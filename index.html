<style>

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:200;}

.modal.wide{width:460px;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:18px;color:#1a1a2e;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:12px;color:#666;margin-bottom:5px;}
.modal-field input,.modal-field textarea{width:100%;font-size:13px;padding:9px 11px;border:1px solid #e0e0ee;border-radius:8px;background:#f8f8ff;color:#1a1a2e;font-family:'Malgun Gothic',sans-serif;}

.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}

.modal-btns button:hover{background:#f5f5f5;}

<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={omi:'~임/~음/~함',adverb:'항상/매사',tone:'격식체',example:'',guide:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">📚</div><div><div class="login-logo-text">생기부 생성기</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교"/></div>
      <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용"/></div>
      <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반"/></div>`:''}
    <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'회원가입':'로그인'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){profile={school:data.school||'',name:data.name||'',role:data.role||''};apiKey=data.api_key||'';try{if(data.style)style=JSON.parse(data.style);}catch(e){}}
    else await sb.from('profiles').upsert({id:user.id,school:'',name:'',role:'',api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  }catch(e){}
}

async function saveProfile(){
  await sb.from('profiles').upsert({id:user.id,school:profile.school,name:profile.name,role:profile.role,api_key:apiKey,style:JSON.stringify(style)},{onConflict:'id'});
}

async function doLogout(){await sb.auth.signOut();}

async function loadClasses(){
  const{data}=await sb.from('students').select('*').eq('user_id',user.id).order('class_name').order('number');
  if(!data)return;
  const map={};
  data.forEach(s=>{
    if(!map[s.class_name])map[s.class_name]={name:s.class_name,deadline:s.class_deadline||'',students:[]};
    map[s.class_name].students.push({id:s.id,number:s.number||0,name:s.name,memo:s.memo||'',keywords:JSON.parse(s.keywords||'[]'),result:s.result||'',status:s.status||'none',deadline:s.deadline||''});
  });
  classes=Object.values(map);
}

function getStu(){const c=classes.find(c=>c.name===selCls);return c?.students.find(s=>s.id===selStu);}
function allStudents(){return classes.flatMap(c=>c.students);}
function bytes(str){let b=0;for(const c of str)b+=c.charCodeAt(0)>127?2:1;return b;}
function statusColor(s){return s==='done'?'#52c41a':s==='wip'?'#faad14':'#d9d9d9';}
function statusLabel(s){return s==='done'?'마감':s==='wip'?'작성중':'미작성';}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

function similarity(a,b){
  const setA=new Set(a.split('').filter(c=>c.charCodeAt(0)>127));
  const setB=new Set(b.split('').filter(c=>c.charCodeAt(0)>127));
  let inter=0;setA.forEach(c=>{if(setB.has(c))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생기부를 먼저 생성해 주세요</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['장애','결손','문제아','불량','빈곤','저능','정신병','ADHD'];
  const hasForbidden=forbidden.some(w=>s.result.includes(w));
  const others=allStudents().filter(os=>os.id!==s.id&&os.result);
  let simWarns=[];
  others.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.65)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);});
  const omiOk=s.result.includes('임')&&(s.result.includes('음')||s.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨':'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음 (전체 학생 기준)'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

- ${style.adverb||'항상/매사'} 중 하나의 부사로 시작
- 긍정 키워드 구체적으로 부각
- 부정 키워드는 극복/성장 가능성으로 표현
- '학생','그는','그가','그의' 사용 금지
- 문장 어미는 ${style.omi||'~임/~음/~함'}으로 통일
- ${style.tone||'격식체'} 말투
- 나이스 기준 ${t}바이트 분량
결과만 출력하세요.`;
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt})});
    const data=await r.json();
    if(data.error){if(ra)ra.value='오류: '+data.error;}
    else{
      const text=data.result||'';
      s.result=text;if(ra)ra.value=text;
      await sb.from('students').update({result:text,status:'wip'}).eq('id',s.id);
      s.status='wip';
      saveVersion(text,feedback?`피드백: ${feedback.substring(0,15)}`:' 자동생성');
      renderChecklist();renderSb();
      if(feedback){
        const hist=JSON.parse(localStorage.getItem(`fb_${s.id}`)||'[]');
        hist.unshift(feedback);if(hist.length>5)hist.pop();
        localStorage.setItem(`fb_${s.id}`,JSON.stringify(hist));
        renderFbHist();
      }
    }
  }catch(e){if(ra)ra.value='오류: '+e.message;}
  if(btn){btn.disabled=false;btn.innerHTML='✨ 생기부 생성';}
  updBC();
}

function generateWithFeedback(){
  const fb=document.getElementById('fbInp')?.value.trim();
  if(!fb){alert('피드백을 입력해 주세요.');return;}
  generate(fb);
  if(document.getElementById('fbInp'))document.getElementById('fbInp').value='';
}

function renderFbHist(){
  const s=getStu();const el=document.getElementById('fbHist');if(!el||!s)return;
  const hist=JSON.parse(localStorage.getItem(`fb_${s.id}`)||'[]');
  el.innerHTML=hist.length?`⏱ 최근 피드백: ${hist[0]}`:'';
}

function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const lbl=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} (${label})`;
  const vers=JSON.parse(localStorage.getItem(`ver_${s.id}`)||'[]');
  vers.unshift({label:lbl,text,ts:Date.now()});
  if(vers.length>15)vers.pop();
  localStorage.setItem(`ver_${s.id}`,JSON.stringify(vers));
}

function openVersionModal(){
  const s=getStu();if(!s)return;
  const vers=JSON.parse(localStorage.getItem(`ver_${s.id}`)||'[]');
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>📋 버전 기록</h3>
    <div class="ver-list">${vers.length?vers.map((v,i)=>`<div class="ver-item"><span class="vl">${v.label}</span><span class="ver-link" onclick="loadVer(${i})">불러오기</span><span class="ver-del" onclick="delVer(${i})">삭제</span></div>`).join(''):'<p style="font-size:13px;color:#bbb;">저장된 버전이 없습니다</p>'}</div>
    <div class="modal-btns" style="margin-top:16px;"><button onclick="closeModal()">닫기</button></div>
  </div>`;
  document.getElementById('app').appendChild(d);
}
function loadVer(i){
  const s=getStu();if(!s)return;
  const vers=JSON.parse(localStorage.getItem(`ver_${s.id}`)||'[]');
  if(!vers[i])return;
  s.result=vers[i].text;
  const ra=document.getElementById('resArea');if(ra)ra.value=s.result;
  sb.from('students').update({result:s.result}).eq('id',s.id);
  updBC();renderChecklist();closeModal();
}
function delVer(i){
  const s=getStu();if(!s)return;
  const vers=JSON.parse(localStorage.getItem(`ver_${s.id}`)||'[]');
  vers.splice(i,1);localStorage.setItem(`ver_${s.id}`,JSON.stringify(vers));
  openVersionModal();
}

async function setDone(){
  const s=getStu();if(!s)return;
  if(!s.result){alert('생기부를 먼저 작성해 주세요.');return;}
  if(!confirm('마감 처리하면 수정이 잠깁니다. 마감할까요?'))return;
  s.status='done';await sb.from('students').update({status:'done'}).eq('id',s.id);
  renderSb();renderMain();
}
async function unsetDone(){
  const s=getStu();if(!s)return;
  if(!confirm('마감을 취소할까요?'))return;
  s.status='wip';await sb.from('students').update({status:'wip'}).eq('id',s.id);
  renderSb();renderMain();
}

function copyResult(){
  const s=getStu();if(!s||!s.result){alert('복사할 내용이 없습니다.');return;}
  navigator.clipboard.writeText(s.result).then(()=>alert('복사됐어요!'));
}

function openModal(t){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  if(t==='class'){
    d.innerHTML=`<div class="modal"><h3>새 반 추가</h3><div class="modal-field"><label>반 이름</label><input id="mi" placeholder="예: 2학년 3반"/></div><div class="modal-field"><label>마감일 (선택)</label><input id="mi2" type="date"/></div><div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="addCls()">추가</button></div></div>`;
  } else {
    d.innerHTML=`<div class="modal"><h3>학생 추가</h3><div class="modal-field"><label>번호</label><input id="mi-num" type="number" placeholder="1" min="1"/></div><div class="modal-field"><label>이름</label><input id="mi" placeholder="예: 김민준"/></div><div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="addStu()">추가</button></div></div>`;
  }
  document.getElementById('app')?.appendChild(d);
  setTimeout(()=>document.getElementById('mi')?.focus(),50);
  document.getElementById('mi')?.addEventListener('keydown',e=>{if(e.key==='Enter')t==='class'?addCls():addStu();});
}
function closeModal(){document.getElementById('mc')?.remove();}

async function addCls(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  const dl=document.getElementById('mi2')?.value||'';
  if(!classes.find(c=>c.name===n))classes.push({name:n,deadline:dl,students:[]});
  selCls=n;selStu=null;closeModal();renderSb();renderMain();
}
async function addStu(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  const num=parseInt(document.getElementById('mi-num')?.value)||0;
  const{data,error}=await sb.from('students').insert({user_id:user.id,name:n,number:num,class_name:selCls,memo:'',keywords:'[]',result:'',status:'none'}).select().single();
  if(error){alert('오류: '+error.message);return;}
  const c=classes.find(c=>c.name===selCls);
  if(c){c.students.push({id:data.id,number:num,name:n,memo:'',keywords:[],result:'',status:'none',deadline:''});c.students.sort((a,b)=>a.number-b.number);}
  selStu=data.id;closeModal();renderSb();renderMain();
}

function openUploadExcel(){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>📥 엑셀 명단 업로드</h3>
    <p style="font-size:12px;color:#888;margin-bottom:14px;">A열: 번호, B열: 이름 형식의 엑셀 파일을 업로드해 주세요.</p>
    <div class="modal-field"><label>반 이름</label><input id="xl-cls" placeholder="예: 2학년 3반"/></div>
    <div class="modal-field"><label>마감일 (선택)</label><input id="xl-dl" type="date"/></div>
    <div class="upload-zone" onclick="document.getElementById('xlFile').click()">클릭하여 엑셀 파일 선택 (.xlsx)</div>
    <input id="xlFile" type="file" accept=".xlsx,.xls" style="display:none" onchange="previewExcel(this)"/>
    <div id="xlPreview"></div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="importExcel()">가져오기</button></div>
  </div>`;
  document.getElementById('app')?.appendChild(d);
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}
async function importExcel(){
  const clsName=document.getElementById('xl-cls')?.value.trim();
  if(!clsName){alert('반 이름을 입력해 주세요.');return;}
  if(!excelData.length){alert('엑셀 파일을 먼저 선택해 주세요.');return;}
  const dl=document.getElementById('xl-dl')?.value||'';
  let c=classes.find(c=>c.name===clsName);
  if(!c){c={name:clsName,deadline:dl,students:[]};classes.push(c);}
  for(const s of excelData){
    const{data,error}=await sb.from('students').insert({user_id:user.id,name:s.name,number:s.number,class_name:clsName,memo:'',keywords:'[]',result:'',status:'none',class_deadline:dl}).select().single();
    if(!error&&data)c.students.push({id:data.id,number:s.number,name:s.name,memo:'',keywords:[],result:'',status:'none',deadline:''});
  }
  c.students.sort((a,b)=>a.number-b.number);
  selCls=clsName;closeModal();renderSb();renderMain();
  alert(`${excelData.length}명이 등록됐어요!`);
}

      <button onclick="doLogout()" class="danger">로그아웃</button>
      <button onclick="closeModal()">취소</button>

async function saveSettings(){
  profile.school=document.getElementById('s-school')?.value.trim()||'';
  profile.name=document.getElementById('s-name')?.value.trim()||'';
  profile.role=document.getElementById('s-role')?.value.trim()||'';
  apiKey=document.getElementById('s-api')?.value.trim()||'';
  style.omi=document.getElementById('s-omi')?.value.trim()||'~임/~음/~함';
  style.adverb=document.getElementById('s-adv')?.value.trim()||'항상/매사';
  style.tone=document.getElementById('s-tone')?.value.trim()||'격식체';
  style.example=document.getElementById('s-ex')?.value.trim()||'';
  style.guide=document.getElementById('s-guide')?.value.trim()||'';
  await saveProfile();closeModal();
  document.querySelector('.logo-school').textContent=profile.school||'학교 미설정';
  document.querySelector('.user-name').textContent=profile.name||'선생님';
  document.querySelector('.user-role').textContent=profile.role||'담임';
  document.querySelector('.avatar').textContent=(profile.name||'?')[0];
  alert('저장됐어요!');
}
