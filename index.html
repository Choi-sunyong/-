.modal-btns button:hover{background:#f5f5f5;}

<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={omi:'~임/~음/~함',adverb:'항상/매사',tone:'격식체',command:'문장은 ~임/~음/~함으로 끝내고, 항상이나 매사로 시작해줘. 격식 있는 말투로 써줘.',example:'',guide:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">📚</div><div><div class="login-logo-text">싯다르타</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교"/></div>
      <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용"/></div>
      <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반"/></div>`:''}
    <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'회원가입':'로그인'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){profile={school:data.school||'',name:data.name||'',role:data.role||''};apiKey=data.api_key||'';try{if(data.style){const parsed=JSON.parse(data.style);style=Object.assign({},style,parsed);if(!style.command){style.command=`문장은 ${style.omi||'~임/~음/~함'}으로 끝내고, ${style.adverb||'항상/매사'} 중 하나로 시작해줘. ${style.tone||'격식체'}로 써줘.`;}}}catch(e){}}
    else await sb.from('profiles').upsert({id:user.id,school:'',name:'',role:'',api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  }catch(e){}
}

async function saveProfile(){
  await sb.from('profiles').upsert({id:user.id,school:profile.school,name:profile.name,role:profile.role,api_key:apiKey,style:JSON.stringify(style)},{onConflict:'id'});
}

async function doLogout(){await sb.auth.signOut();}

async function loadClasses(){
  const{data}=await sb.from('students').select('*').eq('user_id',user.id).order('class_name').order('number');
  if(!data)return;
  const map={};
  data.forEach(s=>{
    if(!map[s.class_name])map[s.class_name]={name:s.class_name,deadline:s.class_deadline||'',students:[]};
    map[s.class_name].students.push({
      id:s.id,number:s.number||0,name:s.name,memo:s.memo||'',
      keywords:JSON.parse(s.keywords||'[]'),result:s.result||'',
      status:s.status||'none',deadline:s.deadline||'',
      versions:JSON.parse(s.versions||'[]'),
      feedbackHist:JSON.parse(s.feedback_hist||'[]'),
      setech:s.setech||'{}',
      changye:s.changye||'{}',
      storedFiles:s.stored_files||'{}'
    });
  });
  classes=Object.values(map);
  const{data:prof}=await sb.from('profiles').select('byte_target').eq('id',user.id).single();
  if(prof?.byte_target)localStorage.setItem('byteTarget',prof.byte_target);
}

function restoreStoredFiles(){
  const s=getStu();if(!s)return;
  const tabId=getCurTabId();
  const key=`files_${s.id}_${tabId}`;
  try{
    const stored=JSON.parse(localStorage.getItem(key)||'{}');
    if(!stored.old&&!stored.example&&(!stored.refs||!stored.refs.filter(r=>r).length))return;
    const files=getAnalyzedFiles();
    if(stored.old)files.old=stored.old;
    if(stored.example)files.example=stored.example;
    if(stored.refs){files.refs=stored.refs;if(!files.refs.length)files.refs=[null];}
    renderFileStatus();
  }catch(e){}
}

function getStu(){const c=classes.find(c=>c.name===selCls);return c?.students.find(s=>s.id===selStu);}
function allStudents(){return classes.flatMap(c=>c.students);}
function bytes(str){let b=0;for(const c of str){const code=c.charCodeAt(0);if(code>0x7F&&code<=0x7FF)b+=2;else if(code>0x7FF)b+=3;else b+=1;}return b;}
function statusColor(s){return s==='done'?'#52c41a':s==='wip'?'#faad14':'#d9d9d9';}
function statusLabel(s){return s==='done'?'마감':s==='wip'?'작성중':'미작성';}

function hasStoredFiles(stuId){
  // 모든 탭에서 파일이 있는지 확인
  const tabs=['haengdong','setech','jayul','dongari','jinro','dokseo'];
  for(const tab of tabs){
    try{
      const stored=JSON.parse(localStorage.getItem(`files_${stuId}_${tab}`)||'{}');
      if(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length))return true;
    }catch(e){}
  }
  return false;
}

function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasStoredFiles(s.id))return 'wip';
  return 'none';
}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

function renderSb(){
  const l=document.getElementById('sbList');if(!l)return;
  const q=searchQ.toLowerCase();
  if(!classes.length){l.innerHTML='<p style="font-size:12px;color:#bbb;padding:12px;">아직 반이 없습니다</p>';return;}
  l.innerHTML=classes.map((c,idx)=>{
    const stus=q?c.students.filter(s=>s.name.includes(q)):c.students;
    const done=c.students.filter(s=>s.status==='done').length;
    const pct=c.students.length?Math.round(done/c.students.length*100):0;
    const dd=ddayText(c.deadline);
    return `<div class="cls-row" draggable="true" data-idx="${idx}"
      ondragstart="onClsDragStart(event,${idx})"

      ondragleave="onClsDragLeave(event)"

        <span style="cursor:grab;color:#ccc;font-size:12px;margin-right:2px;">⠿</span>
        <span>📂</span><span class="cls-name">${c.name}</span>
        ${dd?`<span style="font-size:10px;color:#BA7517;background:#FAEEDA;padding:1px 5px;border-radius:10px;">${dd}</span>`:''}
        <span class="cls-count">${c.students.length}명</span>
        <button class="cls-menu-btn" onclick="showClsMenu(event,'${c.name}')">···</button>
      </div>
      <div class="cls-prog"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;"></div></div><div class="prog-text">${done}/${c.students.length} 마감</div></div>
      ${selCls===c.name?`<div class="stu-list">
        ${stus.map(s=>`<div class="stu-row ${selStu===s.id?'active':''}" onclick="selStudent(${s.id})">
          <span class="stu-num">${String(s.number||'').padStart(2,'0')}</span>
          <span class="stu-name-sb">${s.name}</span>
          <div class="status-dot" style="background:${statusColor(getEffectiveStatus(s))};"></div>

    </div>`;
  }).join('');

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

async function doEditCls(oldName){

  await sb.from('students').update({class_deadline:dl}).eq('user_id',user.id).eq('class_name',clsName);

async function deleteCls(clsName){
  closeCtxMenu();
  if(!confirm(`'${clsName}' 반과 모든 학생 데이터를 삭제할까요?`))return;
  await sb.from('students').delete().eq('user_id',user.id).eq('class_name',clsName);
  classes=classes.filter(c=>c.name!==clsName);
  if(selCls===clsName){selCls=null;selStu=null;}
  renderSb();renderMain();
}

function editStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);if(!s)return;
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal"><h3>학생 정보 수정</h3>
    <div class="modal-field"><label>번호</label><input id="mi-num" type="number" value="${s.number||''}"/></div>

    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="doEditStu(${stuId})">저장</button></div>
  </div>`;
  document.getElementById('app').appendChild(d);setTimeout(()=>document.getElementById('mi')?.focus(),50);
}

async function doEditStu(stuId){
  const name=document.getElementById('mi')?.value.trim();const num=parseInt(document.getElementById('mi-num')?.value)||0;
  if(!name)return;
  await sb.from('students').update({name,number:num}).eq('id',stuId);
  const s=allStudents().find(s=>s.id===stuId);if(s){s.name=name;s.number=num;}
  const c=classes.find(c=>c.name===selCls);if(c)c.students.sort((a,b)=>a.number-b.number);
  closeModal();renderSb();renderMain();
}

async function deleteStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);
  if(!confirm(`'${s?.name}' 학생 데이터를 삭제할까요?`))return;
  await sb.from('students').delete().eq('id',stuId);
  classes.forEach(c=>{c.students=c.students.filter(s=>s.id!==stuId);});
  if(selStu===stuId)selStu=null;
  renderSb();renderMain();
}

function getCalMemo(year,month,date){
  try{
    const memos=JSON.parse(localStorage.getItem('calMemos')||'{}');
    return memos[`${year}-${month}-${date}`]||'';
  }catch(e){return '';}
}

function setCalMemo(year,month,date,memo){
  try{
    const memos=JSON.parse(localStorage.getItem('calMemos')||'{}');
    if(memo)memos[`${year}-${month}-${date}`]=memo;
    else delete memos[`${year}-${month}-${date}`];
    localStorage.setItem('calMemos',JSON.stringify(memos));
  }catch(e){}
}

function openCalMemo(year,month,date){

let calWidgetHeight=parseInt(localStorage.getItem('calWidgetHeight')||'0');

function initCalResize(){
  const handle=document.getElementById('calResizeHandle');
  const widget=document.getElementById('calWidget');
  if(!handle||!widget)return;
  let startY,startH;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    startY=e.clientY;
    startH=widget.offsetHeight;
    const onMove=e=>{
      const h=Math.max(150,startH+(e.clientY-startY));
      widget.style.height=h+'px';
      calWidgetHeight=h;
    };
    const onUp=()=>{
      localStorage.setItem('calWidgetHeight',calWidgetHeight);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  try{
    const base64=await fileToBase64(file);
    files.push({name:file.name,base64,type:file.type||'application/pdf',id:Date.now()});
    renderCommonFileList(stuId);
  }catch(e){alert('파일 읽기 실패: '+e.message);}
}

  const files=getCommonFiles(stuId);

  renderCommonFileList(stuId);
}

function renderTabChecklist(tabType,label){
  const c=document.getElementById('tabChecklist');if(!c)return;
  const data=getTabData(tabType);
  if(!data.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생성 버튼을 눌러 주세요</div>';return;}
  const t=parseInt(document.getElementById('tabByteTarget')?.value||'1000');
  const b=bytes(data.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['장애','결손','문제아','불량','빈곤','저능','정신병','ADHD'];
  const hasForbidden=forbidden.some(w=>data.result.includes(w));
  const others=allStudents().filter(os=>os.id!==getStu()?.id);
  let simWarns=[];
  others.forEach(os=>{
    const oData=tabType==='setech'?JSON.parse(os.setech||'{}')[selSubject||'국어']:JSON.parse(os.changye||'{}')[tabType];
    if(oData?.result){const sim=similarity(data.result,oData.result);if(sim>0.65)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);}
  });
  const omiOk=data.result.includes('임')&&(data.result.includes('음')||data.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨':'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

function updTabBC(){
  const t=parseInt(document.getElementById('tabByteTarget')?.value||'1000');
  const ra=document.getElementById('tabResArea');
  const b=bytes(ra?.value||'');
  const pct=Math.min(100,Math.round(b/t*100));
  const el=document.getElementById('tabByteInfo'),fill=document.getElementById('tabByteFill');
  if(el){el.textContent=`${b} / ${t}`;el.className='byte-info '+(b>t?'ov':'');}
  if(fill)fill.style.width=pct+'%';
}

function getTabData(tabType){
  const s=getStu();if(!s)return{memo:'',keywords:[],result:'',example:'',command:''};
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    return setech[selSubject||'국어']||{memo:'',keywords:[],result:'',example:'',command:''};
  } else {
    const changye=JSON.parse(s.changye||'{}');
    return changye[tabType]||{memo:'',keywords:[],result:'',example:'',command:''};
  }
}

function saveTabData(tabType,label,updates){
  const s=getStu();if(!s)return;
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    const sub=selSubject||'국어';
    setech[sub]={...(setech[sub]||{}), ...updates};
    s.setech=JSON.stringify(setech);
    sb.from('students').update({setech:s.setech}).eq('id',s.id);
  } else {
    const changye=JSON.parse(s.changye||'{}');
    changye[tabType]={...(changye[tabType]||{}), ...updates};
    s.changye=JSON.stringify(changye);
    sb.from('students').update({changye:s.changye}).eq('id',s.id);
  }
}

function saveTabMemo(tabType,label,v){saveTabData(tabType,label,{memo:v});}
let tabAutoSaveTimer=null;
function saveTabResult(tabType,label,v){
  saveTabData(tabType,label,{result:v});updTabBC();
  clearTimeout(tabAutoSaveTimer);
  tabAutoSaveTimer=setTimeout(()=>renderTabChecklist(tabType,label),1000);
}

function addTabKw(tabType,label){
  const inp=document.getElementById('tabKwInp');const text=inp?.value.trim();if(!text)return;
  const type=document.querySelector('input[name="tabKwT"]:checked')?.value||'pos';
  const data=getTabData(tabType);
  const kws=data.keywords||[];
  kws.push({text,type,id:Date.now()});
  inp.value='';
  saveTabData(tabType,label,{keywords:kws});
  const c=document.getElementById('tabKwTags');
  if(c)c.innerHTML=kws.map(k=>`<span class="tag ${k.type}">${k.text}<span class="rm" onclick="rmTabKw('${tabType}','${label}',${k.id})">✕</span></span>`).join('');
}

function rmTabKw(tabType,label,id){
  const data=getTabData(tabType);
  const kws=(data.keywords||[]).filter(k=>k.id!==id);

// 파일 분석 관련 - 학생별 + 탭별로 유지
const analyzedFilesMap={};

function getCurTabId(){return selTab||'haengdong';}

function getAnalyzedFiles(){
  const s=getStu();if(!s)return{old:null,refs:[null],example:null};
  const key=`${s.id}_${getCurTabId()}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}

// 메모리 상의 파일 상태(files)를 localStorage에도 동기화.
// 파일 추가/삭제/슬롯삭제 등 상태가 바뀌는 모든 곳에서 반드시 호출해야
// 다른 탭에 갔다가 돌아와도(restoreStoredFiles) 옛 데이터로 덮어써지지 않음.
function persistFiles(){
  const s=getStu();if(!s)return;
  const files=getAnalyzedFiles();
  const key=`files_${s.id}_${getCurTabId()}`;
  try{
    localStorage.setItem(key,JSON.stringify(files));

function triggerFile(type,idx=0){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx';
  inp.onchange=()=>{if(inp.files[0])processFile(inp.files[0],type,idx);};

}

function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,idx=0){
  e.preventDefault();
  const id=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  document.getElementById(id)?.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f,type,idx);
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#aaa;margin-top:6px;">📖 파일 읽는 중...</div>';
  try{
    const base64=await fileToBase64(file);
    const files=getAnalyzedFiles();
    const s=getStu();
    const fileData={name:file.name,base64,type:file.type||'application/pdf'};

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorage에 저장 (새로고침 후에도 유지)
    persistFiles();

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 파일 읽기 실패</div>';
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else files.refs[idx]=null;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const el=document.getElementById(resultId);if(el)el.innerHTML='';
  persistFiles();
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function similarity(a,b){
  const setA=new Set(a.split('').filter(c=>c.charCodeAt(0)>127));
  const setB=new Set(b.split('').filter(c=>c.charCodeAt(0)>127));
  let inter=0;setA.forEach(c=>{if(setB.has(c))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생기부를 먼저 생성해 주세요</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['장애','결손','문제아','불량','빈곤','저능','정신병','ADHD'];
  const hasForbidden=forbidden.some(w=>s.result.includes(w));
  const others=allStudents().filter(os=>os.id!==s.id&&os.result);
  let simWarns=[];
  others.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.65)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);});
  const omiOk=s.result.includes('임')&&(s.result.includes('음')||s.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨':'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음 (전체 학생 기준)'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

function generateWithFeedback(){
  const fb=document.getElementById('fbInp')?.value.trim();
  if(!fb){alert('피드백을 입력해 주세요.');return;}
  generate(fb);
  if(document.getElementById('fbInp'))document.getElementById('fbInp').value='';
}

function renderFbHist(){
  const s=getStu();const el=document.getElementById('fbHist');if(!el||!s)return;
  const hist=s.feedbackHist||[];
  el.innerHTML=hist.length?`⏱ 최근 피드백: ${hist[0]}`:'';
}

async function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const lbl=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} (${label})`;
  s.versions=s.versions||[];
  s.versions.unshift({label:lbl,text,ts:Date.now()});
  if(s.versions.length>15)s.versions.pop();
  await sb.from('students').update({result:text,status:'wip',versions:JSON.stringify(s.versions)}).eq('id',s.id);
}

function openVersionModal(){
  const s=getStu();if(!s)return;
  const vers=s.versions||[];
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>📋 버전 기록</h3>
    <div class="ver-list">${vers.length?vers.map((v,i)=>`<div class="ver-item"><span class="vl">${v.label}</span><span class="ver-link" onclick="loadVer(${i})">불러오기</span><span class="ver-del" onclick="delVer(${i})">삭제</span></div>`).join(''):'<p style="font-size:13px;color:#bbb;">저장된 버전이 없습니다</p>'}</div>
    <div class="modal-btns" style="margin-top:16px;"><button onclick="closeModal()">닫기</button></div>
  </div>`;
  document.getElementById('app').appendChild(d);
}
async function loadVer(i){
  const s=getStu();if(!s)return;
  const vers=s.versions||[];
  if(!vers[i])return;
  s.result=vers[i].text;
  const ra=document.getElementById('resArea');if(ra)ra.value=s.result;
  await sb.from('students').update({result:s.result}).eq('id',s.id);
  updBC();renderChecklist();closeModal();
}
async function delVer(i){
  const s=getStu();if(!s)return;
  s.versions=s.versions||[];
  s.versions.splice(i,1);
  await sb.from('students').update({versions:JSON.stringify(s.versions)}).eq('id',s.id);
  openVersionModal();
}

async function setDone(){
  const s=getStu();if(!s)return;
  if(!s.result){alert('생기부를 먼저 작성해 주세요.');return;}
  if(!confirm('마감 처리하면 수정이 잠깁니다. 마감할까요?'))return;
  s.status='done';await sb.from('students').update({status:'done'}).eq('id',s.id);
  renderSb();renderMain();
}
async function unsetDone(){
  const s=getStu();if(!s)return;
  if(!confirm('마감을 취소할까요?'))return;
  s.status='wip';await sb.from('students').update({status:'wip'}).eq('id',s.id);
  renderSb();renderMain();
}

function copyResult(){
  const s=getStu();if(!s||!s.result){alert('복사할 내용이 없습니다.');return;}
  navigator.clipboard.writeText(s.result).then(()=>alert('복사됐어요!'));
}

function openModal(t){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  if(t==='class'){
    d.innerHTML=`<div class="modal"><h3>새 반 추가</h3><div class="modal-field"><label>반 이름</label><input id="mi" placeholder="예: 2학년 3반"/></div><div class="modal-field"><label>마감일 (선택)</label><input id="mi2" type="date"/></div><div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="addCls()">추가</button></div></div>`;
  } else {
    d.innerHTML=`<div class="modal"><h3>학생 추가</h3><div class="modal-field"><label>번호</label><input id="mi-num" type="number" placeholder="1" min="1"/></div><div class="modal-field"><label>이름</label><input id="mi" placeholder="예: 김민준"/></div><div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="addStu()">추가</button></div></div>`;
  }
  document.getElementById('app')?.appendChild(d);
  setTimeout(()=>document.getElementById('mi')?.focus(),50);
  document.getElementById('mi')?.addEventListener('keydown',e=>{if(e.key==='Enter')t==='class'?addCls():addStu();});
}
function closeModal(){document.getElementById('mc')?.remove();}

async function addCls(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  const dl=document.getElementById('mi2')?.value||'';
  if(!classes.find(c=>c.name===n))classes.push({name:n,deadline:dl,students:[]});
  selCls=n;selStu=null;closeModal();renderSb();renderMain();
}
async function addStu(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  const num=parseInt(document.getElementById('mi-num')?.value)||0;
  const{data,error}=await sb.from('students').insert({user_id:user.id,name:n,number:num,class_name:selCls,memo:'',keywords:'[]',result:'',status:'none'}).select().single();
  if(error){alert('오류: '+error.message);return;}
  const c=classes.find(c=>c.name===selCls);
  if(c){c.students.push({id:data.id,number:num,name:n,memo:'',keywords:[],result:'',status:'none',deadline:''});c.students.sort((a,b)=>a.number-b.number);}
  selStu=data.id;closeModal();renderSb();renderMain();
}

function openUploadExcel(){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>📥 엑셀 명단 업로드</h3>
    <p style="font-size:12px;color:#888;margin-bottom:14px;">A열: 번호, B열: 이름 형식의 엑셀 파일을 업로드해 주세요.</p>
    <div class="modal-field"><label>반 이름</label><input id="xl-cls" placeholder="예: 2학년 3반"/></div>
    <div class="modal-field"><label>마감일 (선택)</label><input id="xl-dl" type="date"/></div>
    <div class="upload-zone" onclick="document.getElementById('xlFile').click()">클릭하여 엑셀 파일 선택 (.xlsx)</div>
    <input id="xlFile" type="file" accept=".xlsx,.xls" style="display:none" onchange="previewExcel(this)"/>
    <div id="xlPreview"></div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="importExcel()">가져오기</button></div>
  </div>`;
  document.getElementById('app')?.appendChild(d);
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}
async function importExcel(){
  const clsName=document.getElementById('xl-cls')?.value.trim();
  if(!clsName){alert('반 이름을 입력해 주세요.');return;}
  if(!excelData.length){alert('엑셀 파일을 먼저 선택해 주세요.');return;}
  const dl=document.getElementById('xl-dl')?.value||'';
  let c=classes.find(c=>c.name===clsName);
  if(!c){c={name:clsName,deadline:dl,students:[]};classes.push(c);}
  for(const s of excelData){
    const{data,error}=await sb.from('students').insert({user_id:user.id,name:s.name,number:s.number,class_name:clsName,memo:'',keywords:'[]',result:'',status:'none',class_deadline:dl}).select().single();
    if(!error&&data)c.students.push({id:data.id,number:s.number,name:s.name,memo:'',keywords:[],result:'',status:'none',deadline:''});
  }
  c.students.sort((a,b)=>a.number-b.number);
  selCls=clsName;closeModal();renderSb();renderMain();
  alert(`${excelData.length}명이 등록됐어요!`);
}

function openSettings(){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>⚙️ 설정</h3>
    <div class="section-title">👤 프로필</div>
    <div class="modal-field"><label>학교 이름</label><input id="s-school" value="${profile.school}" placeholder="예: 화성고등학교"/></div>
    <div class="modal-field"><label>선생님 이름</label><input id="s-name" value="${profile.name}" placeholder="예: 최순용"/></div>
    <div class="modal-field"><label>역할</label><input id="s-role" value="${profile.role}" placeholder="예: 담임 · 2학년 3반"/></div>
    <div class="section-title">🔑 API 키</div>
    <div class="modal-field"><label>Anthropic API 키</label><input type="password" id="s-api" value="${apiKey}" placeholder="sk-ant-api03-..."/></div>
    <div style="background:#f8f8ff;border:1px solid #e0e0ee;border-radius:8px;padding:12px;margin-top:4px;">
      <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:8px;">📊 API 사용량</div>
      <div style="display:flex;gap:16px;">
        <div style="text-align:center;">
          <div style="font-size:20px;font-weight:700;color:#378ADD;">${localStorage.getItem('genCount')||0}</div>
          <div style="font-size:11px;color:#888;">총 생성 횟수</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:20px;font-weight:700;color:#389e0d;">$${parseFloat(localStorage.getItem('totalCost')||0).toFixed(4)}</div>
          <div style="font-size:11px;color:#888;">총 사용 비용</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:20px;font-weight:700;color:#888;">${localStorage.getItem('genCount')>0?(parseFloat(localStorage.getItem('totalCost')||0)/parseInt(localStorage.getItem('genCount')||1)*100).toFixed(2):0}¢</div>
          <div style="font-size:11px;color:#888;">평균 생성 단가</div>
        </div>
      </div>
      <button onclick="if(confirm('사용량 기록을 초기화할까요?')){localStorage.removeItem('totalCost');localStorage.removeItem('genCount');closeModal();openSettings();}" style="margin-top:8px;font-size:11px;color:#cf1322;border:1px solid #ffa39e;background:#fff1f0;border-radius:5px;padding:2px 8px;cursor:pointer;">초기화</button>
    </div>
    <div class="modal-btns">
      <button onclick="doLogout()" class="danger">로그아웃</button>
      <button onclick="closeModal()">취소</button>
      <button class="ok" onclick="saveSettings()">저장</button>
    </div>
  </div>`;
  document.getElementById('app')?.appendChild(d);
}

function loadExFile(inp){
  const f=inp.files[0];if(!f)return;
  document.getElementById('exFileName').textContent=f.name;
  if(f.type==='text/plain'){
    const reader=new FileReader();
    reader.onload=e=>{document.getElementById('s-ex').value=e.target.result;};
    reader.readAsText(f,'utf-8');
  } else {
    // PDF/PPT는 파일명만 표시하고 base64로 저장해서 API에 전달
    const reader=new FileReader();
    reader.onload=e=>{
      style.exampleFile={name:f.name,base64:e.target.result.split(',')[1],type:f.type};
      document.getElementById('s-ex').value=`[파일 첨부됨: ${f.name}]`;
    };
    reader.readAsDataURL(f);
  }
}

function loadGuideFile(inp){
  const f=inp.files[0];if(!f)return;
  document.getElementById('guideFileName').textContent=f.name;
  if(f.type==='text/plain'){
    const reader=new FileReader();
    reader.onload=e=>{document.getElementById('s-guide').value=e.target.result;};
    reader.readAsText(f,'utf-8');
  } else {
    const reader=new FileReader();
    reader.onload=e=>{
      style.guideFile={name:f.name,base64:e.target.result.split(',')[1],type:f.type};
      document.getElementById('s-guide').value=`[파일 첨부됨: ${f.name}]`;
    };
    reader.readAsDataURL(f);
  }
}

async function saveSettings(){
  profile.school=document.getElementById('s-school')?.value.trim()||'';
  profile.name=document.getElementById('s-name')?.value.trim()||'';
  profile.role=document.getElementById('s-role')?.value.trim()||'';
  apiKey=document.getElementById('s-api')?.value.trim()||'';
  await saveProfile();closeModal();
  document.querySelector('.logo-school').textContent=profile.school||'학교 미설정';
  document.querySelector('.user-name').textContent=profile.name||'선생님';
  document.querySelector('.user-role').textContent=profile.role||'담임';
  document.querySelector('.avatar').textContent=(profile.name||'?')[0];
  alert('저장됐어요!');
}

init();
</script>
