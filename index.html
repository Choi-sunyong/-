<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={omi:'~임/~음/~함',adverb:'항상/매사',tone:'격식체',command:'문장은 ~임/~음/~함으로 끝내고, 격식 있는 말투로 써줘.',example:'',guide:'',customForbidden:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">📚</div><div><div class="login-logo-text">싯다르타</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교"/></div>
      <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용"/></div>
      <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반"/></div>`:''}
    <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'회원가입':'로그인'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){profile={school:data.school||'',name:data.name||'',role:data.role||''};apiKey=data.api_key||'';try{if(data.style){const parsed=JSON.parse(data.style);style=Object.assign({},style,parsed);if(!style.command){style.command=`문장은 ${style.omi||'~임/~음/~함'}으로 끝내고, ${style.tone||'격식체'}로 써줘.`;}}}catch(e){}}

// ===== IndexedDB 기반 파일 저장 (localStorage 5~10MB 한도보다 훨씬 큰 용량을 쓸 수 있음) =====
// 첨부파일(기존 생기부/참고자료)은 용량이 커서 localStorage로는 부족해질 수 있어 여기로 옮김.
// 탭별 텍스트 설정(예시/추가 명령어 등 commonSetting_*)은 용량이 작아서 그대로 localStorage 사용.
const IDB_NAME='siddartha_files';
const IDB_STORE='files';
let _idbPromise=null;
function openIdb(){
  if(_idbPromise)return _idbPromise;
  _idbPromise=new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB 미지원'));return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=()=>{req.result.createObjectStore(IDB_STORE);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return _idbPromise;
}
function idbSet(key,value){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(value,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  }));
}
function idbGet(key){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  }));
}
function idbDelete(key){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  }));
}

// 예전에 localStorage에 저장해뒀던 파일 데이터를 IndexedDB로 한 번만 옮김.
// 옮긴 항목은 localStorage에서 지워서 꽉 찼던 용량도 같이 확보됨. 옮길 게 없으면 그냥 조용히 끝남.
async function migrateFilesToIndexedDB(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('files_'));
  if(!keys.length)return;
  let moved=0;
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw){
        await idbSet(key,JSON.parse(raw));
        localStorage.removeItem(key);
        moved++;
      }
    }catch(e){console.warn('파일 데이터 이전 실패:',key,e);}
  }
  if(moved)console.log(`📦 기존 파일 데이터 ${moved}건을 더 큰 저장소(IndexedDB)로 옮겼어요.`);
}

// hasStoredFiles()는 사이드바/대시보드를 그릴 때 동기적으로 호출되는데, IndexedDB는 비동기라
// 그 자리에서 바로 조회할 수 없음. 그래서 "파일이 있는 학생 ID" 목록을 메모리에 Set으로 들고 있다가
// 동기적으로 즉시 답해주고, 실제 IndexedDB 조회는 파일이 추가/삭제될 때나 로그인 시 미리 해둠.
let studentsWithFilesSet=new Set();
const FILE_TABS=['haengdong','setech','jayul','dongari','jinro','dokseo'];

function isFilesEmpty(stored){
  if(!stored)return true;
  return !(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length));
}

async function refreshStudentFileFlag(studentId){
  for(const tab of FILE_TABS){
    try{
      const stored=await idbGet(`files_${studentId}_${tab}`);
      if(!isFilesEmpty(stored)){studentsWithFilesSet.add(studentId);return;}
    }catch(e){}
  }
  studentsWithFilesSet.delete(studentId);
}

// 로그인 시 IndexedDB 전체를 한 번 훑어서 studentsWithFilesSet을 채워둠.
async function buildStudentsWithFilesSet(){
  studentsWithFilesSet.clear();
  try{
    const db=await openIdb();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).openCursor();
      req.onsuccess=()=>{
        const cursor=req.result;
        if(cursor){
          const m=String(cursor.key).match(/^files_(.+)_(haengdong|setech|jayul|dongari|jinro|dokseo)$/);
          if(m&&!isFilesEmpty(cursor.value))studentsWithFilesSet.add(m[1]);
          cursor.continue();
        }else resolve();
      };
      req.onerror=()=>reject(req.error);
    });
  }catch(e){console.warn('파일 인덱스 구성 실패:',e);}
}

function hasStoredFiles(stuId){
  return studentsWithFilesSet.has(stuId);
}

// 메모/키워드/명령어 중 하나라도 적혀있으면 '작성중'으로 보기 위해, 모든 탭(세특 전체 과목 +
// 자율/동아리/진로/독서 + 행동특성 자체)을 훑어서 뭔가 입력된 게 있는지 확인.
// 학생을 클릭했을 때 어느 탭(세특이면 어느 과목까지)에 실제 작성 중인 내용이 있는지 찾아서 바로 이동시키기 위함.
function getFirstWipTab(s){
  let kwLen=0;
  try{kwLen=(typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[])).length;}catch(e){}
  let haengExtra=false;
  try{
    const changyeH=JSON.parse(s.changye||'{}').haengdong;
    if(changyeH&&(changyeH.command||changyeH.achievement||changyeH.attitude||changyeH.growth))haengExtra=true;
  }catch(e){}
  if(s.result||s.memo||kwLen||haengExtra)return{tab:'haengdong'};
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab:'setech',subject:subj};
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab of ['jayul','dongari','jinro','dokseo']){
      const d=changye[tab];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab};
    }
  }catch(e){}
  return{tab:'setech'};
}

function hasAnyTabInput(s){
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return true;
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab in changye){
      const d=changye[tab];
      // _career는 {clarity,goal} 형태라 d.clarity로 체크
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth||d.clarity))return true;
    }
  }catch(e){}
  if(s.memo)return true;
  try{
    const kws=typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[]);
    if(kws&&kws.length)return true;
  }catch(e){}
  return false;
}
function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasAnyTabInput(s))return 'wip';
  return 'none';
}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

    </div>
    <div id="bulkRefScanResult" style="font-size:13px;color:#888;padding:6px 0;">확인 후 삭제 버튼이 활성화됩니다.</div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok danger" id="bulkRefDeleteBtn" onclick="runBulkRefDelete('${clsName}')">삭제</button></div>
  </div>`;

}
async function scanBulkRefFiles(students){
  let fileCount=0,studentCount=0;
  for(const s of students){
    let studentHas=false;
    for(const tabId of BULK_TAB_IDS){
      try{
        const v=await idbGet(`files_${s.id}_${tabId}`);
        if(v&&Array.isArray(v.refs)&&v.refs.length){fileCount+=v.refs.length;studentHas=true;}
      }catch(e){}
    }
    if(studentHas)studentCount++;
  }
  return{fileCount,studentCount};
}
async function runBulkRefDelete(clsName){
  const c=classes.find(c=>c.name===clsName);if(!c)return;
  const mode=document.querySelector('input[name="bulkDelMode"]:checked')?.value||'refs';
  const label=mode==='refs'?'참고자료':mode==='memo'?'메모':'참고자료 + 메모';
  if(!confirm(`'${clsName}' 반 전체 학생의 ${label}를 삭제할까요? 되돌릴 수 없습니다.`))return;
  const btn=document.getElementById('bulkRefDeleteBtn');
  if(btn){btn.disabled=true;btn.innerHTML='삭제 중...';}
  for(const s of c.students){
    // 참고자료 삭제
    if(mode==='refs'||mode==='both'){
      for(const tabId of BULK_TAB_IDS){
        try{
          const v=await idbGet(`files_${s.id}_${tabId}`);
          if(v&&Array.isArray(v.refs)&&v.refs.length){
            v.refs=[];
            await idbSet(`files_${s.id}_${tabId}`,v);
          }
        }catch(e){}
      }
      await refreshStudentFileFlag(s.id);
    }
    // 메모 삭제
    if(mode==='memo'||mode==='both'){
      // 행동특성 메모
      s.memo='';
      await sb.from('students').update({memo:''}).eq('id',s.id);
      // 세특 메모
      try{
        const setech=JSON.parse(s.setech||'{}');
        Object.keys(setech).forEach(sub=>{if(setech[sub])setech[sub].memo='';});
        s.setech=JSON.stringify(setech);
        await sb.from('students').update({setech:s.setech}).eq('id',s.id);
      }catch(e){}
      // 창의적 체험활동 메모
      try{
        const changye=JSON.parse(s.changye||'{}');
        ['jayul','dongari','jinro','dokseo'].forEach(tab=>{if(changye[tab])changye[tab].memo='';});
        s.changye=JSON.stringify(changye);
        await sb.from('students').update({changye:s.changye}).eq('id',s.id);
      }catch(e){}
    }
  }
  closeModal();
  renderSb();
  if(getStu())restoreStoredFiles();
  if(getStu())renderMain();
  alert(`${label} 일괄 삭제가 완료됐어요.`);
}

async function doEditStu(stuId){
  const name=document.getElementById('mi')?.value.trim();const num=parseInt(document.getElementById('mi-num')?.value)||0;
  if(!name)return;
  await sb.from('students').update({name,number:num}).eq('id',stuId);
  const s=allStudents().find(s=>s.id===stuId);if(s){s.name=name;s.number=num;}
  const c=classes.find(c=>c.name===selCls);if(c)c.students.sort((a,b)=>a.number-b.number);
  closeModal();renderSb();renderMain();
}

async function deleteStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);
  if(!confirm(`'${s?.name}' 학생 데이터를 삭제할까요?`))return;
  await sb.from('students').delete().eq('id',stuId);
  classes.forEach(c=>{c.students=c.students.filter(s=>s.id!==stuId);});
  if(selStu===stuId)selStu=null;
  renderSb();renderMain();
}

function getCalMemo(year,month,date){
  try{
    const memos=JSON.parse(localStorage.getItem('calMemos')||'{}');
    return memos[`${year}-${month}-${date}`]||'';
  }catch(e){return '';}
}

function setCalMemo(year,month,date,memo){
  try{
    const memos=JSON.parse(localStorage.getItem('calMemos')||'{}');
    if(memo)memos[`${year}-${month}-${date}`]=memo;
    else delete memos[`${year}-${month}-${date}`];
    localStorage.setItem('calMemos',JSON.stringify(memos));
  }catch(e){}
}

function searchAndGo(){
  const q=searchQ.trim();if(!q)return;
  for(const c of classes){
    const found=c.students.find(s=>s.name.includes(q));
    if(found){
      selCls=c.name;selStu=found.id;
      searchQ='';
      const inp=document.getElementById('searchInput');if(inp)inp.value='';
      renderSb();renderMain();
      return;
    }
  }
  alert(`'${q}' 학생을 찾을 수 없습니다.`);
}

}

async function addReviewFile(file){
  const isPptx=/\.pptx$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    reviewFiles.push(fileData);
    await persistReviewFiles();
    renderReviewFileList();
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistReviewFiles(){
  try{await idbSet('reviewFiles_global',reviewFiles);}catch(e){console.warn('저장 공간 초과:',e);}
}
async function loadReviewFiles(){
  try{
    const stored=await idbGet('reviewFiles_global');
    if(stored){reviewFiles.length=0;stored.forEach(f=>reviewFiles.push(f));}
  }catch(e){}
}

function removeReviewFile(id){
  const idx=reviewFiles.findIndex(f=>f.id===id);
  if(idx>-1)reviewFiles.splice(idx,1);
  persistReviewFiles();
  renderReviewFileList();
}

async function addDashFile(tabId,file){
  const files=getDashFiles(tabId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistDashFiles(tabId);
    renderDashFileList();
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistDashFiles(tabId){

}

  const tc=document.getElementById('tabContent');if(!tc)return;
  tc.innerHTML=`<div class="sview">
    <div class="card">

      <p style="font-size:12px;color:#888;margin-bottom:12px;">여기에 업로드한 파일은 이 학생의 모든 탭(세특·자율·동아리·진로·독서·행동특성) AI 생성 시 공통으로 사용됩니다.<br>생기부 작성요령, 우수사례, 수행평가 자료 등을 올려주세요.</p>

  </div>`;
  loadCommonFiles(s.id).then(()=>renderCommonFileList(s.id));

function triggerCommonFile(){
  const s=getStu();if(!s)return;
  const files=getCommonFiles(s.id);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx';inp.multiple=true;
  inp.onchange=()=>Array.from(inp.files).forEach(f=>addCommonFile(s.id,f));
  inp.click();
}

function onCommonDrop(e){
  e.preventDefault();
  const s=getStu();if(!s)return;
  const dz=document.getElementById('commonDropZone');
  if(dz)dz.style.background='#f0f7ff';
  Array.from(e.dataTransfer.files).forEach(f=>addCommonFile(s.id,f));
}

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistCommonFiles(stuId);
    renderCommonFileList(stuId);
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistCommonFiles(stuId){
  try{await idbSet(`commonFiles_${stuId}`,getCommonFiles(stuId));}catch(e){console.warn('저장 공간 초과:',e);}
}
async function loadCommonFiles(stuId){
  try{
    const stored=await idbGet(`commonFiles_${stuId}`);
    if(stored)commonFilesMap[stuId]=stored;
  }catch(e){}
}

function removeCommonFile(stuId,id){
  const files=getCommonFiles(stuId);
  const idx=files.findIndex(f=>f.id===id);
  if(idx>-1)files.splice(idx,1);
  persistCommonFiles(stuId);
  renderCommonFileList(stuId);
}

function renderCommonFileList(stuId){
  const container=document.getElementById('commonFileList');if(!container)return;
  const files=getCommonFiles(stuId);
  if(!files.length){container.innerHTML='<p style="font-size:12px;color:#bbb;text-align:center;padding:8px;">업로드된 파일이 없습니다</p>';return;}
  container.innerHTML=files.map(f=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8f8ff;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0ee;">
      <span style="font-size:16px;">📄</span>
      <span style="font-size:12px;flex:1;color:#1a1a2e;">${f.name}</span>
      <span style="font-size:11px;color:#aaa;">${Math.round(f.base64.length*0.75/1024)}KB</span>
      <button onclick="removeCommonFile('${stuId}',${f.id})" style="font-size:11px;color:#cf1322;border:1px solid #ffa39e;background:#fff1f0;border-radius:5px;padding:2px 8px;cursor:pointer;">삭제</button>
    </div>
  `).join('')+`<p style="font-size:11px;color:#aaa;margin-top:4px;">${files.length}/10개 업로드됨</p>`;
}

function renderTabChecklist(tabType,label){
  const c=document.getElementById('tabChecklist');if(!c)return;
  const data=getTabData(tabType);
  if(!data.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생성 버튼을 눌러 주세요</div>';return;}
  const forbiddenFound=checkForbidden(data.result);
  const hasForbidden=forbiddenFound.length>0;
  const others=allStudents().filter(os=>os.id!==getStu()?.id);
  let simWarns=[];
  others.forEach(os=>{
    const oData=tabType==='setech'?JSON.parse(os.setech||'{}')[selSubject||'국어']:JSON.parse(os.changye||'{}')[tabType];
    if(oData?.result){const sim=similarity(data.result,oData.result);if(sim>0.35)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);}
  });
  if(tabType==='dokseo'){
    // 독서활동상황은 나이스 지침상 "도서명(저자), 도서명(저자), ..." 형식만 허용 — 문단형이면 위반
    const looksLikeList=/^[^.!?]*\([^()]+\)\s*(,|$)/.test(data.result.trim())&&!/[.!?]\s*[가-힣]/.test(data.result);
    const hasParen=data.result.includes('(')&&data.result.includes(')');
    c.innerHTML=`
      <div class="check-item"><div class="ci ${hasParen&&looksLikeList?'ok':'warn'}">${hasParen&&looksLikeList?'✓':'!'}</div> 형식 확인 ${hasParen&&looksLikeList?'"도서명(저자)" 목록 형식':'문장형으로 보임 — "도서명(저자), 도서명(저자)" 형식이어야 함'}</div>
      <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨 — '+forbiddenFound.join(', '):'없음'}</div>
      <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음'}</div>`;
    return;
  }
  const t=parseInt(document.getElementById('tabByteTarget')?.value||'1000');
  const b=bytes(data.result);
  const byteOk=b>=t*0.8&&b<=t;
  const omiOk=data.result.includes('임')&&(data.result.includes('음')||data.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨 — '+forbiddenFound.join(', '):'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

function getCareerInfo(s){
  try{return JSON.parse(s.changye||'{}')._career||{};}catch(e){return{};}
}
function careerPromptLine(career){
  if(!career.clarity)return'';
  let extra='';
  if(career.goal&&career.clarity==='구체적 진로희망 있음')extra=` (진로 희망: ${career.goal})`;
  else if(career.goal&&career.clarity==='탐색 중')extra=` (고민 중인 분야: ${career.goal})`;
  return`[진로 구체성]: ${career.clarity}${extra}\n`;
}
async function saveCareerField(field,v,rerender){
  const s=getStu();if(!s)return;
  let changye={};
  try{changye=JSON.parse(s.changye||'{}');}catch(e){}
  changye._career={...(changye._career||{}),[field]:v};
  s.changye=JSON.stringify(changye);
  await sb.from('students').update({changye:s.changye}).eq('id',s.id);
  renderSb();
  if(rerender!==false)renderMain();
}

function initTabEvents(tabType,label){
  document.getElementById('tabKwInp')?.addEventListener('keydown',e=>{if(e.key==='Enter')addTabKw(tabType,label);});
  renderFileStatus();updTabBC();renderTabChecklist(tabType,label);setTimeout(renderRefSlots,50);
}

function updTabBC(){
  const t=parseInt(document.getElementById('tabByteTarget')?.value||'1000');
  const ra=document.getElementById('tabResArea');
  const b=bytes(ra?.value||'');
  const pct=Math.min(100,Math.round(b/t*100));
  const el=document.getElementById('tabByteInfo'),fill=document.getElementById('tabByteFill');
  if(el){el.textContent=`${b} / ${t}`;el.className='byte-info '+(b>t?'ov':'');}
  if(fill)fill.style.width=pct+'%';
}

// ===== 첨부파일 내용 확인 (2단계 검증) =====
// AI가 첨부파일에서 실제로 읽은 내용만 먼저 보여주고, 선생님이 확인/수정한 뒤 저장.
// 이후 생성 시에는 원본 파일을 다시 읽는 대신, 이 검증된 텍스트를 우선 사용해서
// AI가 손글씨 등을 잘못 읽고 지어내는 위험을 줄임.
async function verifyFiles(tabType,label){
  if(!apiKey){alert('⚙️ 설정에서 API 키를 먼저 입력해 주세요.');return;}
  const files=getAnalyzedFiles();
  if(!files.old&&!(files.refs||[]).some(r=>r)){alert('확인할 첨부파일이 없어요. 먼저 파일을 올려주세요.');return;}
  const pptxBlock=extractedTextBlock(files);
  const hasPdf=(files.old&&files.old.base64)||(files.refs||[]).some(r=>r&&r.base64);
  if(!hasPdf){
    // PPTX만 있으면 이미 정확한 텍스트라 AI 확인 절차 없이 그대로 보여줌
    showVerifyModal(tabType,label,pptxBlock||'(내용 없음)',false);
    return;
  }
  const prompt=`당신은 첨부된 파일의 내용을 있는 그대로 확인하는 역할입니다. 생기부 문장을 쓰지 마세요.
첨부된 파일(들)에 실제로 적혀있는 내용(주제, 핵심 키워드, 답변 내용 등)을 최대한 정확하게 정리해서 알려주세요.
- 글씨가 흐릿하거나 불명확한 부분은 추측하지 말고 "(판독 불가)"라고 표시하세요.
- 절대로 내용을 지어내거나 추측하지 마세요. 확실히 읽은 것만 적으세요.
결과만 출력하세요.`;
  const fileRefs=(files.refs||[]).filter(r=>r&&r.base64).map(r=>({base64:r.base64,mediaType:r.type}));
  showVerifyModal(tabType,label,'⏳ 파일을 읽는 중...',true);
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt,fileOld:(files.old&&files.old.base64)?{base64:files.old.base64,mediaType:files.old.type}:null,fileRefs,fileExample:null})});
    const d=await r.json();
    if(d.error){showVerifyModal(tabType,label,'오류: '+d.error,false);return;}
    const combined=pptxBlock?`${d.result||''}\n\n${pptxBlock}`:(d.result||'');
    showVerifyModal(tabType,label,combined,false);
  }catch(e){showVerifyModal(tabType,label,'오류: '+e.message,false);}
}

function getTabData(tabType){
  const s=getStu();if(!s)return{memo:'',keywords:[],result:'',example:'',command:''};
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    return setech[selSubject||'국어']||{memo:'',keywords:[],result:'',example:'',command:''};
  } else {
    const changye=JSON.parse(s.changye||'{}');
    return changye[tabType]||{memo:'',keywords:[],result:'',example:'',command:''};
  }
}

async function saveTabData(tabType,label,updates){
  const s=getStu();if(!s)return;
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    const sub=selSubject||'국어';
    setech[sub]={...(setech[sub]||{}), ...updates};
    s.setech=JSON.stringify(setech);
    await sb.from('students').update({setech:s.setech}).eq('id',s.id);
  } else {
    const changye=JSON.parse(s.changye||'{}');
    changye[tabType]={...(changye[tabType]||{}), ...updates};
    s.changye=JSON.stringify(changye);
    await sb.from('students').update({changye:s.changye}).eq('id',s.id);
  }
}

// 생성 기록 기본 이름용 (첫 번째, 두 번째, ...)
const KOREAN_ORDINALS=['첫','두','세','네','다섯','여섯','일곱','여덟','아홉','열','열한','열두','열세','열네','열다섯','열여섯','열일곱','열여덟','열아홉','스무'];
function koreanOrdinal(n){ return (KOREAN_ORDINALS[n-1]||n)+' 번째'; }

function pushTabVersion(tabType,label,text,verLabel){
  if(!text)return;
  const data=getTabData(tabType);

// 결과가 목표 바이트±100을 벗어나면 한 번 더 요청해서 분량을 맞춤.
// 분량 조정은 "이미 쓴 글"을 줄이거나 늘리는 작업이라 원본 파일을 다시 분석할 필요가 없음.
// 그래서 이 재시도 요청에는 파일을 다시 첨부하지 않음 — 안 그러면 파일 토큰 비용이 그대로 두 번 나가게 됨.
async function regenerateIfByteOff(target,text,cost){
  const actual=bytes(text);
  if(Math.abs(actual-target)<=100)return{text,cost,retried:false};
  const adjustPrompt=`다음 글의 분량을 조정해 주세요. 내용과 문체는 그대로 유지하고, 분량만 ${target}바이트(허용범위 ${Math.max(0,target-100)}~${target+100}바이트, 나이스 기준 한글 1자=3바이트로 계산)에 맞게 ${actual>target?'압축해서 줄여':'세부 내용을 보강해서 늘려'} 주세요. 압축할 때는 같은 평가성 어휘(인상적임, 두드러짐 등)가 반복되지 않도록 정리하고, 간결하고 객관적인 문체를 유지하세요. 새로운 평가 표현이나 새로운 활동 내용을 추가하지 마세요.

[원본 글] (현재 ${actual}바이트):
${text}

결과만 출력하세요.`;
  try{
    const r2=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt:adjustPrompt,fileOld:null,fileRefs:[],fileExample:null})});
    const d2=await r2.json();
    if(!d2.error&&d2.result)return{text:d2.result,cost:cost+(d2.cost||0),retried:true};
  }catch(e){}
  return{text,cost,retried:false};
}

// PPTX는 base64 문서가 아니라 이미 추출된 일반 텍스트(extractedText)로 저장돼 있음.
// 이건 슬라이드에 실제로 적힌 텍스트 그대로라 손글씨 OCR과 달리 100% 정확하므로,
// "지어내지 말 것" 경고 없이 그대로 신뢰하고 쓰도록 프롬프트에 넣어줌.
function extractedTextBlock(files){
  const parts=[];
  if(files.old?.extractedText)parts.push(`[기존 생기부(PPTX) 추출 텍스트]:\n${files.old.extractedText}`);
  (files.refs||[]).forEach((r,i)=>{
    if(!r)return;
    if(r.type==='text'&&r.extractedText)parts.push(`[참고자료${i+1}(구글폼 응답)]:\n${r.extractedText}`);
    else if(r.extractedText)parts.push(`[참고자료${i+1}(PPTX) 추출 텍스트]:\n${r.extractedText}`);
  });
  return parts.join('\n\n');
}

결과만 출력하세요.`;
  try{

    const allRefs=[...fileRefs,...commonRefs];
    const finalPrompt=prompt+(commonPptxText?`\n\n${commonPptxText}\n(위 공통자료 PPTX 텍스트는 실제 슬라이드 내용 그대로이므로 정확하게 신뢰하고 활용할 것)`:'');
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt:finalPrompt,fileOld:(!verifiedContent&&files.old&&files.old.base64)?{base64:files.old.base64,mediaType:files.old.type}:null,fileRefs:allRefs,fileExample:files.example?.base64?{base64:files.example.base64,mediaType:files.example.type}:null})});
    const d=await r.json();
    if(d.error){if(ra)ra.value='오류: '+d.error;}
    else{
      let text=d.result||'';
      let cost=d.cost||0;

      if(ra)ra.value=text;

// 파일 분석 관련 - 학생별 + 탭별로 유지
const analyzedFilesMap={};

function getCurTabId(){return selTab||'haengdong';}

function getAnalyzedFiles(){
  const s=getStu();if(!s)return{old:null,refs:[null],example:null};
  const key=`${s.id}_${getCurTabId()}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};

// 메모리 상의 파일 상태(files)를 IndexedDB에도 동기화.
// 파일 추가/삭제/슬롯삭제 등 상태가 바뀌는 모든 곳에서 반드시 호출해야
// 다른 탭에 갔다가 돌아와도(restoreStoredFiles) 옛 데이터로 덮어써지지 않음.
async function persistFiles(){
  const s=getStu();if(!s)return;
  const files=getAnalyzedFiles();
  const key=`files_${s.id}_${getCurTabId()}`;
  try{
    await idbSet(key,files);

// 파일 데이터(files.old/files.refs[i])에 focus 필드로 같이 저장해서 새로고침해도 남게 함.
let focusSaveTimer=null;
function updateFocus(type,idx){
  const files=getAnalyzedFiles();
  const val=type==='old'?(document.getElementById('focusOld')?.value||''):(document.getElementById(`focusRef${idx}`)?.value||'');
  if(type==='old'){ if(files.old)files.old.focus=val; }
  else{ if(files.refs&&files.refs[idx])files.refs[idx].focus=val; }
  clearTimeout(focusSaveTimer);
  focusSaveTimer=setTimeout(()=>persistFiles(),500);
}

function triggerFile(type,idx=0){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx';
  inp.onchange=()=>{if(inp.files[0])processFile(inp.files[0],type,idx);};
  inp.click();
}

function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,idx=0){
  e.preventDefault();
  const id=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  document.getElementById(id)?.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f,type,idx);
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  const isPptx=/\.pptx$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.</div>';
    if(dropEl)dropEl.classList.remove('loading');
    return;
  }
  if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#aaa;margin-top:6px;">📖 ${isPptx?'슬라이드 텍스트 추출 중...':'파일 읽는 중...'}</div>`;
  try{
    const files=getAnalyzedFiles();
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf'};
    }

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorage에 저장 (새로고침 후에도 유지)
    persistFiles();

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 파일 읽기 실패: ${e.message||''}</div>`;
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else files.refs[idx]=null;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const el=document.getElementById(resultId);if(el)el.innerHTML='';
  persistFiles();
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// 참고자료(및 기존 생기부) 파일을 클릭해서 바로 열어볼 수 있게 해줌.
// PDF/이미지는 base64를 blob으로 바꿔서 새 탭으로 열고, PPTX는 추출된 텍스트를 모달로 보여줌
// (브라우저가 PPTX 자체를 못 열기 때문).
function openFilePreview(type,idx){
  const files=getAnalyzedFiles();
  const f=type==='old'?files.old:type==='example'?files.example:files.refs[idx];
  if(!f){alert('파일을 찾을 수 없어요.');return;}
  if(f.type==='pptx'||f.extractedText){
    const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
    d.innerHTML=`<div class="modal wide"><h3>📄 ${f.name}</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:8px;">PPTX는 미리보기가 안 돼서, 추출된 텍스트를 대신 보여드려요.</p>
      <textarea readonly style="width:100%;height:50vh;font-size:13px;line-height:1.6;border:1px solid #e0e0ee;border-radius:7px;padding:10px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;">${(f.extractedText||'').replace(/</g,'&lt;')}</textarea>
      <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">닫기</button></div>
    </div>`;
    document.getElementById('app').appendChild(d);
    return;
  }
  if(!f.base64){alert('미리볼 수 있는 파일이 아니에요.');return;}
  try{
    const byteChars=atob(f.base64);
    const byteNums=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)byteNums[i]=byteChars.charCodeAt(i);
    const byteArr=new Uint8Array(byteNums);
    const blob=new Blob([byteArr],{type:f.type||'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){alert('파일을 여는 데 실패했어요.');}
}

// PPTX는 Claude API가 PDF처럼 직접 읽을 수 없어서(공식 미지원, 변환 필요),
// ZIP 안의 슬라이드 XML(ppt/slides/slideN.xml)에서 텍스트를 직접 추출해 일반 텍스트로 넘김.
// 이미지가 아니라 실제 슬라이드 텍스트 그대로라서 손글씨 OCR보다 훨씬 정확함.
async function extractPptxText(file){
  const zip=await JSZip.loadAsync(file);
  const slideFiles=Object.keys(zip.files)
    .filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b)=>{
      const na=parseInt(a.match(/slide(\d+)\.xml/)[1]);
      const nb=parseInt(b.match(/slide(\d+)\.xml/)[1]);
      return na-nb;
    });
  if(!slideFiles.length)throw new Error('슬라이드를 찾을 수 없어요 (.ppt 구버전 형식은 지원하지 않아요. .pptx로 저장 후 다시 시도해 주세요)');
  const parser=new DOMParser();
  const slideTexts=[];
  for(let i=0;i<slideFiles.length;i++){
    const xml=await zip.files[slideFiles[i]].async('string');
    const doc=parser.parseFromString(xml,'application/xml');
    const tNodes=doc.getElementsByTagName('a:t');
    const text=Array.from(tNodes).map(n=>n.textContent).join(' ').trim();
    if(text)slideTexts.push(`[슬라이드 ${i+1}]\n${text}`);
  }
  return slideTexts.join('\n\n')||'(텍스트를 찾을 수 없는 슬라이드입니다)';
}

// 글자 종류만 비교하면 흔한 조사/어미 때문에 거의 항상 높게 나옴.
// 대신 4글자 단위로 이어붙인 조각(n-gram, 표절 검사에 흔히 쓰는 shingling 방식)의 집합을 비교해서,
// 실제로 같은 문구가 반복됐는지를 잡아냄.
function ngramSet(text,n=4){
  const clean=(text||'').replace(/\s+/g,'');
  const set=new Set();
  for(let i=0;i<=clean.length-n;i++)set.add(clean.slice(i,i+n));
  return set;
}
// 2026 학교생활기록부 기재요령(교육부/시도교육청 공통, '01. 학교생활기록부 작성 시 유의사항' 가~파 항목) 기준으로 구성.
// 학교마다 추가하고 싶은 단어는 기본 설정의 "금지어 추가" 칸에서 따로 넣을 수 있음.
const FORBIDDEN_WORDS_DEFAULT=[

const FORBIDDEN_PATTERNS=[
  {label:'사교육기관명 의심(나이스 기재요령 타항)',regex:/[가-힣A-Za-z0-9]{1,8}(학원|어학원|교습소)/g},
  {label:'인증시험 점수 의심(가항)',regex:/(토익|토플|텝스|HSK|JPT|JLPT|DELE)\s*[:\s]*\d+/g},
  {label:'부모 직업·지위 암시 의심(차항)',regex:/(아버지|어머니|부모님)\s*(은|는|이|가)?\s*(의사|변호사|판사|검사|교수|대표|사장|공무원|회사원|임원|약사|간호사|군인|경찰)/g},
  {label:'특정 대학명 의심(타항)',regex:/[가-힣]{2,6}대학교/g}
];
function getCustomForbidden(){
  return (style.customForbidden||'').split('\n').map(w=>w.trim()).filter(Boolean);
}
function checkForbidden(text){
  if(!text)return[];
  const found=[];
  [...FORBIDDEN_WORDS_DEFAULT,...getCustomForbidden()].forEach(w=>{
    if(w&&text.includes(w))found.push(w);
  });
  FORBIDDEN_PATTERNS.forEach(p=>{
    const m=text.match(p.regex);
    if(m)found.push(...new Set(m.map(x=>`${p.label}("${x.trim()}")`)));
  });
  // 4. 학교를 알 수 있는 내용(학교명 등) 기재 불가 — 설정에 입력해둔 학교 이름과 대조
  if(profile.school&&text.includes(profile.school))found.push(`학교명 노출 의심("${profile.school}")`);
  return[...new Set(found)];
}

function similarity(a,b){
  if(!a||!b)return 0;
  const setA=ngramSet(a),setB=ngramSet(b);
  if(!setA.size||!setB.size)return 0;
  let inter=0;setA.forEach(g=>{if(setB.has(g))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생기부를 먼저 생성해 주세요</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbiddenFound=checkForbidden(s.result);
  const hasForbidden=forbiddenFound.length>0;
  const others=allStudents().filter(os=>os.id!==s.id&&os.result);
  let simWarns=[];
  others.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.35)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);});
  const omiOk=s.result.includes('임')&&(s.result.includes('음')||s.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨 — '+forbiddenFound.join(', '):'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음 (전체 학생 기준)'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

async function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const dateStr=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  s.versions=s.versions||[];
  const isAuto=(label||'').trim()==='자동생성';
  const name=isAuto?koreanOrdinal(s.versions.length+1)+' 생성':label;
  s.versions.unshift({name,dateStr,text,ts:Date.now()});
  if(s.versions.length>15)s.versions.pop();
  await sb.from('students').update({result:text,status:'wip',versions:JSON.stringify(s.versions)}).eq('id',s.id);
}

function parseFormCsv(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result.replace(/^\uFEFF/,''); // BOM 제거

    // CSV 전체를 따옴표 인식하며 행 분리 (셀 안에 줄바꿈이 있어도 올바르게 처리)
    function parseCsvFull(raw){
      const rows=[];let cur=[];let cell='';let inQ=false;
      for(let i=0;i<raw.length;i++){
        const c=raw[i];
        if(c==='"'){
          if(inQ&&raw[i+1]==='"'){cell+='"';i++;}
          else inQ=!inQ;
        } else if(c===','&&!inQ){cur.push(cell);cell='';}
        else if((c==='\n'||c==='\r')&&!inQ){
          if(c==='\r'&&raw[i+1]==='\n')i++;
          cur.push(cell);cell='';
          if(cur.some(v=>v.trim()))rows.push(cur);
          cur=[];
        } else cell+=c;
      }
      cur.push(cell);
      if(cur.some(v=>v.trim()))rows.push(cur);
      return rows;
    }

    const rawRows=parseCsvFull(text);
    if(rawRows.length<2){alert('데이터가 없어요. CSV 파일을 확인해주세요.');return;}

    // 학생 답변 안에 줄바꿈이 있을 때 CSV 행이 쪼개지는 문제 보정.
    // 헤더 열 수보다 적은 열을 가진 행은 이전 행의 마지막 셀에 이어 붙임.
    const headerLen=rawRows[0].length;
    const allRows=[rawRows[0]];
    for(let i=1;i<rawRows.length;i++){
      if(rawRows[i].length<headerLen&&allRows.length>1){
        const prev=allRows[allRows.length-1];
        prev[prev.length-1]+='\n'+rawRows[i].join(',');
      }else{
        allRows.push(rawRows[i]);
      }
    }

    const headers=allRows[0].map(h=>h.trim());
    const dataRows=allRows.slice(1);

    // 이름/반 열 자동 감지 (대소문자/공백 무시)
    const nameIdx=headers.findIndex(h=>/이름|name/i.test(h));
    const clsIdx=headers.findIndex(h=>/수강반|반|class/i.test(h));
    if(nameIdx<0){
      alert('CSV에서 "이름" 열을 찾을 수 없어요.\n\n발견된 열: '+headers.join(', '));
      return;
    }

    // 제외할 열: 타임스탬프, 이름, 반, 학번 등 메모에 불필요한 열
    const skipIdxs=new Set([nameIdx,clsIdx].filter(i=>i>=0));
    headers.forEach((h,i)=>{
      if(/타임스탬프|timestamp|학번|email|이메일/i.test(h.trim()))skipIdxs.add(i);
    });

    // 나머지 열 = 질문 항목
    const qIdxs=headers.map((h,i)=>i).filter(i=>!skipIdxs.has(i));

    formImportRows=dataRows.map(cols=>{
      const rawName=(cols[nameIdx]||'').trim();
      // "20226 이하은" 또는 "20226이하은" 처럼 학번이 앞에 붙은 경우 숫자 제거
      const name=rawName.replace(/^\d+\s*/,'').replace(/^\d+/,'').trim();
      const cls=clsIdx>=0?(cols[clsIdx]||'').trim():'';
      const qs={};
      qIdxs.forEach(i=>{
        const q=(headers[i]||'').trim();
        const a=(cols[i]||'').trim();
        if(q&&a)qs[q]=a;
      });
      return{name,cls,qs};
    }).filter(r=>r.name);

    renderFormMatchTable();
    document.getElementById('fStep1').style.display='none';
    document.getElementById('fStep2').style.display='block';
  };
  reader.readAsText(file,'utf-8');
}

// CSV 행 매칭 — 파일 일괄 업로드와 동일하게 실제 학생 이름과 직접 대조.
// 이름 완전 일치 우선, 없으면 포함 여부로 폴백. 반 정보는 보조 확인용.
function matchFormRow(r){
  const all=allStudents();
  const rName=r.name.replace(/\s/g,'');
  // 1순위: 이름 완전 일치
  let found=all.find(s=>s.name.replace(/\s/g,'')===rName);
  if(found)return found;
  // 2순위: 이름이 포함되는 가장 긴 이름 (bulkMatchFile과 동일 방식)
  const candidates=all.filter(s=>rName.includes(s.name.replace(/\s/g,''))||s.name.replace(/\s/g,'').includes(rName));
  if(!candidates.length)return null;
  candidates.sort((a,b)=>b.name.length-a.name.length);
  return candidates[0];
}

function parseCsvLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){
      if(inQ&&line[i+1]==='"'){cur+='"';i++;}
      else inQ=!inQ;
    }else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur);
  return result;
}

function renderFormMatchTable(){
  let matched=0,unmatched=0;
  const rows=formImportRows.map(r=>{
    const stu=matchFormRow(r);
    if(stu)matched++;else unmatched++;
    const preview=Object.values(r.qs)[0]||'—';
    const badgeStyle=stu?
      'background:var(--bg-success);color:var(--text-success);':
      'background:var(--bg-warning);color:var(--text-warning);';
    return `<div style="display:grid;grid-template-columns:90px 70px minmax(0,1fr) 64px;padding:7px 12px;border-bottom:0.5px solid var(--border);align-items:center;">
      <span style="font-size:13px;color:var(--text-primary);">${r.name}</span>
      <span style="font-size:12px;color:var(--text-secondary);">${r.cls}</span>
      <div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;min-width:0;">${preview.substring(0,30)}${preview.length>30?'...':''}</div>
      <span style="font-size:11px;padding:2px 8px;border-radius:4px;text-align:center;${badgeStyle}">${stu?'매칭':'미매칭'}</span>
    </div>`;
  }).join('');

  document.getElementById('fMatchTable').innerHTML=rows;
  const badge=document.getElementById('fMatchBadge');
  badge.textContent=`${matched}명 매칭`;
  badge.style.cssText=`font-size:12px;padding:2px 10px;border-radius:var(--radius);background:var(--bg-success);color:var(--text-success);`;
  const btn=document.getElementById('fApplyBtn');
  if(btn)btn.textContent=`${matched}명 메모에 입력`;
  btn.disabled=matched===0;
}

async function applyFormImport(){
  const mode=document.querySelector('input[name="fMode"]:checked')?.value||'replace';
  const tabId=formImportTab;
  let done=0,skipped=0;
  const btn=document.getElementById('fApplyBtn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  for(const r of formImportRows){
    const stu=matchFormRow(r);
    if(!stu){skipped++;continue;}

    const formText=Object.entries(r.qs)
      .filter(([q,a])=>a)
      .map(([q,a])=>`[${q}]\n${a}`)
      .join('\n\n──────────\n\n');

    const refObj={
      name:`폼응답_${stu.name}.txt`,
      type:'text',
      base64:null,
      extractedText:formText,
      focus:'구글폼 응답'
    };

    const key=`files_${stu.id}_${tabId}`;
    let fileData={old:null,refs:[null],example:null};
    try{const v=await idbGet(key);if(v)fileData=v;}catch(e){}
    if(!Array.isArray(fileData.refs))fileData.refs=[null];

    if(mode==='replace'){
      // 기존 폼 응답 참고자료 교체, 없으면 빈 슬롯에 추가
      const existIdx=fileData.refs.findIndex(r=>r&&r.type==='text');
      if(existIdx>=0){fileData.refs[existIdx]=refObj;}
      else{
        const nullIdx=fileData.refs.findIndex(r=>!r);
        if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
        else if(fileData.refs.length<5){fileData.refs.push(refObj);}
        else{fileData.refs[fileData.refs.length-1]=refObj;} // 꽉 찼으면 마지막 슬롯
      }
    } else {
      // 추가: 빈 슬롯에 넣기
      const nullIdx=fileData.refs.findIndex(r=>!r);
      if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
      else if(fileData.refs.length<5){fileData.refs.push(refObj);}
      else{skipped++;continue;} // 참고자료 5개 꽉 찼으면 건너뜀
    }

    await idbSet(key,fileData);
    await refreshStudentFileFlag(stu.id);
    formResponseIds.add(stu.id);
    done++;
  }

  localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  document.getElementById('fStep2').style.display='none';
  document.getElementById('fStep3').style.display='block';
  const msg=document.getElementById('fDoneMsg');
  if(msg)msg.textContent=`${done}명의 참고자료에 폼 응답이 저장됐어요.${skipped?` ${skipped}명은 건너뛰었어요.`:''}`;
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}
async function importExcel(){
  const clsName=document.getElementById('xl-cls')?.value.trim();
  if(!clsName){alert('반 이름을 입력해 주세요.');return;}
  if(!excelData.length){alert('엑셀 파일을 먼저 선택해 주세요.');return;}
  const dl=document.getElementById('xl-dl')?.value||'';
  let c=classes.find(c=>c.name===clsName);
  if(!c){c={name:clsName,deadline:dl,students:[]};classes.push(c);}
  for(const s of excelData){
    const{data,error}=await sb.from('students').insert({user_id:user.id,name:s.name,number:s.number,class_name:clsName,memo:'',keywords:'[]',result:'',status:'none',class_deadline:dl}).select().single();
    if(!error&&data)c.students.push({id:data.id,number:s.number,name:s.name,memo:'',keywords:[],result:'',status:'none',deadline:''});
  }
  c.students.sort((a,b)=>a.number-b.number);
  selCls=clsName;closeModal();renderSb();renderMain();
  alert(`${excelData.length}명이 등록됐어요!`);
}

function getTabResultsForSimilarity(tabType){
  const all=classes.flatMap(c=>c.students.map(s=>({...s,clsName:c.name})));
  const list=[];
  all.forEach(s=>{
    if(simScope!=='all'&&s.clsName!==simScope)return;
    if(tabType==='haengdong'){
      if(s.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:s.result,extra:''});
    }else if(tabType==='setech'){
      let setechData={};try{setechData=JSON.parse(s.setech||'{}');}catch(e){}
      Object.keys(setechData).forEach(subject=>{
        if(setechData[subject]?.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:setechData[subject].result,extra:subject});
      });
    }else{
      let changyeData={};try{changyeData=JSON.parse(s.changye||'{}');}catch(e){}
      if(changyeData[tabType]?.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:changyeData[tabType].result,extra:''});
    }
  });
  return list;
}

function runSimilarityReport(){
  const area=document.getElementById('simReportArea');if(!area)return;
  area.innerHTML='<p style="font-size:12px;color:#888;">분석 중...</p>';
  setTimeout(()=>{
    const list=getTabResultsForSimilarity(simTab);
    if(list.length<2){area.innerHTML=`<p style="font-size:12px;color:#bbb;">비교할 학생이 2명 이상 있어야 해요. (작성 완료: ${list.length}명)</p>`;return;}
    const pairs=[];
    for(let i=0;i<list.length;i++){
      for(let j=i+1;j<list.length;j++){
        const sim=similarity(list[i].text,list[j].text);
        if(sim>0.35)pairs.push({a:list[i],b:list[j],sim});
      }
    }
    pairs.sort((a,b)=>b.sim-a.sim);
    if(!pairs.length){
      area.innerHTML=`<div style="font-size:12px;color:#389e0d;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:10px 12px;">✅ 비슷한 문장 쌍이 발견되지 않았어요. (${list.length}명, ${list.length*(list.length-1)/2}개 쌍 검사)</div>`;
      return;
    }
    area.innerHTML=`
      <div style="font-size:12px;color:#cf1322;margin-bottom:8px;">⚠️ ${pairs.length}개 쌍에서 유사도 35% 이상 발견 (총 ${list.length}명 비교)</div>
      <div style="max-height:320px;overflow-y:auto;border:1px solid #f0f0f5;border-radius:8px;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="background:#f8f8ff;"><th style="padding:7px 9px;text-align:left;color:#888;">학생 A</th><th style="padding:7px 9px;text-align:left;color:#888;">학생 B</th><th style="padding:7px 9px;text-align:left;color:#888;">유사도</th><th></th><th></th></tr></thead>
          <tbody>
            ${pairs.map(p=>`<tr>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">${p.a.clsName} ${p.a.name}${p.a.extra?` (${p.a.extra})`:''}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">${p.b.clsName} ${p.b.name}${p.b.extra?` (${p.b.extra})`:''}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;font-weight:600;color:${p.sim>0.5?'#cf1322':'#d48806'};">${Math.round(p.sim*100)}%</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;"><span class="ver-link" onclick="jumpToStudent('${p.a.id}','${p.a.clsName}');closeModal();">A 보기</span></td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;"><span class="ver-link" onclick="jumpToStudent('${p.b.id}','${p.b.clsName}');closeModal();">B 보기</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  },30);
}

function onBulkDrop(e){

// 파일명에서 학번(5자리)을 찾고, 그 뒤쪽 텍스트 안에 명단표의 실제 이름이 그대로 들어있는지 확인.
// 정규식으로 한글 글자수만 추측해서 자르는 대신, 실제 학생 이름과 대조해서 찾기 때문에
// "최일리야생기부.pdf"처럼 이름 뒤에 다른 한글이 바로 붙어도 정확한 이름만 골라낼 수 있음.
function bulkMatchFile(filename){
  const numMatch=filename.match(/\d{5}/);
  const num=numMatch?numMatch[0]:null;
  const startIdx=numMatch?numMatch.index+5:0;
  const windowText=filename.slice(startIdx,startIdx+14);
  const all=allStudentsWithClass();
  let candidates=all.filter(s=>windowText.includes(s.name));
  if(!candidates.length)candidates=all.filter(s=>filename.includes(s.name));
  candidates.sort((a,b)=>b.name.length-a.name.length);
  const maxLen=candidates.length?candidates[0].name.length:0;
  return{num,candidates:candidates.filter(c=>c.name.length===maxLen)};
}

function addBulkFiles(fileList){
  Array.from(fileList).forEach(file=>{
    const isPdf=/\.pdf$/i.test(file.name);
    const isPptx=/\.pptx$/i.test(file.name);
    if(!isPdf&&!isPptx)return;
    if(bulkUploadFiles.some(f=>f.file.name===file.name&&f.file.size===file.size))return;
    const{num,candidates}=bulkMatchFile(file.name);
    bulkUploadFiles.push({file,num,candidates,chosenId:candidates.length===1?candidates[0].id:''});
  });
  renderBulkMatchTable();
}

function setBulkChoice(i,id){ if(bulkUploadFiles[i])bulkUploadFiles[i].chosenId=id; renderBulkMatchTable(); }
function removeBulkFile(i){ bulkUploadFiles.splice(i,1); renderBulkMatchTable(); }

        <th></th>
      </tr></thead>
      <tbody>
        ${bulkUploadFiles.map((f,i)=>{
          const status=f.candidates.length===1?'✅':f.candidates.length>1?'⚠️ 동명이인':(f.chosenId?'✅':'❌ 매칭안됨');
          return`<tr>

            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">
              <select onchange="setBulkChoice(${i},this.value)" style="font-size:12px;padding:3px 6px;border:1px solid #e0e0ee;border-radius:5px;background:#f8f8ff;max-width:200px;">
                <option value="">선택 안 함</option>
                ${all.map(s=>`<option value="${s.id}" ${f.chosenId===s.id?'selected':''}>${s.clsName} ${s.number}번 ${s.name}</option>`).join('')}
              </select>
            </td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;white-space:nowrap;">${status}</td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;"><button onclick="removeBulkFile(${i})" style="width:20px;height:20px;border:1px solid #e0e0ee;background:#fff;border-radius:4px;cursor:pointer;color:#bbb;">✕</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div style="font-size:11px;color:#888;margin-top:6px;">✅ ${bulkUploadFiles.filter(f=>f.chosenId).length}개 매칭됨 · 총 ${bulkUploadFiles.length}개</div>`;

}

// 현재 선택된 학생(getStu())에 의존하지 않고, 임의의 studentId 기준으로 파일 상태를 읽고/저장하는 버전.
// processFile()/getAnalyzedFiles()와 완전히 같은 키 규칙(analyzedFilesMap, IndexedDB `files_${id}_${tab}`)을
// 그대로 써서, 나중에 해당 학생·탭을 직접 열어도 restoreStoredFiles()가 똑같이 불러와줌.
function getAnalyzedFilesFor(studentId,tabId){
  const key=`${studentId}_${tabId}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}
async function persistFilesFor(studentId,tabId){
  const files=getAnalyzedFilesFor(studentId,tabId);
  try{
    await idbSet(`files_${studentId}_${tabId}`,files);
    await refreshStudentFileFlag(studentId);
    return true;
  }catch(e){return false;}
}
async function addRefFileFor(studentId,tabId,fileData){
  const files=getAnalyzedFilesFor(studentId,tabId);
  let idx=files.refs.findIndex(r=>!r);
  if(idx===-1){
    if(files.refs.length>=5)return'full';
    files.refs.push(null);
    idx=files.refs.length-1;
  }
  files.refs[idx]=fileData;
  return(await persistFilesFor(studentId,tabId))?'ok':'storage_full';
}

async function runBulkUpload(){
  const targets=bulkUploadFiles.filter(f=>f.chosenId);
  if(!targets.length){alert('매칭된 파일이 없어요. 학생을 먼저 선택해 주세요.');return;}
  const btn=document.getElementById('bulkUploadBtn');
  btn.disabled=true;
  let ok=0,full=0,storageFail=0,readFail=0;
  for(let i=0;i<targets.length;i++){
    btn.textContent=`업로드 중... (${i+1}/${targets.length})`;
    const f=targets[i];
    try{
      let fileData;
      if(/\.pptx$/i.test(f.file.name)){
        const extractedText=await extractPptxText(f.file);
        fileData={name:f.file.name,type:'pptx',extractedText};
      }else{
        const base64=await fileToBase64(f.file);
        fileData={name:f.file.name,base64,type:f.file.type||'application/pdf'};
      }
      const result=await addRefFileFor(f.chosenId,bulkUploadTab,fileData);
      if(result==='ok')ok++; else if(result==='full')full++; else storageFail++;
    }catch(e){readFail++;}
  }
  closeModal();
  renderRefSlots();renderFileStatus();renderSb();
  let msg=`✅ ${ok}개 업로드 완료!`;
  if(full)msg+=`\n⚠️ ${full}개는 참고자료 칸이 이미 5개 다 차서 못 넣었어요.`;
  if(storageFail)msg+=`\n❌ ${storageFail}개는 저장 공간 한도를 초과해서 실패했어요.`;
  if(readFail)msg+=`\n❌ ${readFail}개는 파일을 읽지 못했어요 (구버전 .ppt이거나 손상된 파일일 수 있어요).`;
  alert(msg);
}
