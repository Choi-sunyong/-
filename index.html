<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1a2e;height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:#f0f2f5;}
.login-card{background:#fff;border:1px solid #e0e0ee;border-radius:16px;padding:36px 32px;width:380px;}

.login-field{margin-bottom:12px;}

.sidebar{width:200px;min-width:200px;background:#fff;border-right:1px solid #e0e0ee;display:flex;flex-direction:column;}
.sb-top{padding:12px 10px;border-bottom:1px solid #e0e0ee;}

.sb-body{flex:1;overflow-y:auto;padding:4px 6px;}

.cls-prog{margin:2px 7px 0;}
.prog-bar{height:2px;background:#e0e0ee;border-radius:2px;overflow:hidden;}

.stu-list{padding-left:12px;margin-top:1px;}
.stu-row{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:6px;cursor:pointer;margin-bottom:1px;}

.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.sb-footer{padding:10px;border-top:1px solid #e0e0ee;display:flex;align-items:center;gap:7px;}
.avatar{width:28px;height:28px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0C447C;flex-shrink:0;}

.settings-btn{width:26px;height:26px;border-radius:6px;border:1px solid #e0e0ee;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;margin-left:auto;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{padding:10px 16px;background:#fff;border-bottom:1px solid #e0e0ee;display:flex;align-items:center;gap:7px;min-height:46px;}
.breadcrumb{font-size:13px;color:#888;flex:1;}

.sview{display:flex;flex-direction:column;gap:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:#fff;border:1px solid #e0e0ee;border-radius:12px;padding:14px 16px;}
.card-hd{font-size:11px;font-weight:600;color:#aaa;margin-bottom:10px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:0.4px;}
.card-hd .pill{font-size:10px;padding:1px 6px;border-radius:20px;background:#E6F1FB;color:#185FA5;text-transform:none;letter-spacing:0;margin-left:4px;font-weight:500;}
textarea.memo{width:100%;font-size:13px;line-height:1.7;resize:none;border:1px solid #e0e0ee;border-radius:8px;padding:8px 10px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;color:#1a1a2e;}
textarea.memo:focus{outline:none;border-color:#aaa;}
.kw-row{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.kw-row input{flex:1;font-size:12px;padding:6px 9px;border:1px solid #e0e0ee;border-radius:6px;background:#f8f8ff;color:#1a1a2e;font-family:'Malgun Gothic',sans-serif;}
.kw-row input:focus{outline:none;border-color:#aaa;}
.rl{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;white-space:nowrap;}
.kw-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;}
.tag{display:flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag.pos{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
.tag.neg{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e;}
.tag .rm{cursor:pointer;opacity:0.6;margin-left:1px;}
.tag .rm:hover{opacity:1;}
.byte-set{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.byte-set label{font-size:11px;color:#888;white-space:nowrap;}
.byte-set input{width:65px;font-size:12px;padding:4px 7px;border:1px solid #e0e0ee;border-radius:6px;background:#f8f8ff;color:#1a1a2e;}
.byte-info{font-size:11px;color:#888;}
.byte-info.ov{color:#cf1322;}
.byte-row{display:flex;align-items:center;gap:6px;margin-bottom:9px;}
.byte-bar{flex:1;height:3px;background:#e0e0ee;border-radius:2px;overflow:hidden;}
.byte-fill{height:100%;border-radius:2px;background:#378ADD;}
.action-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.btn-gen{padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;background:#378ADD;border:none;color:#fff;display:flex;align-items:center;gap:3px;}
.btn-gen:hover{background:#2d7bc4;}
.btn-gen:disabled{opacity:0.5;cursor:not-allowed;}
.btn-sm{padding:4px 10px;font-size:11px;cursor:pointer;border-radius:6px;border:1px solid #e0e0ee;background:#fff;color:#666;display:flex;align-items:center;gap:3px;}
.btn-sm:hover{background:#f5f5ff;}
textarea.result{width:100%;font-size:13px;line-height:1.8;resize:none;border:1px solid #e0e0ee;border-radius:8px;padding:9px 11px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;color:#1a1a2e;min-height:130px;}
textarea.result:focus{outline:none;border-color:#aaa;}
.feedback-wrap{display:flex;align-items:center;border:1px solid #e0e0ee;border-radius:8px;overflow:hidden;margin-top:10px;}
.feedback-icon{padding:0 9px;color:#aaa;font-size:14px;display:flex;align-items:center;}
.feedback-inp{flex:1;font-size:12px;padding:7px 2px;border:none;background:#fff;color:#1a1a2e;outline:none;font-family:'Malgun Gothic',sans-serif;}
.feedback-send{padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;border:none;border-left:1px solid #e0e0ee;background:#f8f8ff;color:#378ADD;white-space:nowrap;}
.feedback-send:hover{background:#E6F1FB;}
.feedback-hist{margin-top:5px;font-size:11px;color:#aaa;padding:0 2px;}
.checklist{display:flex;flex-direction:column;gap:6px;}
.check-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#555;}
.ci{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.ci.ok{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
.ci.warn{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e;}
.ci.pend{background:#f8f8ff;border:1px solid #e0e0ee;color:#aaa;}
.ver-list{display:flex;flex-direction:column;gap:5px;}
.ver-item{display:flex;align-items:center;gap:6px;padding:6px 9px;background:#f8f8ff;border-radius:7px;font-size:11px;}
.ver-item .vl{color:#666;flex:1;}
.ver-link{color:#378ADD;cursor:pointer;}
.ver-del{color:#cf1322;cursor:pointer;margin-left:2px;}
.file-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.file-item{display:flex;align-items:center;gap:6px;padding:6px 9px;background:#f8f8ff;border-radius:7px;font-size:11px;}
.file-item a{color:#378ADD;text-decoration:none;flex:1;}
.file-item a:hover{text-decoration:underline;}
.file-del{color:#cf1322;cursor:pointer;font-size:10px;padding:2px 7px;border:1px solid #ffa39e;border-radius:4px;}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:14px;padding:24px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
.modal.wide{width:440px;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:18px;color:#1a1a2e;}
.modal-field{margin-bottom:13px;}
.modal-field label{display:block;font-size:11px;color:#666;margin-bottom:4px;}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;font-size:12px;padding:8px 10px;border:1px solid #e0e0ee;border-radius:7px;background:#f8f8ff;color:#1a1a2e;font-family:'Malgun Gothic',sans-serif;}
.modal-field input:focus,.modal-field textarea:focus{outline:none;border-color:#aaa;}
.modal-field textarea{resize:vertical;min-height:80px;}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:6px;}
.modal-btns button{padding:7px 15px;font-size:12px;cursor:pointer;border-radius:7px;border:1px solid #e0e0ee;background:#fff;color:#666;font-family:'Malgun Gothic',sans-serif;}
.modal-btns button:hover{background:#f5f5f5;}
.modal-btns .ok{background:#378ADD;border-color:#378ADD;color:#fff;}
.modal-btns .ok:hover{background:#2d7bc4;}
.modal-btns .danger{background:#fff1f0;border-color:#ffa39e;color:#cf1322;}
.section-title{font-size:12px;font-weight:600;color:#1a1a2e;margin:16px 0 9px;border-bottom:1px solid #e0e0ee;padding-bottom:6px;}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.upload-zone{border:2px dashed #e0e0ee;border-radius:8px;padding:18px;text-align:center;cursor:pointer;font-size:12px;color:#aaa;margin-bottom:10px;}
.upload-zone:hover{border-color:#aaa;color:#666;}
.loading-wrap{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#888;font-size:14px;}
</style>

<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});

let user=null,apiKey='',profile={school:'',name:'',role:''},style={omi:'~임/~음/~함',adverb:'항상/매사',tone:'격식체',example:'',guide:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    user=session.user;
    await loadProfile();
    await loadClasses();
    renderApp();
  } else {
    renderLogin();
  }
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_IN'&&session){
      user=session.user;
    } else if(event==='SIGNED_OUT'){
      user=null;renderLogin();
    }
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">📚</div>
        <div><div class="login-logo-text">생기부 생성기</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div>
      </div>
      <div class="login-tab">
        <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
        <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
      </div>
      ${tab==='register'?`
        <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교" /></div>
        <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용" /></div>
        <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반" /></div>
      `:''}
      <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr" /></div>
      <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상" /></div>
      <div id="l-err" class="login-err"></div>
      <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
        ${tab==='register'?'회원가입':'로그인'}
      </button>
    </div>
  </div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');
  err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;
  await loadProfile();
  await loadClasses();
  renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim();
  const pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'';
  const name=document.getElementById('l-tname')?.value.trim()||'';
  const role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');
  err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;
  profile={school,name,role};
  const{error:pe}=await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  if(pe)console.error('Profile save error:',pe);
  await loadClasses();
  renderApp();
}

async function loadProfile(){
  try{
    const{data,error}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){
      profile={school:data.school||'',name:data.name||'',role:data.role||''};
      apiKey=data.api_key||'';
      try{if(data.style)style=JSON.parse(data.style);}catch(e){}
    } else {
      await sb.from('profiles').upsert({id:user.id,school:'',name:'',role:'',api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
    }
  }catch(e){console.error('Load profile error:',e);}
}

async function saveProfile(){
  try{
    const{error}=await sb.from('profiles').upsert({id:user.id,school:profile.school,name:profile.name,role:profile.role,api_key:apiKey,style:JSON.stringify(style)},{onConflict:'id'});
    if(error)console.error('Save profile error:',error);
  }catch(e){console.error('Save profile error:',e);}
}

async function doLogout(){
  await sb.auth.signOut();
  user=null;classes=[];selCls=null;selStu=null;
  renderLogin();
}

async function loadClasses(){
  try{
    const{data}=await sb.from('students').select('*').eq('user_id',user.id).order('class_name').order('number');
    if(!data)return;
    const map={};
    data.forEach(s=>{
      if(!map[s.class_name])map[s.class_name]={name:s.class_name,students:[]};
      map[s.class_name].students.push({id:s.id,number:s.number||0,name:s.name,memo:s.memo||'',keywords:JSON.parse(s.keywords||'[]'),result:s.result||'',status:s.status||'none',deadline:s.deadline||''});
    });
    classes=Object.values(map);
  }catch(e){console.error('Load classes error:',e);}
}

function getStu(){const c=classes.find(c=>c.name===selCls);return c?.students.find(s=>s.id===selStu);}
function bytes(str){let b=0;for(const c of str)b+=c.charCodeAt(0)>127?2:1;return b;}
function statusColor(s){return s==='done'?'#52c41a':s==='wip'?'#faad14':'#d9d9d9';}
function statusLabel(s){return s==='done'?'마감':s==='wip'?'작성중':'미작성';}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

function renderApp(){
  document.getElementById('root').innerHTML=`
  <div class="app" id="app">
    <div class="sidebar">
      <div class="sb-top">
        <div class="logo">
          <div class="logo-icon">📚</div>
          <div><div class="logo-name">생기부 생성기</div><div class="logo-school">${profile.school||'학교 미설정'}</div></div>
        </div>
        <div class="sb-search">
          <span>🔍</span>
          <input id="searchInput" placeholder="학생 검색..." oninput="searchQ=this.value;renderSb();" />
        </div>
      </div>
      <div class="sb-section">수강반 관리<div style="display:flex;gap:4px;"><button class="sb-icon-btn" onclick="openUploadExcel()" title="엑셀 업로드">📥</button><button class="sb-icon-btn" onclick="openModal('class')" title="반 추가">+</button></div></div>
      <div class="sb-body" id="sbList"></div>
      <div class="sb-footer">
        <div class="avatar">${(profile.name||'?')[0]}</div>

function updResultLocal(v){const s=getStu();if(s){s.result=v;updBC();}}
function updBC(){
  const s=getStu();if(!s)return;
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result||'');
  const pct=Math.min(100,Math.round(b/t*100));

  if(el){el.textContent=`${b} / ${t}`;el.className='byte-info '+(b>t?'ov':'');}

async function updMemo(v){const s=getStu();if(!s)return;s.memo=v;await sb.from('students').update({memo:v}).eq('id',s.id);}

async function addKw(){

  await sb.from('students').update({keywords:JSON.stringify(s.keywords)}).eq('id',s.id);

}
function renderKws(){

  }).join('');

async function delFile(path){if(!confirm('삭제할까요?'))return;await sb.storage.from('files').remove([path]);renderFiles();}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생기부를 먼저 생성해 주세요</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['장애','결손','문제아','불량','빈곤','저능','정신병','ADHD'];
  const hasForbidden=forbidden.some(w=>s.result.includes(w));
  const otherStus=classes.flatMap(c=>c.students).filter(os=>os.id!==s.id&&os.result);
  let simWarn='';
  otherStus.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.65)simWarn+=`${os.name} ${Math.round(sim*100)}% `;});
  const omiOk=s.result.includes('임')&&(s.result.includes('음')||s.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견':'없음'}</div>
    <div class="check-item"><div class="ci ${simWarn?'warn':'ok'}">${simWarn?'!':'✓'}</div> 유사도 ${simWarn?'주의 — '+simWarn:'이상 없음'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인':'확인 필요'}</div>`;
}

function similarity(a,b){
  const setA=new Set(a.split('').filter(c=>c.charCodeAt(0)>127));
  const setB=new Set(b.split('').filter(c=>c.charCodeAt(0)>127));
  let inter=0;setA.forEach(c=>{if(setB.has(c))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

async function generate(feedback=''){
  if(!apiKey){alert('⚙️ 설정에서 API 키를 먼저 입력해 주세요.');return;}
  const s=getStu();if(!s)return;
  if(!s.keywords.length&&!s.memo){alert('키워드나 메모를 먼저 입력해 주세요.');return;}
  const btn=document.getElementById('genBtn');const ra=document.getElementById('resArea');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> 생성 중...';}
  if(ra)ra.value='';
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const pos=s.keywords.filter(k=>k.type==='pos').map(k=>k.text);
  const neg=s.keywords.filter(k=>k.type==='neg').map(k=>k.text);
  const prompt=`당신은 한국의 고등학교에서 30년간 근무한 베테랑 담임 교사입니다. 생활기록부의 '행동특성 및 종합의견'을 작성해 주세요.
[긍정 키워드]: ${pos.join(', ')||'없음'}
[부정 키워드]: ${neg.join(', ')||'없음'}
[학생 메모]: ${s.memo||'없음'}
${style.example?`[우수사례 참고문체]:\n${style.example}\n`:''}
${style.guide?`[작성 요령]:\n${style.guide}\n`:''}
${feedback?`[피드백 반영]: ${feedback}\n`:''}
[조건]
- 하나의 자연스러운 문단
- ${style.adverb||'항상/매사'} 중 하나의 부사로 시작
- 긍정 키워드 구체적으로 부각
- 부정 키워드는 극복/성장 가능성으로 표현
- '학생','그는','그가','그의' 사용 금지
- 문장 어미는 ${style.omi||'~임/~음/~함'}으로 통일
- ${style.tone||'격식체'} 말투
- 나이스 기준 ${t}바이트 분량
결과만 출력하세요.`;
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt})});
    const data=await r.json();
    if(data.error){if(ra)ra.value='오류: '+data.error;}
    else{
      const text=data.result||'';
      s.result=text;if(ra)ra.value=text;
      await sb.from('students').update({result:text,status:'wip'}).eq('id',s.id);
      s.status='wip';
      saveVersion(text,feedback?`피드백: ${feedback.substring(0,20)}`:' 자동생성');
      renderChecklist();renderSb();
      if(feedback){
        const hist=JSON.parse(localStorage.getItem(`fb_${s.id}`)||'[]');
        hist.unshift(feedback);if(hist.length>5)hist.pop();
        localStorage.setItem(`fb_${s.id}`,JSON.stringify(hist));
        renderFbHist();
      }
    }
  }catch(e){if(ra)ra.value='오류: '+e.message;}
  if(btn){btn.disabled=false;btn.innerHTML='✨ 생기부 생성';}
  updBC();
}

function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const lbl=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} (${label})`;
  const vers=JSON.parse(localStorage.getItem(`ver_${s.id}`)||'[]');
  vers.unshift({label:lbl,text,ts:Date.now()});
  if(vers.length>15)vers.pop();
  localStorage.setItem(`ver_${s.id}`,JSON.stringify(vers));
}

function loadVer(i){

function delVer(i){

  const d=document.createElement('div');d.className='modal-bg';d.id='mc';
  d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide"><h3>📥 엑셀 명단 업로드</h3>
    <p style="font-size:11px;color:#888;margin-bottom:12px;">A열: 번호, B열: 이름 형식의 엑셀 파일을 업로드해 주세요.</p>
    <div class="modal-field"><label>반 이름</label><input id="xl-cls" placeholder="예: 2학년 3반" /></div>
    <div class="upload-zone" onclick="document.getElementById('xlFile').click()">클릭하여 엑셀 파일 선택 (.xlsx)</div>
    <input id="xlFile" type="file" accept=".xlsx,.xls" style="display:none" onchange="previewExcel(this)" />
    <div id="xlPreview"></div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="importExcel()">가져오기</button></div>
  </div>`;
  document.getElementById('app')?.appendChild(d);
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:11px;color:#555;margin-top:6px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}
async function importExcel(){
  const clsName=document.getElementById('xl-cls')?.value.trim();
  if(!clsName){alert('반 이름을 입력해 주세요.');return;}
  if(!excelData.length){alert('엑셀 파일을 먼저 선택해 주세요.');return;}
  let c=classes.find(c=>c.name===clsName);
  if(!c){c={name:clsName,students:[]};classes.push(c);}
  for(const s of excelData){
    const{data,error}=await sb.from('students').insert({user_id:user.id,name:s.name,number:s.number,class_name:clsName,memo:'',keywords:'[]',result:'',status:'none'}).select().single();
    if(!error&&data)c.students.push({id:data.id,number:s.number,name:s.name,memo:'',keywords:[],result:'',status:'none',deadline:''});
  }
  c.students.sort((a,b)=>a.number-b.number);
  selCls=clsName;closeModal();renderSb();renderMain();
  alert(`${excelData.length}명이 등록됐어요!`);
}

async function saveSettings(){
  profile.school=document.getElementById('s-school')?.value.trim()||'';
  profile.name=document.getElementById('s-name')?.value.trim()||'';
  profile.role=document.getElementById('s-role')?.value.trim()||'';
  apiKey=document.getElementById('s-api')?.value.trim()||'';
  style.omi=document.getElementById('s-omi')?.value.trim()||'~임/~음/~함';
  style.adverb=document.getElementById('s-adv')?.value.trim()||'항상/매사';
  style.tone=document.getElementById('s-tone')?.value.trim()||'격식체';

  style.guide=document.getElementById('s-guide')?.value.trim()||'';

  closeModal();
  document.querySelector('.logo-school').textContent=profile.school||'학교 미설정';

  document.querySelector('.avatar').textContent=(profile.name||'?')[0];
  alert('저장됐어요!');
}
