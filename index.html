<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',geminiApiKey=localStorage.getItem('geminiApiKey')||'',teacherSubjects=(()=>{try{return JSON.parse(localStorage.getItem('teacherSubjects')||'[]');}catch(e){return[];}})(),profile={school:'',name:'',role:''},style={command:'문장은 ~임/~음/~함으로 끝내고, 격식 있는 말투로 써줘.',example:'',guide:'',customForbidden:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">📚</div><div><div class="login-logo-text">싯다르타</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교"/></div>
      <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용"/></div>
      <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반"/></div>`:''}
    <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'회원가입':'로그인'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{

// ===== IndexedDB 기반 파일 저장 (localStorage 5~10MB 한도보다 훨씬 큰 용량을 쓸 수 있음) =====
// 첨부파일(기존 생기부/참고자료)은 용량이 커서 localStorage로는 부족해질 수 있어 여기로 옮김.
// 탭별 텍스트 설정(예시/추가 명령어 등 commonSetting_*)은 용량이 작아서 그대로 localStorage 사용.
const IDB_NAME='siddartha_files';
const IDB_STORE='files';
let _idbPromise=null;
function openIdb(){
  if(_idbPromise)return _idbPromise;
  _idbPromise=new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB 미지원'));return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=()=>{req.result.createObjectStore(IDB_STORE);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return _idbPromise;
}
function idbSet(key,value){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(value,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  }));
}
function idbGet(key){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  }));
}

// 예전에 localStorage에 저장해뒀던 파일 데이터를 IndexedDB로 한 번만 옮김.
// 옮긴 항목은 localStorage에서 지워서 꽉 찼던 용량도 같이 확보됨. 옮길 게 없으면 그냥 조용히 끝남.
async function migrateFilesToIndexedDB(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('files_'));
  if(!keys.length)return;
  let moved=0;
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw){
        await idbSet(key,JSON.parse(raw));
        localStorage.removeItem(key);
        moved++;
      }
    }catch(e){console.warn('파일 데이터 이전 실패:',key,e);}
  }
  if(moved)console.log(`📦 기존 파일 데이터 ${moved}건을 더 큰 저장소(IndexedDB)로 옮겼어요.`);
}

// 그 자리에서 바로 조회할 수 없음. 그래서 "파일이 있는 학생 ID" 목록을 메모리에 Set으로 들고 있다가
// 동기적으로 즉시 답해주고, 실제 IndexedDB 조회는 파일이 추가/삭제될 때나 로그인 시 미리 해둠.
let studentsWithFilesSet=new Set();
const FILE_TABS=['haengdong','setech','jayul','dongari','jinro','dokseo'];

function isFilesEmpty(stored){
  if(!stored)return true;
  return !(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length));
}

async function refreshStudentFileFlag(studentId){
  for(const tab of FILE_TABS){
    try{
      const stored=await idbGet(`files_${studentId}_${tab}`);
      if(!isFilesEmpty(stored)){studentsWithFilesSet.add(studentId);return;}
    }catch(e){}
  }
  studentsWithFilesSet.delete(studentId);
}

// 로그인 시 IndexedDB 전체를 한 번 훑어서 studentsWithFilesSet을 채워둠.
async function buildStudentsWithFilesSet(){
  studentsWithFilesSet.clear();
  try{
    const db=await openIdb();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).openCursor();
      req.onsuccess=()=>{
        const cursor=req.result;
        if(cursor){
          const m=String(cursor.key).match(/^files_(.+)_(haengdong|setech|jayul|dongari|jinro|dokseo)$/);
          if(m&&!isFilesEmpty(cursor.value))studentsWithFilesSet.add(m[1]);
          cursor.continue();
        }else resolve();
      };
      req.onerror=()=>reject(req.error);
    });
  }catch(e){console.warn('파일 인덱스 구성 실패:',e);}
}

function hasStoredFiles(stuId){
  return studentsWithFilesSet.has(stuId);

function getFirstWipTab(s){
  let kwLen=0;
  try{kwLen=(typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[])).length;}catch(e){}
  let haengExtra=false;
  try{
    const changyeH=JSON.parse(s.changye||'{}').haengdong;
    if(changyeH&&(changyeH.command||changyeH.achievement||changyeH.attitude||changyeH.growth))haengExtra=true;
  }catch(e){}
  if(s.result||s.memo||kwLen||haengExtra)return{tab:'haengdong'};
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab:'setech',subject:subj};
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab of ['jayul','dongari','jinro','dokseo']){
      const d=changye[tab];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab};
    }
  }catch(e){}
  return{tab:'setech'};
}

function hasAnyTabInput(s){
  // 작성중 판정은 메모/생성결과 두 가지만 본다 (키워드·명령어·성취도 등은 제외)
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||d.result))return true;
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab in changye){
      const d=changye[tab];
      if(d&&(d.memo||d.result))return true;
    }
  }catch(e){}
  if(s.memo)return true;
  return false;
}
function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasAnyTabInput(s))return 'wip';

}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

function sbIconDrop(e){
  e.preventDefault();
  const targetId=e.currentTarget.dataset.iconId;
  if(!sbIconDragSrc||sbIconDragSrc===targetId)return;
  const order=getSbIconOrder();
  const from=order.indexOf(sbIconDragSrc);
  const to=order.indexOf(targetId);
  if(from<0||to<0)return;
  order.splice(from,1);
  order.splice(to,0,sbIconDragSrc);
  localStorage.setItem('sbIconOrder',JSON.stringify(order));
  sbIconDragSrc=null;
  renderSbIcons();
}

          return stus.map(s=>{
            if(inQnMode){
              const cnt=qnHistAll.filter(k=>k.studentId===s.id).length;
              return `<div class="stu-row" onclick="selStudent(${s.id})">
                <span class="stu-num">${String(s.number||'')}</span>
                <span class="stu-name-sb">${s.name}</span>
                <span style="margin-left:auto;font-size:11px;font-weight:700;color:${cnt?'#7C3AED':'#ccc'};">${cnt}건</span>
              </div>`;
            }
            return `<div class="stu-row ${selStu===s.id?'active':''}" onclick="selStudent(${s.id})">
              <span class="stu-num" style="${s.status==='done'?'color:#22c55e;font-weight:600;':''}">${String(s.number||'').padStart(2,'0')}</span>
              <span class="stu-name-sb">${s.name}</span>
              <div class="status-dot" style="background:${statusColor(getEffectiveStatus(s))};"></div>
              <button class="stu-menu-btn" onclick="showStuMenu(event,${s.id})">···</button>
            </div>`;
          }).join('');
        })()}
        <div class="sb-add-stu" onclick="openModal('stu')">+ 학생 추가</div>
      </div>`:''}
    </div>`;
  }).join('');
}

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

// 참고자료(refs) 일괄 삭제 — 기존 생기부 파일, 우수사례, 탭별/전체 공통파일은 건드리지 않음.
// 6개 탭(haengdong/setech/jayul/dongari/jinro/dokseo) × 해당 반 학생 전체를 IndexedDB에서 훑어서
// refs 배열만 비우고 나머지(old, example, verifiedContent 등)는 그대로 둠.
const BULK_TAB_IDS=['haengdong','setech','jayul','dongari','jinro','dokseo'];
async function openBulkRefDelete(clsName,preMode){
  closeCtxMenu();
  const c=classes.find(c=>c.name===clsName);if(!c)return;
  // 새 통합 삭제 모달에서 mode를 미리 받은 경우 바로 실행
  if(preMode){
    const label=preMode==='formrefs'?'폼 응답':preMode==='refs'?'참고자료 전체':preMode==='memo'?'메모':'참고자료 전체 + 메모';
    if(!confirm(`'${clsName}' 반 전체 학생의 ${label}를 삭제할까요? 되돌릴 수 없습니다.`))return;
    await runBulkRefDeleteDirect(clsName,preMode);
    return;
  }
  // 기존 컨텍스트 메뉴에서 직접 호출된 경우 기존 모달 표시
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal" style="max-width:460px;"><h3>📁 일괄 삭제</h3>
    <p style="font-size:13px;color:#666;margin-bottom:12px;">'${clsName}' 반 전체 학생에게 적용됩니다.</p>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="formrefs" checked> 폼 응답만</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="refs"> 참고자료 전체</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="memo"> 메모만</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="both"> 참고자료 전체 + 메모 모두</label>
    </div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok danger" onclick="runBulkRefDelete('${clsName}')">삭제</button></div>
  </div>`;
  document.getElementById('app').appendChild(d);
}
async function runBulkRefDelete(clsName){
  const mode=document.querySelector('input[name="bulkDelMode"]:checked')?.value||'refs';
  const label=mode==='formrefs'?'폼 응답':mode==='refs'?'참고자료 전체':mode==='memo'?'메모':'참고자료 전체 + 메모';
  if(!confirm(`'${clsName}' 반 전체 학생의 ${label}를 삭제할까요? 되돌릴 수 없습니다.`))return;
  closeModal();
  await runBulkRefDeleteDirect(clsName,mode);
}
async function runBulkRefDeleteDirect(clsName,mode){
  const c=classes.find(x=>x.name===clsName);if(!c)return;
  const label=mode==='formrefs'?'폼 응답':mode==='refs'?'참고자료 전체':mode==='memo'?'메모':'참고자료 전체 + 메모';
  for(const s of c.students){
    // 참고자료 삭제 (전체 or 폼응답만)
    if(mode==='refs'||mode==='both'||mode==='formrefs'){
      for(const tabId of BULK_TAB_IDS){
        try{
          const v=await idbGet(`files_${s.id}_${tabId}`);
          if(v&&Array.isArray(v.refs)&&v.refs.some(r=>r)){
            if(mode==='formrefs'){
              // 폼 응답(type=text)만 null로
              v.refs=v.refs.map(r=>r&&r.type==='text'?null:r);
            } else {
              v.refs=[];
            }
            await idbSet(`files_${s.id}_${tabId}`,v);
          }
        }catch(e){}
      }
      await refreshStudentFileFlag(s.id);
      if(mode==='formrefs'){formResponseIds.delete(String(s.id));}
    }
    // 메모 삭제
    if(mode==='memo'||mode==='both'){
      // 행동특성 메모
      s.memo='';
      await sb.from('students').update({memo:''}).eq('id',s.id);
      // 세특 메모
      try{
        const setech=JSON.parse(s.setech||'{}');
        Object.keys(setech).forEach(sub=>{if(setech[sub])setech[sub].memo='';});
        s.setech=JSON.stringify(setech);
        await sb.from('students').update({setech:s.setech}).eq('id',s.id);
      }catch(e){}
      // 창의적 체험활동 메모
      try{
        const changye=JSON.parse(s.changye||'{}');
        ['jayul','dongari','jinro','dokseo'].forEach(tab=>{if(changye[tab])changye[tab].memo='';});
        s.changye=JSON.stringify(changye);
        await sb.from('students').update({changye:s.changye}).eq('id',s.id);
      }catch(e){}
    }
  }
  if(mode==='formrefs')localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  closeModal();
  renderSb();
  if(getStu())restoreStoredFiles();
  if(getStu())renderMain();
  alert(`${label} 일괄 삭제가 완료됐어요.`);
}

async function doEditStu(stuId){

async function deleteStu(stuId){

  if(!confirm(`'${s?.name}' 학생 데이터를 삭제할까요?`))return;
  await sb.from('students').delete().eq('id',stuId);
  classes.forEach(c=>{c.students=c.students.filter(s=>s.id!==stuId);});

  renderSb();renderMain();

async function addReviewFile(file){
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    reviewFiles.push(fileData);
    await persistReviewFiles();
    renderReviewFileList();
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistReviewFiles(){
  try{await idbSet('reviewFiles_global',reviewFiles);}catch(e){console.warn('저장 공간 초과:',e);}
}
async function loadReviewFiles(){
  try{
    const stored=await idbGet('reviewFiles_global');
    if(stored){reviewFiles.length=0;stored.forEach(f=>reviewFiles.push(f));}
  }catch(e){}
}

function removeReviewFile(id){
  const idx=reviewFiles.findIndex(f=>f.id===id);
  if(idx>-1)reviewFiles.splice(idx,1);
  persistReviewFiles();
  renderReviewFileList();
}

let pendingHighlight=null;
function jumpToSearchResult(stuId,clsName,tab,subject,word){
  selCls=clsName;selStu=stuId;selTab=tab;
  if(tab==='setech'&&subject)selSubject=subject;
  pendingHighlight=word?{word}:null;
  renderSb();renderMain();
  setTimeout(applyPendingHighlight,80);
}
// 검색으로 찾은 표현을 결과 칸에서 잠깐 선택 표시(형광펜 느낌)해줌. 마감/평소 열람 시엔 아무 표시도 안 남음.
function applyPendingHighlight(){
  if(!pendingHighlight)return;
  const word=pendingHighlight.word;
  pendingHighlight=null;
  const ta=document.getElementById('tabResArea')||document.getElementById('resArea');
  if(!ta||!word)return;
  const norm=s=>(s||'').replace(/\s+/g,' ');
  const hay=ta.value;
  const hayNorm=norm(hay);
  // 1) 완전일치 시도 2) 공백 정규화 후 시도 3) 앞부분만 점점 줄여가며 시도 (AI가 살짝 다르게 인용했을 경우 대비)
  let idx=hay.indexOf(word);
  let matchLen=word.length;
  if(idx<0){
    const wNorm=norm(word);
    idx=hayNorm.indexOf(wNorm);
    matchLen=wNorm.length;
  }
  if(idx<0){
    for(const len of [15,10,6]){
      const head=norm(word).slice(0,len);
      if(head.length<len)continue;
      idx=hayNorm.indexOf(head);
      if(idx>=0){matchLen=head.length;break;}
    }
  }
  if(idx<0)return;
  ta.focus();
  ta.setSelectionRange(idx,idx+matchLen);
  const before=hay.slice(0,idx);
  const approxLine=before.split('\n').length;
  ta.scrollTop=Math.max(0,(approxLine-3)*20);
}

function jumpToStudent(stuId,clsName){
  selCls=clsName;selStu=stuId;
  const s=allStudents().find(st=>st.id===stuId);

    selTab=r.tab;
    // 세특 탭에서 과목 작업 중이면 학생이 바뀌어도 과목 유지
    if(!(prevTab==='setech'&&selSubject))if(r.subject)selSubject=r.subject;
  }
  renderSb();renderMain();
}

function saveDashSettings(){
  const all=['stats','progress','memo','deadline','recent'];
  const selected=all.filter(id=>document.getElementById('w_'+id)?.checked);
  saveDashWidgets(selected);
  closeModal();

function toggleCls(name){
  if(selCls===name){
    selCls=null;
    // 학생 선택은 유지, 폴더만 접기
  } else {
    selCls=name;
  }
  renderSb();
}
function selStudent(id){
  quickNoteModeCls=null;
  selStu=id;
  const s=allStudents().find(st=>st.id===id);
  if(s){
    const prevTab=selTab;
    const r=getFirstWipTab(s);
    selTab=r.tab;
    // 세특 탭에서 과목 작업 중이면 학생이 바뀌어도 과목 유지
    if(!(prevTab==='setech'&&selSubject))if(r.subject)selSubject=r.subject;
  }
  renderSb();renderMain();setTimeout(()=>restoreStoredFiles(),100);
}
// ←(이전)/→(다음) 화살표로 지금 반 안에서 학생 간 이동. 사이드바에 보이는 순서(검색 중이면 검색 결과 순서)를 그대로 따름.
function navigateStudent(dir){
  const c=classes.find(c=>c.name===selCls);
  if(!c)return;
  const q=(searchQ||'').toLowerCase();
  const stus=q?c.students.filter(s=>s.name.includes(q)):c.students;
  if(!stus.length)return;
  const idx=stus.findIndex(s=>s.id===selStu);
  const newIdx=idx<0?0:idx+dir;
  if(newIdx<0||newIdx>=stus.length)return; // 첫/마지막 학생에서는 그냥 멈춤
  selStudent(stus[newIdx].id);
  setTimeout(()=>{document.querySelector('.stu-row.active')?.scrollIntoView({block:'nearest'});},0);
}
document.addEventListener('keydown',e=>{
  if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight')return;
  const tag=(document.activeElement?.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||document.activeElement?.isContentEditable)return; // 텍스트 입력 중엔 커서 이동이 우선
  if(document.getElementById('mc'))return; // 모달 열려있을 땐 학생 이동 안 함
  if(!selCls)return;
  e.preventDefault();
  navigateStudent(e.key==='ArrowLeft'?-1:1);
});

// 필요할 때 선생님이 화면에서 직접 켜고 끔 (수업 중 학생에게 보여줄 때 사용).

// 학생 보기 모드에서 섹션 제목/과목 표시명을 선생님이 자유롭게 바꿀 수 있게 하는 저장소.
// 학생별이 아니라 "그 과목/섹션 전체"에 적용됨(예: '사회' 과목명을 '현대사회와 윤리'로 한 번 바꾸면 모든 학생에게 똑같이 적용) - localStorage에 저장.
function getSectionTitleOverride(key){
  let map={};try{map=JSON.parse(localStorage.getItem('svTitleOverrides')||'{}');}catch(e){}
  return map[key];
}
function setSectionTitleOverride(key,val){
  let map={};try{map=JSON.parse(localStorage.getItem('svTitleOverrides')||'{}');}catch(e){}
  if(val)map[key]=val;else delete map[key];
  localStorage.setItem('svTitleOverrides',JSON.stringify(map));
}
function getSubjectDisplayName(subj){
  let map={};try{map=JSON.parse(localStorage.getItem('subjectDisplayNames')||'{}');}catch(e){}
  return map[subj]||subj;
}
function setSubjectDisplayName(subj,val){
  let map={};try{map=JSON.parse(localStorage.getItem('subjectDisplayNames')||'{}');}catch(e){}
  if(val)map[subj]=val;else delete map[subj];
  localStorage.setItem('subjectDisplayNames',JSON.stringify(map));
}
function studentGradeStr(s){
  const str=String(s.number||'');
  return str.length===5?str[0]+'학년':'';
}
let studentViewEditTarget=null; // {type:'title'|'subject', key}
function startEditStudentViewField(type,key){
  studentViewEditTarget={type,key};
  renderStudentViewBody(getStu());
  setTimeout(()=>{const inp=document.getElementById('svEditInp');if(inp){inp.focus();inp.select();}},0);
}
function saveStudentViewField(){
  if(!studentViewEditTarget)return;
  const inp=document.getElementById('svEditInp');
  const val=inp?inp.value.trim():'';
  const{type,key}=studentViewEditTarget;
  if(type==='title')setSectionTitleOverride(key,val);
  else setSubjectDisplayName(key,val);
  studentViewEditTarget=null;
  renderStudentViewBody(getStu());
}
function cancelStudentViewEdit(){
  studentViewEditTarget=null;
  renderStudentViewBody(getStu());
}
function renderStudentViewBody(s){

  const changyeLabels={jayul:'자율·자치 활동',dongari:'동아리 활동',jinro:'진로 활동',dokseo:'독서활동상황'};

      ${sections.length?sections.map(sec=>{
        const titleOverride=getSectionTitleOverride(sec.key);

        const editingSubj=sec.subj&&studentViewEditTarget?.type==='subject'&&studentViewEditTarget.key===sec.subj;
        const titleHtml=editingTitle
          ?`<input id="svEditInp" value="${(displayTitle||'').replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveStudentViewField();if(event.key==='Escape')cancelStudentViewEdit();" style="font-size:14px;font-weight:700;color:#333;border:1px solid #378ADD;border-radius:4px;padding:2px 6px;width:220px;font-family:inherit;"/>
             <button onclick="saveStudentViewField();" style="border:none;background:none;color:#378ADD;cursor:pointer;font-size:13px;">✓</button>
             <button onclick="cancelStudentViewEdit();" style="border:none;background:none;color:#bbb;cursor:pointer;font-size:13px;">✕</button>`
          :`<span onclick="startEditStudentViewField('title','${sec.key}')" style="cursor:text;border-bottom:1px dashed transparent;" onmouseover="this.style.borderColor='#bbb'" onmouseout="this.style.borderColor='transparent'">${escHtml(displayTitle)}</span>`;
        const subjName=sec.subj?getSubjectDisplayName(sec.subj):'';
        const subjHtml=!sec.subj?'':editingSubj
          ?`<input id="svEditInp" value="${subjName.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveStudentViewField();if(event.key==='Escape')cancelStudentViewEdit();" style="font-size:13px;color:#555;border:1px solid #378ADD;border-radius:4px;padding:1px 5px;width:160px;font-family:inherit;"/>
             <button onclick="saveStudentViewField();" style="border:none;background:none;color:#378ADD;cursor:pointer;font-size:12px;">✓</button>
             <button onclick="cancelStudentViewEdit();" style="border:none;background:none;color:#bbb;cursor:pointer;font-size:12px;">✕</button>`
          :` · <span onclick="startEditStudentViewField('subject','${sec.subj}')" style="cursor:text;border-bottom:1px dashed transparent;" onmouseover="this.style.borderColor='#bbb'" onmouseout="this.style.borderColor='transparent'">${escHtml(subjName)}</span>`;
        return `<div style="margin-bottom:30px;">
          <div style="background:#f4f6fb;border-radius:8px;padding:10px 14px;margin-bottom:10px;">
            <div style="font-size:14px;font-weight:700;color:#333;margin-bottom:3px;">${titleHtml}</div>
            <div style="font-size:13px;color:#555;">${grade} ${c?.name||''} · ${String(s.number||'')} ${s.name}${subjHtml}</div>
          </div>
          <table style="width:100%;border-collapse:collapse;border-top:2px solid #222;border-bottom:2px solid #222;">
            <tr>
              <td style="text-align:center;font-weight:700;font-size:13px;padding:8px 6px;border-bottom:1px solid #222;background:#f7f7f5;font-family:'Malgun Gothic',sans-serif;">세부능력 및 특기사항</td>
            </tr>
            <tr>
              <td style="padding:16px 14px;font-size:14px;line-height:1.95;color:#1a1a1a;white-space:pre-wrap;text-align:justify;font-family:'Malgun Gothic',sans-serif;">${escHtml(sec.text)}</td>
            </tr>
          </table>
        </div>`;
      }).join(''):'<div class="empty-state"><div class="ei">📄</div><p>아직 작성된 내용이 없어요</p></div>'}
    </div>
    </div>`;
}

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistCommonFiles(stuId);
    renderCommonFileList(stuId);
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

// ===== 과세특 정량평가 (시험 점수 기반 학업성취도, 5등급제) =====
function computeSetechGrade(label,studentId){
  const pool=[];
  allStudents().forEach(st=>{
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    const d=setech[label];
    if(d&&d.examScores&&d.examScores.s1!=null&&d.examScores.s2!=null){
      pool.push({id:st.id,total:d.examScores.s1+d.examScores.s2});
    }
  });
  if(!pool.length)return null;
  pool.sort((a,b)=>b.total-a.total);
  const n=pool.length;
  const idx=pool.findIndex(p=>p.id===studentId);
  if(idx===-1)return null;
  const rank=idx+1;
  const cum=[0.10,0.34,0.66,0.90,1.00].map(p=>Math.round(n*p));
  let grade=5;
  for(let i=0;i<cum.length;i++){if(rank<=cum[i]){grade=i+1;break;}}
  return{grade,rank,n,total:pool[idx].total};
}

const SETECH_SUBJECTS=['국어','수학','영어','사회','과학','역사','기술가정','체육','음악','미술','기타'];
// 설정에서 "가르치는 과목"을 직접 입력해두면(1~N개), 그게 세특 과목 목록 전체를 대체함(라벨만이 아니라
// 실제 저장 키 값도 그 이름이라 나이스 내보내기 등에서도 정확한 과목명이 그대로 쓰임). 아직 설정 안 했으면
// 일반적인 11개 과목 분류를 그대로 보여줌(첫 사용자 기본값).
function getEffectiveSetechSubjects(){
  return teacherSubjects.length?teacherSubjects:SETECH_SUBJECTS;
}
function getDefaultSubject(){
  return teacherSubjects[0]||'국어';
}
// 과목 설정을 바꾸면 예전 과목명(예: "사회")으로 저장된 세특 데이터가 화면 목록에서 안 보이게 될 수 있음.
// 데이터 자체는 지워지지 않고 그 키 그대로 DB에 남아있지만, "데이터가 사라졌다"는 착각을 주기 쉬워서
// 설정 저장 시마다 지금 과목 목록에 없는 키에 실제 내용이 남아있는지 확인해서 옮길 기회를 줌.
function findOrphanedSetechSubjects(currentSubjects){
  const counts={};
  allStudents().forEach(s=>{
    let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}
    Object.keys(d).forEach(key=>{
      if(currentSubjects.includes(key))return;
      const v=d[key]||{};
      const hasContent=(v.memo&&v.memo.trim())||(v.keywords&&v.keywords.length)||(v.result&&v.result.trim());
      if(hasContent)counts[key]=(counts[key]||0)+1;
    });
  });
  return Object.entries(counts).map(([subject,count])=>({subject,count})).sort((a,b)=>b.count-a.count);
}
// oldKey 밑에 있던 세특 데이터를 newKey로 옮김. newKey에 이미 데이터가 있으면 덮어쓰지 않고 병합
// (메모는 이어붙이고, 키워드는 합치고, 결과·예시·명령어는 비어있는 쪽만 채움).
async function migrateSetechSubject(oldKey,newKey){
  const targets=allStudents().filter(s=>{
    let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}
    return!!d[oldKey];
  });
  for(const s of targets){
    let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}
    const oldData=d[oldKey];
    if(!oldData||newKey===oldKey)continue;
    const existing=d[newKey];
    if(existing&&((existing.memo||'').trim()||existing.result||(existing.keywords||[]).length)){
      d[newKey]={
        memo:[existing.memo,oldData.memo].filter(Boolean).join('\n'),
        keywords:[...(existing.keywords||[]),...(oldData.keywords||[])],
        result:existing.result||oldData.result||'',
        example:existing.example||oldData.example||'',
        command:existing.command||oldData.command||''
      };
    }else{
      d[newKey]=oldData;
    }
    delete d[oldKey];
    s.setech=JSON.stringify(d);
    await sb.from('students').update({setech:s.setech}).eq('id',s.id);
  }
  renderSb();
  if(getStu())renderMain();
}

  const s=raw.indexOf('['),e=raw.lastIndexOf(']');
  let clean=raw;
  if(s!==-1&&e!==-1&&e>s)clean=raw.slice(s,e+1);
  const parsed=JSON.parse(clean);
  if(!Array.isArray(parsed))throw new Error('not array');
  return parsed;
}

// 나이스 교과목별 일람표 PDF를 클라이언트에서 직접 파싱
async function extractScoreTable(){
  const files=scoreUploadState.files;
  if(files.length!==2){alert('1차·2차 PDF를 두 개 모두 올려주세요.');return;}
  const area=document.getElementById('scoreUploadArea');
  if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 표를 읽는 중...</p>';
  try{
    if(typeof pdfjsLib==='undefined'){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF 파서가 아직 로딩 중이에요. 잠시 후 다시 시도해 주세요.</p>';
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    // x좌표 기반 열 구분으로 빈 칸(결시/전출 등)을 정확히 처리
    const parsePdf=async(file)=>{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      // 모든 아이템을 y좌표 그룹으로 묶기 (여러 페이지 합산)
      const byY={};
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        tc.items.forEach(item=>{
          fullText+=item.str+' ';
          const y=Math.round(item.transform[5]);
          if(!byY[y])byY[y]=[];
          byY[y].push({x:item.transform[4],str:item.str.trim()});
        });
      }
      const round_num=fullText.includes('1차')?1:fullText.includes('2차')?2:0;

      // 과목명 자동 감지: "교과목 : 사회..." 패턴에서 추출
      let detectedSubject=null;
      const subjectMatch=fullText.match(/교과목\s*:\s*([가-힣(]+)/);
      if(subjectMatch){
        const raw=subjectMatch[1];
        // SETECH_SUBJECTS 중 일치하는 것 찾기
        const SUBJECTS=['국어','수학','영어','사회','과학','역사','기술가정','체육','음악','미술'];
        detectedSubject=SUBJECTS.find(s=>raw.includes(s))||null;
      }

      // y 내림차순(위→아래)으로 행 정렬
      const sortedYs=Object.keys(byY).map(Number).sort((a,b)=>b-a);
      const rowsRaw=sortedYs.map(y=>byY[y].sort((a,b)=>a.x-b.x).filter(i=>i.str));

      // 반 헤더 행 찾기: 정수만 있고 1~9 범위, 2개 이상
      let banHeaders=[];
      let banHeaderXs=[];
      let dataYStart=null;
      for(let i=0;i<rowsRaw.length;i++){
        const strs=rowsRaw[i].map(c=>c.str);
        if(strs.length>=2&&strs.length<=8&&
           strs.every(s=>/^\d+$/.test(s))&&strs.every(s=>parseInt(s)>=1&&parseInt(s)<=9)){
          banHeaders=strs.map(Number);
          banHeaderXs=rowsRaw[i].map(c=>c.x);
          dataYStart=i+1;
          break;
        }
      }
      if(!banHeaders.length)return{round_num,banHeaders:[],rows:[]};

      // 각 반 열의 x범위: 헤더 x좌표 ± 허용 오차
      const colWidth=banHeaderXs.length>1?(banHeaderXs[1]-banHeaderXs[0]):40;
      const getColIdx=(x)=>{
        let best=-1,bestDist=Infinity;
        banHeaderXs.forEach((hx,i)=>{const d=Math.abs(x-hx);if(d<bestDist&&d<colWidth*0.7){bestDist=d;best=i;}});
        return best;
      };

      const rows=[];
      for(let i=dataYStart;i<rowsRaw.length;i++){
        const cells=rowsRaw[i];
        if(!cells.length)continue;
        // 첫 번째 셀이 번호(1~40 정수)인지 확인
        const hoStr=cells[0].str;
        const ho=parseInt(hoStr);
        if(!ho||ho<1||ho>40||isNaN(ho))continue;
        // 나머지 셀을 x좌표로 반 열에 매핑
        const scoreByCol={};
        cells.slice(1).forEach(cell=>{
          const col=getColIdx(cell.x);
          if(col>=0){
            const v=parseFloat(cell.str);
            if(!isNaN(v)&&v>=0&&v<=100)scoreByCol[col]=v;
            // 전출/결시/미인정결 등 비숫자는 무시 (점수 없음으로 처리)
          }
        });
        rows.push({ho,scoreByCol});
      }
      return{round_num,banHeaders,banHeaderXs,rows,detectedSubject};
    };

    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 1차 파일 읽는 중...</p>';
    const r1=await parsePdf(files[0]);
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 2차 파일 읽는 중...</p>';
    const r2=await parsePdf(files[1]);

    // 과목명 자동 세팅 (둘 중 하나라도 감지되면 적용)
    const autoSubject=r1.detectedSubject||r2.detectedSubject;
    if(autoSubject&&autoSubject!==scoreUploadState.label){
      scoreUploadState.label=autoSubject;
      // UI 버튼도 갱신
      renderScoreSubjectBtns();
      if(area)area.innerHTML=`<p style="font-size:12px;color:#378ADD;">📌 PDF에서 과목 자동 감지: <b>${autoSubject}</b></p>`;
      await new Promise(r=>setTimeout(r,600));
    }

    const first=r1.round_num===1?r1:(r2.round_num===1?r2:r1);
    const second=r1.round_num===2?r1:(r2.round_num===2?r2:r2);

    const buildMap=(parsed,key)=>{
      const m=new Map();
      parsed.rows.forEach(({ho,scoreByCol})=>{
        Object.entries(scoreByCol).forEach(([col,val])=>{
          const ban=parsed.banHeaders[parseInt(col)];
          if(!ban)return;
          const k=`${ban}_${ho}`;
          const ex=m.get(k)||{ban,ho};
          ex[key]=val;
          m.set(k,ex);
        });
      });
      return m;
    };

    const m1=buildMap(first,'s1');
    const m2=buildMap(second,'s2');
    const allRows=[];
    m1.forEach((v,k)=>{const s2=m2.get(k);if(s2?.s2!=null)allRows.push({...v,s2:s2.s2});});

    if(!allRows.length){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF 파싱 실패. API 키가 있다면 AI로 재시도해요.</p>';
      if(apiKey)await extractScoreTableByAI(files,area);
      return;
    }
    scoreUploadState.parsed=allRows;
    if(area)area.innerHTML=`<p style="font-size:12px;color:#389e0d;">✅ ${allRows.length}명 추출 완료</p>`;
    setTimeout(()=>renderBanMapping(),400);
  }catch(e){
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 오류 발생, AI로 재시도 중...</p>';
    if(apiKey)await extractScoreTableByAI(files,area);
    else if(area)area.innerHTML=`<p style="font-size:12px;color:#cf1322;">오류: ${e.message}</p>`;
  }
}

// 학번 5자리(예: 20314) → {ban:3, ho:14}
function realBanHoFromStudentId(sid){
  const s=String(sid||'').replace(/\D/g,'');
  if(s.length!==5)return null;
  return{ban:parseInt(s[2]),ho:parseInt(s.slice(3))};
}

async function applyScoreUpload(){
  const{label,parsed}=scoreUploadState;
  const area=document.getElementById('scoreUploadArea');
  let matched=0;
  const unmatchedKeys=[];
  // 성적표 반·번호 → 학생 맵
  const stuMap=new Map();
  allStudents().forEach(s=>{
    const bh=realBanHoFromStudentId(s.student_id);
    if(bh)stuMap.set(`${bh.ban}_${bh.ho}`,s);
  });
  const targets=[];
  for(const row of parsed){
    const key=`${Number(row.ban)}_${Number(row.ho)}`;
    const st=stuMap.get(key);
    if(!st){unmatchedKeys.push(`${row.ban}반${row.ho}번`);continue;}
    targets.push({st,row});
  }
  for(let i=0;i<targets.length;i++){
    const{st,row}=targets[i];
    if(area)area.innerHTML=`<p style="font-size:12px;color:#888;">⏳ 저장 중... (${i+1}/${targets.length})</p>`;
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    setech[label]={...(setech[label]||{}),examScores:{s1:Number(row.s1),s2:Number(row.s2)}};
    st.setech=JSON.stringify(setech);
    await sb.from('students').update({setech:st.setech}).eq('id',st.id);
    matched++;
  }
  let html=`<p style="font-size:12px;color:${matched?'#389e0d':'#cf1322'};">${matched?'✅':'⚠️'} ${matched}명 반영 완료${unmatchedKeys.length?`, ${unmatchedKeys.length}명 매칭 실패`:''}</p>`;
  if(unmatchedKeys.length){
    html+=`<p style="font-size:11px;color:#cf1322;margin-top:4px;">매칭 실패 (성적표에만 있고 수강반 명단에 없거나 결시): ${unmatchedKeys.join(', ')}</p>`;
  }
  if(area)area.innerHTML=html;
  if(matched)showToast(`📊 ${matched}명의 학업 성취도가 계산됐어요`);
  setTimeout(()=>{closeModal();renderSb();renderMain();},2500);
}

      <button onclick="closeModal()">${loading?'취소':'닫기'}</button>
      ${loading?'':`<button class="ok" onclick="saveVerifiedContent('${tabType}','${label}')">✅ 확인 완료 (저장)</button>`}
    </div>
  </div>`;
}

function saveVerifiedContent(tabType,label){

}

// 학생 탭(행동특성/세특 등) 안에서 그동안 기록된 누가 기록을 보여줄 때 씀 - 이미 학생·탭·과목이 고정된 컨텍스트라
// 클래스 모드처럼 반 전체를 스캔할 필요 없이, 그 필드의 keywords 배열만 보고 ts 있는 것만 골라 최신순으로 표시.
// 위에 중요도별 건수 요약 + 텍스트/날짜 필터바를 같이 붙여서 기록이 쌓여도 찾기 쉽게 함.
function qnHistoryHtmlFromKeywords(kws,studentId,tabType,subject,containerId,student){
  const history=(kws||[]).filter(k=>k.ts).map(k=>({...k,studentId})).sort((a,b)=>b.ts-a.ts);
  const target={tabType,subject};
  if(!history.length){
    const hint=student?qnOtherLocationsHtml(student,tabType,subject):'';
    return `<div style="font-size:11px;color:#bbb;padding:8px 0;">아직 이 항목엔 누가 기록이 없어요.</div>${hint}`;
  }
  const counts={높음:0,보통:0,낮음:0};
  history.forEach(k=>{const imp=k.importance||'보통';counts[imp]=(counts[imp]||0)+1;});
  const summary=`<div style="font-size:11px;color:#888;margin-bottom:8px;">높음 ${counts.높음}건 · 보통 ${counts.보통}건 · 낮음 ${counts.낮음}건 (총 ${history.length}건)</div>`;
  return `<div style="margin-top:10px;">
    ${summary}
    ${qnHistoryFilterBarHtml(containerId)}
    <div id="${containerId}">${qnGroupByDate(history).map(items=>qnHistoryCardHtml(items,false,target,false)).join('')}</div>
  </div>`;
}
// 지금 보고 있는 탭(+과목)엔 기록이 없는데 다른 탭/과목에는 있는 경우 안내 - 세특은 과목별로 완전히 분리 저장되기 때문에
// "분명히 기록했는데 왜 없지?" 하는 혼란이 생기기 쉬워서(예: 반 단위 기록 대상이 사회인데 국어 탭을 보고 있는 경우), 어디에 있는지 짚어줌.
function qnOtherLocationsHtml(s,excludeTabType,excludeSubject){
  if(!s)return'';
  const locations=[];
  const hCount=(s.keywords||[]).filter(k=>k.ts).length;
  if(hCount&&excludeTabType!=='haengdong')locations.push(`행동특성(${hCount}건)`);
  let setechData={};try{setechData=JSON.parse(s.setech||'{}');}catch(e){}
  const validSubjects=getEffectiveSetechSubjects();
  Object.keys(setechData).filter(sub=>validSubjects.includes(sub)).forEach(sub=>{
    const cnt=((setechData[sub]||{}).keywords||[]).filter(k=>k.ts).length;
    if(cnt&&!(excludeTabType==='setech'&&sub===excludeSubject))locations.push(`${sub} 세특(${cnt}건)`);
  });
  let changyeData={};try{changyeData=JSON.parse(s.changye||'{}');}catch(e){}
  Object.keys(changyeData).forEach(t=>{
    const cnt=((changyeData[t]||{}).keywords||[]).filter(k=>k.ts).length;
    if(cnt&&excludeTabType!==t)locations.push(`${escHtml(REVIEW_TAB_LABELS[t]||t)}(${cnt}건)`);
  });
  if(!locations.length)return'';
  return `<div style="font-size:11px;color:#7C3AED;padding:6px 0;">📍 다른 곳에 기록이 있어요: ${locations.join(', ')}</div>`;
}
// 누가기록 카드 리스트(qn-hist-card 클래스가 붙은 카드들) 위에 얹는 검색어+날짜범위 필터바.
// 실제 필터링은 서버/데이터 재조회 없이 이미 렌더된 카드를 JS로 보이기/숨기기만 함 - 카드 수가 학생 한 명 분량이라 충분히 가벼움.
function qnHistoryFilterBarHtml(containerId){
  return `<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
    <input type="text" placeholder="🔍 내용 검색" oninput="qnFilterHistoryList('${containerId}')" id="${containerId}_q" style="flex:1;min-width:100px;font-size:12px;padding:5px 8px;border:1px solid #e0e0ee;border-radius:8px;box-sizing:border-box;">
    <input type="date" id="${containerId}_from" onchange="qnFilterHistoryList('${containerId}')" style="font-size:12px;padding:5px 6px;border:1px solid #e0e0ee;border-radius:8px;">
    <span style="align-self:center;font-size:11px;color:#aaa;">~</span>
    <input type="date" id="${containerId}_to" onchange="qnFilterHistoryList('${containerId}')" style="font-size:12px;padding:5px 6px;border:1px solid #e0e0ee;border-radius:8px;">
  </div>`;
}
function qnFilterHistoryList(containerId){
  const box=document.getElementById(containerId);if(!box)return;
  const q=(document.getElementById(`${containerId}_q`)?.value||'').toLowerCase().trim();
  const fromV=document.getElementById(`${containerId}_from`)?.value;
  const toV=document.getElementById(`${containerId}_to`)?.value;
  const fromTs=fromV?new Date(`${fromV}T00:00:00`).getTime():null;
  const toTs=toV?new Date(`${toV}T23:59:59`).getTime():null;
  box.querySelectorAll('.qn-hist-card').forEach(el=>{
    const ts=parseInt(el.dataset.ts||'0',10);
    const text=el.dataset.search||'';
    let show=true;
    if(q&&!text.includes(q))show=false;
    if(fromTs&&ts<fromTs)show=false;
    if(toTs&&ts>toTs)show=false;
    el.style.display=show?'':'none';
  });
}
function getTabData(tabType){
  const s=getStu();if(!s)return{memo:'',keywords:[],result:'',example:'',command:''};
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    return setech[selSubject||getDefaultSubject()]||{memo:'',keywords:[],result:'',example:'',command:''};
  } else {
    const changye=JSON.parse(s.changye||'{}');
    return changye[tabType]||{memo:'',keywords:[],result:'',example:'',command:''};
  }
}

async function saveTabData(tabType,label,updates){
  const s=getStu();if(!s)return;
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    const sub=selSubject||getDefaultSubject();
    setech[sub]={...(setech[sub]||{}), ...updates};
    s.setech=JSON.stringify(setech);
    await sb.from('students').update({setech:s.setech}).eq('id',s.id);
  } else {
    const changye=JSON.parse(s.changye||'{}');
    changye[tabType]={...(changye[tabType]||{}), ...updates};
    s.changye=JSON.stringify(changye);
    await sb.from('students').update({changye:s.changye}).eq('id',s.id);
  }
}

// 반 안에서 "최근 2주 이상(또는 아예 한 번도) 기록이 없는 학생"을 찾아 통계 카드로 보여줌.
// 이름을 항상 늘어놓지 않고, 박스를 눌러야 명단이 펼쳐지는 방식(기록없음 명단 클릭→그 학생으로 바로 작성,
// 기록있음 명단 클릭→날짜만 펼침→날짜 클릭→그 날 쓴 내용 펼침)으로 단계적으로 드릴다운.
function qnStaleStudentsHtml(clsName,target,c){
  if(!target||!c||!c.students.length)return'';
  const STALE_MS=14*24*60*60*1000;
  const now=Date.now();
  const getHist=(s)=>{
    let arr;
    if(target.tabType==='haengdong')arr=s.keywords||[];
    else if(target.tabType==='setech'){let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}arr=(d[target.subject]||{}).keywords||[];}
    else{let d={};try{d=JSON.parse(s.changye||'{}');}catch(e){}arr=(d[target.tabType]||{}).keywords||[];}
    return(arr||[]).filter(k=>k.ts).sort((a,b)=>b.ts-a.ts);
  };
  const recorded=[],stale=[];
  c.students.forEach(s=>{
    const hist=getHist(s);
    if(!hist.length){stale.push(s);return;}
    if((now-hist[0].ts)>STALE_MS)stale.push(s);else recorded.push({s,hist});
  });
  if(!recorded.length&&!stale.length)return'';
  const total=c.students.length;
  const pct=total?Math.round(recorded.length/total*100):0;
  const safeId=clsName.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const clsNameEsc=clsName.replace(/'/g,"\\'");
  const recordedListHtml=recorded.map(({s,hist})=>{
    const dateGroups={};
    hist.forEach(k=>{
      const d=new Date(k.ts);
      const key=`${d.getMonth()+1}_${d.getDate()}`;
      (dateGroups[key]=dateGroups[key]||[]).push(k);
    });
    return `
    <div style="margin:0 6px 8px 0;display:inline-block;vertical-align:top;">
      <span onclick="qnToggleDates('${safeId}',${s.id})" style="cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;background:#fff;border:1.5px solid #86D19A;color:#268A46;font-size:12px;font-weight:600;">${escHtml(`${s.number||''} ${s.name}`)}<span style="background:#DFF3E4;color:#268A46;border-radius:10px;padding:0 6px;font-size:11px;">${hist.length}</span><span id="qnChev_${safeId}_${s.id}" style="display:inline-block;transition:transform .2s;font-size:9px;">▾</span></span>
      <div id="qnDates_${safeId}_${s.id}" style="max-height:0;overflow:hidden;opacity:0;transition:max-height .25s ease,opacity .2s ease;">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0 4px;max-width:260px;">
          ${Object.entries(dateGroups).map(([key,items])=>{const[mo,da]=key.split('_');return`<span onclick="qnToggleNote('${safeId}',${s.id},'${key}')" style="cursor:pointer;display:inline-block;padding:4px 11px;border-radius:16px;background:#EAF3FE;border:1px solid #B9D9FA;color:#1D6FC7;font-size:11px;font-weight:600;">${mo}월 ${da}일${items.length>1?` (${items.length})`:''}</span>`;}).join('')}
        </div>
        ${Object.entries(dateGroups).map(([key,items])=>`<div id="qnNote_${safeId}_${s.id}_${key}" style="max-height:0;overflow:hidden;opacity:0;transition:max-height .25s ease,opacity .2s ease;">${items.map((k,ki)=>`<div style="font-size:11px;color:#555;line-height:1.6;margin:8px 0 0 4px;padding:8px 10px;background:#f8f8fa;border-left:3px solid #B9D9FA;border-radius:6px;">${items.length>1?`<b style="color:#1D6FC7;">${ki+1}번</b> `:''}${escHtml(k.text)}</div>`).join('')}</div>`).join('')}
      </div>
    </div>`;}).join('');
  const staleListHtml=stale.map(s=>`<span onclick="qnJumpToWrite('${clsNameEsc}',${s.id})" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin:0 6px 8px 0;padding:5px 13px;border-radius:20px;background:#fff;border:1.5px solid #F3AEB4;color:#cf1322;font-size:12px;font-weight:600;">✎ ${escHtml(`${s.number||''} ${s.name}`)}</span>`).join('');
  return `<div class="card" style="margin-bottom:14px;">
    <div class="card-hd">📊 ${escHtml(clsName)} 최근 2주 기록 현황</div>
    <div style="display:flex;gap:10px;margin:10px 0 12px;">
      <div onclick="qnTogglePanel('${safeId}','recorded')" style="flex:1;text-align:center;padding:10px;background:#EAF3DE;border-radius:8px;cursor:pointer;">
        <div style="font-size:22px;font-weight:700;color:#389e0d;">${recorded.length}</div>
        <div style="font-size:11px;color:#389e0d;">기록 있음 <span id="qnChevPanel_${safeId}_recorded" style="display:inline-block;transition:transform .2s;">▾</span></div>
      </div>
      <div onclick="qnTogglePanel('${safeId}','stale')" style="flex:1;text-align:center;padding:10px;background:#FDEDED;border-radius:8px;cursor:pointer;">
        <div style="font-size:22px;font-weight:700;color:#cf1322;">${stale.length}</div>
        <div style="font-size:11px;color:#cf1322;">기록 없음 <span id="qnChevPanel_${safeId}_stale" style="display:inline-block;transition:transform .2s;">▾</span></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="flex:1;height:8px;background:#e0e0ee;border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:#52c41a;border-radius:4px;transition:width 0.3s;"></div>
      </div>
      <span style="font-size:12px;color:#555;font-weight:600;">${pct}%</span>
    </div>
    <div id="qnPanel_${safeId}_recorded" style="max-height:0;overflow:hidden;opacity:0;transition:max-height .3s ease,opacity .25s ease;">
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #eee;">${recordedListHtml||'<div style="font-size:12px;color:#bbb;">없음</div>'}</div>
    </div>
    <div id="qnPanel_${safeId}_stale" style="max-height:0;overflow:hidden;opacity:0;transition:max-height .3s ease,opacity .25s ease;">
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #eee;">${staleListHtml||'<div style="font-size:12px;color:#bbb;">없음</div>'}</div>
    </div>
  </div>`;
}
// 기록있음/기록없음 통계박스를 누르면 그 명단 패널만 펼침(반대쪽은 자동으로 접음) - max-height 트랜지션으로 펼쳐지는 느낌 연출,
// 화살표(▾)도 열림 상태에 맞춰 180도 회전
function qnTogglePanel(safeId,which){
  const other=which==='recorded'?'stale':'recorded';
  const p=document.getElementById(`qnPanel_${safeId}_${which}`);
  const o=document.getElementById(`qnPanel_${safeId}_${other}`);
  const pChev=document.getElementById(`qnChevPanel_${safeId}_${which}`);
  const oChev=document.getElementById(`qnChevPanel_${safeId}_${other}`);
  if(o){o.style.maxHeight='0px';o.style.opacity='0';}
  if(oChev)oChev.style.transform='rotate(0deg)';
  if(!p)return;

  else{p.style.maxHeight='3000px';p.style.opacity='1';if(pChev)pChev.style.transform='rotate(180deg)';}
}
function qnToggleDates(safeId,studentId){

function qnToggleNote(safeId,studentId,kwId){

}
// "기록 없음" 명단에서 학생 이름을 누르면 바로 그 학생을 멘션해서 입력창에 넣어줌(이어쓰기 기능과 동일한 방식)
function qnJumpToWrite(clsName,studentId){
  const c=classes.find(c=>c.name===clsName);
  const s=c?.students.find(st=>st.id===studentId);
  const ta=document.getElementById('qnInput_cls');
  if(!s||!ta)return;
  ta.value=`/${s.number||''} ${s.name} `;
  ta.focus();
  ta.setSelectionRange(ta.value.length,ta.value.length);
  qnUpdateHighlight(clsName);
  qnUpdateStudentPreview(clsName);
  ta.scrollIntoView({behavior:'smooth',block:'center'});
}
// 입력창에 /멘션이 실제 학생으로 인식될 때마다(하이라이트가 켜질 때마다) 그 학생의 지금까지의 누가기록을
// 실시간으로 바로 아래에 보여줌. 사이드바 클릭 방식은 폐기됐고, 이 반응형 방식만 유지함.
function qnUpdateStudentPreview(clsName){
  const wrap=document.getElementById('qnHistoryPreview_cls');
  const ta=document.getElementById('qnInput_cls');
  if(!wrap||!ta){return;}
  const target=getClassRecordTarget(clsName);
  const c=classes.find(c=>c.name===clsName);
  if(!target||!c){wrap.innerHTML='';return;}
  const seen=new Set();
  const resolved=[];
  [...ta.value.matchAll(QN_MENTION_RE)].forEach(m=>{
    const num=m[1],name=m[2];
    const s=num?c.students.find(st=>String(st.number)===num):c.students.find(st=>st.name===name);
    if(s&&!seen.has(s.id)){seen.add(s.id);resolved.push(s);}
  });
  if(!resolved.length){wrap.innerHTML='';return;}
  const history=getQuickNoteHistory(clsName,target);
  wrap.innerHTML=resolved.map(s=>{
    const h=history.filter(k=>k.studentId===s.id);
    return `<div style="margin-top:22px;">
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px;">✨ ${escHtml(s.name)} 누가 기록 내역 (${h.length}건)</div>
      ${h.length?qnGroupByDate(h).map(items=>qnHistoryCardHtml(items,false,target)).join(''):'<div style="font-size:12px;color:#bbb;padding:8px 0;">아직 기록된 내용이 없어요.</div>'}
    </div>`;
  }).join('');
}
// /이름 또는 /학번 이름(자동완성으로 선택 시 이 형태로 삽입됨) 뒤에 이어지는 태그를 찾아, 실제 학생과 일치하면
// 입력창 뒤에 깔린 하이라이트 레이어에 노랗게 칠해줌(textarea 자체는 부분 서식을 지원 안 해서 겹쳐서 흉내냄).
const QN_MENTION_RE=/\/(?:(\d{4,6})\s+)?([^\s\/]+)/g;
function qnUpdateHighlight(clsName){
  const ta=document.getElementById('qnInput_cls');
  const hl=document.getElementById('qnHighlight_cls');
  if(!ta||!hl)return;
  const c=classes.find(c=>c.name===clsName);
  const students=c?c.students:[];
  hl.innerHTML=escHtml(ta.value).replace(QN_MENTION_RE,(m,num,name)=>{
    const resolved=num?students.find(s=>String(s.number)===num):students.find(s=>s.name===name);
    return resolved?`<mark style="background:#FDE68A;color:transparent;border-radius:3px;padding:0;margin:0;">${m}</mark>`:m;
  });
}
function showQnSubjectPicker(clsName){
  const w=document.getElementById('qnSubjectPickerWrap');
  if(w)w.style.display='block';
}
// 그 반의 그 저장 대상(target)에 실제로 쌓여있는 누가기록을 학생 keywords에서 직접 긁어옴(세션 한정이 아니라 진짜 데이터).
// ts 필드가 있는 것만 누가기록 항목으로 취급(예전에 손으로 직접 넣은 키워드는 ts가 없어서 자연히 안 섞임).
function getQuickNoteHistory(clsName,target){
  const c=classes.find(c=>c.name===clsName);
  if(!c)return[];
  const out=[];
  c.students.forEach(s=>{
    let arr=[];
    if(target.tabType==='haengdong')arr=s.keywords||[];
    else if(target.tabType==='setech'){let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}arr=(d[target.subject]||{}).keywords||[];}
    else{let d={};try{d=JSON.parse(s.changye||'{}');}catch(e){}arr=(d[target.tabType]||{}).keywords||[];}
    arr.filter(k=>k.ts).forEach(k=>out.push({...k,studentId:s.id,studentName:s.name,studentNumber:s.number}));
  });
  out.sort((a,b)=>b.ts-a.ts);
  return out;
}
// 누가기록 한 건을 카드 형태로 렌더링(N월N일 · 학번이름 · 중요도, 전문, 바이트 수, 이동/수정/삭제 버튼)
// 같은 날짜에 기록이 여러 건이면 카드 하나로 묶어서(날짜 헤더 공유), 각 건은 1번/2번으로 번호 매겨 보여줌.
// items는 반드시 같은 날짜의 항목들만 담은 배열이어야 함(하위호환으로 단일 객체를 넘기면 배열로 감싸줌).
function qnHistoryCardHtml(items,showStudent,target,showMoveLink=true){
  if(!Array.isArray(items))items=[items];
  const first=items[0];
  const d=new Date(first.ts);
  const dateStr=`${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`;
  const impColors={낮음:'#94a3b8',보통:'#3b82f6',높음:'#dc2626'};
  const subjArg=target.subject?`'${target.subject.replace(/'/g,"\\'")}'`:'null';
  const multi=items.length>1;
  const searchBlob=items.map(k=>(k.text||'').toLowerCase()).join(' ');
  const cardId=`qc_${first.ts}_${first.studentId||0}_${Math.floor(Math.random()*100000)}`;
  const entriesHtml=items.map((k,ki)=>{
    const impColor=impColors[k.importance]||'#3b82f6';
    return `<div style="${ki>0?'margin-top:8px;padding-top:8px;border-top:1px dashed #eee;':''}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:11px;">
        ${multi?`<span style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#eef1f5;color:#8a94a3;font-size:10px;">${ki+1}</span>`:''}
        <span style="margin-left:auto;padding:2px 8px;border-radius:10px;background:${impColor}22;color:${impColor};font-weight:600;">${k.importance||'보통'}</span>
      </div>
      <div id="qnCardText_${k.id}" style="font-size:12px;color:#444;line-height:1.55;">${escHtml(k.text)}</div>
      <div id="qnCardEdit_${k.id}" style="display:none;">
        <textarea id="qnEditTa_${k.id}" style="width:100%;box-sizing:border-box;min-height:60px;font-size:12px;line-height:1.6;padding:8px;border:1px solid #DDD6FE;border-radius:8px;font-family:inherit;resize:vertical;">${escHtml(k.text)}</textarea>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <button onclick="qnSaveEditHistoryEntry(${k.studentId},'${target.tabType}',${subjArg},${k.id})" style="padding:4px 12px;font-size:11px;border-radius:8px;border:none;background:#7C3AED;color:#fff;cursor:pointer;">저장</button>
          <button onclick="qnCancelEditHistoryEntry(${k.id})" style="padding:4px 12px;font-size:11px;border-radius:8px;border:1px solid #e0e0ee;background:#fff;color:#666;cursor:pointer;">취소</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
        <span style="font-size:10px;color:#bbb;">${bytes(k.text)}B</span>
        <div style="display:flex;gap:5px;">
          <span onclick="qnStartEditHistoryEntry(${k.id})" style="cursor:pointer;padding:2px 9px;border-radius:14px;background:#fff;border:1px solid #DDD6FE;color:#7C3AED;font-size:10px;font-weight:600;">✏️ 수정</span>
          <span onclick="qnDeleteHistoryEntry(${k.studentId},'${target.tabType}',${subjArg},${k.id})" style="cursor:pointer;padding:2px 9px;border-radius:14px;background:#fff;border:1px solid #F3AEB4;color:#dc2626;font-size:10px;font-weight:600;">🗑️ 삭제</span>
          ${showMoveLink?`<span onclick="viewQuickNoteInStudent(${k.studentId},'${target.tabType}',${subjArg})" style="cursor:pointer;padding:2px 9px;border-radius:14px;background:#fff;border:1px solid #B9D9FA;color:#378ADD;font-size:10px;font-weight:600;">이동</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="qn-hist-card" data-ts="${first.ts}" data-search="${escHtml(searchBlob)}" style="background:#fff;border:1px solid #f0f0f0;border-radius:10px;padding:9px 12px;margin-bottom:6px;">
    <div onclick="qnToggleCard('${cardId}')" style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;color:#999;flex-wrap:wrap;">
      <span id="${cardId}_chev" style="display:inline-block;font-size:9px;transition:transform .2s;color:#bbb;">▸</span>
      <span style="font-size:12px;font-weight:700;color:#555;">${dateStr}</span>
      ${showStudent?`<span>· ${escHtml(String(first.studentNumber||''))} ${escHtml(first.studentName||'')}</span>`:''}
      ${multi?`<span style="font-size:10px;color:#aaa;">${items.length}건</span>`:''}
    </div>
    <div id="${cardId}" style="max-height:0;overflow:hidden;opacity:0;transition:max-height .2s ease,opacity .15s ease;">
      <div style="margin-top:8px;">${entriesHtml}</div>
    </div>
  </div>`;
}
// 날짜 헤더를 눌러 그 안의 기록 내용을 펼치거나 접음(기본은 접힌 상태로 시작해 목록이 컴팩트하게 보이게 함)
function qnToggleCard(cardId){
  const el=document.getElementById(cardId);
  const chev=document.getElementById(`${cardId}_chev`);
  if(!el)return;
  const isOpen=el.style.maxHeight&&el.style.maxHeight!=='0px';
  if(isOpen){el.style.maxHeight='0px';el.style.opacity='0';if(chev)chev.style.transform='rotate(0deg)';}
  else{el.style.maxHeight='1000px';el.style.opacity='1';if(chev)chev.style.transform='rotate(90deg)';}
}
// 최신순으로 정렬된 목록을 날짜(연-월-일) 단위로 묶어서 배열의 배열로 반환. 각 그룹 내부는 원래 순서(최신순) 유지.
function qnGroupByDate(list){
  const groups={};
  const order=[];
  (list||[]).forEach(k=>{
    const d=new Date(k.ts);
    const key=`${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
    if(!groups[key]){groups[key]=[];order.push(key);}
    groups[key].push(k);
  });
  return order.map(key=>groups[key]);
}
// 누가기록 한 건의 keywords 배열을 어디서 가져와야 하는지(행동특성/세특/자율 등)에 상관없이
// 공통으로 찾아서 mutateFn으로 바꾼 뒤 Supabase에 반영 + 화면 갱신하는 공용 함수(수정/삭제가 공유)
async function qnMutateHistoryEntry(studentId,tabType,subject,mutateFn){
  const c=classes.find(c=>c.students.some(st=>st.id===studentId));
  const s=c?.students.find(st=>st.id===studentId);
  if(!s)return;
  if(tabType==='haengdong'){
    s.keywords=mutateFn(s.keywords||[]);
    await sb.from('students').update({keywords:JSON.stringify(s.keywords)}).eq('id',s.id);
  }else if(tabType==='setech'){
    let d={};try{d=JSON.parse(s.setech||'{}');}catch(e){}
    const cur=d[subject]||{memo:'',keywords:[],result:'',example:'',command:''};
    cur.keywords=mutateFn(cur.keywords||[]);
    d[subject]=cur;s.setech=JSON.stringify(d);
    await sb.from('students').update({setech:s.setech}).eq('id',s.id);
  }else{
    let d={};try{d=JSON.parse(s.changye||'{}');}catch(e){}
    const cur=d[tabType]||{memo:'',keywords:[],result:'',example:'',command:''};
    cur.keywords=mutateFn(cur.keywords||[]);
    d[tabType]=cur;s.changye=JSON.stringify(d);
    await sb.from('students').update({changye:s.changye}).eq('id',s.id);
  }
  renderSb();
  if(selStu===s.id)renderMain();
  if(quickNoteModeCls)qnUpdateStudentPreview(quickNoteModeCls);
}
async function qnDeleteHistoryEntry(studentId,tabType,subject,kwId){
  if(!confirm('이 기록을 삭제할까요? 되돌릴 수 없어요.'))return;
  await qnMutateHistoryEntry(studentId,tabType,subject,arr=>arr.filter(k=>k.id!==kwId));
  showToast('삭제했어요.');
}
function qnStartEditHistoryEntry(kwId){
  const t=document.getElementById(`qnCardText_${kwId}`);
  const e=document.getElementById(`qnCardEdit_${kwId}`);

function qnCancelEditHistoryEntry(kwId){

  const e=document.getElementById(`qnCardEdit_${kwId}`);

async function qnSaveEditHistoryEntry(studentId,tabType,subject,kwId){

  if(!text)return;

function viewQuickNoteInStudent(studentId,tabType,subject){
  quickNoteModeCls=null;
  selStu=studentId;
  selTab=tabType;
  if(tabType==='setech'&&subject)selSubject=subject;

// 한글 완성형 글자에서 초성만 뽑아냄 (예: "강민구" → "ㄱㅁㄱ") - 초성 검색 지원용
const CHOSEONG=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChoseong(str){
  let out='';
  for(const ch of str||''){
    const code=ch.charCodeAt(0)-0xAC00;
    out+=(code>=0&&code<=11171)?CHOSEONG[Math.floor(code/588)]:ch;
  }
  return out;
}
// /이름(또는 /학번) 뒤에 이어지는 글자로 이 반 안에서만 검색 (반이 이미 정해진 상태라 학번+이름만 보여주면 동명이인 걱정 없음)
let qnAcMatches=[],qnAcActiveIdx=-1,qnAcNavigated=false;
function qnClassAutocompleteCheck(clsName){
  const ta=document.getElementById('qnInput_cls');
  const dd=document.getElementById('qnAutocomplete_cls');
  if(!ta||!dd)return;
  const pos=ta.selectionStart;
  const before=ta.value.slice(0,pos);
  const m=before.match(/\/(\S*)$/);
  if(!m){dd.style.display='none';qnAcMatches=[];qnAcActiveIdx=-1;qnAcNavigated=false;return;}
  const frag=m[1];
  const c=classes.find(c=>c.name===clsName);
  if(!c){dd.style.display='none';return;}
  const matches=c.students.filter(s=>s.name.includes(frag)||String(s.number||'').includes(frag)||getChoseong(s.name).includes(frag)).slice(0,50);
  qnAcMatches=matches;qnAcActiveIdx=matches.length?0:-1;qnAcNavigated=false;
  if(!matches.length){dd.style.display='none';return;}
  dd.innerHTML=matches.map((s,i)=>`<div id="qnAcItem${i}" onmousedown="qnClassPickStudent(${i},'${clsName}')" style="padding:8px 12px;font-size:13px;cursor:pointer;background:${i===0?'#f4f0ff':'#fff'};" onmouseover="qnAcActiveIdx=${i};qnAcNavigated=true;qnRenderAcHighlight();"><b>${escHtml(String(s.number||''))}</b> ${escHtml(s.name)}</div>`).join('');
  dd.style.display='block';
}
function qnRenderAcHighlight(){
  qnAcMatches.forEach((s,i)=>{
    const el=document.getElementById('qnAcItem'+i);
    if(!el)return;
    el.style.background=i===qnAcActiveIdx?'#f4f0ff':'#fff';
    if(i===qnAcActiveIdx)el.scrollIntoView({block:'nearest'});
  });
}
// @자동완성 드롭다운이 떠 있을 땐 위/아래 화살표로 후보를 훑을 수 있고(스크롤도 같이 따라감),
// 드롭다운이 열려서 후보가 하이라이트돼 있는 동안은 Enter가 항상 그 후보를 선택함(화살표로 안 훑었어도 0번이 기본 선택돼 있으므로).
// 드롭다운이 닫혀있을 때만 Enter가 기록 제출로 동작함.
function qnHandleClsKeydown(e,clsName){
  const dd=document.getElementById('qnAutocomplete_cls');
  const open=dd&&dd.style.display==='block'&&qnAcMatches.length;
  if(open&&(e.key==='ArrowDown'||e.key==='ArrowUp')){
    e.preventDefault();
    qnAcNavigated=true;
    qnAcActiveIdx=e.key==='ArrowDown'?Math.min(qnAcActiveIdx+1,qnAcMatches.length-1):Math.max(qnAcActiveIdx-1,0);
    qnRenderAcHighlight();
    return;
  }
  if(open&&e.key==='Enter'&&qnAcActiveIdx>=0){
    e.preventDefault();
    qnClassPickStudent(qnAcActiveIdx,clsName);
    return;
  }
  if(open&&e.key==='Escape'){dd.style.display='none';return;}
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitQuickNoteForClass(clsName);}
}
// 자동완성에서 학생을 고르면 "/학번 이름 " 형태로 삽입(사이드바 표기와 통일 + 동명이인 걱정 없이 정확히 특정됨),

function qnClassPickStudent(idx,clsName){
  const s=qnAcMatches[idx];
  const ta=document.getElementById('qnInput_cls');
  if(!ta||!s)return;
  const pos=ta.selectionStart;
  const val=ta.value;
  const before=val.slice(0,pos).replace(/\/(\S*)$/,`/${s.number||''} ${s.name} `);
  ta.value=before+val.slice(pos);
  ta.focus();ta.setSelectionRange(before.length,before.length);
  const dd=document.getElementById('qnAutocomplete_cls');

  qnUpdateStudentPreview(clsName);

function getQnEngine(){ return localStorage.getItem('qnEngine')||'gemini'; }

async function submitQuickNoteForClass(clsName){
  const inp=document.getElementById('qnInput_cls');
  const raw=inp?.value.trim();
  if(!raw)return;
  document.getElementById('qnAutocomplete_cls')&&(document.getElementById('qnAutocomplete_cls').style.display='none');
  const c=classes.find(c=>c.name===clsName);
  const mentions=[...raw.matchAll(QN_MENTION_RE)].map(m=>({number:m[1]||null,name:m[2]}));
  if(!mentions.length){alert('학생을 지정해주세요 (예: /이름)');return;}
  const content=raw.replace(QN_MENTION_RE,'').replace(/\s+/g,' ').trim();
  if(!content){alert('내용을 입력해주세요.');return;}
  const seen=new Set();
  const students=[];
  mentions.forEach(({number,name})=>{
    const s=number?c?.students.find(st=>String(st.number)===number):c?.students.find(st=>st.name===name);
    if(s&&!seen.has(s.id)){seen.add(s.id);students.push({...s,clsName});}
  });
  if(!students.length){alert('일치하는 학생을 못 찾았어요. 이름을 확인해주세요.');return;}
  const target=getClassRecordTarget(clsName);
  if(!target){alert('먼저 이 반의 기록 대상을 설정해주세요.');return;}
  const btn=document.getElementById('qnSubmitBtn_cls');
  if(btn){btn.disabled=true;btn.textContent='다듬는 중...';}
  try{
    const sys=`너는 교사가 수업 중 학생을 관찰하고 남긴 짧고 편한 말투의 메모를 나이스 생기부용 격식체 문장으로 다듬는 도우미야.
사실 관계나 내용은 절대 바꾸지 말고 말투만 격식 있게 다듬어. 반말·이모티콘·은어·오타를 정리하고, ${style.command||'문장은 ~임/~음/~함으로 끝내는 격식체로 써줘.'}
결과는 완성된 문장(하나 또는 여러 문장)만 출력하고, 다른 설명이나 따옴표는 붙이지 마.`;
    const polished=await qnPolish(sys,content);
    if(inp)inp.value='';
    qnUpdateHighlight(clsName);
    qnUpdateStudentPreview(clsName);
    openQuickNoteReview(raw,polished,{tabType:target.tabType,subject:target.subject,students});
  }catch(e){
    alert('다듬는 중 오류: '+e.message);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='기록 (Enter)';}
  }
}

// 결과가 목표 바이트±50을 벗어나면 한 번 더 요청해서 분량을 맞춤.
function postProcess(text){
  // 중간점(·) 강제 제거 → 쉼표로 치환
  return text.replace(/·/g,',').replace(/,,/g,',');
}

async function regenerateIfByteOff(target,text,cost){
  text=postProcess(text);
  const actual=bytes(text);
  if(Math.abs(actual-target)<=50)return{text,cost,retried:false};

  const doAdjust=async(txt,c)=>{
    const act=bytes(txt);
    const adjustPrompt=`다음 생기부 세특 문장의 분량을 조정해 주세요. 내용과 문체는 그대로 유지하고, 분량만 정확히 ${target}바이트(허용범위 ${Math.max(0,target-50)}~${target+50}바이트)에 맞게 ${act>target?'압축해서 줄여':'세부 내용을 보강해서 늘려'} 주세요.
- 압축할 때는 덜 중요한 세부 사례나 반복 표현을 줄이고 간결한 문체를 유지하세요.
- 새로운 활동 내용이나 평가 표현을 추가하지 마세요.
- 중간점(·)은 절대 사용하지 마세요. 한자도 절대 사용하지 마세요.
- 생기부 문장만 출력하세요. 설명, 바이트 계산, 구분선 등은 절대 출력하지 마세요.

[원본 글] (현재 ${act}바이트):
${txt}`;
    const d=await callClaudeAPI({apiKey,prompt:adjustPrompt,fileOld:null,fileRefs:[],fileExample:null});
    if(d.result)return{text:postProcess(d.result),cost:c+(d.cost||0)};
    return null;
  };

  // 재시도 1회
  const r1=await doAdjust(text,cost);
  if(r1)return{text:r1.text,cost:r1.cost,retried:true};
  return{text,cost,retried:false};
}


// PPTX는 base64 문서가 아니라 이미 추출된 일반 텍스트(extractedText)로 저장돼 있음.
// 이건 슬라이드에 실제로 적힌 텍스트 그대로라 손글씨 OCR과 달리 100% 정확하므로,
// "지어내지 말 것" 경고 없이 그대로 신뢰하고 쓰도록 프롬프트에 넣어줌.
function extractedTextBlock(files){
  const parts=[];
  if(files.old?.extractedText)parts.push(`[기존 생기부(${files.old.type==='pdf'?'PDF':'PPTX'}) 추출 텍스트]:\n${files.old.extractedText}`);
  (files.refs||[]).forEach((r,i)=>{
    if(!r)return;
    if(r.type==='text'&&r.extractedText)parts.push(`[참고자료${i+1} — 학생이 직접 작성한 수업 소감 설문 응답입니다]\n이 자료는 학생이 직접 쓴 소감이므로 설문에 없는 활동·탐구·분석·내면화를 추가하지 말고, 학생이 직접 언급한 내용만 재구성할 것.\n---\n${r.extractedText}`);
    else if(r.type==='txt'&&r.extractedText)parts.push(`[참고자료${i+1} — 학생 발표 음성 인식 텍스트(예: 클로바노트) 원문입니다]\n이 자료는 발표를 그대로 옮겨 적은 텍스트이므로 실제로 언급된 내용만 활용하고, 여기 없는 내용을 지어내지 말 것. 음성 인식 특성상 오탈자·띄어쓰기 오류가 있을 수 있으니 문맥상 자연스럽게 이해할 것.\n---\n${r.extractedText}`);
    else if(r.type==='pdf'&&r.extractedText)parts.push(`[참고자료${i+1}(PDF) 추출 텍스트]:\n${r.extractedText}`);
    else if(r.extractedText)parts.push(`[참고자료${i+1}(PPTX) 추출 텍스트]:\n${r.extractedText}`);
  });
  return parts.join('\n\n');
}

// 누가 기록에 저장해둔 중요도(낮음/보통/높음)를 실제 생기부 생성 프롬프트에 반영하기 위한 포맷터.
// 기본값(보통)인 키워드는 표시를 안 해서 프롬프트가 지저분해지지 않게 하고, 낮음/높음만 눈에 띄게 표시함.
function formatKwList(list){
  if(!list.length)return'없음';
  return list.map(k=>{
    const text=typeof k==='string'?k:k.text;
    const imp=typeof k==='object'&&k.importance&&k.importance!=='보통'?k.importance:null;
    return imp?`${text}(중요도:${imp})`:text;
  }).join(', ');
}

    const msg=e.message||String(e);
    let hint='';
    if(msg.includes('fetch')||msg.toLowerCase().includes('failed')||msg.includes('network')){hint='\n\n가능한 원인: ① 인터넷 연결 확인 ② API 키 설정 확인 ③ 잠시 후 다시 시도';}
    else if(msg.includes('401')||msg.includes('403')){hint='\n\nAPI 키가 잘못됐거나 만료됐어요.';}
    else if(msg.includes('429')){hint='\n\n요청이 너무 많아요. 잠시 후 다시 시도해 주세요.';}
    else if(/50[024]/.test(msg)){hint='\n\n서버 오류예요. 잠시 후 다시 시도해 주세요.';}

function updBC(){
  const s=getStu();if(!s)return;
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result||'');const pct=Math.min(100,Math.round(b/t*100));
  const el=document.getElementById('byteInfo'),fill=document.getElementById('byteFill');
  if(el){el.textContent=`${b} / ${t}`;el.className='byte-info '+(b>t?'ov':'');}
  if(fill)fill.style.width=pct+'%';
}

async function updMemo(v){const s=getStu();if(!s)return;s.memo=v;await sb.from('students').update({memo:v}).eq('id',s.id);}

// 파일 분석 관련 - 학생별 + 탭별로 유지
const analyzedFilesMap={};

function getCurTabId(){return selTab||'haengdong';}

function getAnalyzedFiles(){
  const s=getStu();if(!s)return{old:null,refs:[null],example:null};
  const key=`${s.id}_${getCurTabId()}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}

// 메모리 상의 파일 상태(files)를 IndexedDB에도 동기화.
// 파일 추가/삭제/슬롯삭제 등 상태가 바뀌는 모든 곳에서 반드시 호출해야
// 다른 탭에 갔다가 돌아와도(restoreStoredFiles) 옛 데이터로 덮어써지지 않음.
async function persistFiles(){
  const s=getStu();if(!s)return;
  const files=getAnalyzedFiles();
  const key=`files_${s.id}_${getCurTabId()}`;
  try{
    await idbSet(key,files);
    await refreshStudentFileFlag(s.id);
    renderSb();
  }catch(e){console.warn('저장 공간 초과:', e);}
}

// "중점 분석 포인트" 입력칸은 예전엔 화면에만 떠있고 저장이 안 돼서 새로고침하면 사라졌음.
// 파일 데이터(files.old/files.refs[i])에 focus 필드로 같이 저장해서 새로고침해도 남게 함.
let focusSaveTimer=null;
function updateFocus(type,idx){
  const files=getAnalyzedFiles();
  const val=type==='old'?(document.getElementById('focusOld')?.value||''):(document.getElementById(`focusRef${idx}`)?.value||'');
  if(type==='old'){ if(files.old)files.old.focus=val; }
  else{ if(files.refs&&files.refs[idx])files.refs[idx].focus=val; }
  clearTimeout(focusSaveTimer);
  focusSaveTimer=setTimeout(()=>persistFiles(),500);
}

function triggerFile(type,idx=0){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx,.txt';
  inp.onchange=()=>{if(inp.files[0])processFile(inp.files[0],type,idx);};
  inp.click();
}

function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,idx=0){
  e.preventDefault();
  const id=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  document.getElementById(id)?.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f,type,idx);
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.</div>';
    if(dropEl)dropEl.classList.remove('loading');
    return;
  }
  if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#aaa;margin-top:6px;">📖 ${isPptx?'슬라이드 텍스트 추출 중...':isTxt?'텍스트 읽는 중...':'파일 읽는 중...'}</div>`;
  try{
    const files=getAnalyzedFiles();
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf'};
    }

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorage에 저장 (새로고침 후에도 유지)
    persistFiles();

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 파일 읽기 실패: ${e.message||''}</div>`;
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else{
    // 폼 응답(type==='text') 파일을 지우면 초록색 표시도 같이 제거
    if(files.refs[idx]?.type==='text'){
      const s=getStu();

function removeRefItem(idx){
  const files=getAnalyzedFiles();

  // null만 제거하되 빈 슬롯 하나는 유지
  files.refs=files.refs.filter(f=>f);

}

function onMultiRefDrop(e){
  e.preventDefault();
  document.getElementById('multiRefDrop')?.classList.remove('drag-over');
  onMultiRefPick(e.dataTransfer.files);
}

async function onMultiRefPick(fileList){
  const files=getAnalyzedFiles();
  const arr=Array.from(fileList);
  for(const file of arr){
    const filled=files.refs.filter(f=>f).length;
    if(filled>=5){showToast('참고자료는 최대 5개까지 추가할 수 있어요.');break;}
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
    if(isLegacyPpt){showToast('구버전 .ppt는 지원하지 않아요.');continue;}
    let fileData;
    if(isPptx){const extractedText=await extractPptxText(file);fileData={name:file.name,type:'pptx',extractedText};}
    else if(isTxt){const extractedText=await file.text();fileData={name:file.name,type:'txt',extractedText};}
    else{const base64=await fileToBase64(file);fileData={name:file.name,base64,type:file.type||'application/pdf'};}
    // 빈 슬롯에 채우기
    let idx=files.refs.findIndex(r=>!r);
    if(idx===-1){files.refs.push(null);idx=files.refs.length-1;}
    files.refs[idx]=fileData;
  }
  persistFiles();
  renderRefSlots();
  renderFileStatus();
}

// Claude API 직접 호출 (Vercel 프록시 대신 — 용량 제한 없음)
async function callGeminiAPI({prompt,fileOld,fileRefs,fileExample}){
  if(!geminiApiKey)throw new Error('Gemini API 키가 설정되어 있지 않아요. 설정에서 먼저 입력해주세요.');
  const parts=[];
  if(fileOld?.base64)parts.push({inlineData:{mimeType:fileOld.mediaType||'application/pdf',data:fileOld.base64}});
  if(Array.isArray(fileRefs)){
    for(const ref of fileRefs){
      if(ref?.base64)parts.push({inlineData:{mimeType:ref.mediaType||'application/pdf',data:ref.base64}});
    }
  }
  if(fileExample?.base64)parts.push({inlineData:{mimeType:fileExample.mediaType||'application/pdf',data:fileExample.base64}});
  parts.push({text:prompt});
  const model='gemini-3.5-flash';
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key':geminiApiKey},
    body:JSON.stringify({contents:[{role:'user',parts}],generationConfig:{maxOutputTokens:8192}})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(translateApiError(e?.error?.message)||`Gemini API ${r.status}`);}
  const data=await r.json();
  if(data?.candidates?.[0]?.finishReason==='MAX_TOKENS')throw new Error('Gemini 응답이 너무 길어서 중간에 잘렸어요(출력 토큰 한도 초과). 목표 바이트를 줄이거나 Claude 엔진으로 다시 시도해보세요.');
  const result=(data?.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  if(!result)throw new Error('Gemini 응답이 비어있어요 (안전 필터에 걸렸거나 빈 응답).');
  const usage=data.usageMetadata||{};
  console.log('[생기부 Gemini 사용량]',{prompt_tokens:usage.promptTokenCount,output_tokens:usage.candidatesTokenCount,total:usage.totalTokenCount});
  return{result,usage,cost:0}; // 무료/저가라 기존 totalCost(Claude 단가 기준) 집계에는 안 섞음
}
