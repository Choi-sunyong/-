async function callClaudeAPI({apiKey,prompt,fileOld,fileRefs,fileExample}){
  const userContent=[];
  if(fileOld?.base64)userContent.push({type:'document',source:{type:'base64',media_type:fileOld.mediaType||'application/pdf',data:fileOld.base64}});
  if(Array.isArray(fileRefs)){
    for(const ref of fileRefs){
      if(ref?.base64)userContent.push({type:'document',source:{type:'base64',media_type:ref.mediaType||'application/pdf',data:ref.base64}});
    }
  }
  if(fileExample?.base64)userContent.push({type:'document',source:{type:'base64',media_type:fileExample.mediaType||'application/pdf',data:fileExample.base64}});
  userContent.push({type:'text',text:prompt});
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:userContent}]})
  });
  const data=await r.json();
  if(data.error)throw new Error(data.error.message);
  const result=data.content?.map(i=>i.text||'').join('')||'';
  const usage=data.usage||{};
  const inputCost=(usage.input_tokens||0)*3/1000000;
  const outputCost=(usage.output_tokens||0)*15/1000000;
  console.log('[세특 API 비용]',{input_tokens:usage.input_tokens,output_tokens:usage.output_tokens,cost_usd:(inputCost+outputCost).toFixed(4)});
  return{result,usage,cost:inputCost+outputCost};
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function extractPdfText(file){
  try{
    if(typeof pdfjsLib==='undefined')return null;
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      text+=tc.items.map(i=>i.str).join(' ')+'\n';
    }
    return text.trim()||null;
  }catch(e){return null;}
}

// 참고자료(및 기존 생기부) 파일을 클릭해서 바로 열어볼 수 있게 해줌.
// PDF/이미지는 base64를 blob으로 바꿔서 새 탭으로 열고, PPTX는 추출된 텍스트를 모달로 보여줌
// (브라우저가 PPTX 자체를 못 열기 때문).
function openFilePreview(type,idx){
  const files=getAnalyzedFiles();
  const f=type==='old'?files.old:type==='example'?files.example:files.refs[idx];
  if(!f){alert('파일을 찾을 수 없어요.');return;}
  if(f.type==='pptx'||f.extractedText){
    const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
    d.innerHTML=`<div class="modal wide"><h3>📄 ${f.name}</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:8px;">${f.type==='txt'?'텍스트 파일 내용이에요.':'PPTX는 미리보기가 안 돼서, 추출된 텍스트를 대신 보여드려요.'}</p>
      <textarea readonly style="width:100%;height:50vh;font-size:13px;line-height:1.6;border:1px solid #e0e0ee;border-radius:7px;padding:10px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;">${(f.extractedText||'').replace(/</g,'&lt;')}</textarea>
      <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">닫기</button></div>
    </div>`;
    document.getElementById('app').appendChild(d);
    return;
  }
  if(!f.base64){alert('미리볼 수 있는 파일이 아니에요.');return;}
  try{
    const byteChars=atob(f.base64);
    const byteNums=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)byteNums[i]=byteChars.charCodeAt(i);
    const byteArr=new Uint8Array(byteNums);
    const blob=new Blob([byteArr],{type:f.type||'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){alert('파일을 여는 데 실패했어요.');}
}

// PPTX는 Claude API가 PDF처럼 직접 읽을 수 없어서(공식 미지원, 변환 필요),
// ZIP 안의 슬라이드 XML(ppt/slides/slideN.xml)에서 텍스트를 직접 추출해 일반 텍스트로 넘김.
// 이미지가 아니라 실제 슬라이드 텍스트 그대로라서 손글씨 OCR보다 훨씬 정확함.
async function extractPptxText(file){
  const zip=await JSZip.loadAsync(file);
  const slideFiles=Object.keys(zip.files)
    .filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b)=>{
      const na=parseInt(a.match(/slide(\d+)\.xml/)[1]);
      const nb=parseInt(b.match(/slide(\d+)\.xml/)[1]);
      return na-nb;
    });
  if(!slideFiles.length)throw new Error('슬라이드를 찾을 수 없어요 (.ppt 구버전 형식은 지원하지 않아요. .pptx로 저장 후 다시 시도해 주세요)');
  const parser=new DOMParser();
  const slideTexts=[];
  for(let i=0;i<slideFiles.length;i++){
    const xml=await zip.files[slideFiles[i]].async('string');
    const doc=parser.parseFromString(xml,'application/xml');
    const tNodes=doc.getElementsByTagName('a:t');
    const text=Array.from(tNodes).map(n=>n.textContent).join(' ').trim();
    if(text)slideTexts.push(`[슬라이드 ${i+1}]\n${text}`);
  }
  return slideTexts.join('\n\n')||'(텍스트를 찾을 수 없는 슬라이드입니다)';
}

// 글자 종류만 비교하면 흔한 조사/어미 때문에 거의 항상 높게 나옴.
// 대신 4글자 단위로 이어붙인 조각(n-gram, 표절 검사에 흔히 쓰는 shingling 방식)의 집합을 비교해서,
// 실제로 같은 문구가 반복됐는지를 잡아냄.
function ngramSet(text,n=4){
  const clean=(text||'').replace(/\s+/g,'');
  const set=new Set();
  for(let i=0;i<=clean.length-n;i++)set.add(clean.slice(i,i+n));
  return set;
}

// 문장이 "~함/음/됨/임"으로 끝나는 나이스 문체인데 마침표(.)가 빠진 경우를 찾음.
// 뒤에 바로 다른 한글이 이어지면(예: "됨으로써") 어미가 아니라 단어 일부이므로 제외.
// "죽음", "마음"처럼 그 자체가 명사인 단어는 문장 종결 어미가 아니므로(문장이 계속 이어질 수 있음) 오탐 방지용으로 제외.
const MISSING_PERIOD_NOUN_EXCEPTIONS=['죽음','믿음','마음','걸음','다음','처음','싸움','울음','웃음','졸음','젊음','아름다움','미지근함','책임','담임','후임','신임','주임','전임','겸임','자임','위임','선임','책임감','사물함','보관함','우편함'];
function checkMissingPeriod(text){
  if(!text)return[];
  const found=[];
  const re=/(음|함|됨|임)(?![가-힣])/g;
  let m;
  while((m=re.exec(text))){
    const endIdx=re.lastIndex;
    const nextCh=text[endIdx];
    if(nextCh==='.')continue; // 이미 마침표 있음
    const isNoun=MISSING_PERIOD_NOUN_EXCEPTIONS.some(w=>text.slice(endIdx-w.length,endIdx)===w);
    if(isNoun)continue; // 어미가 아니라 그 자체로 명사인 단어(죽음, 마음 등) - 문장이 계속 이어지는 정상적인 경우
    if(nextCh===undefined||/\s/.test(nextCh)){
      const start=Math.max(0,m.index-9);
      found.push(text.slice(start,endIdx));
    }
  }
  return[...new Set(found)];
}
// 마침표·쉼표·물음표 등 같은 문장부호가 실수로 두 번 이상 연달아 찍힌 경우(".." ",," "((" 등)를 찾음.
function checkDoubledPunctuation(text){
  if(!text)return[];
  const found=[];
  const re=/([.,()!?;:～·])\1+/g;
  let m;
  while((m=re.exec(text))){
    const start=Math.max(0,m.index-8);
    const end=Math.min(text.length,re.lastIndex+8);
    found.push(text.slice(start,end));
  }
  return[...new Set(found)];
}
function checkForbidden(text){
  if(!text)return[];
  const found=[];
  [...FORBIDDEN_WORDS_DEFAULT,...getCustomForbidden()].forEach(w=>{
    if(w&&text.includes(w))found.push(w);
  });
  FORBIDDEN_PATTERNS.forEach(p=>{
    const m=text.match(p.regex);
    if(m)found.push(...new Set(m.map(x=>`${p.label}("${x.trim()}")`)));
  });
  // 4. 학교를 알 수 있는 내용(학교명 등) 기재 불가 — 설정에 입력해둔 학교 이름과 대조
  if(profile.school&&text.includes(profile.school))found.push(`학교명 노출 의심("${profile.school}")`);
  return[...new Set(found)];
}

function similarity(a,b){
  if(!a||!b)return 0;
  const setA=ngramSet(a),setB=ngramSet(b);
  if(!setA.size||!setB.size)return 0;
  let inter=0;setA.forEach(g=>{if(setB.has(g))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> 생기부를 먼저 생성해 주세요</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbiddenFound=checkForbidden(s.result);
  const hasForbidden=forbiddenFound.length>0;
  const others=allStudents().filter(os=>os.id!==s.id&&os.result);
  let simWarns=[];
  others.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.35)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);});
  const omiOk=s.result.includes('임')&&(s.result.includes('음')||s.result.includes('함'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'✓':'!'}</div> 바이트 범위 ${byteOk?'적합':'확인 필요'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'✓'}</div> 금지어 ${hasForbidden?'발견됨 — '+forbiddenFound.join(', '):'없음'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'✓'}</div> 유사도 ${simWarns.length?'주의 — '+simWarns.join(', '):'이상 없음 (전체 학생 기준)'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'✓':'!'}</div> 어미 통일 ${omiOk?'확인됨':'확인 필요'}</div>`;
}

async function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const dateStr=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  s.versions=s.versions||[];
  const isAuto=(label||'').trim()==='자동생성';
  const name=isAuto?koreanOrdinal(s.versions.length+1)+' 생성':label;
  s.versions.unshift({name,dateStr,text,ts:Date.now()});
  if(s.versions.length>15)s.versions.pop();
  await sb.from('students').update({result:text,status:'wip',versions:JSON.stringify(s.versions)}).eq('id',s.id);
}

function parseFormCsv(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result.replace(/^\uFEFF/,''); // BOM 제거

    // CSV 전체를 따옴표 인식하며 행 분리 (셀 안에 줄바꿈이 있어도 올바르게 처리)
    function parseCsvFull(raw){
      const rows=[];let cur=[];let cell='';let inQ=false;
      for(let i=0;i<raw.length;i++){
        const c=raw[i];
        if(c==='"'){
          if(inQ&&raw[i+1]==='"'){cell+='"';i++;}
          else inQ=!inQ;
        } else if(c===','&&!inQ){cur.push(cell);cell='';}
        else if((c==='\n'||c==='\r')&&!inQ){
          if(c==='\r'&&raw[i+1]==='\n')i++;
          cur.push(cell);cell='';
          if(cur.some(v=>v.trim()))rows.push(cur);
          cur=[];
        } else cell+=c;
      }
      cur.push(cell);
      if(cur.some(v=>v.trim()))rows.push(cur);
      return rows;
    }

    const rawRows=parseCsvFull(text);
    if(rawRows.length<2){alert('데이터가 없어요. CSV 파일을 확인해주세요.');return;}

    // 학생 답변 안에 줄바꿈이 있을 때 CSV 행이 쪼개지는 문제 보정.
    // 헤더 열 수보다 적은 열을 가진 행은 이전 행의 마지막 셀에 이어 붙임.
    const headerLen=rawRows[0].length;
    const allRows=[rawRows[0]];
    for(let i=1;i<rawRows.length;i++){
      if(rawRows[i].length<headerLen&&allRows.length>1){
        const prev=allRows[allRows.length-1];
        prev[prev.length-1]+='\n'+rawRows[i].join(',');
      }else{
        allRows.push(rawRows[i]);
      }
    }

    const headers=allRows[0].map(h=>h.trim());
    const dataRows=allRows.slice(1);

    // 이름/반 열 자동 감지 (대소문자/공백 무시)
    const nameIdx=headers.findIndex(h=>/이름|name/i.test(h));
    const clsIdx=headers.findIndex(h=>/수강반|반|class/i.test(h));
    if(nameIdx<0){
      alert('CSV에서 "이름" 열을 찾을 수 없어요.\n\n발견된 열: '+headers.join(', '));
      return;
    }

    // 제외할 열: 타임스탬프, 이름, 반, 학번 등 메모에 불필요한 열
    const skipIdxs=new Set([nameIdx,clsIdx].filter(i=>i>=0));
    headers.forEach((h,i)=>{
      if(/타임스탬프|timestamp|학번|email|이메일/i.test(h.trim()))skipIdxs.add(i);
    });

    // 나머지 열 = 질문 항목
    const qIdxs=headers.map((h,i)=>i).filter(i=>!skipIdxs.has(i));

    formImportRows=dataRows.map(cols=>{
      const rawName=(cols[nameIdx]||'').trim();
      // "20226 이하은" 또는 "20226이하은" 처럼 학번이 앞에 붙은 경우 숫자 제거
      const name=rawName.replace(/^\d+\s*/,'').replace(/^\d+/,'').trim();
      const cls=clsIdx>=0?(cols[clsIdx]||'').trim():'';
      const qs={};
      qIdxs.forEach(i=>{
        const q=(headers[i]||'').trim();
        const a=(cols[i]||'').trim();
        if(q&&a)qs[q]=a;
      });
      return{name,cls,qs,chosenId:null};
    }).filter(r=>r.name);

    renderFormMatchTable();
    document.getElementById('fStep1').style.display='none';
    document.getElementById('fStep2').style.display='block';
  };
  reader.readAsText(file,'utf-8');
}

// 폼 CSV 행을 학생과 매칭. 같은 이름이 여러 반에 있으면 배열로 반환 (선택 필요).
// 하나만 있으면 그 학생, 없으면 null.
function matchFormRowAll(r){
  let all=allStudents();
  if(formImportClsFilter.size>0){
    all=all.filter(s=>{
      const cls=classes.find(c=>c.students.some(st=>st.id===s.id));
      return cls&&formImportClsFilter.has(cls.name);
    });
  }
  const rName=r.name.replace(/\s/g,'');
  let found=all.filter(s=>s.name.replace(/\s/g,'')===rName);
  if(!found.length){
    const candidates=all.filter(s=>rName.includes(s.name.replace(/\s/g,''))||s.name.replace(/\s/g,'').includes(rName));
    const maxLen=candidates.length?Math.max(...candidates.map(s=>s.name.length)):0;
    found=candidates.filter(s=>s.name.length===maxLen);
  }
  if(!found.length)return null;
  if(found.length===1)return found[0];
  return found; // 여러 반에 걸쳐 있는 경우
}
function matchFormRow(r){
  const result=matchFormRowAll(r);
  if(!result)return null;
  if(Array.isArray(result))return result[0]; // 선택 안 된 경우엔 첫 번째 (applyFormImport에서 chosenId로 오버라이드)
  return result;
}

    const clsSelect=isDup?`<select onchange="formImportRows[${ri}].chosenId=parseInt(this.value)||'';renderFormMatchTable();" style="font-size:11px;padding:2px 5px;border:1px solid #e0e0ee;border-radius:5px;background:#f8f8ff;margin-top:3px;width:100%;">
      <option value="">반 선택...</option>
      ${result.map(s=>{const cls=classes.find(c=>c.students.some(st=>st.id===s.id));return`<option value="${s.id}" ${r.chosenId===s.id?'selected':''}>${cls?cls.name:''} ${s.number}번</option>`;}).join('')}
    </select>`:'';
    return `<div style="display:grid;grid-template-columns:90px 70px minmax(0,1fr) 64px;padding:7px 12px;border-bottom:0.5px solid var(--border);align-items:center;gap:4px;">
      <span style="font-size:13px;color:var(--text-primary);">${r.name}</span>
      <div style="font-size:12px;color:var(--text-secondary);">${r.cls}${clsSelect}</div>
      <div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;min-width:0;">${preview.substring(0,30)}${preview.length>30?'...':''}</div>
      ${badge}
    </div>`;
  }).join('');

  // chosenId 있는 중복 학생도 matched로 카운트
  const totalMatched=formImportRows.filter(r=>{
    const result=matchFormRowAll(r);
    if(Array.isArray(result))return!!r.chosenId;
    return!!result;
  }).length;

  document.getElementById('fMatchTable').innerHTML=rows;
  const badge=document.getElementById('fMatchBadge');
  badge.textContent=`${totalMatched}명 매칭`;
  badge.style.cssText=`font-size:12px;padding:2px 10px;border-radius:var(--radius);background:var(--bg-success);color:var(--text-success);`;
  const btn=document.getElementById('fApplyBtn');
  if(btn)btn.textContent=`${totalMatched}명 참고자료에 저장`;
  btn.disabled=totalMatched===0;
}

  const mode=document.getElementById('fModeVal')?.value||'replace';

    const result=matchFormRowAll(r);
    if(Array.isArray(result)){
      // 여러 반에 있는 경우 — chosenId로 선택된 학생 사용
      if(!r.chosenId){skipped++;continue;}
      stu=allStudents().find(s=>s.id===r.chosenId);
    } else {
      stu=result;
    }
    if(!stu){skipped++;continue;}
    idx++;
    if(btn)btn.textContent=`저장 중... (${idx}/${total})`;

    const formText=Object.entries(r.qs)
      .filter(([q,a])=>a)
      .map(([q,a])=>`[${q}]\n${a}`)
      .join('\n\n──────────\n\n');

    const refObj={
      name:`폼응답_${stu.name}.txt`,
      type:'text',
      base64:null,
      extractedText:formText,
      focus:''
    };

    const key=`files_${stu.id}_${tabId}`;
    let fileData={old:null,refs:[null],example:null};
    try{const v=await idbGet(key);if(v)fileData=v;}catch(e){}
    if(!Array.isArray(fileData.refs))fileData.refs=[null];

    if(mode==='replace'){
      // 기존 폼 응답 참고자료 교체, 없으면 빈 슬롯에 추가
      const existIdx=fileData.refs.findIndex(r=>r&&r.type==='text');
      if(existIdx>=0){fileData.refs[existIdx]=refObj;}
      else{
        const nullIdx=fileData.refs.findIndex(r=>!r);
        if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
        else if(fileData.refs.length<5){fileData.refs.push(refObj);}
        else{fileData.refs[fileData.refs.length-1]=refObj;} // 꽉 찼으면 마지막 슬롯
      }
    } else {
      // 추가: 빈 슬롯에 넣기
      const nullIdx=fileData.refs.findIndex(r=>!r);
      if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
      else if(fileData.refs.length<5){fileData.refs.push(refObj);}
      else{skipped++;continue;} // 참고자료 5개 꽉 찼으면 건너뜀
    }

    await idbSet(key,fileData);
    await refreshStudentFileFlag(stu.id);
    formResponseIds.add(String(stu.id));
    done++;
  }

  localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  document.getElementById('fStep2').style.display='none';
  document.getElementById('fStep3').style.display='block';
  const msg=document.getElementById('fDoneMsg');
  if(msg)msg.textContent=`${done}명의 참고자료에 폼 응답이 저장됐어요.${skipped?` ${skipped}명은 건너뛰었어요.`:''}`;
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}

function deleteReviewHistory(id){
  if(!confirm('이 검토 내역을 삭제할까요? (실제 학생 데이터는 지워지지 않고, 이 검토 기록만 없어져요)'))return;
  const idx=reviewHistory.findIndex(e=>e.id===id);
  if(idx<0)return;
  reviewHistory.splice(idx,1);
  if(reviewActiveHistoryId===id){
    if(reviewHistory.length){
      loadHistoryEntry(reviewHistory[0].id);

      reviewActiveHistoryId=null;
      reviewState={running:false,done:false,current:0,total:0,totalBatches:0,curBatch:0,issues:[],failedBatches:[],tab:'',scope:'',subject:'all'};

  const all=classes.flatMap(c=>c.students.map(s=>({...s,clsName:c.name})));
  const list=[];
  all.forEach(s=>{
    if(reviewScope!=='all'&&s.clsName!==reviewScope)return;

      if(s.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:s.result,extra:''});
    }else if(tabType==='setech'){
      let setechData={};try{setechData=JSON.parse(s.setech||'{}');}catch(e){}
      Object.keys(setechData).forEach(subject=>{
        if(reviewSubject!=='all'&&subject!==reviewSubject)return;
        if(setechData[subject]?.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:setechData[subject].result,extra:subject});

      let changyeData={};try{changyeData=JSON.parse(s.changye||'{}');}catch(e){}

  });
  return list;

// 문제 문장이 지금도 남아있는지 비교할 때, AI가 인용하며 앞에 '...'을 붙이거나 공백이 살짝 다르게 인용하는 경우가 있어
// 그대로 매칭하면 실제로는 고쳤는데도 "아직 있음"으로 오판할 수 있음. 이를 완화하기 위한 정규화.
function normalizeForMatch(s){
  return (s||'').replace(/^[.…]+\s*/,'').replace(/\s+/g,' ').trim();
}
// 검토 카드 인라인 수정용: 원문(fullText) 안에서 AI가 인용한 문제 문장(oldQuote)의 실제 위치를 찾음.
// 완전일치 → 공백/줄바꿈 유연 매칭(정규식) 순으로 시도. 못 찾으면 null.
function replaceQuoteInText(fullText,oldQuote){
  const cleaned=(oldQuote||'').replace(/^[.…]+\s*/,'').trim();
  if(!cleaned)return null;
  let idx=fullText.indexOf(cleaned);
  if(idx>=0)return{idx,len:cleaned.length};
  const esc=cleaned.replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'\\s+');
  try{
    const m=fullText.match(new RegExp(esc));
    if(m)return{idx:m.index,len:m[0].length};
  }catch(e){}
  return null;
}
// 이 문제가 아직도 남아있는지(=미해결) 판단. 글자수초과는 바이트 재계산, 나머지는 문제 문장이 아직 있는지로 판단.
function isIssueUnresolved(iss,tab){
  const curText=getCurrentReviewText(iss.id,iss.clsName,tab,iss.extra);
  if(iss.유형==='글자수초과')return bytes(curText)>1500;
  if(iss.유형==='마침표누락'){
    // 이 스니펫 자체는(마침표 없이) 마침표를 붙인 뒤에도 여전히 부분 문자열로 남아있기 때문에
    // 일반적인 "인용문이 아직 있나" 검사로는 해결 여부를 못 가림 - 바로 뒤 글자가 마침표인지 직접 확인해야 함
    const idx=curText.indexOf(iss.문장);
    if(idx<0)return false; // 그 부분이 통째로 바뀌어 사라짐 - 해결된 것으로 간주
    return curText[idx+iss.문장.length]!=='.';
  }
  if(!iss.문장)return true;
  const normCur=normalizeForMatch(curText).replace(/\n/g,' ');
  const normQuote=normalizeForMatch(iss.문장);
  if(!normQuote)return true;
  return normCur.includes(normQuote);
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// 전문(fullText) 안에서 문제 문장(quote) 위치를 찾아 노란 하이라이트를 입힌 HTML을 만듦.
// 앞뒤 문맥을 다 보여주면서 어디가 문제인지 한눈에 띄게 하기 위함.
function buildHighlightedText(fullText,quote){
  const hit=quote?replaceQuoteInText(fullText,quote):null;
  if(!hit)return escHtml(fullText).replace(/\n/g,'<br>');
  const before=fullText.slice(0,hit.idx),matched=fullText.slice(hit.idx,hit.idx+hit.len),after=fullText.slice(hit.idx+hit.len);
  return escHtml(before).replace(/\n/g,'<br>')+'<mark style="background:#fde68a;padding:0 1px;border-radius:2px;">'+escHtml(matched).replace(/\n/g,'<br>')+'</mark>'+escHtml(after).replace(/\n/g,'<br>');
}
// 설명 텍스트 안에 '작은따옴표'로 인용된 짧은 구절이 있으면 그것만 뽑아냄.
// AI가 문제 문장(item.문장) 자체를 두 지점을 아우르는 긴 구간으로 통째로 인용해버리는 경우가 있어서,
// 그 경우 전체를 다 노랗게 칠하면 정작 진짜 문제 되는 짧은 구절이 묻혀버림 - 설명에 콕 집어 인용된 구절이 있으면 그쪽을 우선함.
function extractQuotedPhrases(desc){
  if(!desc)return[];
  const matches=[...desc.matchAll(/'([^']{2,40})'/g)].map(m=>m[1]);
  return[...new Set(matches)];
}
// phrases(설명에서 뽑은 짧은 인용구들)가 fullText 안에 실제로 있으면 그 부분들만 하이라이트.
// 못 찾으면(설명에 인용구가 없거나 원문과 안 맞으면) 기존처럼 item.문장 전체 구간을 하이라이트하는 방식으로 폴백.
function buildHighlightedTextMulti(fullText,phrases,fallbackQuote){
  const validPhrases=(phrases||[]).filter(p=>fullText.includes(p));
  if(!validPhrases.length)return buildHighlightedText(fullText,fallbackQuote);
  const ranges=[];
  validPhrases.forEach(p=>{
    let idx=0;
    while((idx=fullText.indexOf(p,idx))!==-1){ranges.push({start:idx,end:idx+p.length});idx+=p.length;}
  });
  ranges.sort((a,b)=>a.start-b.start);
  const merged=[];
  ranges.forEach(r=>{
    if(merged.length&&r.start<=merged[merged.length-1].end)merged[merged.length-1].end=Math.max(merged[merged.length-1].end,r.end);
    else merged.push({...r});
  });
  let html='',pos=0;
  merged.forEach(r=>{
    html+=escHtml(fullText.slice(pos,r.start)).replace(/\n/g,'<br>');
    html+='<mark style="background:#fde68a;padding:0 1px;border-radius:2px;">'+escHtml(fullText.slice(r.start,r.end)).replace(/\n/g,'<br>')+'</mark>';
    pos=r.end;
  });
  html+=escHtml(fullText.slice(pos)).replace(/\n/g,'<br>');
  return html;
}
// 추천 문구(newStr)를 원문 인용(oldStr)과 문자 단위로 비교해서, 실제로 바뀐 부분만 초록 하이라이트로 표시.
// LCS(최장 공통 부분열) 기반 - 공통 부분은 그대로, 공통이 아닌 부분(=새로 바뀐 부분)만 하이라이트.
function diffHighlightSuggestion(oldStr,newStr){
  const a=oldStr||'',b=newStr||'';
  if(!a||!b)return escHtml(b);
  const m=a.length,n=b.length;
  if(m*n>200000)return escHtml(b); // 너무 길면 성능 보호 차원에서 하이라이트 생략
  const dp=[];
  for(let i=0;i<=m;i++)dp.push(new Int16Array(n+1));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const keepB=new Array(n).fill(false);
  let i=m,j=n;
  while(i>0&&j>0){
    if(a[i-1]===b[j-1]){keepB[j-1]=true;i--;j--;}
    else if(dp[i-1][j]>=dp[i][j-1])i--;
    else j--;
  }
  let html='',open=false;
  for(let k=0;k<n;k++){
    const kept=keepB[k];
    if(!kept&&!open){html+='<mark style="background:#bbf7d0;padding:0 1px;border-radius:2px;">';open=true;}
    if(kept&&open){html+='</mark>';open=false;}
    html+=escHtml(b[k]);
  }
  if(open)html+='</mark>';
  return html;
}
// allIssues(reviewState.issues)를 학생+과목으로 묶고, 같은 문장에 여러 문제가 걸려있으면 카드 하나로 합침(1. 2. 로 나열).
// renderReviewArea와 위젯 실시간 카운트 양쪽에서 재사용.
function buildReviewGroups(){
  const allIssues=reviewState.issues,tab=reviewState.tab;
  if(!allIssues||!allIssues.length)return [];
  const groups=new Map();
  allIssues.forEach((iss,gidx)=>{
    const key=`${iss.id}_${iss.clsName}_${iss.extra||''}`;
    if(!groups.has(key)){
      const stu=classes.find(c=>c.name===iss.clsName)?.students.find(st=>st.id===iss.id);
      groups.set(key,{key,id:iss.id,clsName:iss.clsName,name:iss.학생,number:stu?.number||'',extra:iss.extra,items:[]});
    }
    groups.get(key).items.push({...iss,_gidx:gidx});
  });
  const groupArr=[...groups.values()].map(g=>{
    const byQuote=new Map();
    g.items.forEach(iss=>{
      const qKey=iss.유형==='글자수초과'?`__len_${iss._gidx}`:(normalizeForMatch(iss.문장||'')||`__none_${iss._gidx}`);
      if(!byQuote.has(qKey))byQuote.set(qKey,[]);
      byQuote.get(qKey).push(iss);
    });
    const merged=[...byQuote.values()].map(subs=>{
      const first=subs[0];
      const rkey=`${g.key}_m${subs.map(s=>s._gidx).join('-')}`;
      const autoResolved=!isIssueUnresolved(first,tab);
      const resolved=reviewManualUnresolved.has(rkey)?false:(autoResolved||reviewManualResolved.has(rkey));
      return{id:first.id,clsName:first.clsName,extra:first.extra,문장:first.문장,subs:subs.map(s=>({유형:s.유형,설명:s.설명,verified:s.verified!==false,수정제안:s.수정제안})),resolved,rkey};
    });
    merged.sort((a,b)=>(a.resolved?1:0)-(b.resolved?1:0));
    const unresolvedCount=merged.filter(x=>!x.resolved).length;
    return{...g,items:merged,unresolvedCount};
  });
  // 다 끝난 학생 카드는 아래로 내려가도록 우선 정렬(미해결 있는 학생이 항상 위), 그 안에서는 반 이름 → 학번(번호) 순으로 정리
  groupArr.sort((a,b)=>{
    const doneA=a.unresolvedCount===0?1:0,doneB=b.unresolvedCount===0?1:0;
    if(doneA!==doneB)return doneA-doneB;
    if(a.clsName!==b.clsName)return a.clsName.localeCompare(b.clsName,'ko');
    return (parseInt(a.number)||0)-(parseInt(b.number)||0);
  });
  return groupArr;
}
// Pass 버튼: 지금 화면에 보이는 상태(currentlyResolved) 기준으로 반대로 뒤집음.
// 자동 감지로 이미 초록불인 항목도(내가 안 눌렀는데 초록인 경우) 눌러서 다시 미해결로 되돌릴 수 있음.
// 미해결→Pass로 넘어가는 경우는 "AI가 오탐했다"는 신호이므로 학습용 로그에 남김 (아래 analyzeReviewPassPatterns에서 활용).
let reviewPassLog=[];try{reviewPassLog=JSON.parse(localStorage.getItem('reviewPassLog')||'[]');}catch(e){}
let reviewLearnedExceptions=[];try{reviewLearnedExceptions=JSON.parse(localStorage.getItem('reviewLearnedExceptions')||'[]');}catch(e){}
function logReviewPass(item){
  item.subs.forEach(s=>{
    reviewPassLog.push({유형:s.유형,문장:item.문장,설명:s.설명,ts:Date.now()});
  });
  if(reviewPassLog.length>300)reviewPassLog=reviewPassLog.slice(-300); // 너무 커지지 않게 최근 300건만 유지
  localStorage.setItem('reviewPassLog',JSON.stringify(reviewPassLog));
  renderReviewLearnArea();
}
function toggleReviewManualResolved(key,currentlyResolved){
  if(!currentlyResolved){
    const groups=buildReviewGroups();
    for(const g of groups){
      const item=g.items.find(it=>it.rkey===key);
      if(item){logReviewPass(item);break;}
    }
  }
  if(currentlyResolved){
    reviewManualResolved.delete(key);
    reviewManualUnresolved.add(key);
  }else{
    reviewManualResolved.add(key);
    reviewManualUnresolved.delete(key);
  }
  afterReviewAction(key);
}
// Pass 로그를 AI에게 보여주고 "왜 이런 걸 Pass했는지" 공통 패턴을 뽑아 새 예외 규칙을 제안받음.
// 선생님이 승인한 규칙만 reviewLearnedExceptions에 쌓이고, 다음 검토부터 프롬프트에 자동으로 포함됨 - 이게 "학습"에 해당하는 부분.
async function analyzeReviewPassPatterns(){
  if(!reviewPassLog.length){alert('아직 분석할 만큼 Pass 기록이 없어요. 검토하면서 Pass를 좀 더 눌러주세요.');return;}
  if(!apiKey){alert('Claude API 키가 필요해요.');return;}
  const btn=document.getElementById('reviewLearnBtn');
  if(btn){btn.disabled=true;btn.textContent='🧠 분석 중...';}
  try{
    const grouped={};
    reviewPassLog.forEach(p=>{(grouped[p.유형]=grouped[p.유형]||[]).push(p);});
    const summary=Object.entries(grouped).map(([t,arr])=>`[${t}] (${arr.length}건)\n`+arr.slice(-15).map(a=>`- 문장: "${a.문장}"\n  설명: ${a.설명}`).join('\n')).join('\n\n');
    const sysA=`너는 생기부 문장 검토 프롬프트를 개선하는 어시스턴트야. 아래는 선생님이 AI 검토 결과 중 "문제 아님"으로 Pass(통과) 처리한 항목들이야. 즉 AI가 오탐(false positive)한 사례들이야.
이 사례들을 보고 공통 패턴을 찾아서, 앞으로 같은 유형의 오탐을 막을 수 있는 새 예외 규칙을 1~3개 이내로 제안해줘.
규칙은 검토 AI에게 그대로 지시로 넣을 수 있는 한두 문장 형태로, 한국어로, 구체적인 예시 표현을 포함해서 작성해줘.
패턴이 뚜렷하지 않은 소수 사례는 무시하고, 반복적으로 나타나는 진짜 패턴만 짚어줘.
규칙이 없다고 판단되면 "규칙 없음"이라고만 답해.
다른 설명 없이 규칙 목록만 줄바꿈으로 구분해서 출력해.`;
    const raw=await attClaudeStream(sysA,summary,null);
    const proposals=raw.trim().split('\n').map(l=>l.replace(/^[-•\d.]\s*/,'').trim()).filter(l=>l&&l!=='규칙 없음');
    if(!proposals.length){alert('뚜렷한 패턴을 못 찾았어요. Pass 기록이 더 쌓이면 다시 시도해보세요.');return;}
    const picked=proposals.filter(p=>confirm(`이 규칙을 앞으로 검토에 반영할까요?\n\n${p}`));
    if(picked.length){
      reviewLearnedExceptions.push(...picked);
      localStorage.setItem('reviewLearnedExceptions',JSON.stringify(reviewLearnedExceptions));
      alert(`${picked.length}개 규칙을 반영했어요. 다음 검토부터 적용됩니다.`);
    }
  }catch(e){
    alert('분석 중 오류: '+e.message);
  }finally{
    renderReviewLearnArea();
  }
}
function viewLearnedExceptions(){
  if(!reviewLearnedExceptions.length){alert('아직 학습된 규칙이 없어요.');return;}
  const text=reviewLearnedExceptions.map((e,i)=>`${i+1}. ${e}`).join('\n\n');
  if(confirm(text+'\n\n전체 삭제할까요? (확인=삭제, 취소=닫기)')){
    reviewLearnedExceptions=[];
    localStorage.setItem('reviewLearnedExceptions','[]');
    renderReviewLearnArea();
  }
}
function renderReviewLearnArea(){
  const el=document.getElementById('reviewLearnArea');
  if(!el)return;
  el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;">
    <button id="reviewLearnBtn" onclick="analyzeReviewPassPatterns()" style="padding:5px 12px;font-size:12px;border-radius:20px;border:1px solid #7c3aed;background:#fff;color:#7c3aed;cursor:pointer;font-family:inherit;">🧠 Pass 패턴에서 규칙 학습 (${reviewPassLog.length}건 기록)</button>
    ${reviewLearnedExceptions.length?`<span onclick="viewLearnedExceptions()" style="font-size:11px;color:#7c3aed;cursor:pointer;text-decoration:underline;">적용된 학습 규칙 ${reviewLearnedExceptions.length}개 보기</span>`:''}
  </div>`;
}
// Pass/저장 직후 공통 처리: 그 카드가 속한 학생 카드의 미해결이 0건이 되면
// 자동으로 접고 다음 미해결 학생으로 스크롤, 아니면 지금 스크롤 위치 그대로 유지.
// 학생 전체(모든 과목 포함)의 미해결이 0건이면 자동으로 마감 처리까지 함.
function afterReviewAction(rkey){
  const groups=buildReviewGroups();
  const gi=groups.findIndex(g=>g.items.some(it=>it.rkey===rkey));
  if(gi>=0&&groups[gi].unresolvedCount===0){
    reviewCollapsedGroups.add(groups[gi].key);
    let nextGi=groups.findIndex((g,i)=>i>gi&&g.unresolvedCount>0);
    if(nextGi<0)nextGi=groups.findIndex(g=>g.unresolvedCount>0);
    reviewScrollTargetGi=nextGi;
  }else{
    reviewScrollTargetGi=undefined;
  }
  autoFinalizeReviewedStudents(groups);
  renderReviewArea();
}
// 검토 카드에서 학생 탭으로 이동하지 않고 바로 고칠 수 있게 하는 인라인 수정 상태.
// rkey마다 {id,clsName,tab,extra,orig(원래 인용 문장)}을 기억해뒀다가, 편집창엔 전문을 채워넣고 그대로 저장함.
let reviewEditingKey=null;
let reviewEditMeta={};
let reviewLockedTargets=[];
// 검토 모달에서 마감된 학생을 일괄로 해제 - 개별로 학생 탭 가서 "마감 취소" 누를 필요 없게
async function bulkUnsetDoneReview(){
  const list=reviewLockedTargets;
  if(!list.length)return;
  if(!confirm(`${list.length}명의 마감을 해제할까요?\n(${list.map(s=>s.name).join(', ')})`))return;
  for(const t of list){
    const c=classes.find(c=>c.name===t.clsName);
    const s=c?.students.find(st=>st.id===t.id);
    if(s&&s.status==='done'){s.status='wip';await sb.from('students').update({status:'wip'}).eq('id',s.id);}
  }
  renderSb();renderReviewArea();
}
// 학생의 모든 과목·항목이 다 해결되면 자동으로 마감 처리함 (교사가 일일이 "마감 설정" 안 눌러도 되게).
// 주의: 마감은 학생 전체에 걸리는 단일 상태라, 지금 검토 중인 탭/과목만 끝났어도 다른 탭 내용과 무관하게 잠김.
async function autoFinalizeReviewedStudents(groups){
  const agg=new Map();
  groups.forEach(g=>{
    const key=`${g.id}_${g.clsName}`;
    const cur=agg.get(key)||{id:g.id,clsName:g.clsName,unresolved:0};
    cur.unresolved+=g.unresolvedCount;
    agg.set(key,cur);
  });
  const targets=[...agg.values()].filter(t=>t.unresolved===0&&!isReviewStudentLocked(t.id,t.clsName));
  if(!targets.length)return;
  for(const t of targets){
    const c=classes.find(c=>c.name===t.clsName);
    const s=c?.students.find(st=>st.id===t.id);
    if(s&&s.status!=='done'){s.status='done';await sb.from('students').update({status:'done'}).eq('id',s.id);}
  }
  renderSb();
}
function startReviewEdit(rkey){
  reviewEditingKey=rkey;
  renderReviewArea();
  requestAnimationFrame(()=>{
    const ta=document.getElementById('reviewEditTa_'+rkey);
    if(!ta)return;
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();
    const meta=reviewEditMeta[rkey];
    const hit=meta?replaceQuoteInText(ta.value,meta.orig):null;
    if(hit){
      ta.setSelectionRange(hit.idx,hit.idx+hit.len);
      const before=ta.value.slice(0,hit.idx);
      const approxLine=(before.match(/\n/g)||[]).length;
      ta.scrollTop=Math.max(0,(approxLine-2)*20);
    }else{
      ta.setSelectionRange(ta.value.length,ta.value.length);
    }
  });
}
function cancelReviewEdit(){
  reviewEditingKey=null;
  renderReviewArea();
}
// 이제 편집창엔 잘라낸 문장이 아니라 전문이 통째로 들어있으므로, 저장도 그대로 통째로 반영하면 됨
// (예전처럼 "원문에서 못 찾음" 케이스가 생길 일이 없어짐).
async function saveReviewEdit(rkey){
  const meta=reviewEditMeta[rkey];
  const ta=document.getElementById('reviewEditTa_'+rkey);
  if(!meta||!ta)return;
  const newVal=ta.value;
  const ok=await setCurrentReviewText(meta.id,meta.clsName,meta.tab,meta.extra,newVal);
  if(!ok){
    alert('마감된 학생이라 여기서는 수정할 수 없어요. 학생 상세 화면에서 "마감 취소" 후 다시 시도해주세요.');
    return;
  }
  reviewEditingKey=null;
  afterReviewAction(rkey);
}
function renderReviewArea(progressChars){

  const area=document.getElementById('reviewReportArea');
  const btn=document.getElementById('reviewStartBtn');
  if(btn)btn.disabled=reviewState.running;
  if(!area)return;
  const prevScrollBox=document.getElementById('revScrollBox');
  // 모달이 방금 다시 열려서 #revScrollBox가 새로 생긴 경우(스크롤값이 0으로 리셋됨)엔
  // 마지막으로 기억해둔 위치(reviewScrollSaved)를 대신 씀. 모달이 계속 열려있던 채로 다시 그려지는 중이면 실제 현재 위치를 씀.
  const prevScroll=prevScrollBox?prevScrollBox.scrollTop:reviewScrollSaved;
  if(reviewState.running){
    const avgMs=reviewState._avgMs;

      <div style="margin-top:6px;color:#bbb;font-size:11px;">${progressChars?`${progressChars}자 분석 중...`:'요청 보내는 중...'}</div>
    </div>`;
    return;
  }
  if(!reviewState.done){area.innerHTML='';return;}
  // 지금 선택된 탭/범위와 마지막으로 실행한 검토의 탭/범위가 다르면, 옛날 결과를 지금 결과인 것처럼 보여주지 않음
  if(reviewState.tab!==reviewTab||reviewState.scope!==reviewScope||(reviewState.tab==='setech'&&reviewState.subject!==reviewSubject)){

    return;
  }
  const allIssues=reviewState.issues,failedBatches=reviewState.failedBatches,tab=reviewState.tab,total=reviewState.total;
  if(!allIssues.length){
    area.innerHTML=`<div style="font-size:12px;color:#389e0d;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:10px 12px;">✅ 특별한 문제가 발견되지 않았어요. (${total}명 검토)${failedBatches.length?`<br><span style="color:#d97706;">⚠️ 일부 실패해서 재시도 필요: ${failedBatches.join(', ')}</span>`:''}</div>`;
    return;
  }
  const groupArr=buildReviewGroups(); // 학생+과목별로 묶고, 같은 문장에 걸린 여러 문제는 카드 하나로 병합됨. 다 끝난 학생은 아래로 정렬됨.
  const totalUnresolved=groupArr.reduce((a,g)=>a+g.unresolvedCount,0);
  // 마감돼서 못 고치는 학생(해제 필요) - 학생 전체(모든 과목) 기준으로 집계해야, 한 과목만 끝났는데 다 된 것처럼 잘못 표시되는 걸 막을 수 있음

  reviewLockedTargets=[...aggMap.values()].filter(t=>t.unresolved>0&&isReviewStudentLocked(t.id,t.clsName));
  area.innerHTML=`

            <span style="font-size:12px;font-weight:700;color:${g.unresolvedCount?'#cf1322':'#52c41a'};">${doneCount}/${g.items.length}</span>

                    <textarea id="reviewEditTa_${item.rkey}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';const bc=document.getElementById('reviewEditByteCount_${item.rkey}');if(bc){const n=bytes(this.value);bc.textContent=n+'바이트';bc.style.color=n>1500?'#dc2626':'#888';bc.style.fontWeight=n>1500?'700':'400';}" style="width:100%;box-sizing:border-box;font-size:13px;line-height:1.7;font-family:inherit;color:#1a1a2e;border:1px solid #378ADD;border-radius:6px;padding:10px;resize:none;overflow:hidden;min-height:100px;" onclick="event.stopPropagation();">${escHtml(fullText)}</textarea>

// 검토 기능 전용 스트리밍 호출 (실시간 진행 상황 표시 + 비용 집계는 attClaude와 동일)
// Gemini API 호출 (전체 검토 전용) - 스트리밍 없이 한 번에 응답을 받음
async function geminiCall(system, userText){
  if(!geminiApiKey)throw new Error('Gemini API 키가 설정되어 있지 않아요. 설정에서 입력해주세요.');
  const model='gemini-3.5-flash';
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key':geminiApiKey},
    body:JSON.stringify({
      system_instruction:{parts:[{text:system}]},
      contents:[{role:'user',parts:[{text:userText}]}]
    })
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(translateApiError(e?.error?.message)||`Gemini API ${r.status}`);}
  const data=await r.json();
  return (data?.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
}

async function attClaudeStream(system, content, onDelta){
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: 4096, system, stream:true, messages: [{ role: 'user', content }] })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(translateApiError(e?.error?.message) || `API ${r.status}`); }
  const reader=r.body.getReader();
  const decoder=new TextDecoder();
  let buffer='',fullText='';
  const usage={input_tokens:0,output_tokens:0};
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');
    buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith('data: '))continue;
      const dataStr=line.slice(6).trim();
      if(!dataStr)continue;
      let evt;try{evt=JSON.parse(dataStr);}catch(e){continue;}
      if(evt.type==='content_block_delta'&&evt.delta?.text){
        fullText+=evt.delta.text;
        if(onDelta)onDelta(fullText);
      }
      if(evt.type==='message_start'&&evt.message?.usage)usage.input_tokens=evt.message.usage.input_tokens||0;
      if(evt.type==='message_delta'&&evt.usage?.output_tokens)usage.output_tokens=evt.usage.output_tokens;
    }
  }
  const cost=(usage.input_tokens||0)*3/1000000+(usage.output_tokens||0)*15/1000000;
  const prev=parseFloat(localStorage.getItem('totalCost')||'0');
  localStorage.setItem('totalCost',(prev+cost).toFixed(6));
  const cnt=parseInt(localStorage.getItem('genCount')||'0');
  localStorage.setItem('genCount',cnt+1);
  return fullText;
}

      allIssues.push({학생:item.name,유형:'마침표누락',문장:snippet,설명:'"~음/함/됨/임"으로 끝나는데 마침표(.)가 빠진 것 같아요. 나이스 문체는 문장 끝에 마침표가 있어야 해요.',id:item.id,clsName:item.clsName,extra:item.extra});
    });
    checkDoubledPunctuation(item.text).forEach(snippet=>{
      allIssues.push({학생:item.name,유형:'기호중복',문장:snippet,설명:'같은 문장부호가 실수로 두 번 이상 연달아 찍힌 것 같아요.',id:item.id,clsName:item.clsName,extra:item.extra});
    });
    const b=bytes(item.text);
    if(b>1500){
      allIssues.push({학생:item.name,유형:'글자수초과',문장:`현재 ${b}바이트`,설명:'나이스 입력 제한(1500바이트)을 초과했어요. 줄여야 저장할 수 있어요.',id:item.id,clsName:item.clsName,extra:item.extra});
    }
  });

  const newEntry={
    id:'r'+Date.now()+Math.random().toString(36).slice(2,6),

    total:list.length,issues:allIssues,failedBatches,
    manualResolved:new Set(),manualUnresolved:new Set(),collapsedGroups:new Set(),showPassed:new Set(),scrollSaved:0
  };

  loadHistoryEntry(newEntry.id);
}

function runSimilarityReport(){
  const area=document.getElementById('simReportArea');if(!area)return;
  area.innerHTML='<p style="font-size:12px;color:#888;">분석 중...</p>';
  setTimeout(()=>{
    const list=getTabResultsForSimilarity(simTab);
    if(list.length<2){area.innerHTML=`<p style="font-size:12px;color:#bbb;">비교할 학생이 2명 이상 있어야 해요. (작성 완료: ${list.length}명)</p>`;return;}
    const pairs=[];
    for(let i=0;i<list.length;i++){
      for(let j=i+1;j<list.length;j++){
        const sim=similarity(list[i].text,list[j].text);
        if(sim>0.35)pairs.push({a:list[i],b:list[j],sim});
      }
    }
    pairs.sort((a,b)=>b.sim-a.sim);
    if(!pairs.length){
      area.innerHTML=`<div style="font-size:12px;color:#389e0d;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:10px 12px;">✅ 비슷한 문장 쌍이 발견되지 않았어요. (${list.length}명, ${list.length*(list.length-1)/2}개 쌍 검사)</div>`;
      return;
    }
    area.innerHTML=`
      <div style="font-size:12px;color:#cf1322;margin-bottom:8px;">⚠️ ${pairs.length}개 쌍에서 유사도 35% 이상 발견 (총 ${list.length}명 비교)</div>

          <tbody>
            ${pairs.map(p=>`<tr>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">${p.a.clsName} ${p.a.name}${p.a.extra?` (${p.a.extra})`:''}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">${p.b.clsName} ${p.b.name}${p.b.extra?` (${p.b.extra})`:''}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;font-weight:600;color:${p.sim>0.5?'#cf1322':'#d48806'};">${Math.round(p.sim*100)}%</td>
              <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;"><span class="ver-link" onclick="jumpToStudent(${p.a.id},'${p.a.clsName}');closeModal();">A 보기</span></td>

function runExport(){

  const fileEntries=[];
  targetClasses.forEach(c=>{
    const sorted=[...c.students].sort((a,b)=>(a.number||0)-(b.number||0));
    const lines=sorted.map(s=>{
      const txt=getExportText(s,exportTab);

const SURNAME_ROMAN={김:'Kim',이:'Lee',박:'Park',최:'Choi',정:'Jung',강:'Kang',조:'Cho',윤:'Yoon',장:'Jang',임:'Lim',한:'Han',오:'Oh',서:'Seo',신:'Shin',권:'Kwon',황:'Hwang',안:'Ahn',송:'Song',전:'Jeon',홍:'Hong',유:'Yoo',고:'Ko',문:'Moon',양:'Yang',손:'Son',배:'Bae',백:'Baek',허:'Heo',남:'Nam',심:'Sim',노:'Noh',하:'Ha',곽:'Kwak',성:'Sung',차:'Cha',주:'Joo',우:'Woo',구:'Koo',민:'Min',진:'Jin',지:'Ji',엄:'Eom',채:'Chae',원:'Won',천:'Cheon',방:'Bang',공:'Kong',현:'Hyun',함:'Ham',변:'Byun',염:'Yeom',여:'Yeo',추:'Choo',도:'Do',소:'So',석:'Seok',선:'Seon',설:'Seol',마:'Ma',길:'Gil',연:'Yeon',위:'Wi',표:'Pyo',명:'Myung',기:'Ki',반:'Ban'};
function buildAltRomanName(name){
  // "김안겔리나 (angellina)" 형태에서 "Kimangellina" 같은 로마자 표기 후보를 만듦
  const m=name.match(/^([가-힣]+)\s*\(([^)]+)\)\s*$/);
  if(!m)return null;
  const surname=m[1][0];
  const eng=m[2].trim();
  const roman=SURNAME_ROMAN[surname];
  if(!roman||!eng)return null;
  return (roman+eng).replace(/\s+/g,'').toLowerCase();
}
function openNeisExcelUpload(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.xlsx';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        const wb=XLSX.read(evt.target.result,{type:'array'});
        const sheetName=wb.SheetNames[0];
        const ws=wb.Sheets[sheetName];
        const range=XLSX.utils.decode_range(ws['!ref']);
        let colName=-1,colContent=-1;
        for(let c=range.s.c;c<=range.e.c;c++){
          const cell=ws[XLSX.utils.encode_cell({r:range.s.r,c})];
          const v=cell?String(cell.v||''):'';
          if(v.includes('성명'))colName=c;
          if(v.includes('세부능력')||v.includes('세부능력및특기사항')||v.replace(/\s/g,'').includes('세부능력및특기사항'))colContent=c;
        }
        if(colName<0||colContent<0){
          alert('엑셀에서 "성명" 또는 "세부능력 및 특기사항" 열을 찾지 못했어요. 나이스에서 받은 원본 엑셀 파일 그대로 올려주세요.');
          return;
        }
        if(!exportNeisClass){alert('업로드할 파일이 어느 반인지 선택해주세요.');return;}
        const targetClass=classes.find(c=>c.name===exportNeisClass);
        if(!targetClass){alert('선택한 반을 찾을 수 없어요.');return;}
        const nameMap={};
        const altMap={};
        targetClass.students.forEach(s=>{
          const txt=getExportText(s,exportTab);
          if(!txt)return;
          nameMap[s.name]=txt;
          const alt=buildAltRomanName(s.name);
          if(alt)altMap[alt]=txt;
        });
        let filled=0;const missing=[];
        for(let r=range.s.r+1;r<=range.e.r;r++){
          const nameCell=ws[XLSX.utils.encode_cell({r,c:colName})];
          const name=nameCell?String(nameCell.v||'').trim():'';
          if(!name)continue;
          let txt=nameMap[name];
          if(!txt){
            const norm=name.replace(/\s+/g,'').toLowerCase();
            txt=altMap[norm];
          }
          const addr=XLSX.utils.encode_cell({r,c:colContent});
          if(txt){ws[addr]={t:'s',v:txt};filled++;}
          else missing.push(name);
        }
        const out=XLSX.write(wb,{bookType:'xlsx',type:'array',compression:true});
        const sizeKB=Math.round(out.byteLength/1024);
        const sizeWarn=sizeKB>=48?`\n\n⚠️ 파일 크기가 ${sizeKB}KB로 나이스 업로드 제한(50KB)에 근접했어요. 업로드가 안 되면 반을 나눠서 다시 시도해주세요.`:'';
        const blob=new Blob([out],{type:'application/octet-stream'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=file.name.replace(/\.xlsx$/i,'')+'_작성완료.xlsx';
        a.click();
        alert(`${filled}명 채웠습니다.${missing.length?`\n\n못 찾은 학생(${missing.length}명): ${missing.join(', ')}`:''}\n\n다운로드된 파일을 나이스 "엑셀업로드" 버튼으로 그대로 올리시면 됩니다.${sizeWarn}`);
        closeModal();
      }catch(err){
        alert('엑셀 파일을 처리하는 중 오류가 났어요: '+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

// 파일명 매칭: 학번(5자리) 우선, 없으면 이름 부분일치
// 학생 이름의 한글 부분만 추출해서 비교 (영문 병기 제거)
function getCoreName(name){return (name||'').replace(/[^가-힣]/g,'');}

function bulkMatchFile(filename){
  const base=filename.replace(/\.[^.]+$/,''); // 확장자 제거
  const numMatch=base.match(/\d{5}/);
  const num=numMatch?numMatch[0]:null;
  const all=allStudentsWithClass();

  // 1차: 학번으로 정확 매칭
  if(num){
    const byNum=all.filter(s=>String(s.number)===num);
    if(byNum.length===1)return{num,candidates:byNum,autoByNum:true};
    if(byNum.length>1){
      // 학번 뒤 이름으로 추가 구분
      const afterNum=base.slice((numMatch.index||0)+5);
      const byNameToo=byNum.filter(s=>afterNum.includes(getCoreName(s.name)));
      if(byNameToo.length===1)return{num,candidates:byNameToo,autoByNum:true};
      return{num,candidates:byNum.length===1?byNum:byNum,autoByNum:false};
    }
  }

  // 2차: 이름 부분일치 (학번 없는 파일명)
  const coreName=getCoreName(base);
  let candidates=all.filter(s=>{
    const sCore=getCoreName(s.name);
    return sCore&&coreName.includes(sCore);
  });
  candidates.sort((a,b)=>getCoreName(b.name).length-getCoreName(a.name).length);
  const maxLen=candidates.length?getCoreName(candidates[0].name).length:0;
  return{num,candidates:candidates.filter(c=>getCoreName(c.name).length===maxLen),autoByNum:false};
}

function addBulkFiles(fileList){
  Array.from(fileList).forEach(file=>{
    const isPdf=/\.pdf$/i.test(file.name);
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    if(!isPdf&&!isPptx&&!isTxt)return;
    if(bulkUploadFiles.some(f=>f.file.name===file.name&&f.file.size===file.size))return;
    const{num,candidates,autoByNum}=bulkMatchFile(file.name);
    // 학번으로 유일 매칭되거나 후보가 1명이면 자동 선택
    const autoMatch=autoByNum&&candidates.length===1?candidates[0].id:candidates.length===1?candidates[0].id:'';
    bulkUploadFiles.push({file,num,candidates,chosenId:autoMatch,autoByNum});
  });
  renderBulkMatchTable();
}

// 현재 선택된 학생(getStu())에 의존하지 않고, 임의의 studentId 기준으로 파일 상태를 읽고/저장하는 버전.
// processFile()/getAnalyzedFiles()와 완전히 같은 키 규칙(analyzedFilesMap, IndexedDB `files_${id}_${tab}`)을
// 그대로 써서, 나중에 해당 학생·탭을 직접 열어도 restoreStoredFiles()가 똑같이 불러와줌.
function getAnalyzedFilesFor(studentId,tabId){
  const key=`${studentId}_${tabId}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}
async function persistFilesFor(studentId,tabId){
  const files=getAnalyzedFilesFor(studentId,tabId);
  try{
    await idbSet(`files_${studentId}_${tabId}`,files);
    await refreshStudentFileFlag(studentId);
    return true;
  }catch(e){return false;}
}
async function addRefFileFor(studentId,tabId,fileData){
  const files=getAnalyzedFilesFor(studentId,tabId);
  let idx=files.refs.findIndex(r=>!r);
  if(idx===-1){
    if(files.refs.length>=5)return'full';
    files.refs.push(null);
    idx=files.refs.length-1;
  }
  files.refs[idx]=fileData;
  return(await persistFilesFor(studentId,tabId))?'ok':'storage_full';
}

async function runBulkUpload(){
  const targets=bulkUploadFiles.filter(f=>f.chosenId);
  if(!targets.length){alert('매칭된 파일이 없어요. 학생을 먼저 선택해 주세요.');return;}
  const btn=document.getElementById('bulkUploadBtn');
  btn.disabled=true;
  const mode=window.bulkUploadMode||'add';
  // 교체 모드: 먼저 해당 학생들의 기존 참고자료 비우기
  if(mode==='replace'){
    const uniqueIds=[...new Set(targets.map(f=>f.chosenId))];
    for(const sid of uniqueIds){
      const files=getAnalyzedFilesFor(sid,bulkUploadTab);
      files.refs=[null];
      await persistFilesFor(sid,bulkUploadTab);
    }
  }
  let ok=0,full=0,storageFail=0,readFail=0;
  for(let i=0;i<targets.length;i++){
    btn.textContent=`업로드 중... (${i+1}/${targets.length})`;
    const f=targets[i];
    try{
      let fileData;
      if(/\.pptx$/i.test(f.file.name)){
        const extractedText=await extractPptxText(f.file);
        fileData={name:f.file.name,type:'pptx',extractedText};
      }else if(/\.txt$/i.test(f.file.name)){
        const extractedText=await f.file.text();
        fileData={name:f.file.name,type:'txt',extractedText};
      }else{
        const base64=await fileToBase64(f.file);
        fileData={name:f.file.name,base64,type:f.file.type||'application/pdf'};
      }
      const result=await addRefFileFor(f.chosenId,bulkUploadTab,fileData);
      if(result==='ok')ok++; else if(result==='full')full++; else storageFail++;
    }catch(e){readFail++;}
  }
  closeModal();
  renderRefSlots();renderFileStatus();renderSb();
  let msg=`✅ ${ok}개 업로드 완료!`;
  if(full)msg+=`\n⚠️ ${full}개는 참고자료 칸이 이미 5개 다 차서 못 넣었어요.`;
  if(storageFail)msg+=`\n❌ ${storageFail}개는 저장 공간 한도를 초과해서 실패했어요.`;
  if(readFail)msg+=`\n❌ ${readFail}개는 파일을 읽지 못했어요 (구버전 .ppt이거나 손상된 파일일 수 있어요).`;
  alert(msg);
}

const attStore = { sheet: [], nice: [], docs: [] };
let attLogs = [];
// 출결 대조를 백그라운드로 돌리고(다른 화면으로 이동해도 계속 실행), 완료되면 우하단 알림으로 표시하고,
// 새로고침해도 결과가 남아있게 하기 위한 영속 상태. 검토(reviewState) 기능의 원형 배지 패턴을 그대로 따르되,
// localStorage에도 저장해서 새로고침 이후에도 완료된 결과는 복원되게 함(단, 진행 중이었다면 네트워크 요청 자체는
// 새로고침으로 끊기므로 재개는 불가능 - 그 경우엔 오류 상태로 전환하고 "새로 시작"을 안내함).
let attJobState = null; // {status:'running'|'done'|'error', engine, startedAt, finishedAt, error}
function saveAttJobState(){
  if(!attJobState)return;
  try{
    localStorage.setItem('attJobState', JSON.stringify({
      status: attJobState.status, engine: attJobState.engine,
      startedAt: attJobState.startedAt, finishedAt: attJobState.finishedAt||null,
      error: attJobState.error||null, logs: attLogs,
      compareData: attLastCompareData||null, resolvedKeys: [...attResolvedSet]
    }));
  }catch(e){}
}
function clearAttJobState(){
  attJobState=null;
  localStorage.removeItem('attJobState');
  updateAttWidget();
}
function restoreAttJobState(){
  let saved=null;
  try{ const raw=localStorage.getItem('attJobState'); saved=raw?JSON.parse(raw):null; }catch(e){}
  if(!saved)return;
  if(saved.status==='running'){
    // 새로고침 중에 끊긴 것 - 실제 네트워크 요청은 재개할 수 없으므로 오류로 전환
    saved.status='error';
    saved.error='새로고침으로 중단됐어요. "새로 시작"으로 다시 실행해주세요.';
  }
  attJobState=saved;
  attLogs=saved.logs||[];
  if(saved.compareData){ attLastCompareData=saved.compareData; attResolvedSet=new Set(saved.resolvedKeys||[]); }
  try{ localStorage.setItem('attJobState', JSON.stringify(saved)); }catch(e){}
  updateAttWidget();
}
let attWidgetEl=null;
let attWidgetDismissed=false;
function ensureAttWidget(){
  if(attWidgetEl&&document.body.contains(attWidgetEl))return attWidgetEl;
  const el=document.createElement('div');
  el.id='attWidget';
  el.style.cssText='position:fixed;bottom:20px;right:84px;z-index:99998;width:52px;height:52px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);font-family:inherit;color:#fff;text-align:center;line-height:1.1;';
  el.onclick=()=>openAttendanceView();
  document.body.appendChild(el);
  attWidgetEl=el;
  return el;
}
// 우하단 알림 배지 - 클릭하면 출결 대조 화면으로 바로 들어감(=완료 알림 역할). 진행 중엔 다른 화면으로 이동해도
// 이 배지가 계속 떠 있어서 "다른 작업 하다가 완료되면 알림 받기"가 가능함.
// 이슈 배열에서 실제로 아직 "완료!" 처리 안 된(=남은) 건수만 셈 - attRenderResult의 key 생성 규칙과 동일하게 맞춰야
// 정확히 카운트되므로 그쪽과 동일한 방식(번호_날짜_유형_인덱스)으로 키를 만듦.
function attComputeUnresolvedCount(cmp){
  const issues=(cmp&&cmp.issues)||[];
  let count=0;
  issues.forEach((i,idx)=>{
    const key=`${i.번호}_${i.날짜}_${i.유형}_${idx}`;
    if(!attResolvedSet.has(key))count++;
  });
  return count;
}
function updateAttWidget(){
  const el=ensureAttWidget();
  if(!attJobState||attWidgetDismissed){el.style.display='none';return;}
  if(attJobState.status==='running'){
    el.style.display='flex';
    el.style.background='#7C3AED';
    el.title='출결 대조 진행 중... (클릭하면 화면으로 이동)';
    el.innerHTML=`<div style="font-size:9px;">대조중</div><div style="font-size:16px;">⏳</div>`;
  }else if(attJobState.status==='done'){
    el.style.display='flex';
    const n=attComputeUnresolvedCount(attLastCompareData);
    el.style.background=n?'#dc2626':'#22c55e';
    el.title=n?`출결 대조 완료 (남은 불일치 ${n}건) - 클릭해서 보기`:'출결 대조 완료 (전부 해결됨) - 클릭해서 보기';
    el.innerHTML=`<span onclick="event.stopPropagation();attWidgetDismissed=true;updateAttWidget();" title="닫기" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#fff;color:#888;font-size:11px;line-height:18px;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;">✕</span>`+(n?`<div style="font-size:9px;">남음</div><div style="font-size:16px;font-weight:700;">${n}</div>`:`<div style="font-size:13px;font-weight:700;">완료</div>`);
  }else if(attJobState.status==='error'){
    el.style.display='flex';
    el.style.background='#dc2626';
    el.title=`출결 대조 오류: ${attJobState.error||''} (클릭해서 확인)`;
    el.innerHTML=`<span onclick="event.stopPropagation();attWidgetDismissed=true;updateAttWidget();" title="닫기" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#fff;color:#888;font-size:11px;line-height:18px;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;">✕</span><div style="font-size:20px;">⚠️</div>`;
  }else{
    el.style.display='none';
  }
}

function attAddF(k, files) {

function attDelF(k, n) { attStore[k] = attStore[k].filter(f => f.name !== n); attRenderFL(k); }
function attRenderFL(k) {

function attDov(e, el) { e.preventDefault(); el.style.borderColor = '#378ADD'; el.style.background = '#f0f7ff'; }
function attDol(el) { el.style.borderColor = '#e0e0ee'; el.style.background = ''; }
// 파일명을 보고 어느 칸(구글시트/나이스/서류)에 속하는지 짐작. 못 알아내면 null(사용자가 드롭한 칸 그대로 사용).
function attClassifyFile(name) {
  const n = name.toLowerCase();
  if (n.includes('나이스') || n.includes('neis') || n.includes('월별') || n.includes('학급별') || n.includes('출결현황')) {
    // "구글시트"라는 단어가 파일명에 명시돼 있으면 그게 우선
    if (n.includes('구글') || n.includes('sheet')) return 'sheet';
    return 'nice';
  }
  if (n.includes('구글') || n.includes('sheet') || n.includes('담임')) return 'sheet';
  if (n.includes('확인서') || n.includes('소견서') || n.includes('진단서') || n.includes('처방전') || n.includes('보고서') || n.includes('서류') || n.includes('신청서')) return 'docs';
  return null;
}
// 드래그든 클릭해서 고르든, 파일이 들어오는 모든 경로가 공통으로 거치는 자동 분류 함수
function attFlashZone(k) {
  const zone = document.getElementById('att-zone-' + k);
  if (!zone) return;
  zone.style.transition = 'background .2s, border-color .2s';
  zone.style.background = '#eaf7ec';
  zone.style.borderColor = '#22c55e';
  setTimeout(() => { zone.style.background = ''; zone.style.borderColor = '#e0e0ee'; }, 900);
}
function attShowToast(msg) {
  let toast = document.getElementById('att-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'att-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 4px 14px rgba(0,0,0,.2);';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => { toast.style.display = 'none'; }, 2200);
}
function attIngestFiles(files, k) {
  const buckets = { sheet: [], nice: [], docs: [] };
  let autoMoved = 0;
  const moved = [];
  for (const f of files) {
    const guess = attClassifyFile(f.name);
    if (guess && guess !== k) { autoMoved++; moved.push(`${f.name} → ${{sheet:'구글시트',nice:'나이스',docs:'서류'}[guess]}`); }
    buckets[guess || k].push(f);
  }
  Object.keys(buckets).forEach(bk => { if (buckets[bk].length) { attAddF(bk, buckets[bk]); attFlashZone(bk); } });
  const zoneName = { sheet: '구글시트', nice: '나이스', docs: '서류' };
  if (autoMoved) {
    attShowToast(`📂 파일명으로 자동 분류: ${autoMoved}개 옮김 (${moved.slice(0,3).join(', ')}${moved.length>3?' 등':''})`);
    attLog(`파일명으로 자동 분류: ${autoMoved}개 파일을 알맞은 칸으로 옮겼어요`, 'ok');
  } else if (files.length) {
    attShowToast(`📁 ${files.length}개 파일을 ${zoneName[k]} 칸에 넣었어요`);
  }
}
function attDop(e, k) {
  e.preventDefault();
  const zone = document.getElementById('att-zone-' + k);
  if (zone) { zone.style.borderColor = '#e0e0ee'; zone.style.background = ''; }
  attIngestFiles(e.dataTransfer.files, k);
}

function attLog(msg, type = '') {

  if (el) {
    el.innerHTML = attLogs.map(l =>
      `<div style="font-size:11px;font-family:monospace;color:${l.type === 'ok' ? '#4ade80' : l.type === 'er' ? '#f87171' : l.type === 'act' ? '#93c5fd' : '#6b7280'};display:flex;gap:10px;">
        <span style="color:#374151;flex-shrink:0;">${l.t}</span><span>${l.msg}</span>
      </div>`).join('');
    el.scrollTop = el.scrollHeight;
  }
  if (attJobState) saveAttJobState();
}

function attSetStatus(msg, cls = 'running') {

}

async function attToB64(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });
}
function attMt(file) {
  if (file.name.endsWith('.pdf')) return 'application/pdf';
  if (file.name.endsWith('.png')) return 'image/png';
  return 'image/jpeg';
}
async function attFileBlock(file) {
  const b64 = await attToB64(file);
  const m = attMt(file);
  if (m === 'application/pdf') return { type: 'document', source: { type: 'base64', media_type: m, data: b64 } };
  return { type: 'image', source: { type: 'base64', media_type: m, data: b64 } };
}

// API 오류 메시지를 한글로 바꿔서 보여줌
function translateApiError(msg){
  if(!msg)return '알 수 없는 오류가 발생했어요.';
  const m=msg.toLowerCase();
  if(m.includes('credit balance is too low'))return 'API 사용 크레딧이 부족해요. Anthropic 콘솔(console.anthropic.com)에서 결제·충전 후 다시 시도해주세요.';
  if(m.includes('invalid x-api-key')||m.includes('invalid api key')||m.includes('authentication'))return 'API 키가 올바르지 않아요. 설정에서 키를 다시 확인해주세요.';
  if(m.includes('rate limit')||m.includes('rate_limit'))return '요청이 너무 잦아서 잠시 제한됐어요. 잠시 후 다시 시도해주세요.';
  if(m.includes('overloaded'))return 'AI 서버가 지금 많이 몰려있어요. 잠시 후 다시 시도해주세요.';
  if(m.includes('exceeds the maximum')||m.includes('too large')||m.includes('request too large'))return '파일이나 요청 크기가 너무 커요. 파일을 나눠서 시도해주세요.';
  if(m.includes('timeout')||m.includes('timed out'))return '요청 시간이 너무 오래 걸려서 중단됐어요. 다시 시도해주세요.';
  if(m.includes('permission')||m.includes('forbidden'))return '이 API 키로는 접근 권한이 없어요. 키를 다시 확인해주세요.';
  return msg; // 매칭되는 게 없으면 원문 그대로
}
// ===== 출결 대조 - Gemini 엔진 지원 =====

}

// Gemini REST 호출 - responseSchema로 구조화된 JSON 출력을 강제해서(딴소리·마크다운 펜스 불가)
// Claude 대비 파싱 실패 위험을 줄임. temperature 0으로 정밀 대조에 맞게 창의성 배제.
async function attGemini(system, parts, schema) {
  if (!geminiApiKey) throw new Error('Gemini API 키가 설정되어 있지 않아요. 설정에서 먼저 입력해주세요.');
  const model = 'gemini-3.5-flash';
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': geminiApiKey },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: system }] },
      contents: [{ role: 'user', parts }],
      generationConfig: { temperature: 0, responseMimeType: 'application/json', responseSchema: schema, maxOutputTokens: 16384 }
    })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(translateApiError(e?.error?.message) || `Gemini API ${r.status}`); }

  const usage = d.usageMetadata || {};
  console.log('[출결 Gemini 사용량]', { prompt: usage.promptTokenCount, output: usage.candidatesTokenCount, total: usage.totalTokenCount });
  const finishReason = d?.candidates?.[0]?.finishReason;
  if (finishReason === 'MAX_TOKENS') throw new Error('Gemini 응답이 너무 길어서 중간에 잘렸어요(출력 토큰 한도 초과). 반을 나눠서 대조하거나 Claude 엔진으로 다시 시도해보세요.');
  const text = (d?.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('');
  if (!text) throw new Error('Gemini 응답이 비어있어요 (안전 필터에 걸렸거나 빈 응답).');

}

// 소스(파일 여러 장 + 추가 지시문)를 현재 선택된 엔진에 맞는 형식으로 포장해서 호출하고 JSON으로 파싱해 반환.
// attRun() 안의 4개 호출 지점(구글시트/나이스/서류/대조)이 전부 이 함수 하나로 통일됨.
async function attCallStructured(system, files, extraTexts, schema) {
  const engine = getAttEngine();
  if (engine === 'gemini') {
    const fileParts = await Promise.all(files.map(attFileBlockGemini));
    const parts = [...fileParts, ...extraTexts.map(t => ({ text: t }))];
    const raw = await attGemini(system, parts, schema);
    return attParseJSON(raw);
  }
  const fileBlocks = await Promise.all(files.map(attFileBlock));
  const content = [...fileBlocks, ...extraTexts.map(t => ({ type: 'text', text: t }))];
  const raw = await attClaude(system, content);
  return attParseJSON(raw);
}
async function attClaude(system, content) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: 8192, system, messages: [{ role: 'user', content }] })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(translateApiError(e?.error?.message) || `API ${r.status}`); }
  const d = await r.json();
  // 비용 집계
  const usage=d.usage||{};
  const cost=(usage.input_tokens||0)*3/1000000+(usage.output_tokens||0)*15/1000000;
  console.log('[출결 API 비용]',{input_tokens:usage.input_tokens,output_tokens:usage.output_tokens,cost_usd:cost.toFixed(4)});
  const prev=parseFloat(localStorage.getItem('totalCost')||'0');
  localStorage.setItem('totalCost',(prev+cost).toFixed(6));
  const cnt=parseInt(localStorage.getItem('genCount')||'0');
  localStorage.setItem('genCount',cnt+1);
  return d.content.map(b => b.text || '').join('');
}

function attParseJSON(s) {
  let cleaned = s.replace(/```json|```/g, '').trim();
  // AI가 JSON 앞뒤에 설명 문장을 덧붙이는 경우가 있어서, 첫 '{'부터 마지막 '}'까지만 추출
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start >= 0 && end > start) cleaned = cleaned.slice(start, end + 1);
  try { return JSON.parse(cleaned); }
  catch (e) { throw new Error('파싱 실패(응답이 중간에 잘렸을 수 있어요): ' + s.slice(0, 200)); }
}

    const compareSys = `당신은 학교 출결 대조 전문가입니다.

【대조 방법 — 반드시 이 순서로 진행할 것】
1. 먼저 학생별로 묶으세요. 각 학생마다 구글시트에 적힌 모든 항목(날짜별로)과 나이스에 적힌 모든 항목(날짜별로)을 각각 목록으로 정리하세요.

날짜별 세부 대조 기준:

- 교시: 조퇴/결과/지각은 교시도 반드시 대조. 두 자료 모두 "지각=N교시까지(그 교시까지 결시, N+1교시부터 출석)", "조퇴=N교시부터(N교시부터 결시)" 표기법으로 이미 정규화되어 있으니, 숫자 N이 서로 같으면 일치, 다르면 "교시불일치"로 판단하세요. 단, 위계서열이 적용된 날은 위 주의사항을 먼저 확인하세요.

  - 예: 시트 "종일"(전체 결석/결과) vs 나이스 "특정 몇 교시만" → 범위가 다르므로 "교시불일치"
- 사유: 구글시트에는 사유가 적혀 있는데 나이스는 그 사유 칸이 비어있으면 "사유불일치"로 표시 (교시·출결구분이 일치해도 별개로 체크)
- 구글시트 기록 형식 예시: "17. 생리통 (~3) / 인정지각 1회 / 보호자확인서" = 17일, 생리통, 3교시까지, 인정지각, 보호자확인서 제출

그 외 대조 기준:
- 구글시트 ↔ 나이스 (횟수 집계): 학생별로 구글시트에서 집계한 출결 횟수와 나이스 학급별출결현황의 숫자가 일치하는지. 확실히 셀 수 있을 때만 보고하세요.
- 구글시트 ↔ 서류: 구글시트에 적힌 서류명과 실제 서류 파일명이 일치하는지. "(not yet)"이 포함되어 있으면 서류 미제출 → 무조건 이상, 유형 "서류미제출". **주의: 나이스에는 서류명을 기재하는 항목 자체가 없습니다. "서류명불일치"는 절대 나이스와 비교하지 마세요 — 오직 구글시트 vs 실제 업로드된 서류 파일명끼리만 비교하세요. 이 유형을 보고할 때 "나이스" 필드는 반드시 null로 두세요.**
- 서류 날짜 오류: 의료기관 발급 서류(진료확인서·처방전·소견서·통원확인서 등, 질병결석/질병조퇴/질병결과용)는 발급일이 출결 당일과 일치해야 함. 보호자·담임 작성 서류(보호자확인서, 학부모 의견서 등)는 출결일로부터 7일 이내면 정상. 유형 "서류날짜오류".
- 서류 정정날인 문제: 서류 파싱 단계에서 "정정날인문제":true로 표시된 서류는 정정(두 줄로 그은 수정) 표시 바로 위에 도장(날인)이 없는 것이니 유형 "정정날인누락"으로 보고하세요. "구글시트" 필드에는 서류명을, "나이스" 필드는 null로 두세요.
- 교시 누락: 구글시트에서 조퇴·지각·결과인데 교시 정보가 비어있으면 "교시누락".

{"issues":[{"번호":77,"이름":"정예시","날짜":"3/12","유형":"출결구분불일치","구글시트":"미인정조퇴","나이스":"미인정결석","서류":null,"설명":"구글시트는 조퇴인데 나이스는 결석"},{"번호":88,"이름":"나예시","날짜":"3/20","유형":"서류명불일치","구글시트":"보호자확인서","나이스":null,"서류":"진료확인서","설명":"구글시트엔 보호자확인서로 적혀있으나 실제 서류는 진료확인서"}],"통계":{"총건수":0,"출결구분불일치":0,"나이스누락":0,"구글시트누락":0,"서류명불일치":0,"서류누락":0}}
유형: "출결구분불일치"|"교시불일치"|"교시누락"|"사유불일치"|"횟수불일치"|"나이스누락"|"구글시트누락"|"서류명불일치"|"서류누락"|"서류미제출"|"서류날짜오류"|"정정날인누락"

function attDateVariants(d){
  if(!d)return[];
  const out=[d];
  const m=d.match(/(\d+)\s*\/\s*(\d+)/);
  if(m){
    out.push(`${m[1]}월 ${m[2]}일`, `${m[1]}월${m[2]}일`, `${m[2]}일`);
  }
  return out;
}
async function attRenderPdfSide(containerId, files, searchName, dateVariants){
  const el=document.getElementById(containerId);
  if(!el)return;
  const usable=files.filter(f=>f && f.name)
    .sort((a,b)=>{
      const aSummary=a.name.includes('학급별')?1:0;
      const bSummary=b.name.includes('학급별')?1:0;
      return aSummary-bSummary; // 학급별(집계표)은 뒤로, 나머지(월별 등 상세)가 먼저
    });
  if(!usable.length){el.innerHTML='<div style="padding:16px;color:#bbb;font-size:12px;">파일이 없어요.</div>';return;}
  el.innerHTML='<div style="padding:16px;color:#aaa;font-size:12px;">불러오는 중...</div>';
  const wrap=document.createElement('div');
  let firstMatchEl=null;
  for(const f of usable){
    const isPdf=f.name.toLowerCase().endsWith('.pdf');
    if(!isPdf){
      const b64=await attToB64(f);
      const img=document.createElement('img');
      img.src=`data:${attMt(f)};base64,${b64}`;
      img.style.cssText='width:100%;margin-bottom:8px;border:1px solid #eee;';
      wrap.appendChild(img);
      continue;
    }
    try{
      const buf=await f.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const containerWidth=Math.max(220,(el.clientWidth||300)-6);
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const unscaled=page.getViewport({scale:1});
        const scale=containerWidth/unscaled.width;
        const viewport=page.getViewport({scale});
        const pageWrap=document.createElement('div');
        pageWrap.style.cssText='position:relative;margin-bottom:10px;border:1px solid #eee;line-height:1;';
        pageWrap.style.width=viewport.width+'px';
        pageWrap.style.height=viewport.height+'px';
        const canvas=document.createElement('canvas');
        canvas.width=viewport.width;canvas.height=viewport.height;
        const ctx=canvas.getContext('2d');
        await page.render({canvasContext:ctx,viewport}).promise;
        pageWrap.appendChild(canvas);
        const textContent=await page.getTextContent();
        const textLayerDiv=document.createElement('div');
        textLayerDiv.style.cssText=`position:absolute;left:0;top:0;width:${viewport.width}px;height:${viewport.height}px;overflow:hidden;`;
        pageWrap.appendChild(textLayerDiv);
        await pdfjsLib.renderTextLayer({textContentSource:textContent,textContent,container:textLayerDiv,viewport,textDivs:[]}).promise;
        // 하이라이트 안 된 글자는 기본적으로 투명 처리 (캔버스 이미지 위에 검게 겹쳐보이던 문제 수정)
        textLayerDiv.querySelectorAll('span').forEach(sp=>{ sp.style.color='transparent'; });
        wrap.appendChild(pageWrap);
        textLayerDiv.querySelectorAll('span').forEach(sp=>{
          const t=sp.textContent||'';
          const hasName=searchName&&t.includes(searchName);
          const hasDate=dateVariants.some(d=>d&&t.includes(d));
          if(hasName||hasDate){
            sp.style.background=hasDate?'rgba(255,99,71,.55)':'rgba(255,224,71,.6)';
            sp.style.borderRadius='2px';
            sp.style.color='transparent';
            sp.style.textShadow='none';
            if(!firstMatchEl||hasDate)firstMatchEl=sp;
          }
        });
      }
    }catch(e){
      const errDiv=document.createElement('div');
      errDiv.style.cssText='padding:12px;color:#dc2626;font-size:12px;';
      errDiv.textContent='PDF를 열지 못했어요: '+e.message;
      wrap.appendChild(errDiv);
    }
  }
  el.innerHTML='';
  el.appendChild(wrap);
  if(firstMatchEl)setTimeout(()=>firstMatchEl.scrollIntoView({block:'center'}),80);
}
// 대조(유료 API 호출) 없이, 지금 올려둔 PDF만으로 하이라이트가 잘 되는지 무료로 확인하는 기능
function openAttHighlightTest(){
  closeModal();
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal wide" style="width:760px;max-width:92vw;">
    <h3>🧪 하이라이트 미리 테스트 (무료)</h3>
    <p style="font-size:12px;color:#888;margin-bottom:14px;">대조를 돌리지 않고, 지금 ①②에 올려둔 PDF만으로 이름·날짜 검색이 잘 되는지 바로 확인해요. API 비용이 전혀 안 들어요.</p>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input id="att-test-name" type="text" placeholder="학생 이름 (예: 김나슬)" class="modal-field" style="flex:1;padding:8px 11px;border:1px solid #e0e0ee;border-radius:8px;background:#f8f8ff;font-size:13px;">
      <input id="att-test-date" type="text" placeholder="날짜 (예: 7/8)" class="modal-field" style="width:140px;padding:8px 11px;border:1px solid #e0e0ee;border-radius:8px;background:#f8f8ff;font-size:13px;">
      <button class="ok" onclick="runAttHighlightTest()">🔍 찾기</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div>
        <div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:6px;">📊 구글 시트 (${attStore.sheet.length}개 파일)</div>
        <div id="attTestPdfSheet" style="max-height:420px;overflow:auto;background:#fff;border:1px solid #e0e0ee;border-radius:6px;"><div style="padding:16px;color:#bbb;font-size:12px;">이름·날짜 입력하고 찾기를 눌러주세요.</div></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:6px;">🏫 나이스 (${attStore.nice.length}개 파일)</div>
        <div id="attTestPdfNice" style="max-height:420px;overflow:auto;background:#fff;border:1px solid #e0e0ee;border-radius:6px;"><div style="padding:16px;color:#bbb;font-size:12px;">이름·날짜 입력하고 찾기를 눌러주세요.</div></div>
      </div>
    </div>
    <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">닫기</button></div>
  </div>`;
  document.getElementById('app')?.appendChild(d);
}
function runAttHighlightTest(){
  const name=document.getElementById('att-test-name')?.value.trim()||'';
  const date=document.getElementById('att-test-date')?.value.trim()||'';
  if(!name&&!date){alert('이름이나 날짜 중 하나는 입력해주세요.');return;}
  if(!attStore.sheet.length&&!attStore.nice.length){alert('①②에 PDF를 먼저 올려주세요.');return;}
  const dateVariants=attDateVariants(date);
  attRenderPdfSide('attTestPdfSheet', attStore.sheet, name, dateVariants);
  attRenderPdfSide('attTestPdfNice', attStore.nice, name, dateVariants);
}

function toggleAttDetail(rowKey, name, date){
  const row=document.getElementById(`attDetail_${rowKey}`);
  if(!row)return;
  const isOpen=row.style.display!=='none';
  row.style.display=isOpen?'none':'table-row';
  if(!isOpen && !row.dataset.loaded){
    row.dataset.loaded='1';
    const dateVariants=attDateVariants(date);
    attRenderPdfSide(`attPdfSheet_${rowKey}`, attStore.sheet, name, dateVariants);
    attRenderPdfSide(`attPdfNice_${rowKey}`, attStore.nice, name, dateVariants);
  }
}
const STUDENT_COLORS = [
  ['#D85A30','#FAECE7','#712B13'], ['#534AB7','#EEEDFE','#3C3489'], ['#0F6E56','#E1F5EE','#04342C'],
  ['#993556','#FBEAF0','#4B1528'], ['#185FA5','#E6F1FB','#042C53'], ['#854F0B','#FAEEDA','#412402'],
  ['#3B6D11','#EAF3DE','#173404'], ['#A32D2D','#FCEBEB','#501313']
];
function attRenderResult(cmp) {
  attLastCompareData = cmp;
  const issues = cmp.issues || [];
  const typeLabelMap = { '출결구분불일치':'구분 다름','교시불일치':'교시 다름','교시누락':'교시 누락','사유불일치':'사유 다름','횟수불일치':'횟수 다름','나이스누락':'나이스 누락','구글시트누락':'시트 누락','서류명불일치':'서류명 다름','서류누락':'서류 없음','서류미제출':'서류 미제출','서류날짜오류':'날짜 오류','정정날인누락':'정정날인 없음' };

  // 같은 학생 여러 건은 하나로 묶고, 날짜순으로 정렬
  const groups = new Map();
  issues.forEach((i, idx) => {
    const gkey = `${i.번호}_${i.이름}`;
    if (!groups.has(gkey)) groups.set(gkey, { 번호: i.번호, 이름: i.이름, items: [] });
    groups.get(gkey).items.push({ ...i, _idx: idx });
  });
  const groupArr = [...groups.values()]
    .map(g => {
      const withResolved = g.items.map(i => {
        const key = `${i.번호}_${i.날짜}_${i.유형}_${i._idx}`;
        return { ...i, key, resolved: attResolvedSet.has(key) };
      });
      withResolved.sort((a, b) => {
        if ((a.resolved ? 1 : 0) !== (b.resolved ? 1 : 0)) return (a.resolved ? 1 : 0) - (b.resolved ? 1 : 0);
        return (a.날짜 || '').localeCompare(b.날짜 || '', 'ko', { numeric: true });
      });
      const unresolvedCount = withResolved.filter(x => !x.resolved).length;
      return { ...g, items: withResolved, unresolvedCount, gkey: `${g.번호}_${g.이름}` };
    })
    .sort((a, b) => {
      // 그 학생의 불일치가 전부 해결됐으면 카드 자체를 목록 맨 아래로 내림 ("탭 닫히면서 아래로")
      const aDone = a.unresolvedCount === 0 ? 1 : 0, bDone = b.unresolvedCount === 0 ? 1 : 0;
      if (aDone !== bDone) return aDone - bDone;
      return (a.번호 || 0) - (b.번호 || 0);
    })
    .map((g, gi) => {
      const [accent, tint, tintText] = STUDENT_COLORS[gi % STUDENT_COLORS.length];
      return { ...g, accent, tint, tintText };
    });
  const unresolvedCount = groupArr.reduce((a, g) => a + g.unresolvedCount, 0);

  const cardsHtml = issues.length === 0
    ? `<div style="text-align:center;padding:32px;color:#bbb;font-size:13px;background:#fff;border-radius:12px;">✅ 불일치 항목이 없습니다.</div>`
    : groupArr.map(g => {
      const fullyDone = g.unresolvedCount === 0;
      const collapsed = attManualToggle.has(g.gkey) ? !fullyDone : fullyDone;
      const itemsHtml = collapsed ? '' : g.items.map((i, ii) => {
        const rowKey = i.key.replace(/[^a-zA-Z0-9]/g, '');
        const tl = typeLabelMap[i.유형] || i.유형;
        const isLast = ii === g.items.length - 1;
        return `<div style="${isLast ? '' : 'padding-bottom:14px;margin-bottom:14px;border-bottom:0.5px solid #f0f0f5;'}${i.resolved ? 'opacity:.5;' : ''}">
          <div onclick="${attHighlightMode ? `toggleAttDetail('${rowKey}','${(i.이름||'').replace(/'/g,"\\'")}','${(i.날짜||'').replace(/'/g,"\\'")}')` : ''}" style="${attHighlightMode ? 'cursor:pointer;' : ''}">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px;">
              <span style="background:#f5f5f8;color:#1a1a2e;font-size:14px;font-weight:600;padding:3px 11px;border-radius:99px;">${i.날짜 || '-'}</span>
              <span style="background:${i.resolved ? '#eee' : g.tint};color:${i.resolved ? '#aaa' : g.tintText};font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;">${tl}</span>
              <button onclick="event.stopPropagation();toggleAttResolved('${i.key}')" style="margin-left:auto;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid ${i.resolved ? '#52c41a' : '#e0e0ee'};background:${i.resolved ? '#52c41a' : '#fafafa'};color:${i.resolved ? '#fff' : '#888'};">${i.resolved ? '완료!' : '수정?'}</button>
            </div>
            <div style="font-size:14px;color:#374151;line-height:1.8;">
              <b style="font-weight:600;">구글시트:</b> ${i.구글시트 || i.설명 || '-'}<br>
              ${['서류명불일치','서류누락','서류미제출','서류날짜오류','정정날인누락'].includes(i.유형)
                ? `<b style="font-weight:600;">서류:</b> ${i.서류 || '미제출'}`
                : `<b style="font-weight:600;">나이스:</b> ${i.나이스 || '미기재'}`}
            </div>
          </div>
          <div id="attDetail_${rowKey}" style="display:none;margin-top:12px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div>
                <div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:6px;">📊 구글 시트</div>
                <div id="attPdfSheet_${rowKey}" style="max-height:420px;overflow:auto;background:#fff;border:1px solid #e0e0ee;border-radius:6px;"></div>
              </div>
              <div>
                <div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:6px;">🏫 나이스</div>
                <div id="attPdfNice_${rowKey}" style="max-height:420px;overflow:auto;background:#fff;border:1px solid #e0e0ee;border-radius:6px;"></div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
      return `<div style="border-left:5px solid transparent;border-bottom:5px solid transparent;border-image:linear-gradient(160deg,${g.tint},${g.accent}) 1;border-radius:0 0 0 26px;box-shadow:-6px 6px 18px -4px ${g.accent}59,0 6px 16px rgba(0,0,0,.06);${collapsed ? 'opacity:.6;' : ''}">
        <div onclick="attToggleGroupCollapse('${g.gkey.replace(/'/g,"\\'")}')" style="cursor:pointer;display:flex;align-items:center;gap:8px;background:${g.tint};color:${g.tintText};padding:6px 14px;border-radius:0 10px 0 0;font-size:14px;">
          <b style="font-weight:700;">${g.번호}번 ${g.이름}</b> <span style="font-weight:400;opacity:.75;">· ${g.items.length}건${fullyDone ? ' 모두 해결됨' : ''}</span>
          ${fullyDone ? '<span style="margin-left:2px;">✅</span>' : ''}
          <span style="margin-left:auto;font-size:11px;opacity:.7;">${collapsed ? '펼치기 ▾' : '접기 ▴'}</span>
        </div>
        ${collapsed ? '' : `<div style="background:#fff;border-radius:0 12px 0 0;padding:16px 18px;">
          ${itemsHtml}
        </div>`}
      </div>`;
    }).join('');

  const main = document.getElementById('att-main');
  if (!main) return; // 다른 화면으로 이동한 사이에 완료된 경우 - 데이터는 이미 attLastCompareData/attJobState에 저장돼 있으니, 나중에 다시 열면 restoreAttMainView가 알아서 그려줌
  main.innerHTML = `
    <div id="att-sbar" style="background:#fff;border:1px solid #e0e0ee;border-radius:8px;padding:13px 16px;display:flex;align-items:center;gap:10px;">
      <div class="att-dot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;"></div>
      <div class="att-smsg" style="font-size:13px;font-weight:600;">대조 완료</div>
      <div style="margin-left:auto;font-size:12px;color:#aaa;">${new Date().toLocaleString('ko-KR')}</div>
    </div>

    <div style="display:flex;gap:12px;">
      <div style="flex:1;background:#fff;border-radius:12px;padding:14px 16px;">
        <div style="font-size:22px;font-weight:700;color:#1a1a2e;">${unresolvedCount}<span style="font-size:14px;font-weight:400;color:#888;margin-left:3px;">건</span></div>
        <div style="font-size:12px;color:#888;margin-top:2px;">남은 불일치 (총 ${issues.length}건)</div>
      </div>
      <div style="flex:1;background:#fff;border-radius:12px;padding:14px 16px;">
        <div style="font-size:22px;font-weight:700;color:#1a1a2e;">${groupArr.length}<span style="font-size:14px;font-weight:400;color:#888;margin-left:3px;">명</span></div>
        <div style="font-size:12px;color:#888;margin-top:2px;">대조한 전체 인원 중 이상 있음</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">${cardsHtml}</div>

    <div id="att-logbox" style="background:#1a1a2e;border-radius:8px;padding:13px 15px;display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;"></div>`;

  // 로그 다시 렌더
  const lb = document.getElementById('att-logbox');
  if (lb) {
    lb.innerHTML = attLogs.map(l =>
      `<div style="font-size:11px;font-family:monospace;color:${l.type === 'ok' ? '#4ade80' : l.type === 'er' ? '#f87171' : l.type === 'act' ? '#93c5fd' : '#6b7280'};display:flex;gap:10px;">
        <span style="color:#374151;flex-shrink:0;">${l.t}</span><span>${l.msg}</span>
      </div>`).join('');
    lb.scrollTop = lb.scrollHeight;
  }
}

</script>
