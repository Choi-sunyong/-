<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>로딩 중...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={command:'문장은 ~임/~음/~함으로 끝내고, 격식 있는 말투로 써줘.',example:'',guide:'',customForbidden:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">📚</div><div><div class="login-logo-text">싯다르타</div><div class="login-logo-sub">교사용 생활기록부 작성 도구</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">로그인</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">회원가입</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>학교 이름</label><input id="l-school" placeholder="예: 화성고등학교"/></div>
      <div class="login-field"><label>선생님 이름</label><input id="l-tname" placeholder="예: 최순용"/></div>
      <div class="login-field"><label>담당 학년/반</label><input id="l-role" placeholder="예: 담임 · 2학년 3반"/></div>`:''}
    <div class="login-field"><label>이메일</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" placeholder="6자 이상"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'회원가입':'로그인'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='로그인 중...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='가입 중...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){profile={school:data.school||'',name:data.name||'',role:data.role||''};apiKey=data.api_key||'';try{if(data.style){const parsed=JSON.parse(data.style);style=Object.assign({},style,parsed);if(!style.command){style.command='문장은 ~임/~음/~함으로 끝내고, 격식 있는 말투로 써줘.';}}}catch(e){}}
    else await sb.from('profiles').upsert({id:user.id,school:'',name:'',role:'',api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  }catch(e){}
}

// ===== IndexedDB 기반 파일 저장 (localStorage 5~10MB 한도보다 훨씬 큰 용량을 쓸 수 있음) =====
// 첨부파일(기존 생기부/참고자료)은 용량이 커서 localStorage로는 부족해질 수 있어 여기로 옮김.
// 탭별 텍스트 설정(예시/추가 명령어 등 commonSetting_*)은 용량이 작아서 그대로 localStorage 사용.
const IDB_NAME='siddartha_files';
const IDB_STORE='files';
let _idbPromise=null;
function openIdb(){
  if(_idbPromise)return _idbPromise;
  _idbPromise=new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB 미지원'));return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=()=>{req.result.createObjectStore(IDB_STORE);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return _idbPromise;
}
function idbSet(key,value){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(value,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  }));
}
function idbGet(key){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  }));
}

// 예전에 localStorage에 저장해뒀던 파일 데이터를 IndexedDB로 한 번만 옮김.
// 옮긴 항목은 localStorage에서 지워서 꽉 찼던 용량도 같이 확보됨. 옮길 게 없으면 그냥 조용히 끝남.
async function migrateFilesToIndexedDB(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('files_'));
  if(!keys.length)return;
  let moved=0;
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw){
        await idbSet(key,JSON.parse(raw));
        localStorage.removeItem(key);
        moved++;
      }
    }catch(e){console.warn('파일 데이터 이전 실패:',key,e);}
  }
  if(moved)console.log(`📦 기존 파일 데이터 ${moved}건을 더 큰 저장소(IndexedDB)로 옮겼어요.`);
}

// hasStoredFiles()는 사이드바/대시보드를 그릴 때 동기적으로 호출되는데, IndexedDB는 비동기라
// 그 자리에서 바로 조회할 수 없음. 그래서 "파일이 있는 학생 ID" 목록을 메모리에 Set으로 들고 있다가
// 동기적으로 즉시 답해주고, 실제 IndexedDB 조회는 파일이 추가/삭제될 때나 로그인 시 미리 해둠.
let studentsWithFilesSet=new Set();
const FILE_TABS=['haengdong','setech','jayul','dongari','jinro','dokseo'];

function isFilesEmpty(stored){
  if(!stored)return true;
  return !(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length));
}

async function refreshStudentFileFlag(studentId){
  for(const tab of FILE_TABS){
    try{
      const stored=await idbGet(`files_${studentId}_${tab}`);
      if(!isFilesEmpty(stored)){studentsWithFilesSet.add(studentId);return;}
    }catch(e){}
  }
  studentsWithFilesSet.delete(studentId);
}

// 로그인 시 IndexedDB 전체를 한 번 훑어서 studentsWithFilesSet을 채워둠.
async function buildStudentsWithFilesSet(){
  studentsWithFilesSet.clear();
  try{
    const db=await openIdb();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).openCursor();
      req.onsuccess=()=>{
        const cursor=req.result;
        if(cursor){
          const m=String(cursor.key).match(/^files_(.+)_(haengdong|setech|jayul|dongari|jinro|dokseo)$/);
          if(m&&!isFilesEmpty(cursor.value))studentsWithFilesSet.add(m[1]);
          cursor.continue();
        }else resolve();
      };
      req.onerror=()=>reject(req.error);
    });
  }catch(e){console.warn('파일 인덱스 구성 실패:',e);}
}

function hasStoredFiles(stuId){
  return studentsWithFilesSet.has(stuId);
}

// 메모/키워드/명령어 중 하나라도 적혀있으면 '작성중'으로 보기 위해, 모든 탭(세특 전체 과목 +

// 학생을 클릭했을 때 어느 탭(세특이면 어느 과목까지)에 실제 작성 중인 내용이 있는지 찾아서 바로 이동시키기 위함.
function getFirstWipTab(s){
  let kwLen=0;
  try{kwLen=(typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[])).length;}catch(e){}
  let haengExtra=false;
  try{
    const changyeH=JSON.parse(s.changye||'{}').haengdong;
    if(changyeH&&(changyeH.command||changyeH.achievement||changyeH.attitude||changyeH.growth))haengExtra=true;
  }catch(e){}
  if(s.result||s.memo||kwLen||haengExtra)return{tab:'haengdong'};
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab:'setech',subject:subj};
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab of ['jayul','dongari','jinro','dokseo']){
      const d=changye[tab];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab};
    }
  }catch(e){}
  return{tab:'setech'};
}

function hasAnyTabInput(s){
  // 작성중 판정은 메모/생성결과 두 가지만 본다 (키워드·명령어·성취도 등은 제외)
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||d.result))return true;
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab in changye){
      const d=changye[tab];
      if(d&&(d.memo||d.result))return true;
    }
  }catch(e){}
  if(s.memo)return true;
  return false;
}
function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasAnyTabInput(s))return 'wip';
  return 'none';
}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

    </div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok danger" onclick="runBulkRefDelete('${clsName}')">삭제</button></div>

}
async function runBulkRefDelete(clsName){
  const mode=document.querySelector('input[name="bulkDelMode"]:checked')?.value||'refs';
  const label=mode==='formrefs'?'폼 응답':mode==='refs'?'참고자료 전체':mode==='memo'?'메모':'참고자료 전체 + 메모';
  if(!confirm(`'${clsName}' 반 전체 학생의 ${label}를 삭제할까요? 되돌릴 수 없습니다.`))return;
  closeModal();
  await runBulkRefDeleteDirect(clsName,mode);
}
async function runBulkRefDeleteDirect(clsName,mode){
  const c=classes.find(x=>x.name===clsName);if(!c)return;
  const label=mode==='formrefs'?'폼 응답':mode==='refs'?'참고자료 전체':mode==='memo'?'메모':'참고자료 전체 + 메모';
  for(const s of c.students){
    // 참고자료 삭제 (전체 or 폼응답만)
    if(mode==='refs'||mode==='both'||mode==='formrefs'){
      for(const tabId of BULK_TAB_IDS){
        try{
          const v=await idbGet(`files_${s.id}_${tabId}`);
          if(v&&Array.isArray(v.refs)&&v.refs.some(r=>r)){
            if(mode==='formrefs'){
              // 폼 응답(type=text)만 null로
              v.refs=v.refs.map(r=>r&&r.type==='text'?null:r);
            } else {
              v.refs=[];
            }
            await idbSet(`files_${s.id}_${tabId}`,v);
          }
        }catch(e){}
      }
      await refreshStudentFileFlag(s.id);
      if(mode==='formrefs'){formResponseIds.delete(String(s.id));}
    }
    // 메모 삭제
    if(mode==='memo'||mode==='both'){
      // 행동특성 메모
      s.memo='';
      await sb.from('students').update({memo:''}).eq('id',s.id);
      // 세특 메모
      try{
        const setech=JSON.parse(s.setech||'{}');
        Object.keys(setech).forEach(sub=>{if(setech[sub])setech[sub].memo='';});
        s.setech=JSON.stringify(setech);
        await sb.from('students').update({setech:s.setech}).eq('id',s.id);
      }catch(e){}
      // 창의적 체험활동 메모
      try{
        const changye=JSON.parse(s.changye||'{}');
        ['jayul','dongari','jinro','dokseo'].forEach(tab=>{if(changye[tab])changye[tab].memo='';});
        s.changye=JSON.stringify(changye);
        await sb.from('students').update({changye:s.changye}).eq('id',s.id);
      }catch(e){}
    }
  }
  if(mode==='formrefs')localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  closeModal();
  renderSb();
  if(getStu())restoreStoredFiles();
  if(getStu())renderMain();
  alert(`${label} 일괄 삭제가 완료됐어요.`);
}

function editStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);if(!s)return;
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal"><h3>학생 정보 수정</h3>

    <div class="modal-field"><label>이름</label><input id="mi" value="${s.name}"/></div>
    <div class="modal-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="doEditStu(${stuId})">저장</button></div>
  </div>`;

async function doEditStu(stuId){
  const name=document.getElementById('mi')?.value.trim();const num=parseInt(document.getElementById('mi-num')?.value)||0;
  if(!name)return;
  await sb.from('students').update({name,number:num}).eq('id',stuId);
  const s=allStudents().find(s=>s.id===stuId);if(s){s.name=name;s.number=num;}
  const c=classes.find(c=>c.name===selCls);if(c)c.students.sort((a,b)=>a.number-b.number);
  closeModal();renderSb();renderMain();
}

async function deleteStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);
  if(!confirm(`'${s?.name}' 학생 데이터를 삭제할까요?`))return;
  await sb.from('students').delete().eq('id',stuId);
  classes.forEach(c=>{c.students=c.students.filter(s=>s.id!==stuId);});
  if(selStu===stuId)selStu=null;
  renderSb();renderMain();
}

function searchAndGo(){
  const q=searchQ.trim();if(!q)return;
  for(const c of classes){
    const found=c.students.find(s=>s.name.includes(q));
    if(found){
      selCls=c.name;selStu=found.id;
      searchQ='';
      const inp=document.getElementById('searchInput');if(inp)inp.value='';
      renderSb();renderMain();
      return;
    }
  }
  alert(`'${q}' 학생을 찾을 수 없습니다.`);
}

function showWipList(){
  const wipStus=[];
  classes.forEach(c=>c.students.forEach(s=>{if(getEffectiveStatus(s)==='wip')wipStus.push({...s,clsName:c.name});}));

async function addReviewFile(file){
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    reviewFiles.push(fileData);
    await persistReviewFiles();
    renderReviewFileList();
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistReviewFiles(){
  try{await idbSet('reviewFiles_global',reviewFiles);}catch(e){console.warn('저장 공간 초과:',e);}
}
async function loadReviewFiles(){
  try{
    const stored=await idbGet('reviewFiles_global');
    if(stored){reviewFiles.length=0;stored.forEach(f=>reviewFiles.push(f));}
  }catch(e){}
}

function removeReviewFile(id){
  const idx=reviewFiles.findIndex(f=>f.id===id);
  if(idx>-1)reviewFiles.splice(idx,1);
  persistReviewFiles();
  renderReviewFileList();
}

async function addDashFile(tabId,file){
  const files=getDashFiles(tabId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistDashFiles(tabId);
    renderDashFileList();
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

async function persistDashFiles(tabId){

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('최대 10개까지 업로드 가능해요.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistCommonFiles(stuId);
    renderCommonFileList(stuId);
  }catch(e){alert('파일 읽기 실패: '+(e.message||''));}
}

// ===== 과세특 정량평가 (시험 점수 기반 학업성취도, 5등급제) =====
function computeSetechGrade(label,studentId){
  const pool=[];
  allStudents().forEach(st=>{
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    const d=setech[label];
    if(d&&d.examScores&&d.examScores.s1!=null&&d.examScores.s2!=null){
      pool.push({id:st.id,total:d.examScores.s1+d.examScores.s2});
    }
  });
  if(!pool.length)return null;
  pool.sort((a,b)=>b.total-a.total);
  const n=pool.length;
  const idx=pool.findIndex(p=>p.id===studentId);
  if(idx===-1)return null;
  const rank=idx+1;
  const cum=[0.10,0.34,0.66,0.90,1.00].map(p=>Math.round(n*p));
  let grade=5;
  for(let i=0;i<cum.length;i++){if(rank<=cum[i]){grade=i+1;break;}}
  return{grade,rank,n,total:pool[idx].total};
}

  1:'이 학생은 수업 내용을 깊이 이해하고 탁월한 학업 성취를 보이므로, 지적 탐구력과 높은 이해도가 자연스럽게 드러나도록 서술하세요. 단, "1등급", "최상위", "또래 대비" 같은 직접적인 등급·순위 표현은 절대 쓰지 마세요.',
  2:'이 학생은 수업 내용을 충실히 이해하고 우수한 학업 성취를 보이므로, 성실한 학습 태도와 이해력이 자연스럽게 드러나도록 서술하세요. 단, 등급·순위 표현은 절대 쓰지 마세요.',
  3:null,
  4:null,
  5:null
};

function setechScorePromptLine(s,label){
  const g=computeSetechGrade(label,s.id);

function parseJsonArrayLoose(raw){
  const s=raw.indexOf('['),e=raw.lastIndexOf(']');
  let clean=raw;
  if(s!==-1&&e!==-1&&e>s)clean=raw.slice(s,e+1);
  const parsed=JSON.parse(clean);
  if(!Array.isArray(parsed))throw new Error('not array');
  return parsed;
}

// 나이스 교과목별 일람표 PDF를 클라이언트에서 직접 파싱
async function extractScoreTable(){
  const files=scoreUploadState.files;
  if(files.length!==2){alert('1차·2차 PDF를 두 개 모두 올려주세요.');return;}
  const area=document.getElementById('scoreUploadArea');
  if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 표를 읽는 중...</p>';
  try{
    if(typeof pdfjsLib==='undefined'){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF 파서가 아직 로딩 중이에요. 잠시 후 다시 시도해 주세요.</p>';
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    // x좌표 기반 열 구분으로 빈 칸(결시/전출 등)을 정확히 처리
    const parsePdf=async(file)=>{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      // 모든 아이템을 y좌표 그룹으로 묶기 (여러 페이지 합산)
      const byY={};
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        tc.items.forEach(item=>{
          fullText+=item.str+' ';
          const y=Math.round(item.transform[5]);
          if(!byY[y])byY[y]=[];
          byY[y].push({x:item.transform[4],str:item.str.trim()});
        });
      }
      const round_num=fullText.includes('1차')?1:fullText.includes('2차')?2:0;

      // 과목명 자동 감지: "교과목 : 사회..." 패턴에서 추출
      let detectedSubject=null;
      const subjectMatch=fullText.match(/교과목\s*:\s*([가-힣(]+)/);
      if(subjectMatch){
        const raw=subjectMatch[1];
        // SETECH_SUBJECTS 중 일치하는 것 찾기
        const SUBJECTS=['국어','수학','영어','사회','과학','역사','기술가정','체육','음악','미술'];
        detectedSubject=SUBJECTS.find(s=>raw.includes(s))||null;
      }

      // y 내림차순(위→아래)으로 행 정렬
      const sortedYs=Object.keys(byY).map(Number).sort((a,b)=>b-a);
      const rowsRaw=sortedYs.map(y=>byY[y].sort((a,b)=>a.x-b.x).filter(i=>i.str));

      // 반 헤더 행 찾기: 정수만 있고 1~9 범위, 2개 이상
      let banHeaders=[];
      let banHeaderXs=[];
      let dataYStart=null;
      for(let i=0;i<rowsRaw.length;i++){
        const strs=rowsRaw[i].map(c=>c.str);
        if(strs.length>=2&&strs.length<=8&&
           strs.every(s=>/^\d+$/.test(s))&&strs.every(s=>parseInt(s)>=1&&parseInt(s)<=9)){
          banHeaders=strs.map(Number);
          banHeaderXs=rowsRaw[i].map(c=>c.x);
          dataYStart=i+1;
          break;
        }
      }
      if(!banHeaders.length)return{round_num,banHeaders:[],rows:[]};

      // 각 반 열의 x범위: 헤더 x좌표 ± 허용 오차
      const colWidth=banHeaderXs.length>1?(banHeaderXs[1]-banHeaderXs[0]):40;
      const getColIdx=(x)=>{
        let best=-1,bestDist=Infinity;
        banHeaderXs.forEach((hx,i)=>{const d=Math.abs(x-hx);if(d<bestDist&&d<colWidth*0.7){bestDist=d;best=i;}});
        return best;
      };

      const rows=[];
      for(let i=dataYStart;i<rowsRaw.length;i++){
        const cells=rowsRaw[i];
        if(!cells.length)continue;
        // 첫 번째 셀이 번호(1~40 정수)인지 확인
        const hoStr=cells[0].str;
        const ho=parseInt(hoStr);
        if(!ho||ho<1||ho>40||isNaN(ho))continue;
        // 나머지 셀을 x좌표로 반 열에 매핑
        const scoreByCol={};
        cells.slice(1).forEach(cell=>{
          const col=getColIdx(cell.x);
          if(col>=0){
            const v=parseFloat(cell.str);
            if(!isNaN(v)&&v>=0&&v<=100)scoreByCol[col]=v;
            // 전출/결시/미인정결 등 비숫자는 무시 (점수 없음으로 처리)
          }
        });
        rows.push({ho,scoreByCol});
      }
      return{round_num,banHeaders,banHeaderXs,rows,detectedSubject};
    };

    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 1차 파일 읽는 중...</p>';
    const r1=await parsePdf(files[0]);
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 2차 파일 읽는 중...</p>';
    const r2=await parsePdf(files[1]);

    // 과목명 자동 세팅 (둘 중 하나라도 감지되면 적용)
    const autoSubject=r1.detectedSubject||r2.detectedSubject;
    if(autoSubject&&autoSubject!==scoreUploadState.label){
      scoreUploadState.label=autoSubject;
      // UI 버튼도 갱신
      renderScoreSubjectBtns();
      if(area)area.innerHTML=`<p style="font-size:12px;color:#378ADD;">📌 PDF에서 과목 자동 감지: <b>${autoSubject}</b></p>`;
      await new Promise(r=>setTimeout(r,600));
    }

    const first=r1.round_num===1?r1:(r2.round_num===1?r2:r1);
    const second=r1.round_num===2?r1:(r2.round_num===2?r2:r2);

    const buildMap=(parsed,key)=>{
      const m=new Map();
      parsed.rows.forEach(({ho,scoreByCol})=>{
        Object.entries(scoreByCol).forEach(([col,val])=>{
          const ban=parsed.banHeaders[parseInt(col)];
          if(!ban)return;
          const k=`${ban}_${ho}`;
          const ex=m.get(k)||{ban,ho};
          ex[key]=val;
          m.set(k,ex);
        });
      });
      return m;
    };

    const m1=buildMap(first,'s1');
    const m2=buildMap(second,'s2');
    const allRows=[];
    m1.forEach((v,k)=>{const s2=m2.get(k);if(s2?.s2!=null)allRows.push({...v,s2:s2.s2});});

    if(!allRows.length){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF 파싱 실패. API 키가 있다면 AI로 재시도해요.</p>';
      if(apiKey)await extractScoreTableByAI(files,area);
      return;
    }
    scoreUploadState.parsed=allRows;
    if(area)area.innerHTML=`<p style="font-size:12px;color:#389e0d;">✅ ${allRows.length}명 추출 완료</p>`;
    setTimeout(()=>renderBanMapping(),400);
  }catch(e){
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">⏳ 오류 발생, AI로 재시도 중...</p>';
    if(apiKey)await extractScoreTableByAI(files,area);
    else if(area)area.innerHTML=`<p style="font-size:12px;color:#cf1322;">오류: ${e.message}</p>`;
  }
}

// AI 폴백: 직접 파싱 실패 시 사용
async function extractScoreTableByAI(files,area){
  if(!apiKey){if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">API 키가 없어요. 설정에서 먼저 입력해 주세요.</p>';return;}
  try{
    const b1=await fileToBase64(files[0]);
    const b2=await fileToBase64(files[1]);
    const header=`첨부된 두 개의 PDF는 같은 과목의 나이스 정기고사 교과목별 일람표입니다. 각 파일 상단에 "고사 : 1차 정기시험" 또는 "고사 : 2차 정기시험"이라고 적혀 있으니, 첨부 순서와 무관하게 이 표기를 직접 읽고 어느 파일이 1차이고 어느 파일이 2차인지 스스로 판단하세요. 표는 열이 "반" 번호, 행이 반 내 "번호"인 학생별 점수 매트릭스입니다.`;
    let allRows=[];
    // 반 목록 파악 후 반별 추출
    const banRaw=await callScoreApi(`${header}\n표의 열 헤더에 있는 "반" 번호를 전부 오름차순으로, 설명 없이 JSON 배열로만 출력하세요. 예: [1,2,3,4,5,6]`,b1,b2);
    let bans;
    try{bans=parseJsonArrayLoose(banRaw).map(Number);}catch(e){
      if(area)area.innerHTML=`<p style="font-size:12px;color:#cf1322;">AI 추출도 실패했어요. 다시 시도해 주세요.</p>`;return;
    }
    for(let i=0;i<bans.length;i++){
      const ban=bans[i];
      if(area)area.innerHTML=`<p style="font-size:12px;color:#888;">⏳ AI로 ${ban}반 추출 중... (${i+1}/${bans.length})</p>`;
      try{
        const raw=await callScoreApi(`${header}\n이 표에서 "반 ${ban}"에 해당하는 학생들만 추출하세요.\n- 점수 칸이 비어있거나 숫자가 아니면 제외하세요.\n- 설명 없이 [번호,1차점수,2차점수] 배열의 배열로만 출력하세요.\n[[1,57.9,48.5],[2,48.3,34.8]]`,b1,b2);
        parseJsonArrayLoose(raw).forEach(a=>{if(Array.isArray(a))allRows.push({ban,ho:a[0],s1:a[1],s2:a[2]});});
      }catch(e){}
    }
    if(!allRows.length){if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">추출 실패. 다시 시도해 주세요.</p>';return;}
    scoreUploadState.parsed=allRows;
    if(area)area.innerHTML=`<p style="font-size:12px;color:#389e0d;">✅ ${allRows.length}명 추출 완료 (AI)</p>`;
    setTimeout(()=>renderBanMapping(),400);
  }catch(e){if(area)area.innerHTML=`<p style="font-size:12px;color:#cf1322;">오류: ${e.message}</p>`;}
}

// 학번 5자리(예: 20314) → {ban:3, ho:14}
function realBanHoFromStudentId(sid){
  const s=String(sid||'').replace(/\D/g,'');
  if(s.length!==5)return null;
  return{ban:parseInt(s[2]),ho:parseInt(s.slice(3))};
}

async function applyScoreUpload(){
  const{label,parsed}=scoreUploadState;
  const area=document.getElementById('scoreUploadArea');
  let matched=0;
  const unmatchedKeys=[];
  // 성적표 반·번호 → 학생 맵
  const stuMap=new Map();
  allStudents().forEach(s=>{
    const bh=realBanHoFromStudentId(s.student_id);
    if(bh)stuMap.set(`${bh.ban}_${bh.ho}`,s);
  });
  const targets=[];
  for(const row of parsed){
    const key=`${Number(row.ban)}_${Number(row.ho)}`;
    const st=stuMap.get(key);
    if(!st){unmatchedKeys.push(`${row.ban}반${row.ho}번`);continue;}
    targets.push({st,row});
  }
  for(let i=0;i<targets.length;i++){
    const{st,row}=targets[i];
    if(area)area.innerHTML=`<p style="font-size:12px;color:#888;">⏳ 저장 중... (${i+1}/${targets.length})</p>`;
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    setech[label]={...(setech[label]||{}),examScores:{s1:Number(row.s1),s2:Number(row.s2)}};
    st.setech=JSON.stringify(setech);
    await sb.from('students').update({setech:st.setech}).eq('id',st.id);
    matched++;
  }
  let html=`<p style="font-size:12px;color:${matched?'#389e0d':'#cf1322'};">${matched?'✅':'⚠️'} ${matched}명 반영 완료${unmatchedKeys.length?`, ${unmatchedKeys.length}명 매칭 실패`:''}</p>`;
  if(unmatchedKeys.length){
    html+=`<p style="font-size:11px;color:#cf1322;margin-top:4px;">매칭 실패 (성적표에만 있고 수강반 명단에 없거나 결시): ${unmatchedKeys.join(', ')}</p>`;
  }
  if(area)area.innerHTML=html;
  if(matched)showToast(`📊 ${matched}명의 학업 성취도가 계산됐어요`);
  setTimeout(()=>{closeModal();renderSb();renderMain();},2500);
}

${pptxBlock}`;

// 이후 생성 시에는 원본 파일을 다시 읽는 대신, 이 검증된 텍스트를 우선 사용해서
// AI가 손글씨 등을 잘못 읽고 지어내는 위험을 줄임.
async function verifyFiles(tabType,label){
  if(!apiKey){alert('⚙️ 설정에서 API 키를 먼저 입력해 주세요.');return;}
  const files=getAnalyzedFiles();
  if(!files.old&&!(files.refs||[]).some(r=>r)){alert('확인할 첨부파일이 없어요. 먼저 파일을 올려주세요.');return;}
  const pptxBlock=extractedTextBlock(files);
  const hasPdf=(files.old&&files.old.base64)||(files.refs||[]).some(r=>r&&r.base64);
  if(!hasPdf){
    // PPTX만 있으면 이미 정확한 텍스트라 AI 확인 절차 없이 그대로 보여줌
    showVerifyModal(tabType,label,pptxBlock||'(내용 없음)',false);
    return;
  }
  const prompt=`당신은 첨부된 파일의 내용을 있는 그대로 확인하는 역할입니다. 생기부 문장을 쓰지 마세요.
첨부된 파일(들)에 실제로 적혀있는 내용(주제, 핵심 키워드, 답변 내용 등)을 최대한 정확하게 정리해서 알려주세요.
- 글씨가 흐릿하거나 불명확한 부분은 추측하지 말고 "(판독 불가)"라고 표시하세요.
- 절대로 내용을 지어내거나 추측하지 마세요. 확실히 읽은 것만 적으세요.
결과만 출력하세요.`;
  const fileRefs=(files.refs||[]).filter(r=>r&&r.base64).map(r=>({base64:r.base64,mediaType:r.type}));
  showVerifyModal(tabType,label,'⏳ 파일을 읽는 중...',true);
  try{
    const d=await callClaudeAPI({apiKey,prompt,fileOld:(files.old&&files.old.base64)?{base64:files.old.base64,mediaType:files.old.type}:null,fileRefs,fileExample:null});
    if(d.error){showVerifyModal(tabType,label,'오류: '+d.error,false);return;}
    const combined=pptxBlock?`${d.result||''}\n\n${pptxBlock}`:(d.result||'');
    showVerifyModal(tabType,label,combined,false);
  }catch(e){showVerifyModal(tabType,label,'오류: '+e.message,false);}
}

// 결과가 목표 바이트±50을 벗어나면 한 번 더 요청해서 분량을 맞춤.
function postProcess(text){
  // 중간점(·) 강제 제거 → 쉼표로 치환
  return text.replace(/·/g,',').replace(/,,/g,',');
}

async function regenerateIfByteOff(target,text,cost){
  text=postProcess(text);
  const actual=bytes(text);
  if(Math.abs(actual-target)<=50)return{text,cost,retried:false};

  const doAdjust=async(txt,c)=>{
    const act=bytes(txt);
    const adjustPrompt=`다음 생기부 세특 문장의 분량을 조정해 주세요. 내용과 문체는 그대로 유지하고, 분량만 정확히 ${target}바이트(허용범위 ${Math.max(0,target-50)}~${target+50}바이트)에 맞게 ${act>target?'압축해서 줄여':'세부 내용을 보강해서 늘려'} 주세요.
- 압축할 때는 덜 중요한 세부 사례나 반복 표현을 줄이고 간결한 문체를 유지하세요.
- 새로운 활동 내용이나 평가 표현을 추가하지 마세요.
- 중간점(·)은 절대 사용하지 마세요. 한자도 절대 사용하지 마세요.
- 생기부 문장만 출력하세요. 설명, 바이트 계산, 구분선 등은 절대 출력하지 마세요.

[원본 글] (현재 ${act}바이트):
${txt}`;
    const d=await callClaudeAPI({apiKey,prompt:adjustPrompt,fileOld:null,fileRefs:[],fileExample:null});
    if(d.result)return{text:postProcess(d.result),cost:c+(d.cost||0)};
    return null;
  };

  // 재시도 1회
  const r1=await doAdjust(text,cost);
  if(r1)return{text:r1.text,cost:r1.cost,retried:true};
  return{text,cost,retried:false};
}

// PPTX는 base64 문서가 아니라 이미 추출된 일반 텍스트(extractedText)로 저장돼 있음.
// 이건 슬라이드에 실제로 적힌 텍스트 그대로라 손글씨 OCR과 달리 100% 정확하므로,
// "지어내지 말 것" 경고 없이 그대로 신뢰하고 쓰도록 프롬프트에 넣어줌.
function extractedTextBlock(files){
  const parts=[];
  if(files.old?.extractedText)parts.push(`[기존 생기부(${files.old.type==='pdf'?'PDF':'PPTX'}) 추출 텍스트]:\n${files.old.extractedText}`);
  (files.refs||[]).forEach((r,i)=>{
    if(!r)return;
    if(r.type==='text'&&r.extractedText)parts.push(`[참고자료${i+1} — 학생이 직접 작성한 수업 소감 설문 응답입니다]\n이 자료는 학생이 직접 쓴 소감이므로 설문에 없는 활동·탐구·분석·내면화를 추가하지 말고, 학생이 직접 언급한 내용만 재구성할 것.\n---\n${r.extractedText}`);
    else if(r.type==='txt'&&r.extractedText)parts.push(`[참고자료${i+1} — 학생 발표 음성 인식 텍스트(예: 클로바노트) 원문입니다]\n이 자료는 발표를 그대로 옮겨 적은 텍스트이므로 실제로 언급된 내용만 활용하고, 여기 없는 내용을 지어내지 말 것. 음성 인식 특성상 오탈자·띄어쓰기 오류가 있을 수 있으니 문맥상 자연스럽게 이해할 것.\n---\n${r.extractedText}`);
    else if(r.type==='pdf'&&r.extractedText)parts.push(`[참고자료${i+1}(PDF) 추출 텍스트]:\n${r.extractedText}`);
    else if(r.extractedText)parts.push(`[참고자료${i+1}(PPTX) 추출 텍스트]:\n${r.extractedText}`);
  });
  return parts.join('\n\n');
}

    const d=await callClaudeAPI({apiKey,prompt:finalPrompt,fileOld:(!verifiedContent&&files.old&&files.old.base64)?{base64:files.old.base64,mediaType:files.old.type}:null,fileRefs:allRefs,fileExample:files.example?.base64?{base64:files.example.base64,mediaType:files.example.type}:null});
    {
      let text=d.result||'';
      let cost=d.cost||0;
      text=postProcess(text);
      if(ra)ra.value=text;
      if(cost){
        const prev=parseFloat(localStorage.getItem('totalCost')||'0');
        localStorage.setItem('totalCost',(prev+cost).toFixed(6));
        const prevCount=parseInt(localStorage.getItem('genCount')||'0');
        localStorage.setItem('genCount',prevCount+1);
        localStorage.setItem('lastCost',cost.toFixed(6));
      }
      saveTabData(tabType,label,{result:text,command,example});
      pushTabVersion(tabType,label,text,feedback?`피드백: ${feedback.substring(0,15)}`:'자동생성');
      updTabBC();renderTabChecklist(tabType,label);
    }
  }catch(e){
    const msg=e.message||String(e);
    let hint='';
    if(msg.includes('fetch')||msg.toLowerCase().includes('failed')||msg.includes('network')){hint='\n\n가능한 원인: ① 인터넷 연결 확인 ② API 키 설정 확인 ③ 잠시 후 다시 시도';}
    else if(msg.includes('401')||msg.includes('403')){hint='\n\nAPI 키가 잘못됐거나 만료됐어요.';}
    else if(msg.includes('429')){hint='\n\n요청이 너무 많아요. 잠시 후 다시 시도해 주세요.';}
    else if(/50[024]/.test(msg)){hint='\n\n서버 오류예요. 잠시 후 다시 시도해 주세요.';}
    if(ra)ra.value=`오류: ${msg}${hint}`;
  }
  if(btn){btn.disabled=false;btn.innerHTML=`✨ ${label} 생성`;}
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 구버전 .ppt는 지원하지 않아요. .pptx로 다시 저장한 후 올려주세요.</div>';
    if(dropEl)dropEl.classList.remove('loading');
    return;
  }
  if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#aaa;margin-top:6px;">📖 ${isPptx?'슬라이드 텍스트 추출 중...':isTxt?'텍스트 읽는 중...':'파일 읽는 중...'}</div>`;
  try{
    const files=getAnalyzedFiles();
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf'};
    }

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorage에 저장 (새로고침 후에도 유지)
    persistFiles();

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#cf1322;margin-top:6px;">❌ 파일 읽기 실패: ${e.message||''}</div>`;
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else{
    // 폼 응답(type==='text') 파일을 지우면 초록색 표시도 같이 제거
    if(files.refs[idx]?.type==='text'){

  const el=document.getElementById(resultId);if(el)el.innerHTML='';
  persistFiles();
  renderSb(); // 사이드바 번호 색상 즉시 갱신
}

async function onMultiRefPick(fileList){
  const files=getAnalyzedFiles();
  const arr=Array.from(fileList);
  for(const file of arr){
    const filled=files.refs.filter(f=>f).length;
    if(filled>=5){showToast('참고자료는 최대 5개까지 추가할 수 있어요.');break;}
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
    if(isLegacyPpt){showToast('구버전 .ppt는 지원하지 않아요.');continue;}
    let fileData;
    if(isPptx){const extractedText=await extractPptxText(file);fileData={name:file.name,type:'pptx',extractedText};}
    else if(isTxt){const extractedText=await file.text();fileData={name:file.name,type:'txt',extractedText};}
    else{const base64=await fileToBase64(file);fileData={name:file.name,base64,type:file.type||'application/pdf'};}
    // 빈 슬롯에 채우기
    let idx=files.refs.findIndex(r=>!r);
    if(idx===-1){files.refs.push(null);idx=files.refs.length-1;}
    files.refs[idx]=fileData;
  }
  persistFiles();
  renderRefSlots();
  renderFileStatus();
}

// Claude API 직접 호출 (Vercel 프록시 대신 — 용량 제한 없음)
async function callClaudeAPI({apiKey,prompt,fileOld,fileRefs,fileExample}){
  const userContent=[];
  if(fileOld?.base64)userContent.push({type:'document',source:{type:'base64',media_type:fileOld.mediaType||'application/pdf',data:fileOld.base64}});
  if(Array.isArray(fileRefs)){
    for(const ref of fileRefs){
      if(ref?.base64)userContent.push({type:'document',source:{type:'base64',media_type:ref.mediaType||'application/pdf',data:ref.base64}});
    }
  }
  if(fileExample?.base64)userContent.push({type:'document',source:{type:'base64',media_type:fileExample.mediaType||'application/pdf',data:fileExample.base64}});
  userContent.push({type:'text',text:prompt});
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:userContent}]})
  });
  const data=await r.json();
  if(data.error)throw new Error(data.error.message);
  const result=data.content?.map(i=>i.text||'').join('')||'';
  const usage=data.usage||{};
  const inputCost=(usage.input_tokens||0)*3/1000000;
  const outputCost=(usage.output_tokens||0)*15/1000000;
  console.log('[세특 API 비용]',{input_tokens:usage.input_tokens,output_tokens:usage.output_tokens,cost_usd:(inputCost+outputCost).toFixed(4)});
  return{result,usage,cost:inputCost+outputCost};
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function extractPdfText(file){
  try{
    if(typeof pdfjsLib==='undefined')return null;
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      text+=tc.items.map(i=>i.str).join(' ')+'\n';
    }
    return text.trim()||null;
  }catch(e){return null;}
}

// 참고자료(및 기존 생기부) 파일을 클릭해서 바로 열어볼 수 있게 해줌.
// PDF/이미지는 base64를 blob으로 바꿔서 새 탭으로 열고, PPTX는 추출된 텍스트를 모달로 보여줌
// (브라우저가 PPTX 자체를 못 열기 때문).
function openFilePreview(type,idx){
  const files=getAnalyzedFiles();
  const f=type==='old'?files.old:type==='example'?files.example:files.refs[idx];
  if(!f){alert('파일을 찾을 수 없어요.');return;}
  if(f.type==='pptx'||f.extractedText){
    const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
    d.innerHTML=`<div class="modal wide"><h3>📄 ${f.name}</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:8px;">${f.type==='txt'?'텍스트 파일 내용이에요.':'PPTX는 미리보기가 안 돼서, 추출된 텍스트를 대신 보여드려요.'}</p>
      <textarea readonly style="width:100%;height:50vh;font-size:13px;line-height:1.6;border:1px solid #e0e0ee;border-radius:7px;padding:10px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;">${(f.extractedText||'').replace(/</g,'&lt;')}</textarea>
      <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">닫기</button></div>
    </div>`;
    document.getElementById('app').appendChild(d);
    return;
  }
  if(!f.base64){alert('미리볼 수 있는 파일이 아니에요.');return;}
  try{
    const byteChars=atob(f.base64);
    const byteNums=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)byteNums[i]=byteChars.charCodeAt(i);
    const byteArr=new Uint8Array(byteNums);
    const blob=new Blob([byteArr],{type:f.type||'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){alert('파일을 여는 데 실패했어요.');}
}

// PPTX는 Claude API가 PDF처럼 직접 읽을 수 없어서(공식 미지원, 변환 필요),
// ZIP 안의 슬라이드 XML(ppt/slides/slideN.xml)에서 텍스트를 직접 추출해 일반 텍스트로 넘김.
// 이미지가 아니라 실제 슬라이드 텍스트 그대로라서 손글씨 OCR보다 훨씬 정확함.
async function extractPptxText(file){
  const zip=await JSZip.loadAsync(file);
  const slideFiles=Object.keys(zip.files)
    .filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b)=>{
      const na=parseInt(a.match(/slide(\d+)\.xml/)[1]);
      const nb=parseInt(b.match(/slide(\d+)\.xml/)[1]);
      return na-nb;
    });
  if(!slideFiles.length)throw new Error('슬라이드를 찾을 수 없어요 (.ppt 구버전 형식은 지원하지 않아요. .pptx로 저장 후 다시 시도해 주세요)');
  const parser=new DOMParser();
  const slideTexts=[];
  for(let i=0;i<slideFiles.length;i++){
    const xml=await zip.files[slideFiles[i]].async('string');
    const doc=parser.parseFromString(xml,'application/xml');
    const tNodes=doc.getElementsByTagName('a:t');
    const text=Array.from(tNodes).map(n=>n.textContent).join(' ').trim();

  }
  return slideTexts.join('\n\n')||'(텍스트를 찾을 수 없는 슬라이드입니다)';
}

// 글자 종류만 비교하면 흔한 조사/어미 때문에 거의 항상 높게 나옴.
// 대신 4글자 단위로 이어붙인 조각(n-gram, 표절 검사에 흔히 쓰는 shingling 방식)의 집합을 비교해서,
// 실제로 같은 문구가 반복됐는지를 잡아냄.
function ngramSet(text,n=4){
  const clean=(text||'').replace(/\s+/g,'');
  const set=new Set();
  for(let i=0;i<=clean.length-n;i++)set.add(clean.slice(i,i+n));
  return set;
}

function getCustomForbidden(){
  return (style.customForbidden||'').split('\n').map(w=>w.trim()).filter(Boolean);
}
function checkForbidden(text){
  if(!text)return[];
  const found=[];
  [...FORBIDDEN_WORDS_DEFAULT,...getCustomForbidden()].forEach(w=>{
    if(w&&text.includes(w))found.push(w);
  });
  FORBIDDEN_PATTERNS.forEach(p=>{
    const m=text.match(p.regex);
    if(m)found.push(...new Set(m.map(x=>`${p.label}("${x.trim()}")`)));
  });
  // 4. 학교를 알 수 있는 내용(학교명 등) 기재 불가 — 설정에 입력해둔 학교 이름과 대조
  if(profile.school&&text.includes(profile.school))found.push(`학교명 노출 의심("${profile.school}")`);
  return[...new Set(found)];
}

function similarity(a,b){
  if(!a||!b)return 0;
  const setA=ngramSet(a),setB=ngramSet(b);
  if(!setA.size||!setB.size)return 0;
  let inter=0;setA.forEach(g=>{if(setB.has(g))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

        localStorage.setItem('lastCost',cost.toFixed(6));
      }
      await saveVersion(text,feedback?`피드백: ${feedback.substring(0,15)}`:'자동생성');
      s.status='wip';
      renderChecklist();renderSb();
      if(feedback){
        s.feedbackHist=s.feedbackHist||[];
        s.feedbackHist.unshift(feedback);
        if(s.feedbackHist.length>5)s.feedbackHist.pop();
        await sb.from('students').update({feedback_hist:JSON.stringify(s.feedbackHist)}).eq('id',s.id);
        renderFbHist();
      }
    }
  }catch(e){
    const msg=e.message||String(e);
    let hint='';
    if(msg.includes('fetch')||msg.toLowerCase().includes('failed')||msg.includes('network')){hint='\n\n가능한 원인: ① 인터넷 연결 확인 ② API 키 설정 확인 ③ 잠시 후 다시 시도';}
    else if(msg.includes('401')||msg.includes('403')){hint='\n\nAPI 키가 잘못됐거나 만료됐어요.';}
    else if(msg.includes('429')){hint='\n\n요청이 너무 많아요. 잠시 후 다시 시도해 주세요.';}
    else if(/50[024]/.test(msg)){hint='\n\n서버 오류예요. 잠시 후 다시 시도해 주세요.';}
    if(ra)ra.value=`오류: ${msg}${hint}`;
  }
  if(btn){btn.disabled=false;btn.innerHTML='✨ 생기부 생성';}
  updBC();
}

function parseFormCsv(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result.replace(/^\uFEFF/,''); // BOM 제거

    // CSV 전체를 따옴표 인식하며 행 분리 (셀 안에 줄바꿈이 있어도 올바르게 처리)
    function parseCsvFull(raw){
      const rows=[];let cur=[];let cell='';let inQ=false;
      for(let i=0;i<raw.length;i++){
        const c=raw[i];
        if(c==='"'){
          if(inQ&&raw[i+1]==='"'){cell+='"';i++;}
          else inQ=!inQ;
        } else if(c===','&&!inQ){cur.push(cell);cell='';}
        else if((c==='\n'||c==='\r')&&!inQ){
          if(c==='\r'&&raw[i+1]==='\n')i++;
          cur.push(cell);cell='';
          if(cur.some(v=>v.trim()))rows.push(cur);
          cur=[];
        } else cell+=c;
      }
      cur.push(cell);
      if(cur.some(v=>v.trim()))rows.push(cur);
      return rows;
    }

    const rawRows=parseCsvFull(text);
    if(rawRows.length<2){alert('데이터가 없어요. CSV 파일을 확인해주세요.');return;}

    // 학생 답변 안에 줄바꿈이 있을 때 CSV 행이 쪼개지는 문제 보정.
    // 헤더 열 수보다 적은 열을 가진 행은 이전 행의 마지막 셀에 이어 붙임.
    const headerLen=rawRows[0].length;
    const allRows=[rawRows[0]];
    for(let i=1;i<rawRows.length;i++){
      if(rawRows[i].length<headerLen&&allRows.length>1){
        const prev=allRows[allRows.length-1];
        prev[prev.length-1]+='\n'+rawRows[i].join(',');
      }else{
        allRows.push(rawRows[i]);
      }
    }

    const headers=allRows[0].map(h=>h.trim());
    const dataRows=allRows.slice(1);

    // 이름/반 열 자동 감지 (대소문자/공백 무시)
    const nameIdx=headers.findIndex(h=>/이름|name/i.test(h));
    const clsIdx=headers.findIndex(h=>/수강반|반|class/i.test(h));
    if(nameIdx<0){
      alert('CSV에서 "이름" 열을 찾을 수 없어요.\n\n발견된 열: '+headers.join(', '));
      return;
    }

    // 제외할 열: 타임스탬프, 이름, 반, 학번 등 메모에 불필요한 열
    const skipIdxs=new Set([nameIdx,clsIdx].filter(i=>i>=0));
    headers.forEach((h,i)=>{
      if(/타임스탬프|timestamp|학번|email|이메일/i.test(h.trim()))skipIdxs.add(i);
    });

    // 나머지 열 = 질문 항목
    const qIdxs=headers.map((h,i)=>i).filter(i=>!skipIdxs.has(i));

    formImportRows=dataRows.map(cols=>{
      const rawName=(cols[nameIdx]||'').trim();
      // "20226 이하은" 또는 "20226이하은" 처럼 학번이 앞에 붙은 경우 숫자 제거
      const name=rawName.replace(/^\d+\s*/,'').replace(/^\d+/,'').trim();
      const cls=clsIdx>=0?(cols[clsIdx]||'').trim():'';
      const qs={};
      qIdxs.forEach(i=>{
        const q=(headers[i]||'').trim();
        const a=(cols[i]||'').trim();
        if(q&&a)qs[q]=a;
      });
      return{name,cls,qs,chosenId:null};
    }).filter(r=>r.name);

    renderFormMatchTable();
    document.getElementById('fStep1').style.display='none';
    document.getElementById('fStep2').style.display='block';
  };
  reader.readAsText(file,'utf-8');
}

// 폼 CSV 행을 학생과 매칭. 같은 이름이 여러 반에 있으면 배열로 반환 (선택 필요).
// 하나만 있으면 그 학생, 없으면 null.
function matchFormRowAll(r){
  let all=allStudents();
  if(formImportClsFilter.size>0){
    all=all.filter(s=>{
      const cls=classes.find(c=>c.students.some(st=>st.id===s.id));
      return cls&&formImportClsFilter.has(cls.name);
    });
  }
  const rName=r.name.replace(/\s/g,'');
  let found=all.filter(s=>s.name.replace(/\s/g,'')===rName);
  if(!found.length){
    const candidates=all.filter(s=>rName.includes(s.name.replace(/\s/g,''))||s.name.replace(/\s/g,'').includes(rName));
    const maxLen=candidates.length?Math.max(...candidates.map(s=>s.name.length)):0;
    found=candidates.filter(s=>s.name.length===maxLen);
  }
  if(!found.length)return null;
  if(found.length===1)return found[0];
  return found; // 여러 반에 걸쳐 있는 경우
}
function matchFormRow(r){
  const result=matchFormRowAll(r);
  if(!result)return null;
  if(Array.isArray(result))return result[0]; // 선택 안 된 경우엔 첫 번째 (applyFormImport에서 chosenId로 오버라이드)
  return result;
}

function renderFormMatchTable(){
  const allWithCls=allStudentsWithClass();
  let matched=0,unmatched=0,needChoice=0;
  const rows=formImportRows.map((r,ri)=>{
    const result=matchFormRowAll(r);
    const isDup=Array.isArray(result);
    const stu=isDup?(r.chosenId?allStudents().find(s=>s.id===r.chosenId):null):result;
    if(isDup)needChoice++;
    else if(stu)matched++;else unmatched++;
    const preview=Object.values(r.qs)[0]||'—';
    const badge=isDup&&!r.chosenId
      ?`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:#fff3cd;color:#856404;">반 선택</span>`
      :stu
        ?`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-success);color:var(--text-success);">매칭</span>`
        :`<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-warning);color:var(--text-warning);">미매칭</span>`;
    const clsSelect=isDup?`<select onchange="formImportRows[${ri}].chosenId=parseInt(this.value)||'';renderFormMatchTable();" style="font-size:11px;padding:2px 5px;border:1px solid #e0e0ee;border-radius:5px;background:#f8f8ff;margin-top:3px;width:100%;">
      <option value="">반 선택...</option>
      ${result.map(s=>{const cls=classes.find(c=>c.students.some(st=>st.id===s.id));return`<option value="${s.id}" ${r.chosenId===s.id?'selected':''}>${cls?cls.name:''} ${s.number}번</option>`;}).join('')}
    </select>`:'';
    return `<div style="display:grid;grid-template-columns:90px 70px minmax(0,1fr) 64px;padding:7px 12px;border-bottom:0.5px solid var(--border);align-items:center;gap:4px;">
      <span style="font-size:13px;color:var(--text-primary);">${r.name}</span>
      <div style="font-size:12px;color:var(--text-secondary);">${r.cls}${clsSelect}</div>
      <div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;min-width:0;">${preview.substring(0,30)}${preview.length>30?'...':''}</div>
      ${badge}
    </div>`;
  }).join('');

  // chosenId 있는 중복 학생도 matched로 카운트
  const totalMatched=formImportRows.filter(r=>{
    const result=matchFormRowAll(r);
    if(Array.isArray(result))return!!r.chosenId;
    return!!result;
  }).length;

  document.getElementById('fMatchTable').innerHTML=rows;
  const badge=document.getElementById('fMatchBadge');
  badge.textContent=`${totalMatched}명 매칭`;
  badge.style.cssText=`font-size:12px;padding:2px 10px;border-radius:var(--radius);background:var(--bg-success);color:var(--text-success);`;
  const btn=document.getElementById('fApplyBtn');
  if(btn)btn.textContent=`${totalMatched}명 참고자료에 저장`;
  btn.disabled=totalMatched===0;
}

async function applyFormImport(){
  const mode=document.getElementById('fModeVal')?.value||'replace';
  const tabId=formImportTab;
  let done=0,skipped=0;
  const btn=document.getElementById('fApplyBtn');
  if(btn){btn.disabled=true;btn.textContent='저장 중...';}

  const total=formImportRows.filter(r=>matchFormRow(r)).length;
  let idx=0;
  for(const r of formImportRows){
    let stu;
    const result=matchFormRowAll(r);
    if(Array.isArray(result)){
      // 여러 반에 있는 경우 — chosenId로 선택된 학생 사용
      if(!r.chosenId){skipped++;continue;}
      stu=allStudents().find(s=>s.id===r.chosenId);
    } else {
      stu=result;
    }
    if(!stu){skipped++;continue;}
    idx++;
    if(btn)btn.textContent=`저장 중... (${idx}/${total})`;

    const formText=Object.entries(r.qs)
      .filter(([q,a])=>a)
      .map(([q,a])=>`[${q}]\n${a}`)
      .join('\n\n──────────\n\n');

    const refObj={
      name:`폼응답_${stu.name}.txt`,
      type:'text',
      base64:null,
      extractedText:formText,
      focus:''
    };

    const key=`files_${stu.id}_${tabId}`;
    let fileData={old:null,refs:[null],example:null};
    try{const v=await idbGet(key);if(v)fileData=v;}catch(e){}
    if(!Array.isArray(fileData.refs))fileData.refs=[null];

    if(mode==='replace'){
      // 기존 폼 응답 참고자료 교체, 없으면 빈 슬롯에 추가
      const existIdx=fileData.refs.findIndex(r=>r&&r.type==='text');
      if(existIdx>=0){fileData.refs[existIdx]=refObj;}
      else{
        const nullIdx=fileData.refs.findIndex(r=>!r);
        if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
        else if(fileData.refs.length<5){fileData.refs.push(refObj);}
        else{fileData.refs[fileData.refs.length-1]=refObj;} // 꽉 찼으면 마지막 슬롯
      }
    } else {
      // 추가: 빈 슬롯에 넣기
      const nullIdx=fileData.refs.findIndex(r=>!r);
      if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
      else if(fileData.refs.length<5){fileData.refs.push(refObj);}
      else{skipped++;continue;} // 참고자료 5개 꽉 찼으면 건너뜀
    }

    await idbSet(key,fileData);
    await refreshStudentFileFlag(stu.id);
    formResponseIds.add(String(stu.id));
    done++;
  }

  localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  document.getElementById('fStep2').style.display='none';
  document.getElementById('fStep3').style.display='block';
  const msg=document.getElementById('fDoneMsg');
  if(msg)msg.textContent=`${done}명의 참고자료에 폼 응답이 저장됐어요.${skipped?` ${skipped}명은 건너뛰었어요.`:''}`;
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">📋 ${excelData.length}명: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}

// 파일명 매칭: 학번(5자리) 우선, 없으면 이름 부분일치
// 학생 이름의 한글 부분만 추출해서 비교 (영문 병기 제거)
function getCoreName(name){return (name||'').replace(/[^가-힣]/g,'');}

function bulkMatchFile(filename){
  const base=filename.replace(/\.[^.]+$/,''); // 확장자 제거
  const numMatch=base.match(/\d{5}/);
  const num=numMatch?numMatch[0]:null;
  const all=allStudentsWithClass();

  // 1차: 학번으로 정확 매칭
  if(num){
    const byNum=all.filter(s=>String(s.number)===num);
    if(byNum.length===1)return{num,candidates:byNum,autoByNum:true};
    if(byNum.length>1){
      // 학번 뒤 이름으로 추가 구분
      const afterNum=base.slice((numMatch.index||0)+5);
      const byNameToo=byNum.filter(s=>afterNum.includes(getCoreName(s.name)));
      if(byNameToo.length===1)return{num,candidates:byNameToo,autoByNum:true};
      return{num,candidates:byNum.length===1?byNum:byNum,autoByNum:false};
    }
  }

  // 2차: 이름 부분일치 (학번 없는 파일명)
  const coreName=getCoreName(base);
  let candidates=all.filter(s=>{
    const sCore=getCoreName(s.name);
    return sCore&&coreName.includes(sCore);
  });
  candidates.sort((a,b)=>getCoreName(b.name).length-getCoreName(a.name).length);
  const maxLen=candidates.length?getCoreName(candidates[0].name).length:0;
  return{num,candidates:candidates.filter(c=>getCoreName(c.name).length===maxLen),autoByNum:false};
}

function addBulkFiles(fileList){
  Array.from(fileList).forEach(file=>{
    const isPdf=/\.pdf$/i.test(file.name);
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    if(!isPdf&&!isPptx&&!isTxt)return;
    if(bulkUploadFiles.some(f=>f.file.name===file.name&&f.file.size===file.size))return;
    const{num,candidates,autoByNum}=bulkMatchFile(file.name);
    // 학번으로 유일 매칭되거나 후보가 1명이면 자동 선택
    const autoMatch=autoByNum&&candidates.length===1?candidates[0].id:candidates.length===1?candidates[0].id:'';
    bulkUploadFiles.push({file,num,candidates,chosenId:autoMatch,autoByNum});
  });
  renderBulkMatchTable();
}

// 현재 선택된 학생(getStu())에 의존하지 않고, 임의의 studentId 기준으로 파일 상태를 읽고/저장하는 버전.
// processFile()/getAnalyzedFiles()와 완전히 같은 키 규칙(analyzedFilesMap, IndexedDB `files_${id}_${tab}`)을
// 그대로 써서, 나중에 해당 학생·탭을 직접 열어도 restoreStoredFiles()가 똑같이 불러와줌.
function getAnalyzedFilesFor(studentId,tabId){
  const key=`${studentId}_${tabId}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}
async function persistFilesFor(studentId,tabId){
  const files=getAnalyzedFilesFor(studentId,tabId);
  try{
    await idbSet(`files_${studentId}_${tabId}`,files);
    await refreshStudentFileFlag(studentId);
    return true;
  }catch(e){return false;}
}
async function addRefFileFor(studentId,tabId,fileData){
  const files=getAnalyzedFilesFor(studentId,tabId);
  let idx=files.refs.findIndex(r=>!r);
  if(idx===-1){
    if(files.refs.length>=5)return'full';
    files.refs.push(null);
    idx=files.refs.length-1;
  }
  files.refs[idx]=fileData;
  return(await persistFilesFor(studentId,tabId))?'ok':'storage_full';
}

async function runBulkUpload(){
  const targets=bulkUploadFiles.filter(f=>f.chosenId);
  if(!targets.length){alert('매칭된 파일이 없어요. 학생을 먼저 선택해 주세요.');return;}
  const btn=document.getElementById('bulkUploadBtn');
  btn.disabled=true;
  const mode=window.bulkUploadMode||'add';
  // 교체 모드: 먼저 해당 학생들의 기존 참고자료 비우기
  if(mode==='replace'){
    const uniqueIds=[...new Set(targets.map(f=>f.chosenId))];
    for(const sid of uniqueIds){
      const files=getAnalyzedFilesFor(sid,bulkUploadTab);
      files.refs=[null];
      await persistFilesFor(sid,bulkUploadTab);
    }
  }
  let ok=0,full=0,storageFail=0,readFail=0;
  for(let i=0;i<targets.length;i++){
    btn.textContent=`업로드 중... (${i+1}/${targets.length})`;
    const f=targets[i];
    try{
      let fileData;
      if(/\.pptx$/i.test(f.file.name)){
        const extractedText=await extractPptxText(f.file);
        fileData={name:f.file.name,type:'pptx',extractedText};
      }else if(/\.txt$/i.test(f.file.name)){
        const extractedText=await f.file.text();
        fileData={name:f.file.name,type:'txt',extractedText};
      }else{
        const base64=await fileToBase64(f.file);
        fileData={name:f.file.name,base64,type:f.file.type||'application/pdf'};
      }
      const result=await addRefFileFor(f.chosenId,bulkUploadTab,fileData);
      if(result==='ok')ok++; else if(result==='full')full++; else storageFail++;
    }catch(e){readFail++;}
  }
  closeModal();
  renderRefSlots();renderFileStatus();renderSb();
  let msg=`✅ ${ok}개 업로드 완료!`;
  if(full)msg+=`\n⚠️ ${full}개는 참고자료 칸이 이미 5개 다 차서 못 넣었어요.`;
  if(storageFail)msg+=`\n❌ ${storageFail}개는 저장 공간 한도를 초과해서 실패했어요.`;
  if(readFail)msg+=`\n❌ ${readFail}개는 파일을 읽지 못했어요 (구버전 .ppt이거나 손상된 파일일 수 있어요).`;
  alert(msg);
}

async function attToB64(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });
}
function attMt(file) {
  if (file.name.endsWith('.pdf')) return 'application/pdf';
  if (file.name.endsWith('.png')) return 'image/png';
  return 'image/jpeg';
}
async function attFileBlock(file) {
  const b64 = await attToB64(file);
  const m = attMt(file);
  if (m === 'application/pdf') return { type: 'document', source: { type: 'base64', media_type: m, data: b64 } };
  return { type: 'image', source: { type: 'base64', media_type: m, data: b64 } };
}

async function attClaude(system, content) {

    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: 4096, system, messages: [{ role: 'user', content }] })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e?.error?.message || `API ${r.status}`); }
  const d = await r.json();
  // 비용 집계
  const usage=d.usage||{};
  const cost=(usage.input_tokens||0)*3/1000000+(usage.output_tokens||0)*15/1000000;
  console.log('[출결 API 비용]',{input_tokens:usage.input_tokens,output_tokens:usage.output_tokens,cost_usd:cost.toFixed(4)});
  const prev=parseFloat(localStorage.getItem('totalCost')||'0');
  localStorage.setItem('totalCost',(prev+cost).toFixed(6));
  const cnt=parseInt(localStorage.getItem('genCount')||'0');
  localStorage.setItem('genCount',cnt+1);
  return d.content.map(b => b.text || '').join('');
}

function attParseJSON(s) {
  try { return JSON.parse(s.replace(/```json|```/g, '').trim()); }
  catch (e) { throw new Error('파싱 실패: ' + s.slice(0, 200)); }
}

async function attRun() {
  if (!apiKey) { alert('⚙️ 설정에서 API 키를 먼저 입력해 주세요.'); return; }
  if (!attStore.sheet.length) { alert('구글 시트 파일을 올려주세요.'); return; }
  if (!attStore.nice.length) { alert('나이스 파일을 올려주세요.'); return; }

  const btn = document.getElementById('att-run-btn');

  try {
    // ── 1. 구글 시트 파싱 ──
    attLog('구글 시트 분석 중...', 'act');

    const sheetBlocks = await Promise.all(attStore.sheet.map(attFileBlock));
    const sheetSys = `당신은 한국 고등학교 출결 담당 전문가입니다.
구글 시트 학급출결현황에서 출결 이상이 있는 학생 정보를 추출하세요.

기호 의미: ♡=질병결석, ♥=미인정결석, △=인정결석, ▲=기타결석, #=질병지각, X=미인정지각, ≠=기타지각, ◁=인정지각, @=질병조퇴, ◎=미인정조퇴, ∽=기타조퇴, ▷=인정조퇴, ☆=질병결과, ◇=미인정결과, 〓=기타결과, ▽=인정결과

비고란에 날짜·사유·출결구분·교시·서류명이 기재되어 있습니다.
기록 형식 예시: "17. 생리통 (~3) / 인정지각 1회 / 보호자확인서"
→ 날짜: 17일, 사유: 생리통, 교시: 3교시까지, 출결구분: 인정지각, 서류: 보호자확인서
"(not yet)"이 서류명에 포함되면 서류가 아직 미제출된 것.
조퇴·지각·결과는 교시 정보를 반드시 추출할 것.

반드시 JSON만 출력하세요 (마크다운 없이):
{"students":[{"번호":6,"이름":"김시연","records":[{"날짜":"6/1","출결구분":"인정결석","사유":"생리통","교시":null,"서류":"보호자확인서"},{"날짜":"6/8","출결구분":"질병조퇴","사유":"배탈","교시":"5교시부터","서류":"진료확인서(not yet)"}]}]}
서류가 없으면 "서류":null, 교시 정보가 없으면 "교시":null, (not yet)은 서류명 그대로 포함`;

    const sheetRaw = await attClaude(sheetSys, [...sheetBlocks, { type: 'text', text: '학급출결현황에서 출결 이상 학생 전원의 기록을 추출하세요.' }]);
    const sheetData = attParseJSON(sheetRaw);
    attLog(`구글 시트: ${sheetData.students?.length || 0}명 파싱됨`, 'ok');

    // ── 2. 나이스 파싱 ──
    attLog('나이스 기록 분석 중...', 'act');
    attSetStatus('나이스 기록 분석 중...');
    const niceBlocks = await Promise.all(attStore.nice.map(attFileBlock));
    const niceSys = `당신은 나이스(NEIS) 출결 데이터 전문가입니다.
월별출결현황(건별)과 학급별출결현황(집계표)에서 데이터를 추출하세요.

반드시 JSON만 출력하세요:
{"students":[{"번호":6,"이름":"김시연","records":[{"날짜":"6/1","출결구분":"인정결석","사유":"생리통"}],"집계":{"질병결석":3,"인정결석":1}}]}
출결 이상이 없는 학생(전부 0)은 제외해도 됩니다.`;

    const niceRaw = await attClaude(niceSys, [...niceBlocks, { type: 'text', text: '나이스 출결 현황에서 출결 이상 학생 전원의 기록을 추출하세요.' }]);
    const niceData = attParseJSON(niceRaw);
    attLog(`나이스: ${niceData.students?.length || 0}명 파싱됨`, 'ok');

    // ── 3. 서류 파싱 ──
    let docsData = null;
    if (attStore.docs.length > 0) {
      attLog('출결 서류 분석 중...', 'act');
      attSetStatus('출결 서류 분석 중...');
      const docBlocks = await Promise.all(attStore.docs.map(attFileBlock));
      const docSys = `당신은 한국 고등학교 출결 서류 분석 전문가입니다.
진료확인서·보호자확인서·소견서 등에서 정보를 추출하세요.
서류 명칭은 문서에 실제로 적힌 명칭 그대로 추출하세요.
날짜는 서류에 적힌 발급일(또는 진료일)을 읽으세요.

반드시 JSON만 출력하세요:
{"documents":[{"이름":"홍길동","결석일":"6/1","발급일":"6/3","서류명":"진료확인서","사유":"감기"}]}
결석일을 서류에서 알 수 없으면 null로, 발급일이 없으면 null로 두세요.`;
      const docRaw = await attClaude(docSys, [...docBlocks, { type: 'text', text: '이 서류들에서 이름·날짜·서류명·사유를 추출하세요.' }]);
      try { docsData = attParseJSON(docRaw); attLog(`서류: ${docsData.documents?.length || 0}건 파싱됨`, 'ok'); }
      catch (e) { attLog('서류 파싱 실패 (무시)', 'er'); }
    }

    // ── 4. 대조 ──
    attLog('3중 대조 분석 중...', 'act');
    attSetStatus('대조 중...');
    const compareSys = `당신은 학교 출결 대조 전문가입니다.
구글시트·나이스·서류 세 가지를 대조하여 불일치를 찾으세요.

대조 기준:
1. 구글시트 ↔ 나이스 (건별): 같은 학생·날짜의 출결구분·사유·교시가 일치하는지
   - 조퇴/결과/지각은 교시도 반드시 대조. 예: 시트 "3교시까지 인정지각" vs 나이스 "1교시,2교시" → 불일치
   - 구글시트 기록 형식 예시: "17. 생리통 (~3) / 인정지각 1회 / 보호자확인서" = 17일, 생리통, 3교시까지, 인정지각, 보호자확인서 제출

2. 구글시트 ↔ 나이스 (횟수 집계): 학생별로 구글시트에서 집계한 출결 횟수와 나이스 학급별출결현황의 숫자가 일치하는지
   - 예: 구글시트에 질병결석 3일인데 나이스 집계표에 질병결석 2로 되어있으면 이상
   - 출결구분별(질병결석, 인정결석, 미인정결석, 질병조퇴, 인정조퇴, 미인정조퇴, 질병지각, 인정지각, 미인정지각, 질병결과, 인정결과 등) 전부 대조

3. 구글시트 ↔ 서류: 구글시트에 적힌 서류명과 실제 서류명이 일치하는지
   - 서류명에 "(not yet)"이 포함되어 있으면 서류 미제출 → 무조건 이상, 유형 "서류미제출"로 표시

4. 누락: 한쪽에만 기록된 경우

5. 서류 날짜 오류:
   - 당일 발급이어야 하는 경우 (의료기관 발급 서류): 질병결석, 질병조퇴, 질병결과에 해당하는 진료확인서·처방전·소견서·통원확인서 등. 서류 발급일이 해당 출결 당일과 일치해야 함. 하루라도 다르면 이상.
   - 7일 이내이면 되는 경우 (보호자·담임 작성 서류): 보호자확인서, 학부모 의견서, 담임 의견서 등. 출결일로부터 7일 이내에 작성(발급)되면 정상. 8일 이후면 이상.
   위 두 경우 모두 유형은 "서류날짜오류"로 표시하고, 설명란에 구체적으로 어떤 문제인지 적을 것.

반드시 JSON만 출력하세요:
{"issues":[{"번호":21,"이름":"전보연","날짜":"6/15","유형":"출결구분불일치","구글시트":"미인정조퇴","나이스":"미인정결석","서류":null,"설명":"구글시트는 조퇴인데 나이스는 결석"}],"통계":{"총건수":0,"출결구분불일치":0,"나이스누락":0,"구글시트누락":0,"서류명불일치":0,"서류누락":0}}
유형: "출결구분불일치"|"교시불일치"|"횟수불일치"|"나이스누락"|"구글시트누락"|"서류명불일치"|"서류누락"|"서류미제출"|"서류날짜오류"
`;

    const compareRaw = await attClaude(compareSys, [{ type: 'text', text: `[구글시트]\n${JSON.stringify(sheetData, null, 2)}\n\n[나이스]\n${JSON.stringify(niceData, null, 2)}\n\n[서류]\n${docsData ? JSON.stringify(docsData, null, 2) : '없음'}\n\n위 데이터를 대조해서 불일치를 모두 찾아주세요.` }]);
    const compareData = attParseJSON(compareRaw);
    attLog(`대조 완료: 불일치 ${compareData.issues?.length || 0}건`, compareData.issues?.length > 0 ? 'er' : 'ok');

    attSetStatus('대조 완료', 'done');
    attRenderResult(compareData);

  } catch (e) {
    attLog('오류: ' + e.message, 'er');
    attSetStatus('오류 발생', 'err');
    document.getElementById('att-main').insertAdjacentHTML('beforeend',
      `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:14px;color:#dc2626;font-size:13px;"><strong>오류:</strong> ${e.message}</div>`);
  }

  btn.disabled = false; btn.textContent = '🔍 대조 시작';
}

  const issues = cmp.issues || [];

  const typeMap = { '출결구분불일치': ['#fef2f2','#dc2626','구분 다름'], '교시불일치': ['#fef2f2','#dc2626','교시 다름'], '횟수불일치': ['#fef2f2','#dc2626','횟수 다름'], '나이스누락': ['#fffbeb','#d97706','나이스 누락'], '구글시트누락': ['#fffbeb','#d97706','시트 누락'], '서류명불일치': ['#eff6ff','#3b82f6','서류명 다름'], '서류누락': ['#eff6ff','#3b82f6','서류 없음'], '서류미제출': ['#fef2f2','#dc2626','서류 미제출'], '서류날짜오류': ['#fef2f2','#dc2626','날짜 오류'] };

      const [tbg, tc, tl] = typeMap[i.유형] || ['#f0f0f0', '#666', i.유형];

        <td style="padding:9px 12px;border-bottom:1px solid #f5f5f5;"><strong>${i.번호}번</strong> ${i.이름}</td>

        <td style="padding:9px 12px;border-bottom:1px solid #f5f5f5;"><span style="background:${tbg};color:${tc};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;">${tl}</span></td>
        <td style="padding:9px 12px;border-bottom:1px solid #f5f5f5;font-size:12px;">
          <div style="color:#dc2626;">시트: <strong>${i.구글시트 || '-'}</strong></div>
          <div style="color:#d97706;">나이스: <strong>${i.나이스 || '-'}</strong></div>
          ${i.서류 ? `<div style="color:#6b7280;">서류: ${i.서류}</div>` : ''}
        </td>
        <td style="padding:9px 12px;border-bottom:1px solid #f5f5f5;font-size:12px;color:#6b7280;">${i.설명 || ''}</td>
        
      </tr>`;
    }).join('');

  const main = document.getElementById('att-main');
  main.innerHTML = `
    <div id="att-sbar" style="background:#fff;border:1px solid #e0e0ee;border-radius:8px;padding:13px 16px;display:flex;align-items:center;gap:10px;">
      <div class="att-dot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;"></div>
      <div class="att-smsg" style="font-size:13px;font-weight:600;">대조 완료</div>
      <div style="margin-left:auto;font-size:12px;color:#aaa;">${new Date().toLocaleString('ko-KR')}</div>
    </div>

    <div style="background:${issues.length > 0 ? '#fef2f2' : '#f0fdf4'};border:1px solid ${issues.length > 0 ? '#fca5a5' : '#86efac'};border-radius:8px;padding:14px 18px;font-size:14px;font-weight:600;color:${issues.length > 0 ? '#dc2626' : '#16a34a'};">
      ${issues.length > 0 ? '⚠️ 이상 있음' : '✅ 이상 없음 — 세 자료가 모두 일치합니다.'}
    </div>

    <div style="font-size:14px;font-weight:700;">불일치 항목 (${issues.length}건)</div>
    <div style="background:#fff;border:1px solid #e0e0ee;border-radius:8px;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:#f8f8ff;">
            <th style="padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;border-bottom:1px solid #e0e0ee;">학생</th>
            <th style="padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;border-bottom:1px solid #e0e0ee;">날짜</th>
            <th style="padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;border-bottom:1px solid #e0e0ee;">유형</th>
            <th style="padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;border-bottom:1px solid #e0e0ee;">내용</th>
            <th style="padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#888;border-bottom:1px solid #e0e0ee;">설명</th>

      </table>
    </div>

    <div id="att-logbox" style="background:#1a1a2e;border-radius:8px;padding:13px 15px;display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;"></div>`;

  // 로그 다시 렌더
  const lb = document.getElementById('att-logbox');
  if (lb) {
    lb.innerHTML = attLogs.map(l =>
      `<div style="font-size:11px;font-family:monospace;color:${l.type === 'ok' ? '#4ade80' : l.type === 'er' ? '#f87171' : l.type === 'act' ? '#93c5fd' : '#6b7280'};display:flex;gap:10px;">
        <span style="color:#374151;flex-shrink:0;">${l.t}</span><span>${l.msg}</span>
      </div>`).join('');
    lb.scrollTop = lb.scrollHeight;
  }
}
