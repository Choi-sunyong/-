<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생기부 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#f5f5f5;color:#222;}
.app{display:flex;height:100vh;}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;}
.sb-head{padding:14px 12px;border-bottom:1px solid #e0e0e0;}
.sb-head h2{font-size:13px;color:#555;margin-bottom:8px;}
.add-btn{width:100%;padding:6px 10px;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff;display:flex;align-items:center;gap:5px;}
.add-btn:hover{background:#f0f0f0;}
.sb-list{flex:1;overflow-y:auto;padding:6px;}
.cls-hd{display:flex;align-items:center;gap:5px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}
.cls-hd:hover{background:#f5f5f5;}
.cls-hd.open{background:#f0f4ff;}
.stu-list{padding-left:16px;}
.stu-item{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#555;}
.stu-item:hover{background:#f5f5f5;color:#222;}
.stu-item.active{background:#e8eeff;color:#3355cc;font-weight:600;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.api-bar{padding:8px 16px;background:#fffbe6;border-bottom:1px solid #ffe58f;display:flex;align-items:center;gap:8px;}
.api-bar label{font-size:12px;color:#666;white-space:nowrap;}
.api-bar input{flex:1;font-size:12px;padding:5px 9px;border:1px solid #ddd;border-radius:6px;font-family:monospace;}
.api-st{font-size:11px;white-space:nowrap;}
.api-ok{color:#389e0d;}
.api-no{color:#aaa;}
.m-head{padding:14px 18px;border-bottom:1px solid #e0e0e0;background:#fff;}
.m-head h1{font-size:15px;font-weight:600;}
.m-body{flex:1;overflow-y:auto;padding:16px;background:#f5f5f5;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#aaa;font-size:13px;}
.sview{display:flex;flex-direction:column;gap:14px;}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;}
.card-title{font-size:12px;font-weight:600;color:#666;margin-bottom:10px;}
textarea{width:100%;font-size:13px;line-height:1.8;resize:vertical;border:1px solid #ddd;border-radius:6px;padding:9px 11px;background:#fafafa;font-family:'Malgun Gothic',sans-serif;}
textarea:focus{outline:none;border-color:#aaa;}
.kw-row{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.kw-row input{flex:1;font-size:13px;padding:6px 9px;border:1px solid #ddd;border-radius:6px;background:#fafafa;}
.kw-row input:focus{outline:none;border-color:#aaa;}
.rl{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;white-space:nowrap;}
.kw-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;}
.tag{display:flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.tag.pos{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f;}
.tag.neg{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e;}
.tag .rm{cursor:pointer;font-size:11px;opacity:0.6;margin-left:2px;}
.tag .rm:hover{opacity:1;}
.gen-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.gen-btn{padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;background:#3355cc;border:none;color:#fff;display:flex;align-items:center;gap:5px;}
.gen-btn:hover{background:#2244bb;}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed;}
.cp-btn{padding:6px 13px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #ccc;background:#fff;display:flex;align-items:center;gap:4px;}
.cp-btn:hover{background:#f5f5f5;}
.bc{font-size:12px;}
.bc.ok{color:#389e0d;}
.bc.ov{color:#cf1322;}
.file-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f5f5f5;border-radius:6px;font-size:12px;}
.file-item a{color:#3355cc;text-decoration:none;flex:1;}
.file-item a:hover{text-decoration:underline;}
.file-del{cursor:pointer;color:#cf1322;font-size:11px;padding:2px 6px;border:1px solid #ffa39e;border-radius:4px;background:#fff1f0;}
.upload-btn{padding:6px 13px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #ccc;background:#fff;display:flex;align-items:center;gap:4px;}
.upload-btn:hover{background:#f5f5f5;}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:10px;padding:22px;width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal input{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;font-family:'Malgun Gothic',sans-serif;}
.modal input:focus{outline:none;border-color:#aaa;}
.m-btns{display:flex;gap:6px;justify-content:flex-end;}
.m-btns button{padding:6px 14px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid #ccc;background:#fff;}
.m-btns button:hover{background:#f5f5f5;}
.m-btns .ok{background:#3355cc;border-color:#3355cc;color:#fff;}
.m-btns .ok:hover{background:#2244bb;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.del-x{font-size:10px;color:#bbb;padding:1px 4px;cursor:pointer;margin-left:auto;}
.del-x:hover{color:#cf1322;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sb-head">
      <h2>📁 학급 관리</h2>
      <button class="add-btn" onclick="openModal('class')">+ 반 추가</button>
    </div>
    <div class="sb-list" id="sbList"></div>
  </div>
  <div class="main">
    <div class="api-bar">
      <label>🔑 API 키</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." oninput="saveApiKey(this.value)" />
      <span class="api-st" id="apiSt"><span class="api-no">미입력</span></span>
    </div>
    <div class="m-head"><h1 id="mTitle">반을 선택하거나 추가해 주세요</h1></div>
    <div class="m-body" id="mBody">
      <div class="empty"><p>👈 왼쪽에서 반을 추가하고 학생을 등록해 보세요</p></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let st={classes:[],selCls:null,selStu:null},apiKey='';

async function load(){
  try{const r=localStorage.getItem('sb_ak');if(r){apiKey=r;document.getElementById('apiKeyInput').value=apiKey;updApiSt();}}catch(e){}
  await loadClasses();
}

async function loadClasses(){
  const{data}=await sb.from('students').select('*').order('class_name').order('name');
  if(!data)return;
  const clsMap={};
  data.forEach(s=>{
    if(!clsMap[s.class_name])clsMap[s.class_name]={name:s.class_name,students:[]};
    clsMap[s.class_name].students.push({
      id:s.id,name:s.name,memo:s.memo||'',
      keywords:JSON.parse(s.keywords||'[]'),result:s.result||''
    });
  });
  st.classes=Object.values(clsMap);
  render();
}

function saveApiKey(v){apiKey=v.trim();try{localStorage.setItem('sb_ak',apiKey);}catch(e){}updApiSt();}

function updApiSt(){
  const el=document.getElementById('apiSt');
  if(apiKey&&apiKey.startsWith('sk-ant-'))el.innerHTML='<span class="api-ok">✅ 연결됨</span>';
  else if(apiKey)el.innerHTML='<span class="api-no">형식 확인 필요</span>';
  else el.innerHTML='<span class="api-no">미입력</span>';
}

function bytes(s){let b=0;for(const c of s)b+=c.charCodeAt(0)>127?2:1;return b;}

let modal=null;
function openModal(t){modal={t};renderModal();}
function closeModal(){modal=null;document.getElementById('mc')?.remove();}

function renderModal(){
  document.getElementById('mc')?.remove();
  if(!modal)return;
  const d=document.createElement('div');
  d.id='mc';d.className='modal-bg';
  d.onclick=e=>{if(e.target===d)closeModal();};
  const isCls=modal.t==='class';
  d.innerHTML=`<div class="modal"><h3>${isCls?'새 반 추가':'학생 추가'}</h3><input id="mi" placeholder="${isCls?'예: 2학년 3반':'예: 김민준'}" /><div class="m-btns"><button onclick="closeModal()">취소</button><button class="ok" onclick="${isCls?'addCls()':'addStu()'}">추가</button></div></div>`;
  document.getElementById('app').appendChild(d);
  setTimeout(()=>document.getElementById('mi')?.focus(),50);
  document.getElementById('mi').addEventListener('keydown',e=>{if(e.key==='Enter')isCls?addCls():addStu();});
}

async function addCls(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  if(!st.classes.find(c=>c.name===n))st.classes.push({name:n,students:[]});
  st.selCls=n;st.selStu=null;
  closeModal();render();
}

async function addStu(){
  const n=document.getElementById('mi')?.value.trim();if(!n)return;
  const cls=st.selCls;
  const{data,error}=await sb.from('students').insert({name:n,class_name:cls,memo:'',keywords:'[]',result:''}).select().single();
  if(error){alert('오류: '+error.message);return;}
  const c=st.classes.find(c=>c.name===cls);
  if(c)c.students.push({id:data.id,name:n,memo:'',keywords:[],result:''});
  st.selStu=data.id;
  closeModal();render();
}

function toggleCls(name){st.selCls=st.selCls===name?null:name;st.selStu=null;render();}
function selStu(id){st.selStu=id;render();}
function getStu(){const c=st.classes.find(c=>c.name===st.selCls);return c?.students.find(s=>s.id===st.selStu);}

async function updMemo(v){
  const s=getStu();if(!s)return;
  s.memo=v;
  await sb.from('students').update({memo:v}).eq('id',s.id);
}

async function updResult(v){
  const s=getStu();if(!s)return;
  s.result=v;updBC(v);
  await sb.from('students').update({result:v}).eq('id',s.id);
}

function updBC(v){
  const el=document.getElementById('bc');if(!el)return;
  const b=bytes(v);
  el.textContent=`나이스 바이트: ${b} / 1000`;
  el.className='bc '+(b>1000?'ov':'ok');
}

async function addKw(){
  const s=getStu();if(!s)return;
  const inp=document.getElementById('kwInp');
  const text=inp?.value.trim();if(!text)return;
  const type=document.querySelector('input[name="kwT"]:checked')?.value||'pos';
  s.keywords.push({text,type,id:Date.now()});
  inp.value='';
  await sb.from('students').update({keywords:JSON.stringify(s.keywords)}).eq('id',s.id);
  renderKws();
}

async function rmKw(id){
  const s=getStu();if(!s)return;
  s.keywords=s.keywords.filter(k=>k.id!==id);
  await sb.from('students').update({keywords:JSON.stringify(s.keywords)}).eq('id',s.id);
  renderKws();
}

function renderKws(){
  const s=getStu();const c=document.getElementById('kwTags');if(!c||!s)return;
  c.innerHTML=s.keywords.map(k=>`<span class="tag ${k.type}">${k.text}<span class="rm" onclick="rmKw(${k.id})">✕</span></span>`).join('');
}

async function uploadFile(){
  const s=getStu();if(!s)return;
  const input=document.createElement('input');
  input.type='file';
  input.onchange=async()=>{
    const file=input.files[0];if(!file)return;
    const path=`${s.id}/${Date.now()}_${file.name}`;
    const{error}=await sb.storage.from('files').upload(path,file);
    if(error){alert('업로드 실패: '+error.message);return;}
    renderFiles();
  };
  input.click();
}

async function renderFiles(){
  const s=getStu();
  const container=document.getElementById('fileList');if(!container||!s)return;
  const{data}=await sb.storage.from('files').list(String(s.id));
  if(!data||!data.length){container.innerHTML='<p style="font-size:12px;color:#aaa;">업로드된 파일이 없습니다</p>';return;}
  container.innerHTML=data.map(f=>{
    const url=`${SUPABASE_URL}/storage/v1/object/public/files/${s.id}/${f.name}`;
    return `<div class="file-item"><a href="${url}" target="_blank">📄 ${f.name}</a><span class="file-del" onclick="delFile('${s.id}/${f.name}')">삭제</span></div>`;
  }).join('');
}

async function delFile(path){
  if(!confirm('파일을 삭제할까요?'))return;
  await sb.storage.from('files').remove([path]);
  renderFiles();
}

async function generate(){
  if(!apiKey||!apiKey.startsWith('sk-ant-')){alert('상단에 API 키를 먼저 입력해 주세요.');return;}
  const s=getStu();if(!s)return;
  if(!s.keywords.length){alert('키워드를 먼저 입력해 주세요.');return;}
  const btn=document.getElementById('genBtn');
  const ra=document.getElementById('resArea');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> 생성 중...';ra.value='';
  const pos=s.keywords.filter(k=>k.type==='pos').map(k=>k.text);
  const neg=s.keywords.filter(k=>k.type==='neg').map(k=>k.text);
  const prompt=`당신은 한국의 고등학교에서 30년간 근무한 베테랑 담임 교사입니다. 생활기록부의 '행동특성 및 종합의견'을 작성해 주세요.
[긍정 키워드]: ${pos.join(', ')||'없음'}
[부정 키워드]: ${neg.join(', ')||'없음'}
[학생 메모/특이사항]: ${s.memo||'없음'}
[조건]
- 하나의 자연스러운 문단으로 작성
- '항상', '매사'와 같은 부사로 시작
- 긍정 키워드를 구체적으로 부각
- 부정 키워드는 극복/성장 가능성으로 표현 (없으면 무시)
- '학생', '그는', '그가', '그의' 사용 금지
- 문장 어미는 '~임', '~음', '~함'으로 통일
- 품격 있고 신뢰감 있는 말투
- 한국어 600자 분량
결과만 출력하고 설명은 쓰지 마세요.`;
  try{
    const r=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({apiKey,prompt})
    });
    const data=await r.json();
    if(data.error){ra.value='오류: '+data.error;}
    else{const t=data.result||'';s.result=t;ra.value=t;updBC(t);await sb.from('students').update({result:t}).eq('id',s.id);}
  }catch(e){ra.value='오류: '+e.message;}
  btn.disabled=false;btn.innerHTML='✨ 생기부 생성';
}

function copyRes(){
  const el=document.getElementById('resArea');if(!el||!el.value)return;
  navigator.clipboard.writeText(el.value).then(()=>{
    const b=document.getElementById('cpBtn');
    b.textContent='✅ 복사됨';
    setTimeout(()=>{b.textContent='📋 복사';},1500);
  });
}

async function delStu(id,e){
  e.stopPropagation();if(!confirm('이 학생 데이터를 삭제할까요?'))return;
  await sb.from('students').delete().eq('id',id);
  const c=st.classes.find(c=>c.name===st.selCls);
  if(c)c.students=c.students.filter(s=>s.id!==id);
  if(st.selStu===id)st.selStu=null;
  render();
}

function render(){renderSb();renderMain();}

function renderSb(){
  const l=document.getElementById('sbList');
  if(!st.classes.length){l.innerHTML='<p style="font-size:11px;color:#bbb;padding:8px;">아직 반이 없습니다</p>';return;}
  l.innerHTML=st.classes.map(c=>`
    <div style="margin-bottom:3px;">
      <div class="cls-hd ${st.selCls===c.name?'open':''}" onclick="toggleCls('${c.name}')">
        <span>📂</span>
        <span style="flex:1;">${c.name}</span>
        <span style="font-size:10px;color:#aaa;">${c.students.length}명</span>
      </div>
      ${st.selCls===c.name?`<div class="stu-list">
        ${c.students.map(s=>`<div class="stu-item ${st.selStu===s.id?'active':''}" onclick="selStu(${s.id})">
          <span>👤</span>
          <span style="flex:1;">${s.name}</span>
          <span class="del-x" onclick="delStu(${s.id},event)">✕</span>
        </div>`).join('')}
        <div class="stu-item" onclick="openModal('stu')" style="color:#aaa;">+ 학생 추가</div>
      </div>`:''}
    </div>`).join('');
}

function renderMain(){
  const body=document.getElementById('mBody');
  const titleEl=document.getElementById('mTitle');
  const s=getStu();
  const c=st.classes.find(c=>c.name===st.selCls);
  if(!s){
    titleEl.textContent=c?`${c.name} — 학생을 선택해 주세요`:'반을 선택하거나 추가해 주세요';
    body.innerHTML=`<div class="empty"><p>${c?'👈 학생을 선택하거나 추가해 주세요':'👈 왼쪽에서 반을 추가하고 학생을 등록해 보세요'}</p></div>`;
    return;
  }
  titleEl.textContent=`${c.name} · ${s.name}`;
  body.innerHTML=`<div class="sview">
    <div class="card">
      <div class="card-title">📝 학생 메모 / 특이사항</div>
      <textarea id="memoA" style="min-height:80px;" placeholder="수업 태도, 동아리, 수상 내역, 봉사활동 등...">${s.memo}</textarea>
    </div>
    <div class="card">
      <div class="card-title">📎 파일 업로드 (생기부, 발표자료 등)</div>
      <button class="upload-btn" onclick="uploadFile()">📤 파일 업로드</button>
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="card">
      <div class="card-title">🏷️ 키워드</div>
      <div class="kw-row">
        <input id="kwInp" placeholder="키워드 입력 후 Enter" />
        <label class="rl"><input type="radio" name="kwT" value="pos" checked /> <span style="color:#389e0d;">긍정</span></label>
        <label class="rl"><input type="radio" name="kwT" value="neg" /> <span style="color:#cf1322;">부정</span></label>
        <button class="add-btn" onclick="addKw()" style="width:auto;">+ 추가</button>
      </div>
      <div class="kw-tags" id="kwTags"></div>
    </div>
    <div class="card">
      <div class="card-title">✨ 생기부 생성</div>
      <div class="gen-row">
        <button class="gen-btn" id="genBtn" onclick="generate()">✨ 생기부 생성</button>
        <button class="cp-btn" id="cpBtn" onclick="copyRes()">📋 복사</button>
        <span class="bc ok" id="bc">나이스 바이트: 0 / 1000</span>
      </div>
      <textarea id="resArea" style="min-height:160px;" placeholder="키워드 입력 후 생기부 생성 버튼을 눌러 주세요..." oninput="updResult(this.value)">${s.result}</textarea>
    </div>
  </div>`;
  document.getElementById('memoA').addEventListener('input',function(){updMemo(this.value);});
  document.getElementById('kwInp').addEventListener('keydown',e=>{if(e.key==='Enter')addKw();});
  renderKws();
  renderFiles();
  if(s.result)updBC(s.result);
}

load();
</script>
</body>
</html>
