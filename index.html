<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>лЎңл”© мӨ‘...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={command:'л¬ёмһҘмқҖ ~мһ„/~мқҢ/~н•ЁмңјлЎң лҒқлӮҙкі , кІ©мӢқ мһҲлҠ” л§җнҲ¬лЎң мҚЁмӨҳ.',example:'',guide:'',customForbidden:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">рҹ“ҡ</div><div><div class="login-logo-text">мӢҜлӢӨлҘҙнғҖ</div><div class="login-logo-sub">көҗмӮ¬мҡ© мғқнҷңкё°лЎқл¶Җ мһ‘м„ұ лҸ„кө¬</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">лЎңк·ёмқё</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">нҡҢмӣҗк°Җмһ…</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>н•ҷкөҗ мқҙлҰ„</label><input id="l-school" placeholder="мҳҲ: нҷ”м„ұкі л“ұн•ҷкөҗ"/></div>
      <div class="login-field"><label>м„ мғқлӢҳ мқҙлҰ„</label><input id="l-tname" placeholder="мҳҲ: мөңмҲңмҡ©"/></div>
      <div class="login-field"><label>лӢҙлӢ№ н•ҷл…„/л°ҳ</label><input id="l-role" placeholder="мҳҲ: лӢҙмһ„ В· 2н•ҷл…„ 3л°ҳ"/></div>`:''}
    <div class="login-field"><label>мқҙл©”мқј</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>л№„л°ҖлІҲнҳё</label><input id="l-pw" type="password" placeholder="6мһҗ мқҙмғҒ"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'нҡҢмӣҗк°Җмһ…':'лЎңк·ёмқё'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='лЎңк·ёмқё мӨ‘...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();await migrateFilesToIndexedDB();await buildStudentsWithFilesSet();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='к°Җмһ… мӨ‘...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});

// ===== IndexedDB кё°л°ҳ нҢҢмқј м ҖмһҘ (localStorage 5~10MB н•ңлҸ„ліҙлӢӨ нӣЁм”¬ нҒ° мҡ©лҹүмқ„ м“ё мҲҳ мһҲмқҢ) =====
// мІЁл¶ҖнҢҢмқј(кё°мЎҙ мғқкё°л¶Җ/м°ёкі мһҗлЈҢ)мқҖ мҡ©лҹүмқҙ м»Өм„ң localStorageлЎңлҠ” л¶ҖмЎұн•ҙм§Ҳ мҲҳ мһҲм–ҙ м—¬кё°лЎң мҳ®к№Җ.
// нғӯлі„ н…ҚмҠӨнҠё м„Өм •(мҳҲмӢң/м¶”к°Җ лӘ…л №м–ҙ л“ұ commonSetting_*)мқҖ мҡ©лҹүмқҙ мһ‘м•„м„ң к·ёлҢҖлЎң localStorage мӮ¬мҡ©.
const IDB_NAME='siddartha_files';
const IDB_STORE='files';
let _idbPromise=null;
function openIdb(){
  if(_idbPromise)return _idbPromise;
  _idbPromise=new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB лҜём§Җмӣҗ'));return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=()=>{req.result.createObjectStore(IDB_STORE);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return _idbPromise;
}
function idbSet(key,value){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(value,key);
    tx.oncomplete=()=>resolve(true);
    tx.onerror=()=>reject(tx.error);
  }));
}
function idbGet(key){
  return openIdb().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  }));
}

// мҳҲм „м—җ localStorageм—җ м ҖмһҘн•ҙл’ҖлҚҳ нҢҢмқј лҚ°мқҙн„°лҘј IndexedDBлЎң н•ң лІҲл§Ң мҳ®к№Җ.
// мҳ®кёҙ н•ӯлӘ©мқҖ localStorageм—җм„ң м§ҖмӣҢм„ң кҪү м°јлҚҳ мҡ©лҹүлҸ„ к°ҷмқҙ нҷ•ліҙлҗЁ. мҳ®кёё кІҢ м—Ҷмңјл©ҙ к·ёлғҘ мЎ°мҡ©нһҲ лҒқлӮЁ.
async function migrateFilesToIndexedDB(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('files_'));
  if(!keys.length)return;
  let moved=0;
  for(const key of keys){
    try{
      const raw=localStorage.getItem(key);
      if(raw){
        await idbSet(key,JSON.parse(raw));
        localStorage.removeItem(key);
        moved++;
      }
    }catch(e){console.warn('нҢҢмқј лҚ°мқҙн„° мқҙм „ мӢӨнҢЁ:',key,e);}
  }
  if(moved)console.log(`рҹ“Ұ кё°мЎҙ нҢҢмқј лҚ°мқҙн„° ${moved}кұҙмқ„ лҚ” нҒ° м ҖмһҘмҶҢ(IndexedDB)лЎң мҳ®кІјм–ҙмҡ”.`);
}

// hasStoredFiles()лҠ” мӮ¬мқҙл“ңл°”/лҢҖмӢңліҙл“ңлҘј к·ёлҰҙ л•Ң лҸҷкё°м ҒмңјлЎң нҳём¶ңлҗҳлҠ”лҚ°, IndexedDBлҠ” л№„лҸҷкё°лқј
// к·ё мһҗлҰ¬м—җм„ң л°”лЎң мЎ°нҡҢн•  мҲҳ м—ҶмқҢ. к·ёлһҳм„ң "нҢҢмқјмқҙ мһҲлҠ” н•ҷмғқ ID" лӘ©лЎқмқ„ л©”лӘЁлҰ¬м—җ SetмңјлЎң л“Өкі  мһҲлӢӨк°Җ
// лҸҷкё°м ҒмңјлЎң мҰүмӢң лӢөн•ҙмЈјкі , мӢӨм ң IndexedDB мЎ°нҡҢлҠ” нҢҢмқјмқҙ м¶”к°Җ/мӮӯм ңлҗ  л•ҢлӮҳ лЎңк·ёмқё мӢң лҜёлҰ¬ н•ҙл‘ .
let studentsWithFilesSet=new Set();
const FILE_TABS=['haengdong','setech','jayul','dongari','jinro','dokseo'];

function isFilesEmpty(stored){
  if(!stored)return true;
  return !(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length));
}

async function refreshStudentFileFlag(studentId){
  for(const tab of FILE_TABS){
    try{
      const stored=await idbGet(`files_${studentId}_${tab}`);
      if(!isFilesEmpty(stored)){studentsWithFilesSet.add(studentId);return;}
    }catch(e){}
  }
  studentsWithFilesSet.delete(studentId);
}

// лЎңк·ёмқё мӢң IndexedDB м „мІҙлҘј н•ң лІҲ нӣ‘м–ҙм„ң studentsWithFilesSetмқ„ мұ„мӣҢл‘ .
async function buildStudentsWithFilesSet(){
  studentsWithFilesSet.clear();
  try{
    const db=await openIdb();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).openCursor();
      req.onsuccess=()=>{
        const cursor=req.result;
        if(cursor){
          const m=String(cursor.key).match(/^files_(.+)_(haengdong|setech|jayul|dongari|jinro|dokseo)$/);
          if(m&&!isFilesEmpty(cursor.value))studentsWithFilesSet.add(m[1]);
          cursor.continue();
        }else resolve();
      };
      req.onerror=()=>reject(req.error);
    });
  }catch(e){console.warn('нҢҢмқј мқёлҚұмҠӨ кө¬м„ұ мӢӨнҢЁ:',e);}
}

function hasStoredFiles(stuId){
  return studentsWithFilesSet.has(stuId);
}

// л©”лӘЁ/нӮӨмӣҢл“ң/лӘ…л №м–ҙ мӨ‘ н•ҳлӮҳлқјлҸ„ м ҒнҳҖмһҲмңјл©ҙ 'мһ‘м„ұмӨ‘'мңјлЎң ліҙкё° мң„н•ҙ, лӘЁл“  нғӯ(м„ёнҠ№ м „мІҙ кіјлӘ© +
// мһҗмңЁ/лҸҷм•„лҰ¬/м§„лЎң/лҸ…м„ң + н–үлҸҷнҠ№м„ұ мһҗмІҙ)мқ„ нӣ‘м–ҙм„ң лӯ”к°Җ мһ…л Ҙлҗң кІҢ мһҲлҠ”м§Җ нҷ•мқё.
// н•ҷмғқмқ„ нҒҙлҰӯн–Ҳмқ„ л•Ң м–ҙлҠҗ нғӯ(м„ёнҠ№мқҙл©ҙ м–ҙлҠҗ кіјлӘ©к№Ңм§Җ)м—җ мӢӨм ң мһ‘м„ұ мӨ‘мқё лӮҙмҡ©мқҙ мһҲлҠ”м§Җ м°ҫм•„м„ң л°”лЎң мқҙлҸҷмӢңнӮӨкё° мң„н•Ё.
function getFirstWipTab(s){
  let kwLen=0;
  try{kwLen=(typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[])).length;}catch(e){}
  let haengExtra=false;
  try{
    const changyeH=JSON.parse(s.changye||'{}').haengdong;
    if(changyeH&&(changyeH.command||changyeH.achievement||changyeH.attitude||changyeH.growth))haengExtra=true;
  }catch(e){}
  if(s.result||s.memo||kwLen||haengExtra)return{tab:'haengdong'};
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab:'setech',subject:subj};
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab of ['jayul','dongari','jinro','dokseo']){
      const d=changye[tab];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return{tab};
    }
  }catch(e){}
  return{tab:'setech'};
}

function hasAnyTabInput(s){
  try{
    const setech=JSON.parse(s.setech||'{}');
    for(const subj in setech){
      const d=setech[subj];
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth))return true;
    }
  }catch(e){}
  try{
    const changye=JSON.parse(s.changye||'{}');
    for(const tab in changye){
      const d=changye[tab];
      // _careerлҠ” {clarity,goal} нҳ•нғңлқј d.clarityлЎң мІҙнҒ¬
      if(d&&(d.memo||(d.keywords&&d.keywords.length)||d.command||d.result||d.achievement||d.attitude||d.growth||d.clarity))return true;
    }
  }catch(e){}
  if(s.memo)return true;
  try{
    const kws=typeof s.keywords==='string'?JSON.parse(s.keywords||'[]'):(s.keywords||[]);
    if(kws&&kws.length)return true;
  }catch(e){}
  return false;
}
function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasAnyTabInput(s))return 'wip';
  return 'none';
}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){

  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

// м°ёкі мһҗлЈҢ(refs) мқјкҙ„ мӮӯм ң вҖ” кё°мЎҙ мғқкё°л¶Җ нҢҢмқј, мҡ°мҲҳмӮ¬лЎҖ, нғӯлі„/м „мІҙ кіөнҶөнҢҢмқјмқҖ кұҙл“ңлҰ¬м§Җ м•ҠмқҢ.
// 6к°ң нғӯ(haengdong/setech/jayul/dongari/jinro/dokseo) Г— н•ҙлӢ№ л°ҳ н•ҷмғқ м „мІҙлҘј IndexedDBм—җм„ң нӣ‘м–ҙм„ң
// refs л°°м—ҙл§Ң л№„мҡ°кі  лӮҳлЁём§Җ(old, example, verifiedContent л“ұ)лҠ” к·ёлҢҖлЎң л‘ .
const BULK_TAB_IDS=['haengdong','setech','jayul','dongari','jinro','dokseo'];
async function openBulkRefDelete(clsName,preMode){
  closeCtxMenu();
  const c=classes.find(c=>c.name===clsName);if(!c)return;
  // мғҲ нҶөн•© мӮӯм ң лӘЁлӢ¬м—җм„ң modeлҘј лҜёлҰ¬ л°ӣмқҖ кІҪмҡ° л°”лЎң мӢӨн–ү
  if(preMode){
    const label=preMode==='formrefs'?'нҸј мқ‘лӢө':preMode==='refs'?'м°ёкі мһҗлЈҢ м „мІҙ':preMode==='memo'?'л©”лӘЁ':'м°ёкі мһҗлЈҢ м „мІҙ + л©”лӘЁ';
    if(!confirm(`'${clsName}' л°ҳ м „мІҙ н•ҷмғқмқҳ ${label}лҘј мӮӯм ңн• к№Ңмҡ”? лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`))return;
    await runBulkRefDeleteDirect(clsName,preMode);
    return;
  }
  // кё°мЎҙ м»Ён…ҚмҠӨнҠё л©”лүҙм—җм„ң м§Ғм ‘ нҳём¶ңлҗң кІҪмҡ° кё°мЎҙ лӘЁлӢ¬ н‘ңмӢң
  const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
  d.innerHTML=`<div class="modal" style="max-width:460px;"><h3>рҹ“Ғ мқјкҙ„ мӮӯм ң</h3>
    <p style="font-size:13px;color:#666;margin-bottom:12px;">'${clsName}' л°ҳ м „мІҙ н•ҷмғқм—җкІҢ м Ғмҡ©лҗ©лӢҲлӢӨ.</p>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="formrefs" checked> нҸј мқ‘лӢөл§Ң</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="refs"> м°ёкі мһҗлЈҢ м „мІҙ</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="memo"> л©”лӘЁл§Ң</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="radio" name="bulkDelMode" value="both"> м°ёкі мһҗлЈҢ м „мІҙ + л©”лӘЁ лӘЁл‘җ</label>
    </div>
    <div class="modal-btns"><button onclick="closeModal()">м·ЁмҶҢ</button><button class="ok danger" onclick="runBulkRefDelete('${clsName}')">мӮӯм ң</button></div>
  </div>`;
  document.getElementById('app').appendChild(d);
}
async function runBulkRefDelete(clsName){
  const mode=document.querySelector('input[name="bulkDelMode"]:checked')?.value||'refs';
  const label=mode==='formrefs'?'нҸј мқ‘лӢө':mode==='refs'?'м°ёкі мһҗлЈҢ м „мІҙ':mode==='memo'?'л©”лӘЁ':'м°ёкі мһҗлЈҢ м „мІҙ + л©”лӘЁ';
  if(!confirm(`'${clsName}' л°ҳ м „мІҙ н•ҷмғқмқҳ ${label}лҘј мӮӯм ңн• к№Ңмҡ”? лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`))return;
  closeModal();
  await runBulkRefDeleteDirect(clsName,mode);
}
async function runBulkRefDeleteDirect(clsName,mode){
  const c=classes.find(x=>x.name===clsName);if(!c)return;
  const label=mode==='formrefs'?'нҸј мқ‘лӢө':mode==='refs'?'м°ёкі мһҗлЈҢ м „мІҙ':mode==='memo'?'л©”лӘЁ':'м°ёкі мһҗлЈҢ м „мІҙ + л©”лӘЁ';
  for(const s of c.students){
    // м°ёкі мһҗлЈҢ мӮӯм ң (м „мІҙ or нҸјмқ‘лӢөл§Ң)
    if(mode==='refs'||mode==='both'||mode==='formrefs'){
      for(const tabId of BULK_TAB_IDS){
        try{
          const v=await idbGet(`files_${s.id}_${tabId}`);
          if(v&&Array.isArray(v.refs)&&v.refs.some(r=>r)){
            if(mode==='formrefs'){
              // нҸј мқ‘лӢө(type=text)л§Ң nullлЎң
              v.refs=v.refs.map(r=>r&&r.type==='text'?null:r);
            } else {
              v.refs=[];
            }
            await idbSet(`files_${s.id}_${tabId}`,v);
          }
        }catch(e){}
      }
      await refreshStudentFileFlag(s.id);
      if(mode==='formrefs'){formResponseIds.delete(String(s.id));}
    }
    // л©”лӘЁ мӮӯм ң
    if(mode==='memo'||mode==='both'){
      // н–үлҸҷнҠ№м„ұ л©”лӘЁ
      s.memo='';
      await sb.from('students').update({memo:''}).eq('id',s.id);
      // м„ёнҠ№ л©”лӘЁ
      try{
        const setech=JSON.parse(s.setech||'{}');
        Object.keys(setech).forEach(sub=>{if(setech[sub])setech[sub].memo='';});
        s.setech=JSON.stringify(setech);
        await sb.from('students').update({setech:s.setech}).eq('id',s.id);
      }catch(e){}
      // м°Ҫмқҳм Ғ мІҙн—ҳнҷңлҸҷ л©”лӘЁ
      try{
        const changye=JSON.parse(s.changye||'{}');
        ['jayul','dongari','jinro','dokseo'].forEach(tab=>{if(changye[tab])changye[tab].memo='';});
        s.changye=JSON.stringify(changye);
        await sb.from('students').update({changye:s.changye}).eq('id',s.id);
      }catch(e){}
    }
  }
  if(mode==='formrefs')localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  closeModal();
  renderSb();
  if(getStu())restoreStoredFiles();
  if(getStu())renderMain();
  alert(`${label} мқјкҙ„ мӮӯм ңк°Җ мҷ„лЈҢлҗҗм–ҙмҡ”.`);
}

  const dz=document.getElementById('reviewFileDropZone');
  if(dz)dz.style.borderColor='#e0e0ee';
  Array.from(e.dataTransfer.files).forEach(f=>addReviewFile(f));
}

async function addReviewFile(file){
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('кө¬лІ„м „ .pptлҠ” м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”. .pptxлЎң лӢӨмӢң м ҖмһҘн•ң нӣ„ мҳ¬л ӨмЈјм„ёмҡ”.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    reviewFiles.push(fileData);
    await persistReviewFiles();
    renderReviewFileList();
  }catch(e){alert('нҢҢмқј мқҪкё° мӢӨнҢЁ: '+(e.message||''));}
}

async function persistReviewFiles(){
  try{await idbSet('reviewFiles_global',reviewFiles);}catch(e){console.warn('м ҖмһҘ кіөк°„ мҙҲкіј:',e);}
}
async function loadReviewFiles(){
  try{
    const stored=await idbGet('reviewFiles_global');
    if(stored){reviewFiles.length=0;stored.forEach(f=>reviewFiles.push(f));}
  }catch(e){}
}

function removeReviewFile(id){
  const idx=reviewFiles.findIndex(f=>f.id===id);
  if(idx>-1)reviewFiles.splice(idx,1);
  persistReviewFiles();
  renderReviewFileList();
}

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('мөңлҢҖ 10к°ңк№Ңм§Җ м—…лЎңл“ң к°ҖлҠҘн•ҙмҡ”.');return;}
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){alert('кө¬лІ„м „ .pptлҠ” м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”. .pptxлЎң лӢӨмӢң м ҖмһҘн•ң нӣ„ мҳ¬л ӨмЈјм„ёмҡ”.');return;}
  try{
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText,id:Date.now()};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText,id:Date.now()};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf',id:Date.now()};
    }
    files.push(fileData);
    await persistCommonFiles(stuId);
    renderCommonFileList(stuId);
  }catch(e){alert('нҢҢмқј мқҪкё° мӢӨнҢЁ: '+(e.message||''));}
}

async function persistCommonFiles(stuId){
  try{await idbSet(`commonFiles_${stuId}`,getCommonFiles(stuId));}catch(e){console.warn('м ҖмһҘ кіөк°„ мҙҲкіј:',e);}
}
async function loadCommonFiles(stuId){
  try{
    const stored=await idbGet(`commonFiles_${stuId}`);
    if(stored)commonFilesMap[stuId]=stored;
  }catch(e){}
}

function computeSetechGrade(label,studentId){
  const pool=[];
  allStudents().forEach(st=>{
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    const d=setech[label];
    if(d&&d.examScores&&d.examScores.s1!=null&&d.examScores.s2!=null){
      pool.push({id:st.id,total:d.examScores.s1+d.examScores.s2});
    }
  });
  if(!pool.length)return null;
  pool.sort((a,b)=>b.total-a.total);
  const n=pool.length;
  const idx=pool.findIndex(p=>p.id===studentId);
  if(idx===-1)return null;
  const rank=idx+1;
  const cum=[0.10,0.34,0.66,0.90,1.00].map(p=>Math.round(n*p));
  let grade=5;
  for(let i=0;i<cum.length;i++){if(rank<=cum[i]){grade=i+1;break;}}
  return{grade,rank,n,total:pool[idx].total};
}

}

function parseJsonArrayLoose(raw){
  const s=raw.indexOf('['),e=raw.lastIndexOf(']');

// лӮҳмқҙмҠӨ көҗкіјлӘ©лі„ мқјлһҢн‘ң PDFлҘј нҒҙлқјмқҙм–ёнҠём—җм„ң м§Ғм ‘ нҢҢмӢұ
async function extractScoreTable(){
  const files=scoreUploadState.files;
  if(files.length!==2){alert('1м°ЁВ·2м°Ё PDFлҘј л‘җ к°ң лӘЁл‘җ мҳ¬л ӨмЈјм„ёмҡ”.');return;}
  const area=document.getElementById('scoreUploadArea');
  if(area)area.innerHTML='<p style="font-size:12px;color:#888;">вҸі н‘ңлҘј мқҪлҠ” мӨ‘...</p>';
  try{
    if(typeof pdfjsLib==='undefined'){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF нҢҢм„ңк°Җ м•„м§Ғ лЎңл”© мӨ‘мқҙм—җмҡ”. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.</p>';
      return;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    // xмўҢн‘ң кё°л°ҳ м—ҙ кө¬л¶„мңјлЎң л№Ҳ м№ё(кІ°мӢң/м „м¶ң л“ұ)мқ„ м •нҷ•нһҲ мІҳлҰ¬
    const parsePdf=async(file)=>{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      // лӘЁл“  м•„мқҙн…ңмқ„ yмўҢн‘ң к·ёлЈ№мңјлЎң л¬¶кё° (м—¬лҹ¬ нҺҳмқҙм§Җ н•©мӮ°)
      const byY={};
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        tc.items.forEach(item=>{
          fullText+=item.str+' ';
          const y=Math.round(item.transform[5]);
          if(!byY[y])byY[y]=[];
          byY[y].push({x:item.transform[4],str:item.str.trim()});
        });
      }
      const round_num=fullText.includes('1м°Ё')?1:fullText.includes('2м°Ё')?2:0;

      // кіјлӘ©лӘ… мһҗлҸҷ к°җм§Җ: "көҗкіјлӘ© : мӮ¬нҡҢ..." нҢЁн„ҙм—җм„ң м¶”м¶ң
      let detectedSubject=null;
      const subjectMatch=fullText.match(/көҗкіјлӘ©\s*:\s*([к°Җ-нһЈ(]+)/);
      if(subjectMatch){
        const raw=subjectMatch[1];
        // SETECH_SUBJECTS мӨ‘ мқјм№ҳн•ҳлҠ” кІғ м°ҫкё°
        const SUBJECTS=['көӯм–ҙ','мҲҳн•ҷ','мҳҒм–ҙ','мӮ¬нҡҢ','кіјн•ҷ','м—ӯмӮ¬','кё°мҲ к°Җм •','мІҙмңЎ','мқҢм•…','лҜёмҲ '];
        detectedSubject=SUBJECTS.find(s=>raw.includes(s))||null;
      }

      // y лӮҙлҰјм°ЁмҲң(мң„вҶ’м•„лһҳ)мңјлЎң н–ү м •л ¬
      const sortedYs=Object.keys(byY).map(Number).sort((a,b)=>b-a);
      const rowsRaw=sortedYs.map(y=>byY[y].sort((a,b)=>a.x-b.x).filter(i=>i.str));

      // л°ҳ н—ӨлҚ” н–ү м°ҫкё°: м •мҲҳл§Ң мһҲкі  1~9 лІ”мң„, 2к°ң мқҙмғҒ
      let banHeaders=[];
      let banHeaderXs=[];
      let dataYStart=null;
      for(let i=0;i<rowsRaw.length;i++){
        const strs=rowsRaw[i].map(c=>c.str);
        if(strs.length>=2&&strs.length<=8&&
           strs.every(s=>/^\d+$/.test(s))&&strs.every(s=>parseInt(s)>=1&&parseInt(s)<=9)){
          banHeaders=strs.map(Number);
          banHeaderXs=rowsRaw[i].map(c=>c.x);
          dataYStart=i+1;
          break;
        }
      }
      if(!banHeaders.length)return{round_num,banHeaders:[],rows:[]};

      // к°Ғ л°ҳ м—ҙмқҳ xлІ”мң„: н—ӨлҚ” xмўҢн‘ң Вұ н—Ҳмҡ© мҳӨм°Ё
      const colWidth=banHeaderXs.length>1?(banHeaderXs[1]-banHeaderXs[0]):40;
      const getColIdx=(x)=>{
        let best=-1,bestDist=Infinity;
        banHeaderXs.forEach((hx,i)=>{const d=Math.abs(x-hx);if(d<bestDist&&d<colWidth*0.7){bestDist=d;best=i;}});
        return best;
      };

      const rows=[];
      for(let i=dataYStart;i<rowsRaw.length;i++){
        const cells=rowsRaw[i];
        if(!cells.length)continue;
        // мІ« лІҲм§ё м…Җмқҙ лІҲнҳё(1~40 м •мҲҳ)мқём§Җ нҷ•мқё
        const hoStr=cells[0].str;
        const ho=parseInt(hoStr);
        if(!ho||ho<1||ho>40||isNaN(ho))continue;
        // лӮҳлЁём§Җ м…Җмқ„ xмўҢн‘ңлЎң л°ҳ м—ҙм—җ л§Өн•‘
        const scoreByCol={};
        cells.slice(1).forEach(cell=>{
          const col=getColIdx(cell.x);
          if(col>=0){
            const v=parseFloat(cell.str);
            if(!isNaN(v)&&v>=0&&v<=100)scoreByCol[col]=v;
            // м „м¶ң/кІ°мӢң/лҜёмқём •кІ° л“ұ л№„мҲ«мһҗлҠ” л¬ҙмӢң (м җмҲҳ м—ҶмқҢмңјлЎң мІҳлҰ¬)
          }
        });
        rows.push({ho,scoreByCol});
      }
      return{round_num,banHeaders,banHeaderXs,rows,detectedSubject};
    };

    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">вҸі 1м°Ё нҢҢмқј мқҪлҠ” мӨ‘...</p>';
    const r1=await parsePdf(files[0]);
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">вҸі 2м°Ё нҢҢмқј мқҪлҠ” мӨ‘...</p>';
    const r2=await parsePdf(files[1]);

    // кіјлӘ©лӘ… мһҗлҸҷ м„ёнҢ… (л‘ҳ мӨ‘ н•ҳлӮҳлқјлҸ„ к°җм§Җлҗҳл©ҙ м Ғмҡ©)
    const autoSubject=r1.detectedSubject||r2.detectedSubject;
    if(autoSubject&&autoSubject!==scoreUploadState.label){
      scoreUploadState.label=autoSubject;
      // UI лІ„нҠјлҸ„ к°ұмӢ 
      renderScoreSubjectBtns();
      if(area)area.innerHTML=`<p style="font-size:12px;color:#378ADD;">рҹ“Ң PDFм—җм„ң кіјлӘ© мһҗлҸҷ к°җм§Җ: <b>${autoSubject}</b></p>`;
      await new Promise(r=>setTimeout(r,600));
    }

    const first=r1.round_num===1?r1:(r2.round_num===1?r2:r1);
    const second=r1.round_num===2?r1:(r2.round_num===2?r2:r2);

    const buildMap=(parsed,key)=>{
      const m=new Map();
      parsed.rows.forEach(({ho,scoreByCol})=>{
        Object.entries(scoreByCol).forEach(([col,val])=>{
          const ban=parsed.banHeaders[parseInt(col)];
          if(!ban)return;
          const k=`${ban}_${ho}`;
          const ex=m.get(k)||{ban,ho};
          ex[key]=val;
          m.set(k,ex);
        });
      });
      return m;
    };

    const m1=buildMap(first,'s1');
    const m2=buildMap(second,'s2');
    const allRows=[];
    m1.forEach((v,k)=>{const s2=m2.get(k);if(s2?.s2!=null)allRows.push({...v,s2:s2.s2});});

    if(!allRows.length){
      if(area)area.innerHTML='<p style="font-size:12px;color:#cf1322;">PDF нҢҢмӢұ мӢӨнҢЁ. API нӮӨк°Җ мһҲлӢӨл©ҙ AIлЎң мһ¬мӢңлҸ„н•ҙмҡ”.</p>';
      if(apiKey)await extractScoreTableByAI(files,area);
      return;
    }
    scoreUploadState.parsed=allRows;
    if(area)area.innerHTML=`<p style="font-size:12px;color:#389e0d;">вң… ${allRows.length}лӘ… м¶”м¶ң мҷ„лЈҢ</p>`;
    setTimeout(()=>renderBanMapping(),400);
  }catch(e){
    if(area)area.innerHTML='<p style="font-size:12px;color:#888;">вҸі мҳӨлҘҳ л°ңмғқ, AIлЎң мһ¬мӢңлҸ„ мӨ‘...</p>';
    if(apiKey)await extractScoreTableByAI(files,area);
    else if(area)area.innerHTML=`<p style="font-size:12px;color:#cf1322;">мҳӨлҘҳ: ${e.message}</p>`;
  }
}

// н•ҷлІҲ 5мһҗлҰ¬(мҳҲ: 20314) вҶ’ {ban:3, ho:14}
function realBanHoFromStudentId(sid){
  const s=String(sid||'').replace(/\D/g,'');
  if(s.length!==5)return null;
  return{ban:parseInt(s[2]),ho:parseInt(s.slice(3))};
}

async function applyScoreUpload(){
  const{label,parsed}=scoreUploadState;
  const area=document.getElementById('scoreUploadArea');
  let matched=0;
  const unmatchedKeys=[];
  // м„ұм Ғн‘ң л°ҳВ·лІҲнҳё вҶ’ н•ҷмғқ л§ө
  const stuMap=new Map();
  allStudents().forEach(s=>{
    const bh=realBanHoFromStudentId(s.student_id);
    if(bh)stuMap.set(`${bh.ban}_${bh.ho}`,s);
  });
  const targets=[];
  for(const row of parsed){
    const key=`${Number(row.ban)}_${Number(row.ho)}`;
    const st=stuMap.get(key);
    if(!st){unmatchedKeys.push(`${row.ban}л°ҳ${row.ho}лІҲ`);continue;}
    targets.push({st,row});
  }
  for(let i=0;i<targets.length;i++){
    const{st,row}=targets[i];
    if(area)area.innerHTML=`<p style="font-size:12px;color:#888;">вҸі м ҖмһҘ мӨ‘... (${i+1}/${targets.length})</p>`;
    let setech={};try{setech=JSON.parse(st.setech||'{}');}catch(e){}
    setech[label]={...(setech[label]||{}),examScores:{s1:Number(row.s1),s2:Number(row.s2)}};
    st.setech=JSON.stringify(setech);
    await sb.from('students').update({setech:st.setech}).eq('id',st.id);
    matched++;
  }
  let html=`<p style="font-size:12px;color:${matched?'#389e0d':'#cf1322'};">${matched?'вң…':'вҡ пёҸ'} ${matched}лӘ… л°ҳмҳҒ мҷ„лЈҢ${unmatchedKeys.length?`, ${unmatchedKeys.length}лӘ… л§Өм№ӯ мӢӨнҢЁ`:''}</p>`;
  if(unmatchedKeys.length){
    html+=`<p style="font-size:11px;color:#cf1322;margin-top:4px;">л§Өм№ӯ мӢӨнҢЁ (м„ұм Ғн‘ңм—җл§Ң мһҲкі  мҲҳк°•л°ҳ лӘ…лӢЁм—җ м—Ҷкұ°лӮҳ кІ°мӢң): ${unmatchedKeys.join(', ')}</p>`;
  }
  if(area)area.innerHTML=html;
  if(matched)showToast(`рҹ“Ҡ ${matched}лӘ…мқҳ н•ҷм—… м„ұм·ЁлҸ„к°Җ кі„мӮ°лҗҗм–ҙмҡ”`);
  setTimeout(()=>{closeModal();renderSb();renderMain();},2500);
}

// кІ°кіјк°Җ лӘ©н‘ң л°”мқҙнҠёВұ100мқ„ лІ—м–ҙлӮҳл©ҙ н•ң лІҲ лҚ” мҡ”мІӯн•ҙм„ң л¶„лҹүмқ„ л§һм¶Ө.
// л¶„лҹү мЎ°м •мқҖ "мқҙлҜё м“ҙ кёҖ"мқ„ мӨ„мқҙкұ°лӮҳ лҠҳлҰ¬лҠ” мһ‘м—…мқҙлқј мӣҗліё нҢҢмқјмқ„ лӢӨмӢң л¶„м„қн•  н•„мҡ”к°Җ м—ҶмқҢ.
// к·ёлһҳм„ң мқҙ мһ¬мӢңлҸ„ мҡ”мІӯм—җлҠ” нҢҢмқјмқ„ лӢӨмӢң мІЁл¶Җн•ҳм§Җ м•ҠмқҢ вҖ” м•Ҳ к·ёлҹ¬л©ҙ нҢҢмқј нҶ нҒ° л№„мҡ©мқҙ к·ёлҢҖлЎң л‘җ лІҲ лӮҳк°ҖкІҢ лҗЁ.
async function regenerateIfByteOff(target,text,cost){
  const actual=bytes(text);
  if(Math.abs(actual-target)<=100)return{text,cost,retried:false};
  const adjustPrompt=`лӢӨмқҢ кёҖмқҳ л¶„лҹүмқ„ мЎ°м •н•ҙ мЈјм„ёмҡ”. лӮҙмҡ©кіј л¬ёмІҙлҠ” к·ёлҢҖлЎң мң м§Җн•ҳкі , л¶„лҹүл§Ң ${target}л°”мқҙнҠё(н—Ҳмҡ©лІ”мң„ ${Math.max(0,target-100)}~${target+100}л°”мқҙнҠё, лӮҳмқҙмҠӨ кё°мӨҖ н•ңкёҖ 1мһҗ=3л°”мқҙнҠёлЎң кі„мӮ°)м—җ л§һкІҢ ${actual>target?'м••м¶•н•ҙм„ң мӨ„м—¬':'м„ёл¶Җ лӮҙмҡ©мқ„ ліҙк°•н•ҙм„ң лҠҳл Ө'} мЈјм„ёмҡ”. м••м¶•н•  л•ҢлҠ” к°ҷмқҖ нҸүк°Җм„ұ м–ҙнңҳ(мқёмғҒм Ғмһ„, л‘җл“ңлҹ¬м§җ л“ұ)к°Җ л°ҳліөлҗҳм§Җ м•ҠлҸ„лЎқ м •лҰ¬н•ҳкі , к°„кІ°н•ҳкі  к°қкҙҖм Ғмқё л¬ёмІҙлҘј мң м§Җн•ҳм„ёмҡ”. мғҲлЎңмҡҙ нҸүк°Җ н‘ңнҳ„мқҙлӮҳ мғҲлЎңмҡҙ нҷңлҸҷ лӮҙмҡ©мқ„ м¶”к°Җн•ҳм§Җ л§Ҳм„ёмҡ”.

[мӣҗліё кёҖ] (нҳ„мһ¬ ${actual}л°”мқҙнҠё):
${text}

кІ°кіјл§Ң м¶ңл Ҙн•ҳм„ёмҡ”.`;
  try{
    const r2=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,prompt:adjustPrompt,fileOld:null,fileRefs:[],fileExample:null})});
    const d2=await r2.json();
    if(!d2.error&&d2.result)return{text:d2.result,cost:cost+(d2.cost||0),retried:true};
  }catch(e){}
  return{text,cost,retried:false};
}

// PPTXлҠ” base64 л¬ём„ңк°Җ м•„лӢҲлқј мқҙлҜё м¶”м¶ңлҗң мқјл°ҳ н…ҚмҠӨнҠё(extractedText)лЎң м ҖмһҘлҸј мһҲмқҢ.
// мқҙкұҙ мҠ¬лқјмқҙл“ңм—җ мӢӨм ңлЎң м ҒнһҢ н…ҚмҠӨнҠё к·ёлҢҖлЎңлқј мҶҗкёҖм”Ё OCRкіј лӢ¬лҰ¬ 100% м •нҷ•н•ҳлҜҖлЎң,
// "м§Җм–ҙлӮҙм§Җ л§җ кІғ" кІҪкі  м—Ҷмқҙ к·ёлҢҖлЎң мӢ лў°н•ҳкі  м“°лҸ„лЎқ н”„лЎ¬н”„нҠём—җ л„Јм–ҙмӨҢ.
function extractedTextBlock(files){
  const parts=[];
  if(files.old?.extractedText)parts.push(`[кё°мЎҙ мғқкё°л¶Җ(PPTX) м¶”м¶ң н…ҚмҠӨнҠё]:\n${files.old.extractedText}`);
  (files.refs||[]).forEach((r,i)=>{
    if(!r)return;
    if(r.type==='text'&&r.extractedText)parts.push(`[м°ёкі мһҗлЈҢ${i+1} вҖ” н•ҷмғқмқҙ м§Ғм ‘ мһ‘м„ұн•ң мҲҳм—… мҶҢк°җ м„Өл¬ё мқ‘лӢөмһ…лӢҲлӢӨ]\nмқҙ мһҗлЈҢлҠ” н•ҷмғқмқҙ м§Ғм ‘ м“ҙ мҶҢк°җмқҙлҜҖлЎң м„Өл¬ём—җ м—ҶлҠ” нҷңлҸҷВ·нғҗкө¬В·л¶„м„қВ·лӮҙл©ҙнҷ”лҘј м¶”к°Җн•ҳм§Җ л§җкі , н•ҷмғқмқҙ м§Ғм ‘ м–ёкёүн•ң лӮҙмҡ©л§Ң мһ¬кө¬м„ұн•  кІғ.\n---\n${r.extractedText}`);
    else if(r.type==='txt'&&r.extractedText)parts.push(`[м°ёкі мһҗлЈҢ${i+1} вҖ” н•ҷмғқ л°ңн‘ң мқҢм„ұ мқёмӢқ н…ҚмҠӨнҠё(мҳҲ: нҒҙлЎңл°”л…ёнҠё) мӣҗл¬ёмһ…лӢҲлӢӨ]\nмқҙ мһҗлЈҢлҠ” л°ңн‘ңлҘј к·ёлҢҖлЎң мҳ®кІЁ м ҒмқҖ н…ҚмҠӨнҠёмқҙлҜҖлЎң мӢӨм ңлЎң м–ёкёүлҗң лӮҙмҡ©л§Ң нҷңмҡ©н•ҳкі , м—¬кё° м—ҶлҠ” лӮҙмҡ©мқ„ м§Җм–ҙлӮҙм§Җ л§җ кІғ. мқҢм„ұ мқёмӢқ нҠ№м„ұмғҒ мҳӨнғҲмһҗВ·лқ„м–ҙм“°кё° мҳӨлҘҳк°Җ мһҲмқ„ мҲҳ мһҲмңјлӢҲ л¬ёл§ҘмғҒ мһҗм—°мҠӨлҹҪкІҢ мқҙн•ҙн•  кІғ.\n---\n${r.extractedText}`);
    else if(r.extractedText)parts.push(`[м°ёкі мһҗлЈҢ${i+1}(PPTX) м¶”м¶ң н…ҚмҠӨнҠё]:\n${r.extractedText}`);
  });
  return parts.join('\n\n');
}

function updBC(){

  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result||'');const pct=Math.min(100,Math.round(b/t*100));
  const el=document.getElementById('byteInfo'),fill=document.getElementById('byteFill');
  if(el){el.textContent=`${b} / ${t}`;el.className='byte-info '+(b>t?'ov':'');}

}

const analyzedFilesMap={};

function getAnalyzedFiles(){

  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};

  return analyzedFilesMap[key];
}

// нҢҢмқј лҚ°мқҙн„°(files.old/files.refs[i])м—җ focus н•„л“ңлЎң к°ҷмқҙ м ҖмһҘн•ҙм„ң мғҲлЎңкі м№Ён•ҙлҸ„ лӮЁкІҢ н•Ё.
let focusSaveTimer=null;
function updateFocus(type,idx){
  const files=getAnalyzedFiles();
  const val=type==='old'?(document.getElementById('focusOld')?.value||''):(document.getElementById(`focusRef${idx}`)?.value||'');
  if(type==='old'){ if(files.old)files.old.focus=val; }
  else{ if(files.refs&&files.refs[idx])files.refs[idx].focus=val; }
  clearTimeout(focusSaveTimer);
  focusSaveTimer=setTimeout(()=>persistFiles(),500);
}

function triggerFile(type,idx=0){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx,.txt';
  inp.onchange=()=>{if(inp.files[0])processFile(inp.files[0],type,idx);};
  inp.click();
}

function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,idx=0){
  e.preventDefault();
  const id=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  document.getElementById(id)?.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f,type,idx);
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  const isPptx=/\.pptx$/i.test(file.name);
  const isTxt=/\.txt$/i.test(file.name);
  const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
  if(isLegacyPpt){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">вқҢ кө¬лІ„м „ .pptлҠ” м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”. .pptxлЎң лӢӨмӢң м ҖмһҘн•ң нӣ„ мҳ¬л ӨмЈјм„ёмҡ”.</div>';
    if(dropEl)dropEl.classList.remove('loading');
    return;
  }
  if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#aaa;margin-top:6px;">рҹ“– ${isPptx?'мҠ¬лқјмқҙл“ң н…ҚмҠӨнҠё м¶”м¶ң мӨ‘...':isTxt?'н…ҚмҠӨнҠё мқҪлҠ” мӨ‘...':'нҢҢмқј мқҪлҠ” мӨ‘...'}</div>`;
  try{
    const files=getAnalyzedFiles();
    let fileData;
    if(isPptx){
      const extractedText=await extractPptxText(file);
      fileData={name:file.name,type:'pptx',extractedText};
    }else if(isTxt){
      const extractedText=await file.text();
      fileData={name:file.name,type:'txt',extractedText};
    }else{
      const base64=await fileToBase64(file);
      fileData={name:file.name,base64,type:file.type||'application/pdf'};
    }

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorageм—җ м ҖмһҘ (мғҲлЎңкі м№Ё нӣ„м—җлҸ„ мң м§Җ)
    persistFiles();

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div style="font-size:11px;color:#cf1322;margin-top:6px;">вқҢ нҢҢмқј мқҪкё° мӢӨнҢЁ: ${e.message||''}</div>`;
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else{
    // нҸј мқ‘лӢө(type==='text') нҢҢмқјмқ„ м§Җмҡ°л©ҙ мҙҲлЎқмғү н‘ңмӢңлҸ„ к°ҷмқҙ м ңкұ°
    if(files.refs[idx]?.type==='text'){
      const s=getStu();
      if(s){formResponseIds.delete(String(s.id));localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));}
    }
    files.refs[idx]=null;
  }
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const el=document.getElementById(resultId);if(el)el.innerHTML='';
  persistFiles();
  renderSb(); // мӮ¬мқҙл“ңл°” лІҲнҳё мғүмғҒ мҰүмӢң к°ұмӢ 
}

function removeRefSlot(idx){
  const files=getAnalyzedFiles();
  if(files.refs[idx]?.type==='text'){
    const s=getStu();
    if(s){formResponseIds.delete(String(s.id));localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));}
  }
  files.refs.splice(idx,1);
  if(files.refs.length===0)files.refs=[null];
  persistFiles();
  renderRefSlots();
  renderSb();
}

        <span onclick="openFilePreview('ref',${i})" style="font-size:11px;padding:2px 7px;border:1px solid #378ADD;border-radius:4px;cursor:pointer;background:#f0f7ff;color:#378ADD;white-space:nowrap;">м—ҙкё°</span>

function triggerMultiRef(){document.getElementById('multiRefInput')?.click();}

function onMultiRefDrop(e){
  e.preventDefault();
  document.getElementById('multiRefDrop')?.classList.remove('drag-over');
  onMultiRefPick(e.dataTransfer.files);
}

async function onMultiRefPick(fileList){
  const files=getAnalyzedFiles();
  const arr=Array.from(fileList);
  for(const file of arr){
    const filled=files.refs.filter(f=>f).length;
    if(filled>=5){showToast('м°ёкі мһҗлЈҢлҠ” мөңлҢҖ 5к°ңк№Ңм§Җ м¶”к°Җн•  мҲҳ мһҲм–ҙмҡ”.');break;}
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    const isLegacyPpt=/\.ppt$/i.test(file.name)&&!isPptx;
    if(isLegacyPpt){showToast('кө¬лІ„м „ .pptлҠ” м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”.');continue;}
    let fileData;
    if(isPptx){const extractedText=await extractPptxText(file);fileData={name:file.name,type:'pptx',extractedText};}
    else if(isTxt){const extractedText=await file.text();fileData={name:file.name,type:'txt',extractedText};}
    else{const base64=await fileToBase64(file);fileData={name:file.name,base64,type:file.type||'application/pdf'};}
    // л№Ҳ мҠ¬лЎҜм—җ мұ„мҡ°кё°
    let idx=files.refs.findIndex(r=>!r);
    if(idx===-1){files.refs.push(null);idx=files.refs.length-1;}
    files.refs[idx]=fileData;
  }
  persistFiles();
  renderRefSlots();
  renderFileStatus();
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// м°ёкі мһҗлЈҢ(л°Ҹ кё°мЎҙ мғқкё°л¶Җ) нҢҢмқјмқ„ нҒҙлҰӯн•ҙм„ң л°”лЎң м—ҙм–ҙліј мҲҳ мһҲкІҢ н•ҙмӨҢ.
// PDF/мқҙлҜём§ҖлҠ” base64лҘј blobмңјлЎң л°”кҝ”м„ң мғҲ нғӯмңјлЎң м—ҙкі , PPTXлҠ” м¶”м¶ңлҗң н…ҚмҠӨнҠёлҘј лӘЁлӢ¬лЎң ліҙм—¬мӨҢ
// (лёҢлқјмҡ°м Җк°Җ PPTX мһҗмІҙлҘј лӘ» м—ҙкё° л•Ңл¬ё).
function openFilePreview(type,idx){
  const files=getAnalyzedFiles();
  const f=type==='old'?files.old:type==='example'?files.example:files.refs[idx];
  if(!f){alert('нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.');return;}
  if(f.type==='pptx'||f.extractedText){
    const d=document.createElement('div');d.className='modal-bg';d.id='mc';d.onclick=e=>{if(e.target===d)closeModal();};
    d.innerHTML=`<div class="modal wide"><h3>рҹ“„ ${f.name}</h3>
      <p style="font-size:11px;color:#aaa;margin-bottom:8px;">${f.type==='txt'?'н…ҚмҠӨнҠё нҢҢмқј лӮҙмҡ©мқҙм—җмҡ”.':'PPTXлҠ” лҜёлҰ¬ліҙкё°к°Җ м•Ҳ лҸјм„ң, м¶”м¶ңлҗң н…ҚмҠӨнҠёлҘј лҢҖмӢ  ліҙм—¬л“ңл Өмҡ”.'}</p>
      <textarea readonly style="width:100%;height:50vh;font-size:13px;line-height:1.6;border:1px solid #e0e0ee;border-radius:7px;padding:10px;background:#f8f8ff;font-family:'Malgun Gothic',sans-serif;">${(f.extractedText||'').replace(/</g,'&lt;')}</textarea>
      <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">лӢ«кё°</button></div>
    </div>`;
    document.getElementById('app').appendChild(d);
    return;
  }
  if(!f.base64){alert('лҜёлҰ¬ліј мҲҳ мһҲлҠ” нҢҢмқјмқҙ м•„лӢҲм—җмҡ”.');return;}
  try{
    const byteChars=atob(f.base64);
    const byteNums=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)byteNums[i]=byteChars.charCodeAt(i);
    const byteArr=new Uint8Array(byteNums);
    const blob=new Blob([byteArr],{type:f.type||'application/pdf'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){alert('нҢҢмқјмқ„ м—¬лҠ” лҚ° мӢӨнҢЁн–Ҳм–ҙмҡ”.');}
}

// PPTXлҠ” Claude APIк°Җ PDFмІҳлҹј м§Ғм ‘ мқҪмқ„ мҲҳ м—Ҷм–ҙм„ң(кіөмӢқ лҜём§Җмӣҗ, ліҖнҷҳ н•„мҡ”),
// ZIP м•Ҳмқҳ мҠ¬лқјмқҙл“ң XML(ppt/slides/slideN.xml)м—җм„ң н…ҚмҠӨнҠёлҘј м§Ғм ‘ м¶”м¶ңн•ҙ мқјл°ҳ н…ҚмҠӨнҠёлЎң л„ҳк№Җ.
// мқҙлҜём§Җк°Җ м•„лӢҲлқј мӢӨм ң мҠ¬лқјмқҙл“ң н…ҚмҠӨнҠё к·ёлҢҖлЎңлқјм„ң мҶҗкёҖм”Ё OCRліҙлӢӨ нӣЁм”¬ м •нҷ•н•Ё.
async function extractPptxText(file){
  const zip=await JSZip.loadAsync(file);
  const slideFiles=Object.keys(zip.files)
    .filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n))
    .sort((a,b)=>{
      const na=parseInt(a.match(/slide(\d+)\.xml/)[1]);
      const nb=parseInt(b.match(/slide(\d+)\.xml/)[1]);
      return na-nb;
    });
  if(!slideFiles.length)throw new Error('мҠ¬лқјмқҙл“ңлҘј м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ” (.ppt кө¬лІ„м „ нҳ•мӢқмқҖ м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”. .pptxлЎң м ҖмһҘ нӣ„ лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”)');
  const parser=new DOMParser();
  const slideTexts=[];
  for(let i=0;i<slideFiles.length;i++){
    const xml=await zip.files[slideFiles[i]].async('string');
    const doc=parser.parseFromString(xml,'application/xml');
    const tNodes=doc.getElementsByTagName('a:t');
    const text=Array.from(tNodes).map(n=>n.textContent).join(' ').trim();
    if(text)slideTexts.push(`[мҠ¬лқјмқҙл“ң ${i+1}]\n${text}`);
  }
  return slideTexts.join('\n\n')||'(н…ҚмҠӨнҠёлҘј м°ҫмқ„ мҲҳ м—ҶлҠ” мҠ¬лқјмқҙл“ңмһ…лӢҲлӢӨ)';
}

// кёҖмһҗ мў…лҘҳл§Ң л№„көҗн•ҳл©ҙ нқ”н•ң мЎ°мӮ¬/м–ҙлҜё л•Ңл¬ём—җ кұ°мқҳ н•ӯмғҒ лҶ’кІҢ лӮҳмҳҙ.
// лҢҖмӢ  4кёҖмһҗ лӢЁмң„лЎң мқҙм–ҙл¶ҷмқё мЎ°к°Ғ(n-gram, н‘ңм Ҳ кІҖмӮ¬м—җ нқ”нһҲ м“°лҠ” shingling л°©мӢқ)мқҳ м§‘н•©мқ„ л№„көҗн•ҙм„ң,
// мӢӨм ңлЎң к°ҷмқҖ л¬ёкө¬к°Җ л°ҳліөлҗҗлҠ”м§ҖлҘј мһЎм•„лғ„.
function ngramSet(text,n=4){
  const clean=(text||'').replace(/\s+/g,'');
  const set=new Set();
  for(let i=0;i<=clean.length-n;i++)set.add(clean.slice(i,i+n));
  return set;
}
// 2026 н•ҷкөҗмғқнҷңкё°лЎқл¶Җ кё°мһ¬мҡ”л №(көҗмңЎл¶Җ/мӢңлҸ„көҗмңЎмІӯ кіөнҶө, '01. н•ҷкөҗмғқнҷңкё°лЎқл¶Җ мһ‘м„ұ мӢң мң мқҳмӮ¬н•ӯ' к°Җ~нҢҢ н•ӯлӘ©) кё°мӨҖмңјлЎң кө¬м„ұ.
// н•ҷкөҗл§ҲлӢӨ м¶”к°Җн•ҳкі  мӢ¶мқҖ лӢЁм–ҙлҠ” кё°ліё м„Өм •мқҳ "кёҲм§Җм–ҙ м¶”к°Җ" м№ём—җм„ң л”°лЎң л„Јмқ„ мҲҳ мһҲмқҢ.

  // лӢӨ. көҗмҷёмғҒ(н‘ңм°ҪмһҘ, к°җмӮ¬мһҘ, кіөлЎңмғҒ л“ұлҸ„ кё°мһ¬ л¶Ҳк°Җ)

  'лӘЁмқҳкі мӮ¬','м „көӯм—°н•©н•ҷл ҘнҸүк°Җ','мӣҗм җмҲҳ','м„қм°Ёл“ұкёү','л°ұл¶„мң„',

  'л…јл¬ё','н•ҷнҡҢм§Җ','мҶҢл…јл¬ё','лҸ„м„ңм¶ңк°„','нҠ№н—Ҳ','мӢӨмҡ©мӢ м•Ҳ','мғҒн‘ңк¶Ң',

const FORBIDDEN_PATTERNS=[
  {label:'мӮ¬көҗмңЎкё°кҙҖлӘ… мқҳмӢ¬(лӮҳмқҙмҠӨ кё°мһ¬мҡ”л № нғҖн•ӯ)',regex:/[к°Җ-нһЈA-Za-z0-9]{1,8}(н•ҷмӣҗ|м–ҙн•ҷмӣҗ|көҗмҠөмҶҢ)/g},
  {label:'мқёмҰқмӢңн—ҳ м җмҲҳ мқҳмӢ¬(к°Җн•ӯ)',regex:/(нҶ мқө|нҶ н”Ң|н…қмҠӨ|HSK|JPT|JLPT|DELE)\s*[:\s]*\d+/g},
  {label:'л¶ҖлӘЁ м§Ғм—…В·м§Җмң„ м•”мӢң мқҳмӢ¬(м°Ён•ӯ)',regex:/(м•„лІ„м§Җ|м–ҙлЁёлӢҲ|л¶ҖлӘЁлӢҳ)\s*(мқҖ|лҠ”|мқҙ|к°Җ)?\s*(мқҳмӮ¬|ліҖнҳёмӮ¬|нҢҗмӮ¬|кІҖмӮ¬|көҗмҲҳ|лҢҖн‘ң|мӮ¬мһҘ|кіөл¬ҙмӣҗ|нҡҢмӮ¬мӣҗ|мһ„мӣҗ|м•ҪмӮ¬|к°„нҳёмӮ¬|кө°мқё|кІҪм°°)/g},
  {label:'нҠ№м • лҢҖн•ҷлӘ… мқҳмӢ¬(нғҖн•ӯ)',regex:/[к°Җ-нһЈ]{2,6}лҢҖн•ҷкөҗ/g}
];
function getCustomForbidden(){
  return (style.customForbidden||'').split('\n').map(w=>w.trim()).filter(Boolean);
}
function checkForbidden(text){
  if(!text)return[];
  const found=[];
  [...FORBIDDEN_WORDS_DEFAULT,...getCustomForbidden()].forEach(w=>{
    if(w&&text.includes(w))found.push(w);
  });
  FORBIDDEN_PATTERNS.forEach(p=>{
    const m=text.match(p.regex);
    if(m)found.push(...new Set(m.map(x=>`${p.label}("${x.trim()}")`)));
  });
  // 4. н•ҷкөҗлҘј м•Ң мҲҳ мһҲлҠ” лӮҙмҡ©(н•ҷкөҗлӘ… л“ұ) кё°мһ¬ л¶Ҳк°Җ вҖ” м„Өм •м—җ мһ…л Ҙн•ҙл‘” н•ҷкөҗ мқҙлҰ„кіј лҢҖмЎ°
  if(profile.school&&text.includes(profile.school))found.push(`н•ҷкөҗлӘ… л…ём¶ң мқҳмӢ¬("${profile.school}")`);
  return[...new Set(found)];
}

function similarity(a,b){
  if(!a||!b)return 0;
  const setA=ngramSet(a),setB=ngramSet(b);
  if(!setA.size||!setB.size)return 0;
  let inter=0;setA.forEach(g=>{if(setB.has(g))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> мғқкё°л¶ҖлҘј лЁјм Җ мғқм„ұн•ҙ мЈјм„ёмҡ”</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbiddenFound=checkForbidden(s.result);
  const hasForbidden=forbiddenFound.length>0;
  const others=allStudents().filter(os=>os.id!==s.id&&os.result);
  let simWarns=[];
  others.forEach(os=>{const sim=similarity(s.result,os.result);if(sim>0.35)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);});
  const omiOk=s.result.includes('мһ„')&&(s.result.includes('мқҢ')||s.result.includes('н•Ё'));

async function saveVersion(text,label=''){
  const s=getStu();if(!s||!text)return;
  const now=new Date();
  const dateStr=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  s.versions=s.versions||[];
  const isAuto=(label||'').trim()==='мһҗлҸҷмғқм„ұ';
  const name=isAuto?koreanOrdinal(s.versions.length+1)+' мғқм„ұ':label;
  s.versions.unshift({name,dateStr,text,ts:Date.now()});
  if(s.versions.length>15)s.versions.pop();
  await sb.from('students').update({result:text,status:'wip',versions:JSON.stringify(s.versions)}).eq('id',s.id);
}

function parseFormCsv(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result.replace(/^\uFEFF/,''); // BOM м ңкұ°

    // CSV м „мІҙлҘј л”°мҳҙн‘ң мқёмӢқн•ҳл©° н–ү л¶„лҰ¬ (м…Җ м•Ҳм—җ мӨ„л°”кҝҲмқҙ мһҲм–ҙлҸ„ мҳ¬л°”лҘҙкІҢ мІҳлҰ¬)
    function parseCsvFull(raw){
      const rows=[];let cur=[];let cell='';let inQ=false;
      for(let i=0;i<raw.length;i++){
        const c=raw[i];
        if(c==='"'){
          if(inQ&&raw[i+1]==='"'){cell+='"';i++;}
          else inQ=!inQ;
        } else if(c===','&&!inQ){cur.push(cell);cell='';}
        else if((c==='\n'||c==='\r')&&!inQ){
          if(c==='\r'&&raw[i+1]==='\n')i++;
          cur.push(cell);cell='';
          if(cur.some(v=>v.trim()))rows.push(cur);
          cur=[];
        } else cell+=c;
      }
      cur.push(cell);
      if(cur.some(v=>v.trim()))rows.push(cur);
      return rows;
    }

    const rawRows=parseCsvFull(text);
    if(rawRows.length<2){alert('лҚ°мқҙн„°к°Җ м—Ҷм–ҙмҡ”. CSV нҢҢмқјмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');return;}

    // н•ҷмғқ лӢөліҖ м•Ҳм—җ мӨ„л°”кҝҲмқҙ мһҲмқ„ л•Ң CSV н–үмқҙ мӘјк°ңм§ҖлҠ” л¬ём ң ліҙм •.
    // н—ӨлҚ” м—ҙ мҲҳліҙлӢӨ м ҒмқҖ м—ҙмқ„ к°Җм§„ н–үмқҖ мқҙм „ н–үмқҳ л§Ҳм§Җл§ү м…Җм—җ мқҙм–ҙ л¶ҷмһ„.
    const headerLen=rawRows[0].length;
    const allRows=[rawRows[0]];
    for(let i=1;i<rawRows.length;i++){
      if(rawRows[i].length<headerLen&&allRows.length>1){
        const prev=allRows[allRows.length-1];
        prev[prev.length-1]+='\n'+rawRows[i].join(',');
      }else{
        allRows.push(rawRows[i]);
      }
    }

    const headers=allRows[0].map(h=>h.trim());
    const dataRows=allRows.slice(1);

    // мқҙлҰ„/л°ҳ м—ҙ мһҗлҸҷ к°җм§Җ (лҢҖмҶҢл¬ёмһҗ/кіөл°ұ л¬ҙмӢң)
    const nameIdx=headers.findIndex(h=>/мқҙлҰ„|name/i.test(h));
    const clsIdx=headers.findIndex(h=>/мҲҳк°•л°ҳ|л°ҳ|class/i.test(h));
    if(nameIdx<0){
      alert('CSVм—җм„ң "мқҙлҰ„" м—ҙмқ„ м°ҫмқ„ мҲҳ м—Ҷм–ҙмҡ”.\n\nл°ңкІ¬лҗң м—ҙ: '+headers.join(', '));
      return;
    }

    // м ңмҷён•  м—ҙ: нғҖмһ„мҠӨнғ¬н”„, мқҙлҰ„, л°ҳ, н•ҷлІҲ л“ұ л©”лӘЁм—җ л¶Ҳн•„мҡ”н•ң м—ҙ
    const skipIdxs=new Set([nameIdx,clsIdx].filter(i=>i>=0));
    headers.forEach((h,i)=>{
      if(/нғҖмһ„мҠӨнғ¬н”„|timestamp|н•ҷлІҲ|email|мқҙл©”мқј/i.test(h.trim()))skipIdxs.add(i);
    });

    // лӮҳлЁём§Җ м—ҙ = м§Ҳл¬ё н•ӯлӘ©
    const qIdxs=headers.map((h,i)=>i).filter(i=>!skipIdxs.has(i));

    formImportRows=dataRows.map(cols=>{
      const rawName=(cols[nameIdx]||'').trim();
      // "20226 мқҙн•ҳмқҖ" лҳҗлҠ” "20226мқҙн•ҳмқҖ" мІҳлҹј н•ҷлІҲмқҙ м•һм—җ л¶ҷмқҖ кІҪмҡ° мҲ«мһҗ м ңкұ°
      const name=rawName.replace(/^\d+\s*/,'').replace(/^\d+/,'').trim();
      const cls=clsIdx>=0?(cols[clsIdx]||'').trim():'';
      const qs={};
      qIdxs.forEach(i=>{
        const q=(headers[i]||'').trim();
        const a=(cols[i]||'').trim();
        if(q&&a)qs[q]=a;
      });
      return{name,cls,qs,chosenId:null};
    }).filter(r=>r.name);

    renderFormMatchTable();
    document.getElementById('fStep1').style.display='none';
    document.getElementById('fStep2').style.display='block';
  };
  reader.readAsText(file,'utf-8');
}

// нҸј CSV н–үмқ„ н•ҷмғқкіј л§Өм№ӯ. к°ҷмқҖ мқҙлҰ„мқҙ м—¬лҹ¬ л°ҳм—җ мһҲмңјл©ҙ л°°м—ҙлЎң л°ҳнҷҳ (м„ нғқ н•„мҡ”).
// н•ҳлӮҳл§Ң мһҲмңјл©ҙ к·ё н•ҷмғқ, м—Ҷмңјл©ҙ null.
function matchFormRowAll(r){
  let all=allStudents();
  if(formImportClsFilter.size>0){
    all=all.filter(s=>{
      const cls=classes.find(c=>c.students.some(st=>st.id===s.id));
      return cls&&formImportClsFilter.has(cls.name);
    });
  }
  const rName=r.name.replace(/\s/g,'');
  let found=all.filter(s=>s.name.replace(/\s/g,'')===rName);
  if(!found.length){
    const candidates=all.filter(s=>rName.includes(s.name.replace(/\s/g,''))||s.name.replace(/\s/g,'').includes(rName));
    const maxLen=candidates.length?Math.max(...candidates.map(s=>s.name.length)):0;
    found=candidates.filter(s=>s.name.length===maxLen);
  }
  if(!found.length)return null;
  if(found.length===1)return found[0];
  return found; // м—¬лҹ¬ л°ҳм—җ кұёміҗ мһҲлҠ” кІҪмҡ°
}
function matchFormRow(r){
  const result=matchFormRowAll(r);
  if(!result)return null;
  if(Array.isArray(result))return result[0]; // м„ нғқ м•Ҳ лҗң кІҪмҡ°м—” мІ« лІҲм§ё (applyFormImportм—җм„ң chosenIdлЎң мҳӨлІ„лқјмқҙл“ң)
  return result;
}

function renderFormMatchTable(){

    const clsSelect=isDup?`<select onchange="formImportRows[${ri}].chosenId=parseInt(this.value)||'';renderFormMatchTable();" style="font-size:11px;padding:2px 5px;border:1px solid #e0e0ee;border-radius:5px;background:#f8f8ff;margin-top:3px;width:100%;">
      <option value="">л°ҳ м„ нғқ...</option>
      ${result.map(s=>{const cls=classes.find(c=>c.students.some(st=>st.id===s.id));return`<option value="${s.id}" ${r.chosenId===s.id?'selected':''}>${cls?cls.name:''} ${s.number}лІҲ</option>`;}).join('')}
    </select>`:'';
    return `<div style="display:grid;grid-template-columns:90px 70px minmax(0,1fr) 64px;padding:7px 12px;border-bottom:0.5px solid var(--border);align-items:center;gap:4px;">

      ${badge}
    </div>`;
  }).join('');

  // chosenId мһҲлҠ” мӨ‘ліө н•ҷмғқлҸ„ matchedлЎң м№ҙмҡҙнҠё
  const totalMatched=formImportRows.filter(r=>{
    const result=matchFormRowAll(r);
    if(Array.isArray(result))return!!r.chosenId;
    return!!result;
  }).length;

  document.getElementById('fMatchTable').innerHTML=rows;
  const badge=document.getElementById('fMatchBadge');
  badge.textContent=`${totalMatched}лӘ… л§Өм№ӯ`;
  badge.style.cssText=`font-size:12px;padding:2px 10px;border-radius:var(--radius);background:var(--bg-success);color:var(--text-success);`;
  const btn=document.getElementById('fApplyBtn');

  btn.disabled=totalMatched===0;
}

    const result=matchFormRowAll(r);
    if(Array.isArray(result)){
      // м—¬лҹ¬ л°ҳм—җ мһҲлҠ” кІҪмҡ° вҖ” chosenIdлЎң м„ нғқлҗң н•ҷмғқ мӮ¬мҡ©
      if(!r.chosenId){skipped++;continue;}
      stu=allStudents().find(s=>s.id===r.chosenId);
    } else {
      stu=result;
    }
    if(!stu){skipped++;continue;}
    idx++;
    if(btn)btn.textContent=`м ҖмһҘ мӨ‘... (${idx}/${total})`;

    const formText=Object.entries(r.qs)
      .filter(([q,a])=>a)
      .map(([q,a])=>`[${q}]\n${a}`)
      .join('\n\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n\n');

    const refObj={
      name:`нҸјмқ‘лӢө_${stu.name}.txt`,
      type:'text',
      base64:null,
      extractedText:formText,
      focus:''
    };

    const key=`files_${stu.id}_${tabId}`;
    let fileData={old:null,refs:[null],example:null};
    try{const v=await idbGet(key);if(v)fileData=v;}catch(e){}
    if(!Array.isArray(fileData.refs))fileData.refs=[null];

    if(mode==='replace'){
      // кё°мЎҙ нҸј мқ‘лӢө м°ёкі мһҗлЈҢ көҗмІҙ, м—Ҷмңјл©ҙ л№Ҳ мҠ¬лЎҜм—җ м¶”к°Җ
      const existIdx=fileData.refs.findIndex(r=>r&&r.type==='text');
      if(existIdx>=0){fileData.refs[existIdx]=refObj;}
      else{
        const nullIdx=fileData.refs.findIndex(r=>!r);
        if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
        else if(fileData.refs.length<5){fileData.refs.push(refObj);}
        else{fileData.refs[fileData.refs.length-1]=refObj;} // кҪү м°јмңјл©ҙ л§Ҳм§Җл§ү мҠ¬лЎҜ
      }
    } else {
      // м¶”к°Җ: л№Ҳ мҠ¬лЎҜм—җ л„Јкё°
      const nullIdx=fileData.refs.findIndex(r=>!r);
      if(nullIdx>=0){fileData.refs[nullIdx]=refObj;}
      else if(fileData.refs.length<5){fileData.refs.push(refObj);}
      else{skipped++;continue;} // м°ёкі мһҗлЈҢ 5к°ң кҪү м°јмңјл©ҙ кұҙл„ҲлңҖ
    }

    await idbSet(key,fileData);
    await refreshStudentFileFlag(stu.id);
    formResponseIds.add(String(stu.id));
    done++;
  }

  localStorage.setItem(FORM_RESP_KEY,JSON.stringify([...formResponseIds]));
  document.getElementById('fStep2').style.display='none';
  document.getElementById('fStep3').style.display='block';
  const msg=document.getElementById('fDoneMsg');
  if(msg)msg.textContent=`${done}лӘ…мқҳ м°ёкі мһҗлЈҢм—җ нҸј мқ‘лӢөмқҙ м ҖмһҘлҗҗм–ҙмҡ”.${skipped?` ${skipped}лӘ…мқҖ кұҙл„Ҳлӣ°м—Ҳм–ҙмҡ”.`:''}`;
}

let excelData=[];
function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">рҹ“Ӣ ${excelData.length}лӘ…: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}
async function importExcel(){

  const dl=document.getElementById('xl-dl')?.value||'';
  let c=classes.find(c=>c.name===clsName);

  for(const s of excelData){
    const{data,error}=await sb.from('students').insert({user_id:user.id,name:s.name,number:s.number,class_name:clsName,memo:'',keywords:'[]',result:'',status:'none',class_deadline:dl}).select().single();

  selCls=clsName;closeModal();renderSb();renderMain();

function getTabResultsForSimilarity(tabType){
  const all=classes.flatMap(c=>c.students.map(s=>({...s,clsName:c.name})));
  const list=[];
  all.forEach(s=>{
    if(simScope!=='all'&&s.clsName!==simScope)return;
    if(tabType==='haengdong'){
      if(s.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:s.result,extra:''});
    }else if(tabType==='setech'){
      let setechData={};try{setechData=JSON.parse(s.setech||'{}');}catch(e){}
      Object.keys(setechData).forEach(subject=>{
        if(setechData[subject]?.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:setechData[subject].result,extra:subject});
      });
    }else{
      let changyeData={};try{changyeData=JSON.parse(s.changye||'{}');}catch(e){}
      if(changyeData[tabType]?.result)list.push({id:s.id,name:s.name,clsName:s.clsName,text:changyeData[tabType].result,extra:''});
    }
  });
  return list;
}

// нҢҢмқјлӘ… л§Өм№ӯ: н•ҷлІҲ(5мһҗлҰ¬) мҡ°м„ , м—Ҷмңјл©ҙ мқҙлҰ„ л¶Җл¶„мқјм№ҳ
// н•ҷмғқ мқҙлҰ„мқҳ н•ңкёҖ л¶Җл¶„л§Ң м¶”м¶ңн•ҙм„ң л№„көҗ (мҳҒл¬ё лі‘кё° м ңкұ°)
function getCoreName(name){return (name||'').replace(/[^к°Җ-нһЈ]/g,'');}

function bulkMatchFile(filename){
  const base=filename.replace(/\.[^.]+$/,''); // нҷ•мһҘмһҗ м ңкұ°
  const numMatch=base.match(/\d{5}/);
  const num=numMatch?numMatch[0]:null;
  const all=allStudentsWithClass();

  // 1м°Ё: н•ҷлІҲмңјлЎң м •нҷ• л§Өм№ӯ
  if(num){
    const byNum=all.filter(s=>String(s.number)===num);
    if(byNum.length===1)return{num,candidates:byNum,autoByNum:true};
    if(byNum.length>1){
      // н•ҷлІҲ л’Ө мқҙлҰ„мңјлЎң м¶”к°Җ кө¬л¶„
      const afterNum=base.slice((numMatch.index||0)+5);
      const byNameToo=byNum.filter(s=>afterNum.includes(getCoreName(s.name)));
      if(byNameToo.length===1)return{num,candidates:byNameToo,autoByNum:true};
      return{num,candidates:byNum.length===1?byNum:byNum,autoByNum:false};
    }
  }

  // 2м°Ё: мқҙлҰ„ л¶Җл¶„мқјм№ҳ (н•ҷлІҲ м—ҶлҠ” нҢҢмқјлӘ…)
  const coreName=getCoreName(base);
  let candidates=all.filter(s=>{
    const sCore=getCoreName(s.name);
    return sCore&&coreName.includes(sCore);
  });
  candidates.sort((a,b)=>getCoreName(b.name).length-getCoreName(a.name).length);
  const maxLen=candidates.length?getCoreName(candidates[0].name).length:0;
  return{num,candidates:candidates.filter(c=>getCoreName(c.name).length===maxLen),autoByNum:false};
}

function addBulkFiles(fileList){
  Array.from(fileList).forEach(file=>{
    const isPdf=/\.pdf$/i.test(file.name);
    const isPptx=/\.pptx$/i.test(file.name);
    const isTxt=/\.txt$/i.test(file.name);
    if(!isPdf&&!isPptx&&!isTxt)return;
    if(bulkUploadFiles.some(f=>f.file.name===file.name&&f.file.size===file.size))return;
    const{num,candidates,autoByNum}=bulkMatchFile(file.name);
    // н•ҷлІҲмңјлЎң мң мқј л§Өм№ӯлҗҳкұ°лӮҳ нӣ„ліҙк°Җ 1лӘ…мқҙл©ҙ мһҗлҸҷ м„ нғқ
    const autoMatch=autoByNum&&candidates.length===1?candidates[0].id:candidates.length===1?candidates[0].id:'';
    bulkUploadFiles.push({file,num,candidates,chosenId:autoMatch,autoByNum});
  });
  renderBulkMatchTable();
}

function setBulkChoice(i,id){ if(bulkUploadFiles[i])bulkUploadFiles[i].chosenId=id; renderBulkMatchTable(); }
function removeBulkFile(i){ bulkUploadFiles.splice(i,1); renderBulkMatchTable(); }

  el.innerHTML=`<div style="max-height:320px;overflow-y:auto;border:1px solid #f0f0f5;border-radius:8px;">
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:#f8f8ff;">
        <th style="padding:7px 9px;text-align:left;color:#888;font-weight:600;">нҢҢмқјлӘ…</th>
        <th style="padding:7px 9px;text-align:left;color:#888;font-weight:600;">н•ҷлІҲ</th>
        <th style="padding:7px 9px;text-align:left;color:#888;font-weight:600;">л§Өм№ӯ н•ҷмғқ</th>
        <th style="padding:7px 9px;text-align:left;color:#888;font-weight:600;">мғҒнғң</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${bulkUploadFiles.map((f,i)=>{
          const all2=allStudentsWithClass().sort((a,b)=>(a.clsName+String(a.number).padStart(2,'0')).localeCompare(b.clsName+String(b.number).padStart(2,'0')));
          const matched=f.chosenId?all2.find(s=>s.id===f.chosenId):null;
          const needManual=!f.chosenId&&f.candidates.length!==1;
          const status=f.chosenId?'вң…':(needManual&&f.candidates.length>1?'вҡ пёҸ лҸҷлӘ…мқҙмқё':'вқҢ л§Өм№ӯм•ҲлҗЁ');
          return`<tr>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.file.name}</td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">${f.num||'<span style="color:#bbb;">-</span>'}</td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;">
              ${matched?
                `<span style="font-size:12px;color:#1a1a2e;">${matched.clsName} ${matched.number}лІҲ ${matched.name}</span>`:
                `<select onchange="setBulkChoice(${i},this.value)" style="font-size:12px;padding:3px 6px;border:1px solid #e0e0ee;border-radius:5px;background:#f8f8ff;max-width:200px;">
                  <option value="">м„ нғқ м•Ҳ н•Ё</option>
                  ${all2.map(s=>`<option value="${s.id}" ${f.chosenId===s.id?'selected':''}>${s.clsName} ${s.number}лІҲ ${s.name}</option>`).join('')}
                </select>`
              }
            </td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;white-space:nowrap;">${status}</td>
            <td style="padding:6px 9px;border-bottom:1px solid #f5f5f5;"><button onclick="removeBulkFile(${i})" style="width:20px;height:20px;border:1px solid #e0e0ee;background:#fff;border-radius:4px;cursor:pointer;color:#bbb;">вң•</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div style="font-size:11px;color:#888;margin-top:6px;">вң… ${bulkUploadFiles.filter(f=>f.chosenId).length}к°ң л§Өм№ӯлҗЁ В· мҙқ ${bulkUploadFiles.length}к°ң</div>`;
  if(btn)btn.style.display='inline-block';
}

// нҳ„мһ¬ м„ нғқлҗң н•ҷмғқ(getStu())м—җ мқҳмЎҙн•ҳм§Җ м•Ҡкі , мһ„мқҳмқҳ studentId кё°мӨҖмңјлЎң нҢҢмқј мғҒнғңлҘј мқҪкі /м ҖмһҘн•ҳлҠ” лІ„м „.
// processFile()/getAnalyzedFiles()мҷҖ мҷ„м „нһҲ к°ҷмқҖ нӮӨ к·ңм№ҷ(analyzedFilesMap, IndexedDB `files_${id}_${tab}`)мқ„
// к·ёлҢҖлЎң мҚЁм„ң, лӮҳмӨ‘м—җ н•ҙлӢ№ н•ҷмғқВ·нғӯмқ„ м§Ғм ‘ м—ҙм–ҙлҸ„ restoreStoredFiles()к°Җ лҳ‘к°ҷмқҙ л¶Ҳлҹ¬мҷҖмӨҢ.
function getAnalyzedFilesFor(studentId,tabId){
  const key=`${studentId}_${tabId}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}
async function persistFilesFor(studentId,tabId){
  const files=getAnalyzedFilesFor(studentId,tabId);
  try{
    await idbSet(`files_${studentId}_${tabId}`,files);
    await refreshStudentFileFlag(studentId);
    return true;
  }catch(e){return false;}
}
async function addRefFileFor(studentId,tabId,fileData){
  const files=getAnalyzedFilesFor(studentId,tabId);
  let idx=files.refs.findIndex(r=>!r);
  if(idx===-1){
    if(files.refs.length>=5)return'full';
    files.refs.push(null);
    idx=files.refs.length-1;
  }
  files.refs[idx]=fileData;
  return(await persistFilesFor(studentId,tabId))?'ok':'storage_full';
}

async function runBulkUpload(){
  const targets=bulkUploadFiles.filter(f=>f.chosenId);
  if(!targets.length){alert('л§Өм№ӯлҗң нҢҢмқјмқҙ м—Ҷм–ҙмҡ”. н•ҷмғқмқ„ лЁјм Җ м„ нғқн•ҙ мЈјм„ёмҡ”.');return;}
  const btn=document.getElementById('bulkUploadBtn');
  btn.disabled=true;
  const mode=window.bulkUploadMode||'add';
  // көҗмІҙ лӘЁл“ң: лЁјм Җ н•ҙлӢ№ н•ҷмғқл“Өмқҳ кё°мЎҙ м°ёкі мһҗлЈҢ л№„мҡ°кё°
  if(mode==='replace'){
    const uniqueIds=[...new Set(targets.map(f=>f.chosenId))];
    for(const sid of uniqueIds){
      const files=getAnalyzedFilesFor(sid,bulkUploadTab);
      files.refs=[null];
      await persistFilesFor(sid,bulkUploadTab);
    }
  }
  let ok=0,full=0,storageFail=0,readFail=0;
  for(let i=0;i<targets.length;i++){
    btn.textContent=`м—…лЎңл“ң мӨ‘... (${i+1}/${targets.length})`;
    const f=targets[i];
    try{
      let fileData;
      if(/\.pptx$/i.test(f.file.name)){
        const extractedText=await extractPptxText(f.file);
        fileData={name:f.file.name,type:'pptx',extractedText};
      }else if(/\.txt$/i.test(f.file.name)){
        const extractedText=await f.file.text();
        fileData={name:f.file.name,type:'txt',extractedText};
      }else{
        const base64=await fileToBase64(f.file);
        fileData={name:f.file.name,base64,type:f.file.type||'application/pdf'};
      }
      const result=await addRefFileFor(f.chosenId,bulkUploadTab,fileData);
      if(result==='ok')ok++; else if(result==='full')full++; else storageFail++;
    }catch(e){readFail++;}
  }
  closeModal();
  renderRefSlots();renderFileStatus();renderSb();
  let msg=`вң… ${ok}к°ң м—…лЎңл“ң мҷ„лЈҢ!`;
  if(full)msg+=`\nвҡ пёҸ ${full}к°ңлҠ” м°ёкі мһҗлЈҢ м№ёмқҙ мқҙлҜё 5к°ң лӢӨ м°Ём„ң лӘ» л„Јм—Ҳм–ҙмҡ”.`;
  if(storageFail)msg+=`\nвқҢ ${storageFail}к°ңлҠ” м ҖмһҘ кіөк°„ н•ңлҸ„лҘј мҙҲкіјн•ҙм„ң мӢӨнҢЁн–Ҳм–ҙмҡ”.`;
  if(readFail)msg+=`\nвқҢ ${readFail}к°ңлҠ” нҢҢмқјмқ„ мқҪм§Җ лӘ»н–Ҳм–ҙмҡ” (кө¬лІ„м „ .pptмқҙкұ°лӮҳ мҶҗмғҒлҗң нҢҢмқјмқј мҲҳ мһҲм–ҙмҡ”).`;
  alert(msg);
}
