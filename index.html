<body>
<div id="root"><div class="loading-wrap"><div class="spin" style="width:24px;height:24px;border:3px solid #e0e0ee;border-top-color:#378ADD;"></div><p>лЎңл”© мӨ‘...</p></div></div>
<script>
const SUPABASE_URL='https://uxycuvpzsyfvsbwnrexv.supabase.co';
const SUPABASE_KEY='sb_publishable_1aMfdIKdr6sUwI0vshYKXw_e9qVrPJj';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
let user=null,apiKey='',profile={school:'',name:'',role:''},style={omi:'~мһ„/~мқҢ/~н•Ё',adverb:'н•ӯмғҒ/л§ӨмӮ¬',tone:'кІ©мӢқмІҙ',example:'',guide:''},classes=[],selCls=null,selStu=null,searchQ='';

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){user=session.user;await loadProfile();await loadClasses();renderApp();}
  else renderLogin();
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){user=null;classes=[];selCls=null;selStu=null;renderLogin();}
  });
}

function renderLogin(tab='login'){
  document.getElementById('root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div class="login-logo"><div class="login-logo-icon">рҹ“ҡ</div><div><div class="login-logo-text">мӢҜлӢӨлҘҙнғҖ</div><div class="login-logo-sub">көҗмӮ¬мҡ© мғқнҷңкё°лЎқл¶Җ мһ‘м„ұ лҸ„кө¬</div></div></div>
    <div class="login-tab">
      <button class="${tab==='login'?'active':''}" onclick="renderLogin('login')">лЎңк·ёмқё</button>
      <button class="${tab==='register'?'active':''}" onclick="renderLogin('register')">нҡҢмӣҗк°Җмһ…</button>
    </div>
    ${tab==='register'?`
      <div class="login-field"><label>н•ҷкөҗ мқҙлҰ„</label><input id="l-school" placeholder="мҳҲ: нҷ”м„ұкі л“ұн•ҷкөҗ"/></div>
      <div class="login-field"><label>м„ мғқлӢҳ мқҙлҰ„</label><input id="l-tname" placeholder="мҳҲ: мөңмҲңмҡ©"/></div>
      <div class="login-field"><label>лӢҙлӢ№ н•ҷл…„/л°ҳ</label><input id="l-role" placeholder="мҳҲ: лӢҙмһ„ В· 2н•ҷл…„ 3л°ҳ"/></div>`:''}
    <div class="login-field"><label>мқҙл©”мқј</label><input id="l-email" type="email" placeholder="example@school.kr"/></div>
    <div class="login-field"><label>л№„л°ҖлІҲнҳё</label><input id="l-pw" type="password" placeholder="6мһҗ мқҙмғҒ"/></div>
    <div id="l-err" class="login-err"></div>
    <button class="login-btn" onclick="${tab==='register'?'doRegister()':'doLogin()'}">
      ${tab==='register'?'нҡҢмӣҗк°Җмһ…':'лЎңк·ёмқё'}
    </button>
  </div></div>`;
  document.getElementById('l-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='register'?doRegister():doLogin();});
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const err=document.getElementById('l-err');err.textContent='лЎңк·ёмқё мӨ‘...';
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;await loadProfile();await loadClasses();renderApp();
}

async function doRegister(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const school=document.getElementById('l-school')?.value.trim()||'',name=document.getElementById('l-tname')?.value.trim()||'',role=document.getElementById('l-role')?.value.trim()||'';
  const err=document.getElementById('l-err');err.textContent='к°Җмһ… мӨ‘...';
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message;return;}
  user=data.user;profile={school,name,role};
  await sb.from('profiles').upsert({id:user.id,school,name,role,api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  await loadClasses();renderApp();
}

async function loadProfile(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('id',user.id).single();
    if(data){profile={school:data.school||'',name:data.name||'',role:data.role||''};apiKey=data.api_key||'';try{if(data.style)style=JSON.parse(data.style);}catch(e){}}
    else await sb.from('profiles').upsert({id:user.id,school:'',name:'',role:'',api_key:'',style:JSON.stringify(style)},{onConflict:'id'});
  }catch(e){}
}

async function saveProfile(){
  await sb.from('profiles').upsert({id:user.id,school:profile.school,name:profile.name,role:profile.role,api_key:apiKey,style:JSON.stringify(style)},{onConflict:'id'});
}

async function doLogout(){await sb.auth.signOut();}

async function loadClasses(){
  const{data}=await sb.from('students').select('*').eq('user_id',user.id).order('class_name').order('number');
  if(!data)return;
  const map={};
  data.forEach(s=>{
    if(!map[s.class_name])map[s.class_name]={name:s.class_name,deadline:s.class_deadline||'',students:[]};
    map[s.class_name].students.push({
      id:s.id,number:s.number||0,name:s.name,memo:s.memo||'',
      keywords:JSON.parse(s.keywords||'[]'),result:s.result||'',
      status:s.status||'none',deadline:s.deadline||'',
      versions:JSON.parse(s.versions||'[]'),
      feedbackHist:JSON.parse(s.feedback_hist||'[]'),
      setech:s.setech||'{}',
      changye:s.changye||'{}',
      storedFiles:s.stored_files||'{}'
    });
  });
  classes=Object.values(map);
  const{data:prof}=await sb.from('profiles').select('byte_target').eq('id',user.id).single();
  if(prof?.byte_target)localStorage.setItem('byteTarget',prof.byte_target);
}

function restoreStoredFiles(){
  const s=getStu();if(!s)return;
  const tabId=getCurTabId();
  const key=`files_${s.id}_${tabId}`;
  try{
    const stored=JSON.parse(localStorage.getItem(key)||'{}');
    if(!stored.old&&!stored.example&&(!stored.refs||!stored.refs.filter(r=>r).length))return;
    const files=getAnalyzedFiles();
    if(stored.old)files.old=stored.old;
    if(stored.example)files.example=stored.example;
    if(stored.refs){files.refs=stored.refs;if(!files.refs.length)files.refs=[null];}
    renderFileStatus();
  }catch(e){}
}

function getStu(){const c=classes.find(c=>c.name===selCls);return c?.students.find(s=>s.id===selStu);}
function allStudents(){return classes.flatMap(c=>c.students);}
function bytes(str){let b=0;for(const c of str){const code=c.charCodeAt(0);if(code>0x7F&&code<=0x7FF)b+=2;else if(code>0x7FF)b+=3;else b+=1;}return b;}
function statusColor(s){return s==='done'?'#52c41a':s==='wip'?'#faad14':'#d9d9d9';}
function statusLabel(s){return s==='done'?'л§Ҳк°җ':s==='wip'?'мһ‘м„ұмӨ‘':'лҜёмһ‘м„ұ';}

function hasStoredFiles(stuId){
  // лӘЁл“  нғӯм—җм„ң нҢҢмқјмқҙ мһҲлҠ”м§Җ нҷ•мқё
  const tabs=['haengdong','setech','jayul','dongari','bongsa','jinro','dokseo'];
  for(const tab of tabs){
    try{
      const stored=JSON.parse(localStorage.getItem(`files_${stuId}_${tab}`)||'{}');
      if(stored.old||stored.example||(stored.refs&&stored.refs.filter(r=>r).length))return true;
    }catch(e){}
  }
  return false;
}

function getEffectiveStatus(s){
  if(s.status==='done')return 'done';
  if(s.result||hasStoredFiles(s.id))return 'wip';
  return 'none';
}
function ddayText(dl){
  if(!dl)return '';
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff<0?'D+'+Math.abs(diff):diff===0?'D-Day':'D-'+diff;
}

let dragSrcIdx=null;
function onClsDragStart(e,idx){dragSrcIdx=idx;e.dataTransfer.effectAllowed='move';}
function onClsDragOver(e,idx){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcIdx===idx)return;
  document.querySelectorAll('.cls-row').forEach((el,i)=>{
    el.style.borderTop=i===idx&&dragSrcIdx!==idx?'2px solid #378ADD':'';
  });
}
function onClsDragLeave(e){
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
}
function onClsDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.cls-row').forEach(el=>el.style.borderTop='');
  if(dragSrcIdx===null||dragSrcIdx===idx)return;
  const moved=classes.splice(dragSrcIdx,1)[0];
  classes.splice(idx,0,moved);
  dragSrcIdx=null;
  renderSb();
}

async function doEditStu(stuId){
  const name=document.getElementById('mi')?.value.trim();const num=parseInt(document.getElementById('mi-num')?.value)||0;
  if(!name)return;
  await sb.from('students').update({name,number:num}).eq('id',stuId);
  const s=allStudents().find(s=>s.id===stuId);if(s){s.name=name;s.number=num;}
  const c=classes.find(c=>c.name===selCls);if(c)c.students.sort((a,b)=>a.number-b.number);
  closeModal();renderSb();renderMain();
}

async function deleteStu(stuId){
  closeCtxMenu();
  const s=allStudents().find(s=>s.id===stuId);
  if(!confirm(`'${s?.name}' н•ҷмғқ лҚ°мқҙн„°лҘј мӮӯм ңн• к№Ңмҡ”?`))return;
  await sb.from('students').delete().eq('id',stuId);
  classes.forEach(c=>{c.students=c.students.filter(s=>s.id!==stuId);});
  if(selStu===stuId)selStu=null;
  renderSb();renderMain();
}

let calWidgetHeight=parseInt(localStorage.getItem('calWidgetHeight')||'0');

function initCalResize(){
  const handle=document.getElementById('calResizeHandle');
  const widget=document.getElementById('calWidget');
  if(!handle||!widget)return;
  let startY,startH;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    startY=e.clientY;
    startH=widget.offsetHeight;
    const onMove=e=>{
      const h=Math.max(150,startH+(e.clientY-startY));
      widget.style.height=h+'px';
      calWidgetHeight=h;
    };
    const onUp=()=>{
      localStorage.setItem('calWidgetHeight',calWidgetHeight);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

async function addDashFile(tabId,file){
  const files=getDashFiles(tabId);
  if(files.length>=10){alert('мөңлҢҖ 10к°ңк№Ңм§Җ м—…лЎңл“ң к°ҖлҠҘн•ҙмҡ”.');return;}
  try{
    const base64=await fileToBase64(file);
    files.push({name:file.name,base64,type:file.type||'application/pdf',id:Date.now()});
    renderDashFileList();
  }catch(e){alert('нҢҢмқј мқҪкё° мӢӨнҢЁ: '+e.message);}
}

function triggerCommonFile(){
  const s=getStu();if(!s)return;
  const files=getCommonFiles(s.id);
  if(files.length>=10){alert('мөңлҢҖ 10к°ңк№Ңм§Җ м—…лЎңл“ң к°ҖлҠҘн•ҙмҡ”.');return;}
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx';inp.multiple=true;
  inp.onchange=()=>Array.from(inp.files).forEach(f=>addCommonFile(s.id,f));
  inp.click();
}

function onCommonDrop(e){
  e.preventDefault();
  const s=getStu();if(!s)return;
  const dz=document.getElementById('commonDropZone');
  if(dz)dz.style.background='#f0f7ff';
  Array.from(e.dataTransfer.files).forEach(f=>addCommonFile(s.id,f));
}

async function addCommonFile(stuId,file){
  const files=getCommonFiles(stuId);
  if(files.length>=10){alert('мөңлҢҖ 10к°ңк№Ңм§Җ м—…лЎңл“ң к°ҖлҠҘн•ҙмҡ”.');return;}
  try{
    const base64=await fileToBase64(file);
    files.push({name:file.name,base64,type:file.type||'application/pdf',id:Date.now()});
    renderCommonFileList(stuId);
  }catch(e){alert('нҢҢмқј мқҪкё° мӢӨнҢЁ: '+e.message);}
}

function removeCommonFile(stuId,id){
  const files=getCommonFiles(stuId);
  const idx=files.findIndex(f=>f.id===id);
  if(idx>-1)files.splice(idx,1);
  renderCommonFileList(stuId);
}

function renderCommonFileList(stuId){
  const container=document.getElementById('commonFileList');if(!container)return;
  const files=getCommonFiles(stuId);
  if(!files.length){container.innerHTML='<p style="font-size:12px;color:#bbb;text-align:center;padding:8px;">м—…лЎңл“ңлҗң нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ</p>';return;}
  container.innerHTML=files.map(f=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8f8ff;border-radius:8px;margin-bottom:6px;border:1px solid #e0e0ee;">

function renderTabChecklist(tabType,label){
  const c=document.getElementById('tabChecklist');if(!c)return;
  const data=getTabData(tabType);
  if(!data.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> мғқм„ұ лІ„нҠјмқ„ лҲҢлҹ¬ мЈјм„ёмҡ”</div>';return;}
  const t=parseInt(document.getElementById('tabByteTarget')?.value||'1000');
  const b=bytes(data.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['мһҘм• ','кІ°мҶҗ','л¬ём ңм•„','л¶Ҳлҹү','л№ҲкіӨ','м ҖлҠҘ','м •мӢ лі‘','ADHD'];
  const hasForbidden=forbidden.some(w=>data.result.includes(w));
  const others=allStudents().filter(os=>os.id!==getStu()?.id);
  let simWarns=[];
  others.forEach(os=>{
    const oData=tabType==='setech'?JSON.parse(os.setech||'{}')[selSubject||'көӯм–ҙ']:JSON.parse(os.changye||'{}')[tabType];
    if(oData?.result){const sim=similarity(data.result,oData.result);if(sim>0.65)simWarns.push(`${os.name}(${Math.round(sim*100)}%)`);}
  });
  const omiOk=data.result.includes('мһ„')&&(data.result.includes('мқҢ')||data.result.includes('н•Ё'));
  c.innerHTML=`
    <div class="check-item"><div class="ci ${byteOk?'ok':'warn'}">${byteOk?'вң“':'!'}</div> л°”мқҙнҠё лІ”мң„ ${byteOk?'м Ғн•©':'нҷ•мқё н•„мҡ”'} (${b})</div>
    <div class="check-item"><div class="ci ${hasForbidden?'warn':'ok'}">${hasForbidden?'!':'вң“'}</div> кёҲм§Җм–ҙ ${hasForbidden?'л°ңкІ¬лҗЁ':'м—ҶмқҢ'}</div>
    <div class="check-item"><div class="ci ${simWarns.length?'warn':'ok'}">${simWarns.length?'!':'вң“'}</div> мң мӮ¬лҸ„ ${simWarns.length?'мЈјмқҳ вҖ” '+simWarns.join(', '):'мқҙмғҒ м—ҶмқҢ'}</div>
    <div class="check-item"><div class="ci ${omiOk?'ok':'warn'}">${omiOk?'вң“':'!'}</div> м–ҙлҜё нҶөмқј ${omiOk?'нҷ•мқёлҗЁ':'нҷ•мқё н•„мҡ”'}</div>`;
}

function getTabData(tabType){
  const s=getStu();if(!s)return{memo:'',keywords:[],result:'',example:'',command:''};
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    return setech[selSubject||'көӯм–ҙ']||{memo:'',keywords:[],result:'',example:'',command:''};
  } else {
    const changye=JSON.parse(s.changye||'{}');
    return changye[tabType]||{memo:'',keywords:[],result:'',example:'',command:''};
  }
}

function saveTabData(tabType,label,updates){
  const s=getStu();if(!s)return;
  if(tabType==='setech'){
    const setech=JSON.parse(s.setech||'{}');
    const sub=selSubject||'көӯм–ҙ';
    setech[sub]={...(setech[sub]||{}), ...updates};
    s.setech=JSON.stringify(setech);
    sb.from('students').update({setech:s.setech}).eq('id',s.id);
  } else {
    const changye=JSON.parse(s.changye||'{}');
    changye[tabType]={...(changye[tabType]||{}), ...updates};
    s.changye=JSON.stringify(changye);
    sb.from('students').update({changye:s.changye}).eq('id',s.id);
  }
}

async function generateTab(tabType,label,feedback=''){

  } else if(isDokseo){
    prompt=`лӢ№мӢ мқҖ н•ңкөӯ кі л“ұн•ҷкөҗ көҗмӮ¬мһ…лӢҲлӢӨ. лҸ…м„ңнҷңлҸҷмғҒнҷ©мқ„ мһ‘м„ұн•ҙ мЈјм„ёмҡ”.`;

[л¶Җм • нӮӨмӣҢл“ң]: ${neg.join(', ')||'м—ҶмқҢ'}
[нҷңлҸҷ л©”лӘЁ]: ${data.memo||'м—ҶмқҢ'}
${commonExample?`[мҡ°мҲҳмӮ¬лЎҖ м°ёкі л¬ёмІҙ]:\n${commonExample}\n`:''}
${commonGuide?`[мһ‘м„ұ мҡ”л №]:\n${commonGuide}\n`:''}
${files.old?`[кё°мЎҙ мғқкё°л¶Җ мІЁл¶ҖлҗЁ${focusOld?` - мӨ‘м җ: ${focusOld}`:''}]\n`:''}
${(files.refs||[]).filter(r=>r).map((r,i)=>{const f=document.getElementById(`focusRef${i}`)?.value||'';return `[м°ёкі мһҗлЈҢ${i+1} мІЁл¶ҖлҗЁ${f?` - мӨ‘м җ: ${f}`:''}]\n`;}).join('')}

[мЎ°кұҙ]
- н•ҳлӮҳмқҳ мһҗм—°мҠӨлҹ¬мҡҙ л¬ёлӢЁ
- кө¬мІҙм Ғмқё нҷңлҸҷ лӮҙмҡ©кіј м—ӯлҹү/м„ұмһҘ мӨ‘мӢ¬мңјлЎң мһ‘м„ұ
- 'н•ҷмғқ','к·ёлҠ”','к·ёк°Җ','к·ёмқҳ' мӮ¬мҡ© кёҲм§Җ
- л¬ёмһҘ м–ҙлҜёлҠ” ~мһ„/~мқҢ/~н•ЁмңјлЎң нҶөмқј
- лӮҳмқҙмҠӨ кё°мӨҖ ${t}л°”мқҙнҠё л¶„лҹү
кІ°кіјл§Ң м¶ңл Ҙн•ҳм„ёмҡ”.`;

// нҢҢмқј л¶„м„қ кҙҖл Ё - н•ҷмғқлі„ + нғӯлі„лЎң мң м§Җ
const analyzedFilesMap={};

function getCurTabId(){return selTab||'haengdong';}

function getAnalyzedFiles(){
  const s=getStu();if(!s)return{old:null,refs:[null],example:null};
  const key=`${s.id}_${getCurTabId()}`;
  if(!analyzedFilesMap[key])analyzedFilesMap[key]={old:null,refs:[null],example:null};
  if(!analyzedFilesMap[key].refs)analyzedFilesMap[key].refs=[null];
  return analyzedFilesMap[key];
}

function triggerFile(type,idx=0){
  const inp=document.createElement('input');inp.type='file';inp.accept='.pdf,.ppt,.pptx';
  inp.onchange=()=>{if(inp.files[0])processFile(inp.files[0],type,idx);};
  inp.click();
}

function onDragOver(e,id){e.preventDefault();document.getElementById(id)?.classList.add('drag-over');}
function onDragLeave(id){document.getElementById(id)?.classList.remove('drag-over');}
function onDrop(e,type,idx=0){
  e.preventDefault();
  const id=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  document.getElementById(id)?.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f,type,idx);
}

async function processFile(file,type,idx=0){
  const dropId=type==='old'?'dropOld':type==='example'?'dropExample':`dropRef${idx}`;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const dropEl=document.getElementById(dropId);
  const resultEl=document.getElementById(resultId);
  if(dropEl)dropEl.classList.add('loading');
  if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#aaa;margin-top:6px;">рҹ“– нҢҢмқј мқҪлҠ” мӨ‘...</div>';
  try{
    const base64=await fileToBase64(file);
    const files=getAnalyzedFiles();
    const s=getStu();
    const fileData={name:file.name,base64,type:file.type||'application/pdf'};

    if(type==='old')files.old=fileData;
    else if(type==='example')files.example=fileData;
    else files.refs[idx]=fileData;

    // localStorageм—җ м ҖмһҘ (мғҲлЎңкі м№Ё нӣ„м—җлҸ„ мң м§Җ)
    if(s){
      const key=`files_${s.id}_${getCurTabId()}`;
      try{
        const stored=JSON.parse(localStorage.getItem(key)||'{}');
        if(type==='old')stored.old=fileData;
        else if(type==='example')stored.example=fileData;
        else{if(!stored.refs)stored.refs=[];stored.refs[idx]=fileData;}
        localStorage.setItem(key,JSON.stringify(stored));
      }catch(e){console.warn('localStorage мҡ©лҹү мҙҲкіј:', e);}
    }

    if(type==='refs'||type==='ref'){renderRefSlots();}
    else{renderFileStatus();}
  }catch(e){
    if(resultEl)resultEl.innerHTML='<div style="font-size:11px;color:#cf1322;margin-top:6px;">вқҢ нҢҢмқј мқҪкё° мӢӨнҢЁ</div>';
  }
  if(dropEl)dropEl.classList.remove('loading');
}

function clearFile(type,idx=0){
  const files=getAnalyzedFiles();
  if(type==='old')files.old=null;
  else if(type==='example')files.example=null;
  else files.refs[idx]=null;
  const resultId=type==='old'?'fileOldResult':type==='example'?'fileExampleResult':`fileRefResult${idx}`;
  const el=document.getElementById(resultId);if(el)el.innerHTML='';
}

          <span style="font-size:14px;">рҹ“Ӯ</span>

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function renderFileStatus(){
  const files=getAnalyzedFiles();
  // кё°мЎҙ мғқкё°л¶Җ мҳҒм—ӯ м—…лҚ°мқҙнҠё
  const oldArea=document.getElementById('oldFileArea');
  if(oldArea){

function similarity(a,b){
  const setA=new Set(a.split('').filter(c=>c.charCodeAt(0)>127));
  const setB=new Set(b.split('').filter(c=>c.charCodeAt(0)>127));
  let inter=0;setA.forEach(c=>{if(setB.has(c))inter++;});
  return inter/(setA.size+setB.size-inter)||0;
}

function renderChecklist(){
  const s=getStu();const c=document.getElementById('checklist');if(!c||!s)return;
  if(!s.result){c.innerHTML='<div class="check-item"><div class="ci pend">?</div> мғқкё°л¶ҖлҘј лЁјм Җ мғқм„ұн•ҙ мЈјм„ёмҡ”</div>';return;}
  const t=parseInt(document.getElementById('byteTarget')?.value||'1000');
  const b=bytes(s.result);
  const byteOk=b>=t*0.8&&b<=t;
  const forbidden=['мһҘм• ','кІ°мҶҗ','л¬ём ңм•„','л¶Ҳлҹү','л№ҲкіӨ','м ҖлҠҘ','м •мӢ лі‘','ADHD'];

  const omiOk=s.result.includes('мһ„')&&(s.result.includes('мқҢ')||s.result.includes('н•Ё'));

function previewExcel(inp){
  const f=inp.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    excelData=rows.filter(r=>r[0]&&r[1]).map(r=>({number:parseInt(r[0])||0,name:String(r[1]).trim()}));
    document.getElementById('xlPreview').innerHTML=`<p style="font-size:12px;color:#555;margin-top:8px;">рҹ“Ӣ ${excelData.length}лӘ…: ${excelData.slice(0,5).map(s=>s.name).join(', ')}${excelData.length>5?'...':''}</p>`;
  };
  reader.readAsBinaryString(f);
}

    // PDF/PPTлҠ” нҢҢмқјлӘ…л§Ң н‘ңмӢңн•ҳкі  base64лЎң м ҖмһҘн•ҙм„ң APIм—җ м „лӢ¬
    const reader=new FileReader();
    reader.onload=e=>{
      style.exampleFile={name:f.name,base64:e.target.result.split(',')[1],type:f.type};
      document.getElementById('s-ex').value=`[нҢҢмқј мІЁл¶ҖлҗЁ: ${f.name}]`;
    };
    reader.readAsDataURL(f);
  }
}

function loadGuideFile(inp){
  const f=inp.files[0];if(!f)return;
  document.getElementById('guideFileName').textContent=f.name;
  if(f.type==='text/plain'){
    const reader=new FileReader();
    reader.onload=e=>{document.getElementById('s-guide').value=e.target.result;};
    reader.readAsText(f,'utf-8');
  } else {
    const reader=new FileReader();
    reader.onload=e=>{
      style.guideFile={name:f.name,base64:e.target.result.split(',')[1],type:f.type};
      document.getElementById('s-guide').value=`[нҢҢмқј мІЁл¶ҖлҗЁ: ${f.name}]`;
    };
    reader.readAsDataURL(f);
  }
}

async function saveSettings(){
  profile.school=document.getElementById('s-school')?.value.trim()||'';
  profile.name=document.getElementById('s-name')?.value.trim()||'';
  profile.role=document.getElementById('s-role')?.value.trim()||'';
  apiKey=document.getElementById('s-api')?.value.trim()||'';
  style.omi=document.getElementById('s-omi')?.value.trim()||'~мһ„/~мқҢ/~н•Ё';
  style.adverb=document.getElementById('s-adv')?.value.trim()||'н•ӯмғҒ/л§ӨмӮ¬';
  style.tone=document.getElementById('s-tone')?.value.trim()||'кІ©мӢқмІҙ';
  await saveProfile();closeModal();
  document.querySelector('.logo-school').textContent=profile.school||'н•ҷкөҗ лҜём„Өм •';
  document.querySelector('.user-name').textContent=profile.name||'м„ мғқлӢҳ';
  document.querySelector('.user-role').textContent=profile.role||'лӢҙмһ„';
  document.querySelector('.avatar').textContent=(profile.name||'?')[0];
  alert('м ҖмһҘлҗҗм–ҙмҡ”!');
}

init();
</script>
